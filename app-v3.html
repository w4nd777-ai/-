    )
  ));

  // stat tiles (with subtitles explaining each)
  const grid = el('div', { class:'grid grid-4', style:{marginBottom:'16px'} });
  grid.appendChild(el('div', { class:'stat s-success card-hover', onclick:()=> go('attendance','signed'), title:'點此查看已簽到名單' },
    el('div', { class:'num' }, String(stats.signed)),
    el('div', { class:'lbl' }, '已簽到 / ' + stats.total + ' 人')
  ));
  grid.appendChild(el('div', { class:'stat s-danger card-hover', onclick:()=> go('attendance','absent'), title:'點此查看尚未到課學生' },
    el('div', { class:'num' }, String(stats.absent)),
    el('div', { class:'lbl' }, '未簽到 · 待處理')
  ));
  grid.appendChild(el('div', { class:'stat s-accent card-hover', onclick:()=> go('leave'), title:'點此管理請假' },
    el('div', { class:'num' }, String(stats.leave)),
    el('div', { class:'lbl' }, '請假中 · 已批准')
  ));
  grid.appendChild(el('div', { class:'stat s-warn card-hover', onclick:()=> go('attendance','late'), title:'點此查看遲到名單' },
    el('div', { class:'num' }, String(stats.late)),
    el('div', { class:'lbl' }, '今日遲到')
  ));
  content.appendChild(grid);

  // pending registrations
  if(App.db.pending && App.db.pending.length){
    const alert = el('div', { class:'card', style:{borderColor:'var(--warn)',background:'var(--warn-soft)',marginBottom:'12px'} },
      el('div', { class:'flex-between' },
        el('div', null,
          el('h3', null, '📥 有 ' + App.db.pending.length + ' 則新註冊申請'),
          el('div', { class:'small muted' }, '請審核以加入學生名單')
        ),
        el('button', { class:'btn btn-primary btn-sm', onclick:()=> go('pending') }, '前往審核 →')
      )
    );
    content.appendChild(alert);
  }

  // today's roster — 班級分組可摺疊
  if(App.db.students.length === 0){
    const card = el('div', { class:'card' });
    card.appendChild(el('div', { class:'flex-between', style:{marginBottom:'10px'} },
      el('h3', null, '今日班況'),
      el('div', { class:'tag' }, stats.signed + ' / ' + stats.total)
    ));
    card.appendChild(el('div', { class:'empty' },
      el('div', { class:'ico' }, '👥'),
      el('div', null, '還沒有學生'),
      el('button', { class:'btn btn-primary', style:{marginTop:'12px'}, onclick:()=> go('students') }, '＋ 新增學生')
    ));
    content.appendChild(card);
  } else {
    // 班級工具列
    App._ovExpandedCls = App._ovExpandedCls || {};
    const classes = [...new Set(App.db.students.map(s => s.cls || '未分班'))].sort();

    // 全展開 / 全收合按鈕
    const toolbar = el('div', { class:'flex-between', style:{marginBottom:'10px',flexWrap:'wrap',gap:'8px'} },
      el('h3', { style:{margin:'0'} }, '今日班況 · 依班級'),
      el('div', { class:'flex no-print' },
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._ovExpandedCls[c] = true; });
          rerender();
        }}, '全部展開 ▼'),
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._ovExpandedCls[c] = false; });
          rerender();
        }}, '全部收合 ▲')
      )
    );
    content.appendChild(toolbar);

    // 每個班級一張卡片
    classes.forEach(cls => {
      const stuInCls = App.db.students.filter(s => (s.cls || '未分班') === cls)
        .sort((a,b)=> (a.seat||0)-(b.seat||0));
      const stats_cls = {
        total: stuInCls.length,
        signed: 0, leave: 0, late: 0, absent: 0
      };
      stuInCls.forEach(s => {
        const att = studentSignedToday(s.id);
        const lv = studentOnLeaveToday(s.id);
        if(lv) stats_cls.leave++;
        else if(att) {
          if(att.status === 'late') stats_cls.late++;
          else stats_cls.signed++;
        }
        else stats_cls.absent++;
      });

      const isExpanded = App._ovExpandedCls[cls] !== false;  // 預設展開
      const card = el('div', { class:'card cls-section', style:{marginBottom:'12px',padding:'0',overflow:'hidden'} });

      // 班級 header（可點擊摺疊）
      const sigRate = stats_cls.total ? Math.round((stats_cls.signed + stats_cls.late) / stats_cls.total * 100) : 0;
      const sigColor = sigRate >= 80 ? 'var(--success)' : sigRate >= 50 ? 'var(--warn)' : 'var(--danger)';
      const header = el('div', { class:'cls-section-header', style:{
        padding:'14px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
        background: 'var(--surface)',borderBottom: isExpanded ? '1px solid var(--border)' : 'none',
        transition:'background .15s'
      }, onclick:()=> {
        App._ovExpandedCls[cls] = !isExpanded;
        rerender();
      }});
      // 摺疊箭頭
      header.appendChild(el('span', { style:{fontSize:'14px',transition:'transform .2s',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)'} }, '▼'));
      // 班級名
      header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
        el('span', { style:{fontWeight:'700',fontSize:'16px'} }, '🏫 ' + cls),
        el('span', { class:'small muted' }, '（' + stats_cls.total + ' 人）')
      ));
      // 班級統計小數字
      header.appendChild(el('div', { class:'flex', style:{gap:'8px',flexWrap:'wrap'} },
        el('span', { class:'pill', style:{background:'var(--success-soft)',color:'var(--success)',fontSize:'11px',fontWeight:'700'} },
          '✅ ' + (stats_cls.signed + stats_cls.late)),
        stats_cls.late > 0 ? el('span', { class:'pill', style:{background:'var(--warn-soft)',color:'var(--warn)',fontSize:'11px',fontWeight:'700'} },
          '🟡 ' + stats_cls.late) : null,
        stats_cls.leave > 0 ? el('span', { class:'pill', style:{background:'var(--accent-soft)',color:'var(--accent)',fontSize:'11px',fontWeight:'700'} },
          '📆 ' + stats_cls.leave) : null,
        el('span', { class:'pill', style:{background: stats_cls.absent > 0 ? 'var(--danger-soft)' : 'var(--surface-2)',color: stats_cls.absent > 0 ? 'var(--danger)' : 'var(--text-muted)',fontSize:'11px',fontWeight:'700'} },
          '❌ ' + stats_cls.absent),
        el('span', { style:{fontWeight:'700',fontSize:'14px',color:sigColor,marginLeft:'4px'} }, sigRate + '%')
      ));
      card.appendChild(header);

      if(isExpanded){
        const body = el('div', { style:{padding:'14px 16px'} });
        const sgrid = el('div', { class:'stu-grid' });
        stuInCls.forEach(s => {
          const att = studentSignedToday(s.id);
          const leave = studentOnLeaveToday(s.id);
          let scls = 'stu-card';
          if(leave) scls += ' leave';
          else if(att) scls += ' signed';
          else scls += ' absent';
          const c = el('div', { class: scls });
          c.appendChild(el('div', { class:'name' }, s.name + (s.seat ? ` (${s.seat})` : '')));
          c.appendChild(el('div', { class:'meta' }, '學號 ' + (s.sid || '—')));
          if(leave){
            c.appendChild(el('div', { class:'small' }, '📆 ' + (leave.reason || '請假中')));
          } else if(att){
            c.appendChild(el('div', { class:'small mono' }, '✅ ' + att.time));
          } else {
            const acts = el('div', { class:'actions' });
            acts.appendChild(el('button', { class:'btn btn-sm btn-success', onclick:()=> markPresent(s.id) }, '✓ 補簽'));
            acts.appendChild(el('button', { class:'btn btn-sm', onclick:()=> openLeaveDialog(s.id) }, '請假'));
            c.appendChild(acts);
          }
          sgrid.appendChild(c);
        });
        body.appendChild(sgrid);
        card.appendChild(body);
      }

      content.appendChild(card);
    });
  }
}

function markPresent(studentId, options={}){
  const s = findStudent(studentId);
  if(!s) return toast('找不到學生','danger');
  const existing = studentSignedToday(studentId);
  if(existing){
    toast(s.name + ' 已簽到於 ' + existing.time, 'warn');
    return;
  }
  const rec = {
    id: nid(), studentId, studentName: s.name, cls: s.cls || '',
    date: td(), time: nt(), ts: Date.now(),
    status: 'present', method: options.method || 'teacher-mark'
  };
  App.db.attendance.push(rec);
  saveDB();
  Sync.push('attendance', rec);
  bcNotify();
  toast('已標記 ' + s.name + ' 出席','success');
  rerender();
}

function openLeaveDialog(studentId){
  const s = findStudent(studentId);
  if(!s) return;
  promptDlg('請假原因（會自動批准）', '', { title:'為 ' + s.name + ' 請假' }).then(reason => {
    if(reason === null) return;
    const lv = {
      id: nid(), studentId, name: s.name, cls: s.cls||'',
      date: td(), reason: reason || '事假',
      status: 'approved', ts: Date.now(), reviewer: App.session?.name || '老師'
    };
    App.db.leaves.push(lv);
    saveDB();
    Sync.push('leaves', lv);
    bcNotify();
    toast('已為 ' + s.name + ' 請假','success');
    rerender();
  });
}

/* ════════════════════════════════════════════════════════════
   TEACHER: STUDENTS (rStu)
   ──────────────────────────────────────────────────────────── */
function rStu(content){
  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'14px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '學生名單'),
      el('div', { class:'muted small' }, '共 ' + App.db.students.length + ' 位 · 學生用「點我選擇」即可登入')
    ),
    el('div', { class:'flex no-print', style:{flexWrap:'wrap',gap:'6px'} },
      el('button', { class:'btn btn-sm', onclick: openCSVImport, title:'從 CSV 檔匯入學生名單' }, '📥 CSV 匯入'),
      el('button', { class:'btn btn-sm', onclick: openCSVExport, title:'匯出為 CSV 檔' }, '📤 匯出'),
      el('button', { class:'btn btn-sm', onclick: printCurrent, title:'列印 / 存 PDF' }, '🖨'),
      el('button', { class:'btn btn-sm', onclick: bulkAddStudents, title:'一次貼上多位學生姓名' }, '＋ 批次'),
      el('button', { class:'btn btn-sm btn-success', onclick: quickCreateStudent, title:'最快速：只要姓名 + 學號就建立帳號' }, '⚡ 快速建立'),
      el('button', { class:'btn btn-primary', onclick:()=> openStudentEdit(), title:'新增單一學生（含完整欄位）' }, '＋ 新增')
    )
  ));

  // search
  const searchBar = el('div', { style:{marginBottom:'12px'} });
  const inp = el('input', { class:'input', placeholder:'🔍 搜尋姓名 / 班級 / 座號', oninput: e => {
    App._stuSearch = e.target.value.toLowerCase();
    App._stuPage = 1; // batch 2: 換搜尋條件 → 回到第 1 頁
    renderList();
  }});
  if(App._stuSearch) inp.value = App._stuSearch;
  searchBar.appendChild(inp);
  content.appendChild(searchBar);

  const listWrap = el('div', { class:'card' });
  content.appendChild(listWrap);

  function renderList(){
    listWrap.innerHTML = '';
    let students = App.db.students.slice();
    const q = App._stuSearch || '';
    if(q){
      students = students.filter(s =>
        (s.name||'').toLowerCase().includes(q) ||
        (s.cls||'').toLowerCase().includes(q) ||
        String(s.seat||'').includes(q)
      );
    }
    students.sort((a,b)=> (a.cls||'').localeCompare(b.cls||'') || (a.seat||0)-(b.seat||0));

    if(students.length === 0){
      if(q){
        listWrap.appendChild(el('div', { class:'empty' },
          el('div', { class:'ico' }, '🔍'),
          el('div', null, '沒有符合「' + q + '」的學生')
        ));
      } else {
        // strong empty state with multiple paths to action
        listWrap.appendChild(emptyState({
          icon: '👥',
          title: '還沒有學生',
          msg: '建立學生後，學生開 V3 → 點「我是學生」就能直接看到自己名字',
          actions: [
            ['⚡ 快速建立（最簡單）', quickCreateStudent, 'btn btn-primary'],
            ['📥 從 CSV 匯入', openCSVImport, 'btn'],
            ['＋ 批次新增', bulkAddStudents, 'btn']
          ]
        }));
      }
      return;
    }

    // batch 2: 分頁（超過 perPage 自動啟用）
    const totalFiltered = students.length;
    const perPage = App._stuPerPage || 50;
    let page = App._stuPage || 1;
    const totalPages = Math.max(1, Math.ceil(totalFiltered / perPage));
    if(page > totalPages) page = totalPages;
    const startIdx = (page - 1) * perPage;
    const pagedStudents = students.slice(startIdx, startIdx + perPage);

    // 班級分組可摺疊（基於 pagedStudents）
    App._stuExpandedCls = App._stuExpandedCls || {};
    const classes = [...new Set(pagedStudents.map(s => s.cls || '未分班'))].sort();

    // 工具列：每頁筆數 + 全展開/收合
    const headerBar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'space-between',flexWrap:'wrap',alignItems:'center'} });
    const leftBar = el('div', { class:'flex', style:{gap:'6px',alignItems:'center',flexWrap:'wrap'} });
    if(totalFiltered > 30){
      leftBar.appendChild(renderPerPageSelect(perPage, [30, 50, 100], v => {
        App._stuPerPage = v;
        App._stuPage = 1;
        renderList();
      }));
      leftBar.appendChild(el('span', { class:'small muted' },
        '顯示 ' + (startIdx + 1) + '–' + Math.min(startIdx + perPage, totalFiltered) + ' / 共 ' + totalFiltered + ' 位'));
    }
    headerBar.appendChild(leftBar);
    if(classes.length > 1){
      const ctrl = el('div', { class:'flex', style:{gap:'6px'} },
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._stuExpandedCls[c] = true; });
          renderList();
        }}, '全部展開 ▼'),
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._stuExpandedCls[c] = false; });
          renderList();
        }}, '全部收合 ▲')
      );
      headerBar.appendChild(ctrl);
    }
    listWrap.appendChild(headerBar);

    // 替換變數參考：原本的 students 變成 pagedStudents（在分組顯示時）
    students = pagedStudents;

    // 共用：學生 row 渲染
    function renderStudentRow(s){
      const row = el('div', { class:'list-row' });
      row.appendChild(el('div', { class:'avatar' }, initials(s.name)));

      const pwBadge = s.mustChangePw
        ? el('span', { class:'pill pill-att warn', style:{fontSize:'10px',marginLeft:'6px'}, title:'學生尚未首次登入或老師已重設密碼' }, '🔐 未改密碼')
        : (s.passwordChangedAt
            ? el('span', { class:'pill pill-att ok', style:{fontSize:'10px',marginLeft:'6px'}, title:'學生已設定自己的密碼' }, '✅ 已改')
            : el('span', { class:'pill', style:{fontSize:'10px',marginLeft:'6px',background:'var(--surface-2)',color:'var(--text-muted)'}, title:'使用預設密碼' }, '預設'));

      row.appendChild(el('div', { class:'info' },
        el('div', { class:'name' }, [s.name + (s.seat ? ` (${s.seat})` : ''), pwBadge]),
        el('div', { class:'sub' }, (s.cls || '無班級')
          + (s.sid ? ' · 學號 ' + s.sid : '')
          + (s.email?' · '+s.email:'')
        )
      ));
      const acts = el('div', { class:'actions' });
      acts.appendChild(el('button', { class:'btn btn-sm', title:'重設密碼為學號末 4 碼', onclick: async ()=> {
        const defPw = String(s.sid||'0000').slice(-4);
        const ok = await confirmDlg(
          '確定重設 ' + s.name + ' 的密碼？\n\n新密碼將為「' + defPw + '」（學號末 4 碼）\n下次登入時學生需重新設定密碼',
          { title:'重設密碼' }
        );
        if(!ok) return;
        s.password = await hashPassword(defPw);
        s.mustChangePw = true;
        s.passwordChangedAt = null;
        s.passwordResetAt = Date.now();
        saveDB();
        if(typeof logOp === 'function') logOp('passwordReset', '重設 ' + s.name + ' 的密碼');
        Sync.setMap('students', App.db.students);
        bcNotify();
        toast('✅ 已重設 ' + s.name + ' 的密碼為 ' + defPw,'success');
        rerender();
      } }, '🔑'));
      acts.appendChild(el('button', { class:'btn btn-sm', onclick:()=> openStudentEdit(s) }, '✏️'));
      acts.appendChild(el('button', { class:'btn btn-sm btn-danger', onclick: async ()=> {
        const ok = await confirmDlg('確定刪除 ' + s.name + '？相關出席紀錄會保留', { danger:true });
        if(!ok) return;
        App.db.students = App.db.students.filter(x => x.id !== s.id);
        saveDB();
        Sync.setMap('students', App.db.students);
        bcNotify();
        toast('已刪除','success');
        rerender();
      } }, '🗑'));
      row.appendChild(acts);
      return row;
    }

    // 依班級分組顯示
    classes.forEach(cls => {
      const arr = students.filter(s => (s.cls || '未分班') === cls)
        .sort((a,b) => (a.seat||0) - (b.seat||0));
      const isExpanded = App._stuExpandedCls[cls] !== false;
      const unchangedInCls = arr.filter(s => s.mustChangePw).length;

      // 班級 header（可摺疊）
      const header = el('div', { class:'cls-section-header', style:{
        padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
        background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
        marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
        transition:'background .15s'
      }, onclick:()=> {
        App._stuExpandedCls[cls] = !isExpanded;
        renderList();
      }});
      header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
      header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
        el('span', { style:{fontWeight:'700',fontSize:'15px'} }, '🏫 ' + cls),
        el('span', { class:'small muted' }, '（' + arr.length + ' 人）'),
        unchangedInCls > 0 ? el('span', { class:'pill pill-att warn', style:{fontSize:'10px'} },
          '🔐 ' + unchangedInCls + ' 未改密碼') : null
      ));
      header.appendChild(el('span', { class:'small muted' }, isExpanded ? '收合' : '展開'));
      listWrap.appendChild(header);

      if(isExpanded){
        const body = el('div', { style:{border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',background:'var(--surface)',marginBottom:'8px'} });
        arr.forEach(s => body.appendChild(renderStudentRow(s)));
        listWrap.appendChild(body);
      }
    });

    // batch 2: 分頁控制（顯示在班級分組下方）
    if(totalPages > 1){
      listWrap.appendChild(renderPagination(totalFiltered, page, perPage, p => {
        App._stuPage = p;
        renderList();
      }));
    }

    // 批次操作工具列（密碼相關）— 注意此處算 unchanged 用「全部學生」而非 paged
    const allStudents = App.db.students;
    const unchangedCount = allStudents.filter(s => s.mustChangePw).length;
    if(unchangedCount > 0){
      const tools = el('div', { style:{marginTop:'10px',padding:'10px 14px',background:'var(--warn-soft)',borderRadius:'10px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px',flexWrap:'wrap'} },
        el('div', { class:'small' },
          el('span', { style:{fontWeight:'600'} }, '🔐 有 ' + unchangedCount + ' 位學生尚未自行修改密碼')
        ),
        el('button', { class:'btn btn-sm', onclick: async ()=> {
          const ok = await confirmDlg('確定批次重設所有學生密碼為「學號末 4 碼」？\n\n下次登入時學生會被要求自行修改', { danger:true, title:'批次重設密碼' });
          if(!ok) return;
          let n = 0;
          for(const s of App.db.students){
            const defPw = String(s.sid||'0000').slice(-4);
            s.password = await hashPassword(defPw);
            s.mustChangePw = true;
            s.passwordChangedAt = null;
            s.passwordResetAt = Date.now();
            n++;
          }
          saveDB();
          if(typeof logOp === 'function') logOp('passwordReset', '批次重設 ' + n + ' 位學生密碼');
          Sync.setMap('students', App.db.students);
          bcNotify();
          toast('✅ 已批次重設 ' + n + ' 位學生密碼','success');
          rerender();
        }}, '🔄 全部重設為預設')
      );
      listWrap.appendChild(tools);
    }
  }
  renderList();
}

/* ─────────────────────────────────────────────────────────────
   QUICK CREATE STUDENT — one-step "name + sid → done" flow
   The whole point: teacher can hand a child a working account in
   under 5 seconds. Password defaults to last 4 of student id.
   ───────────────────────────────────────────────────────────── */
function quickCreateStudent(){
  const m = modal('', { dismissable:true });
  m.root.appendChild(el('h2', null, '⚡ 快速建立學生'));
  m.root.appendChild(el('p', { class:'small muted' },
    '只要填姓名 + 學號，立刻建立完整帳號。密碼預設為學號末 4 碼。'
  ));

  const fName = el('div', { class:'field' });
  fName.appendChild(el('label', { class:'label' }, '姓名 *'));
  const iName = el('input', { class:'input', placeholder:'例：王小明' });
  fName.appendChild(iName);
  m.root.appendChild(fName);

  const fSid = el('div', { class:'field' });
  fSid.appendChild(el('label', { class:'label' }, '學號（4 位數以上建議）'));
  const iSid = el('input', { class:'input', placeholder:'例：12345 → 密碼變 2345' });
  fSid.appendChild(iSid);
  m.root.appendChild(fSid);

  const fCls = el('div', { class:'field' });
  fCls.appendChild(el('label', { class:'label' }, '班級（可空）'));
  const iCls = el('input', { class:'input', placeholder:'例：301', value: App._quickLastCls || '' });
  fCls.appendChild(iCls);
  m.root.appendChild(fCls);

  const fSeat = el('div', { class:'field' });
  fSeat.appendChild(el('label', { class:'label' }, '座號（可空）'));
  const iSeat = el('input', { class:'input', type:'number', placeholder:'例：1' });
  fSeat.appendChild(iSeat);
  m.root.appendChild(fSeat);

  // Live preview of generated password
  const preview = el('div', { class:'small muted', style:{
    marginTop:'4px',padding:'8px 12px',background:'var(--surface-2)',
    borderRadius:'8px',fontFamily:'ui-monospace,monospace'
  } }, '密碼將為：(請先填學號)');
  function updatePreview(){
    const sid = iSid.value.trim();
    if(sid && sid.length >= 1){
      const pw = sid.slice(-4).padStart(4,'0');
      preview.textContent = '🔑 預設密碼：' + pw + '（學號末 4 碼）';
    } else {
      preview.textContent = '🔑 預設密碼：0000（無學號時的 fallback）';
    }
  }
  iSid.addEventListener('input', updatePreview);
  updatePreview();
  m.root.appendChild(preview);

  // helper: "keep adding" mode (don't close modal, allow rapid entry)
  const keepGoing = el('label', { class:'small', style:{
    display:'flex',alignItems:'center',gap:'6px',marginTop:'10px',cursor:'pointer'
  }});
  const chk = el('input', { type:'checkbox' });
  if(App._quickKeepGoing) chk.checked = true;
  keepGoing.appendChild(chk);
  keepGoing.appendChild(el('span', null, '建立後繼續新增下一位（不關閉視窗）'));
  m.root.appendChild(keepGoing);

  async function doCreate(){
    const name = iName.value.trim();
    if(!name){ toast('姓名必填','danger'); iName.focus(); return; }
    const sid = iSid.value.trim();
    const cls = iCls.value.trim();
    const seat = parseInt(iSeat.value,10) || 0;
    const password = sid ? sid.slice(-4).padStart(4,'0') : '0000';
    const passwordHashed = await hashPassword(password);

    // de-dupe (warn but allow)
    const dup = App.db.students.find(s =>
      (sid && s.sid && String(s.sid) === sid) ||
      (s.name === name && s.cls === cls)
    );
    if(dup){
      toast('提醒：可能已存在「' + dup.name + '」','warn', 2200);
    }

    const rec = {
      id: nid(),
      name, sid, cls, seat,
      email: '', phone: '',
      parentName: '', parentPhone: '', parentEmail: '',
      password: passwordHashed,
      mustChangePw: true,  // 學生首次登入需自行修改密碼
      note: '快速建立'
    };
    App.db.students.push(rec);
    saveDB();
    try { Sync.setMap('students', App.db.students); bcNotify(); } catch(e){}
    toast('✓ 已建立 ' + name + '（預設密碼 ' + password + '，學生首次登入需改密碼）','success', 3000);

    App._quickLastCls = cls;
    App._quickKeepGoing = chk.checked;

    if(chk.checked){
      // reset for next entry but keep class
      iName.value = '';
      iSid.value = '';
      iSeat.value = seat ? String(seat + 1) : '';
      updatePreview();
      iName.focus();
      // partial rerender of list behind modal
      try { rerender(); } catch(e){}
    } else {
      m.close();
      rerender();
    }
  }

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick: doCreate }, '✓ 建立帳號'));
  m.root.appendChild(actions);

  // Enter from any field submits
  [iName, iSid, iCls, iSeat].forEach(inp => {
    inp.addEventListener('keydown', e => { if(e.key === 'Enter') doCreate(); });
  });
  setTimeout(()=> iName.focus(), 80);
}

function openStudentEdit(s=null){
  const isNew = !s;
  const m = modal('');
  m.root.appendChild(el('h2', null, isNew?'新增學生':'編輯學生'));

  // 基本欄位
  const fields = [
    { key:'name', label:'姓名', placeholder:'王小明', required:true },
    { key:'sid', label:'學號', placeholder:'例：12345（密碼預設為末 4 碼）' },
    { key:'cls', label:'班級', placeholder:'A班' },
    { key:'seat', label:'座號', type:'number', placeholder:'1' },
    { key:'email', label:'信箱', placeholder:'optional' },
    { key:'phone', label:'電話', placeholder:'optional' },
    { key:'password', label:'密碼（留空 = 不修改）', type:'password', placeholder: isNew ? '學生登入用' : '不修改請留空' },
    { key:'note', label:'備註', placeholder:'optional' }
  ];
  const inps = {};
  fields.forEach(f => {
    const fb = el('div', { class:'field' });
    fb.appendChild(el('label', { class:'label' }, f.label + (f.required?' *':'')));
    const i = el('input', { class:'input', type:f.type||'text', placeholder:f.placeholder||'' });
    // 不在編輯時預填明文密碼（避免外洩）
    if(s && s[f.key] != null && f.key !== 'password') i.value = s[f.key];
    inps[f.key] = i;
    fb.appendChild(i);
    m.root.appendChild(fb);
  });

  // 家長 / 監護人聯絡欄位（batch 1 新增）
  const parentTitle = el('h3', { style:{marginTop:'14px',marginBottom:'6px',fontSize:'14px'} }, '👨‍👩‍👧 家長 / 監護人（可選）');
  m.root.appendChild(parentTitle);
  const parentFields = [
    { key:'parentName', label:'👤 家長姓名', placeholder:'例：王爸爸' },
    { key:'parentPhone', label:'📞 家長電話', placeholder:'例：0912-345-678' },
    { key:'parentEmail', label:'📧 家長 Email', type:'email', placeholder:'parent@example.com' }
  ];
  parentFields.forEach(f => {
    const fb = el('div', { class:'field' });
    fb.appendChild(el('label', { class:'label' }, f.label));
    const i = el('input', { class:'input', type:f.type||'text', placeholder:f.placeholder||'' });
    if(s && s[f.key] != null) i.value = s[f.key];
    inps[f.key] = i;
    fb.appendChild(i);
    m.root.appendChild(fb);
  });

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick: async ()=> {
    const name = inps.name.value.trim();
    if(!name) return toast('姓名必填','danger');
    if(isNew){
      const rec = { id: nid() };
      for(const k of Object.keys(inps)){
        const v = inps[k].value;
        if(k === 'seat') rec[k] = parseInt(v,10) || 0;
        else if(k === 'password'){
          // 新增：若留空 → 用學號末 4 碼當預設
          const raw = v || String(rec.sid || '').slice(-4) || '0000';
          rec.password = await hashPassword(raw);
          if(!v) rec.mustChangePw = true;
        } else rec[k] = v;
      }
      App.db.students.push(rec);
    } else {
      for(const k of Object.keys(inps)){
        const v = inps[k].value;
        if(k === 'seat') s[k] = parseInt(v,10) || 0;
        else if(k === 'password'){
          // 編輯：留空 = 不修改
          if(v){
            s.password = await hashPassword(v);
            s.passwordChangedAt = Date.now();
            s.mustChangePw = false;
          }
        } else s[k] = v;
      }
    }
    saveDB();
    Sync.setMap('students', App.db.students);
    bcNotify();
    toast(isNew?'已新增':'已更新','success');
    m.close();
    rerender();
  } }, isNew?'新增':'儲存'));
  m.root.appendChild(actions);
}

function openCSVImport(){
  const m = modal('');
  m.root.appendChild(el('h2', null, 'CSV 匯入'));
  m.root.appendChild(el('p', { class:'small muted' }, '欄位：姓名,班級,座號,信箱,電話,密碼,備註'));
  const inp = el('input', { type:'file', accept:'.csv,.txt' });
  inp.addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const fr = new FileReader();
    fr.onload = () => {
      const text = fr.result.replace(/^﻿/, '');
      const lines = text.split(/\r?\n/).filter(l=>l.trim());
      // skip header if first row looks like one
      let start = 0;
      if(/姓名|name/i.test(lines[0])) start = 1;
      let added = 0;
      for(let i=start;i<lines.length;i++){
        const cols = lines[i].split(/,/).map(c=>c.trim().replace(/^"|"$/g,''));
        if(!cols[0]) continue;
        App.db.students.push({
          id: nid(),
          name: cols[0], cls: cols[1]||'', seat: parseInt(cols[2],10)||0,
          email: cols[3]||'', phone: cols[4]||'', password: cols[5]||'',
          note: cols[6]||''
        });
        added++;
      }
      saveDB();
      Sync.setMap('students', App.db.students);
      bcNotify();
      toast('已匯入 ' + added + ' 位','success');
      m.close();
      rerender();
    };
    fr.readAsText(file, 'UTF-8');
  });
  m.root.appendChild(inp);
  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '關閉'));
  m.root.appendChild(actions);
}

function openCSVExport(){
  const header = '姓名,班級,座號,信箱,電話,備註';
  const rows = App.db.students.map(s =>
    [s.name, s.cls, s.seat, s.email||'', s.phone||'', s.note||''].map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(',')
  );
  const csv = '﻿' + header + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'students_' + td() + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('已下載','success');
}

/* ════════════════════════════════════════════════════════════
   TEACHER: ATTENDANCE (rAtt)
   ──────────────────────────────────────────────────────────── */
function rAtt(content){
  const date = App._attDate || td();
  const filter = App.subview; // 'signed'|'absent'|'late'|null
  const att = App.db.attendance.filter(a => a.date === date);
  const signedIds = new Set(att.map(a => a.studentId));
  const leaveIds = new Set(App.db.leaves.filter(l => l.date === date && l.status === 'approved').map(l => l.studentId));

  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'14px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '出席管理'),
      el('div', { class:'muted small' }, '逐一替學生補簽、處理請假或標記遲到 · ' + date)
    ),
    el('div', { class:'flex' },
      el('input', { class:'input', type:'date', value:date, style:{width:'150px'}, title:'選擇日期', onchange: e => { App._attDate = e.target.value; rerender(); } }),
      el('button', { class:'btn btn-sm', onclick: ()=> { App._attDate = td(); rerender(); }, title:'跳到今天' }, '今天'),
      el('button', { class:'btn btn-sm btn-danger', onclick: clearTodayAttendance, title:'清空今天所有簽到紀錄' }, '🗑 清空')
    )
  ));

  // filter tabs
  const tabs = el('div', { class:'tab-bar', style:{maxWidth:'500px',marginBottom:'12px'} });
  const tabItems = [
    { v:null, t:'全部' }, { v:'signed', t:'已簽' },
    { v:'absent', t:'未簽' }, { v:'late', t:'遲到' }
  ];
  tabItems.forEach(t => {
    tabs.appendChild(el('button', { class: filter === t.v ? 'active':'', onclick:()=> go('attendance', t.v) }, t.t));
  });
  content.appendChild(tabs);

  // bulk actions
  const bulkBar = el('div', { class:'flex', style:{marginBottom:'12px',flexWrap:'wrap',gap:'6px'} },
    el('button', { class:'btn btn-success btn-sm', onclick:()=> bulkMark('present') }, '✓ 全班簽到'),
    el('button', { class:'btn btn-sm', onclick:()=> bulkMark('absent') }, '✗ 全班未簽'),
    el('button', { class:'btn btn-sm', onclick:()=> openMassLeave() }, '📆 批次請假')
  );
  content.appendChild(bulkBar);

  // student grid
  let students = App.db.students.slice().sort((a,b)=> (a.cls||'').localeCompare(b.cls||'') || (a.seat||0)-(b.seat||0));

  // 計算遲到判斷的閾值（給 header 統計用）
  const lateMinSetting = App.db.settings.lateMinutes || 10;
  const startSetting = App.db.settings.startTime || '08:00';
  const [shAll, smAll] = startSetting.split(':').map(Number);
  const lateThreshold = shAll*60 + smAll + lateMinSetting;
  function isStudentLate(stu){
    const a = att.find(x => x.studentId === stu.id);
    if(!a || !a.time) return false;
    const [h,m] = a.time.split(':').map(Number);
    return h*60+m > lateThreshold;
  }

  if(filter === 'signed') students = students.filter(s => signedIds.has(s.id));
  else if(filter === 'absent') students = students.filter(s => !signedIds.has(s.id) && !leaveIds.has(s.id));
  else if(filter === 'late') {
    students = students.filter(s => isStudentLate(s));
  }

  if(students.length === 0){
    content.appendChild(el('div', { class:'empty card' },
      el('div', { class:'ico' }, '📭'),
      el('div', null, '沒有符合的學生')
    ));
    return;
  }

  // 渲染單一學生卡片（共用）
  function renderStudentCard(s){
    const a = att.find(x => x.studentId === s.id);
    const lv = leaveIds.has(s.id) ? App.db.leaves.find(l => l.studentId === s.id && l.date === date) : null;
    let cls = 'stu-card';
    if(lv) cls += ' leave';
    else if(a) cls += ' signed';
    else cls += ' absent';
    const card = el('div', { class: cls });
    card.appendChild(el('div', { class:'name' }, s.name + (s.seat ? ` (${s.seat})` : '')));
    card.appendChild(el('div', { class:'meta' }, s.cls || '—'));
    if(lv){
      card.appendChild(el('div', { class:'small' }, '📆 ' + (lv.reason||'請假')));
      const acts = el('div', { class:'actions' });
      acts.appendChild(el('button', { class:'btn btn-sm', onclick:()=> {
        App.db.leaves = App.db.leaves.filter(x => x.id !== lv.id);
        saveDB(); Sync.setMap('leaves', App.db.leaves); bcNotify(); rerender();
      }}, '撤銷'));
      card.appendChild(acts);
    } else if(a){
      card.appendChild(el('div', { class:'small mono' }, '✅ ' + a.time));
      if(a.outTime){
        card.appendChild(el('div', { class:'small mono', style:{color:'var(--accent)'} }, '👋 ' + a.outTime));
      }
      const acts = el('div', { class:'actions' });
      acts.appendChild(el('button', { class:'btn btn-sm btn-danger', onclick:()=> {
        App.db.attendance = App.db.attendance.filter(x => x.id !== a.id);
        saveDB(); Sync.remove('attendance', a.id); bcNotify(); rerender();
      }}, '取消'));
      card.appendChild(acts);
    } else {
      const acts = el('div', { class:'actions' });
      acts.appendChild(el('button', { class:'btn btn-sm btn-success', onclick:()=> markPresent(s.id) }, '✓ 簽到'));
      acts.appendChild(el('button', { class:'btn btn-sm', onclick:()=> openLeaveDialog(s.id) }, '請假'));
      card.appendChild(acts);
    }
    return card;
  }

  // 班級分組（可摺疊）
  App._attExpandedCls = App._attExpandedCls || {};
  const classes = [...new Set(students.map(s => s.cls || '未分班'))].sort();

  // 全展開 / 全收合工具列
  if(classes.length > 1){
    const toolbar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'flex-end'} },
      el('button', { class:'btn btn-sm', onclick:()=> {
        classes.forEach(c => { App._attExpandedCls[c] = true; });
        rerender();
      }}, '全部展開 ▼'),
      el('button', { class:'btn btn-sm', onclick:()=> {
        classes.forEach(c => { App._attExpandedCls[c] = false; });
        rerender();
      }}, '全部收合 ▲')
    );
    content.appendChild(toolbar);
  }

  classes.forEach(cls => {
    const stuInCls = students.filter(s => (s.cls || '未分班') === cls)
      .sort((a,b)=> (a.seat||0) - (b.seat||0));

    // 班級統計
    const stCls = { total: stuInCls.length, signed:0, late:0, leave:0, absent:0 };
    stuInCls.forEach(s => {
      if(leaveIds.has(s.id)){ stCls.leave++; return; }
      const a = att.find(x => x.studentId === s.id);
      if(a){
        if(isStudentLate(s)) stCls.late++;
        else stCls.signed++;
      } else {
        stCls.absent++;
      }
    });
    const attendedTotal = stCls.signed + stCls.late;
    const rate = stCls.total ? Math.round(attendedTotal / stCls.total * 100) : 0;
    const rateColor = rate >= 80 ? 'var(--success)' : rate >= 50 ? 'var(--warn)' : 'var(--danger)';

    const isExpanded = App._attExpandedCls[cls] !== false;

    // 班級 header
    const header = el('div', { class:'cls-section-header', style:{
      padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
      background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
      marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
      transition:'background .15s'
    }, onclick:()=> {
      App._attExpandedCls[cls] = !isExpanded;
      rerender();
    }});
    header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
    header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
      el('span', { style:{fontWeight:'700',fontSize:'15px'} }, '🏫 ' + cls),
      el('span', { class:'small muted' }, '（' + stCls.total + ' 人）')
    ));
    header.appendChild(el('div', { class:'flex', style:{gap:'6px',flexWrap:'wrap',alignItems:'center'} },
      el('span', { class:'pill', style:{background:'var(--success-soft)',color:'var(--success)',fontSize:'11px',fontWeight:'700'} }, '✅ ' + stCls.signed),
      stCls.late > 0 ? el('span', { class:'pill', style:{background:'var(--warn-soft)',color:'var(--warn)',fontSize:'11px',fontWeight:'700'} }, '⏰ ' + stCls.late) : null,
      stCls.leave > 0 ? el('span', { class:'pill', style:{background:'var(--accent-soft)',color:'var(--accent)',fontSize:'11px',fontWeight:'700'} }, '📆 ' + stCls.leave) : null,
      el('span', { class:'pill', style:{background: stCls.absent > 0 ? 'var(--danger-soft)' : 'var(--surface-2)',color: stCls.absent > 0 ? 'var(--danger)' : 'var(--text-muted)',fontSize:'11px',fontWeight:'700'} }, '❌ ' + stCls.absent),
      el('span', { style:{fontWeight:'700',fontSize:'14px',color:rateColor,marginLeft:'4px'} }, rate + '%')
    ));
    content.appendChild(header);

    if(isExpanded){
      const body = el('div', { style:{border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',background:'var(--surface)',marginBottom:'8px',padding:'12px'} });
      const sgrid = el('div', { class:'stu-grid' });
      stuInCls.forEach(s => sgrid.appendChild(renderStudentCard(s)));
      body.appendChild(sgrid);
      content.appendChild(body);
    }
  });
}

function bulkMark(status){
  confirmDlg(status==='present' ? '要把全班標記為已簽到嗎？' : '要清掉本日所有簽到嗎？', { danger: status!=='present' }).then(ok => {
    if(!ok) return;
    const date = App._attDate || td();
    if(status === 'present'){
      const existing = new Set(App.db.attendance.filter(a => a.date === date).map(a => a.studentId));
      const newRecs = [];
      App.db.students.forEach(s => {
        if(existing.has(s.id)) return;
        newRecs.push({
          id: nid(), studentId: s.id, studentName: s.name, cls: s.cls||'',
          date, time: nt(), ts: Date.now(),
          status:'present', method:'teacher-bulk'
        });
      });
      App.db.attendance = App.db.attendance.concat(newRecs);
      saveDB();
      Sync.setMap('attendance', App.db.attendance);
      bcNotify();
      toast('已標記 ' + newRecs.length + ' 位出席','success');
    } else {
      // absent = remove today's records
      App.db.attendance = App.db.attendance.filter(a => a.date !== date);
      saveDB();
      Sync.setMap('attendance', App.db.attendance);
      bcNotify();
      toast('已清空 ' + date + ' 全部簽到','success');
    }
    rerender();
  });
}

function clearTodayAttendance(){
  confirmDlg('要清空 ' + (App._attDate||td()) + ' 的所有簽到嗎？此操作無法復原', { danger:true }).then(ok => {
    if(!ok) return;
    const date = App._attDate || td();
    App.db.attendance = App.db.attendance.filter(a => a.date !== date);
    saveDB();
    Sync.setMap('attendance', App.db.attendance);
    bcNotify();
    toast('已清空','success');
    rerender();
  });
}

function openMassLeave(){
  const date = App._attDate || td();
  const m = modal('');
  m.root.appendChild(el('h2', null, '批次請假'));
  m.root.appendChild(el('p', { class:'small muted' }, '日期：' + date));
  const lf = el('div', { class:'field' });
  lf.appendChild(el('label', { class:'label' }, '原因'));
  const reasonI = el('input', { class:'input', value:'事假', placeholder:'事假/病假...' });
  lf.appendChild(reasonI);
  m.root.appendChild(lf);

  m.root.appendChild(el('label', { class:'label' }, '選擇學生'));
  const checkWrap = el('div', { style:{maxHeight:'260px',overflow:'auto',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px'} });
  const checks = {};
  App.db.students.forEach(s => {
    const row = el('label', { class:'flex', style:{padding:'6px'} });
    const cb = el('input', { type:'checkbox' });
    checks[s.id] = cb;
    row.appendChild(cb);
    row.appendChild(el('span', null, ' ' + (s.cls?s.cls+' · ':'') + s.name + (s.seat?` (${s.seat})`:'')));
    checkWrap.appendChild(row);
  });
  m.root.appendChild(checkWrap);

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> {
    const reason = reasonI.value.trim() || '事假';
    let added = 0;
    Object.keys(checks).forEach(sid => {
      if(!checks[sid].checked) return;
      const s = findStudent(sid); if(!s) return;
      const exists = App.db.leaves.find(l => l.studentId === sid && l.date === date);
      if(exists) return;
      App.db.leaves.push({
        id:nid(), studentId:sid, name:s.name, cls:s.cls||'',
        date, reason, status:'approved', ts:Date.now(),
        reviewer: App.session?.name || '老師'
      });
      added++;
    });
    saveDB();
    Sync.setMap('leaves', App.db.leaves);
    bcNotify();
    toast('已建立 ' + added + ' 筆請假','success');
    m.close();
    rerender();
  }}, '建立請假'));
  m.root.appendChild(actions);
}

/* ════════════════════════════════════════════════════════════
   TEACHER: LEAVE (rLeave)
   ──────────────────────────────────────────────────────────── */
function rLeave(content){
  content.appendChild(el('h1', null, '請假管理'));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'14px'} }, '審核學生請假申請、查詢請假紀錄'));

  const tabs = el('div', { class:'tab-bar', style:{maxWidth:'420px',marginBottom:'12px'} });
  const sub = App.subview || 'pending';
  ['pending','approved','rejected','all'].forEach(t => {
    const label = { pending:'待審核', approved:'已批准', rejected:'已拒絕', all:'全部' }[t];
    tabs.appendChild(el('button', { class: sub === t ? 'active':'', onclick:()=> go('leave', t) }, label));
  });
  content.appendChild(tabs);

  let leaves = App.db.leaves.slice().sort((a,b)=> (b.ts||0) - (a.ts||0));
  if(sub !== 'all') leaves = leaves.filter(l => (l.status || 'pending') === sub);

  if(leaves.length === 0){
    content.appendChild(el('div', { class:'empty card' },
      el('div', { class:'ico' }, '📆'),
      el('div', null, '沒有請假紀錄')
    ));
    return;
  }

  // 單列渲染（共用）
  function renderLeaveRow(l){
    const row = el('div', { class:'list-row' });
    row.appendChild(el('div', { class:'avatar' }, initials(l.name)));
    row.appendChild(el('div', { class:'info' },
      el('div', { class:'name' }, l.name + ' · ' + l.date),
      el('div', { class:'sub' }, l.reason + ' · ' + relTime(l.ts||0))
    ));
    const statusTag = el('span', { class:'tag t-' + (l.status==='approved'?'success':l.status==='rejected'?'danger':'warn') },
      l.status==='approved'?'已批准':l.status==='rejected'?'已拒絕':'待審核'
    );
    const acts = el('div', { class:'actions', style:{alignItems:'center'} });
    acts.appendChild(statusTag);
    if((l.status||'pending') === 'pending'){
      acts.appendChild(el('button', { class:'btn btn-sm btn-success', onclick:()=> updateLeaveStatus(l.id, 'approved') }, '✓'));
      acts.appendChild(el('button', { class:'btn btn-sm btn-danger', onclick:()=> updateLeaveStatus(l.id, 'rejected') }, '✗'));
    } else {
      acts.appendChild(el('button', { class:'btn btn-sm', onclick: async ()=> {
        const ok = await confirmDlg('刪除這筆請假？', { danger:true });
        if(!ok) return;
        App.db.leaves = App.db.leaves.filter(x => x.id !== l.id);
        saveDB(); Sync.setMap('leaves', App.db.leaves); bcNotify();
        rerender();
      } }, '🗑'));
    }
    row.appendChild(acts);
    return row;
  }

  // 班級分組
  App._leaveExpandedCls = App._leaveExpandedCls || {};
  function clsOf(l){
    if(l.cls) return l.cls;
    const stu = l.studentId ? findStudent(l.studentId) : null;
    return (stu && stu.cls) || '未分班';
  }
  const classes = [...new Set(leaves.map(l => clsOf(l)))].sort();

  if(classes.length > 1){
    const toolbar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'flex-end'} },
      el('button', { class:'btn btn-sm', onclick:()=> {
        classes.forEach(c => { App._leaveExpandedCls[c] = true; });
        rerender();
      }}, '全部展開 ▼'),
      el('button', { class:'btn btn-sm', onclick:()=> {
        classes.forEach(c => { App._leaveExpandedCls[c] = false; });
        rerender();
      }}, '全部收合 ▲')
    );
    content.appendChild(toolbar);
  }

  classes.forEach(cls => {
    const inCls = leaves.filter(l => clsOf(l) === cls);
    const stCls = { total: inCls.length, pending:0, approved:0, rejected:0 };
    inCls.forEach(l => {
      const s = l.status || 'pending';
      if(s === 'pending') stCls.pending++;
      else if(s === 'approved') stCls.approved++;
      else if(s === 'rejected') stCls.rejected++;
    });

    const isExpanded = App._leaveExpandedCls[cls] !== false;

    const header = el('div', { class:'cls-section-header', style:{
      padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
      background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
      marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
      transition:'background .15s'
    }, onclick:()=> {
      App._leaveExpandedCls[cls] = !isExpanded;
      rerender();
    }});
    header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
    header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
      el('span', { style:{fontWeight:'700',fontSize:'15px'} }, '🏫 ' + cls),
      el('span', { class:'small muted' }, '（' + stCls.total + ' 件）')
    ));
    header.appendChild(el('div', { class:'flex', style:{gap:'6px',flexWrap:'wrap',alignItems:'center'} },
      stCls.pending > 0 ? el('span', { class:'pill', style:{background:'var(--warn-soft)',color:'var(--warn)',fontSize:'11px',fontWeight:'700'} }, '⏳ ' + stCls.pending) : null,
      stCls.approved > 0 ? el('span', { class:'pill', style:{background:'var(--success-soft)',color:'var(--success)',fontSize:'11px',fontWeight:'700'} }, '✅ ' + stCls.approved) : null,
      stCls.rejected > 0 ? el('span', { class:'pill', style:{background:'var(--danger-soft)',color:'var(--danger)',fontSize:'11px',fontWeight:'700'} }, '❌ ' + stCls.rejected) : null
    ));
    content.appendChild(header);

    if(isExpanded){
      const body = el('div', { class:'card', style:{
        border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',
        marginTop:'0',marginBottom:'8px',padding:'0'
      }});
      inCls.forEach(l => body.appendChild(renderLeaveRow(l)));
      content.appendChild(body);
    }
  });
}

// 共用：輸入欄（附件 + 文字 + 送出）
function buildMsgComposer(onSend){
  const inputBar = el('div', { style:{display:'flex',gap:'8px',marginTop:'12px',paddingTop:'12px',borderTop:'1px solid var(--border)',flexWrap:'wrap',alignItems:'center'} });
  const inp = el('input', { class:'input', placeholder:'輸入訊息...', style:{flex:'1',minWidth:'140px'} });
  let pendingAttach = null;
  const fInp = el('input', { type:'file', style:{display:'none'} });
  const attachPreviewSlot = el('div', { style:{width:'100%',display:'none',padding:'6px 0'} });
  function refreshAttachSlot(){
    attachPreviewSlot.innerHTML = '';
    if(pendingAttach){
      attachPreviewSlot.style.display = '';
      const chip = el('div', { class:'file-chip', style:{display:'inline-flex',alignItems:'center',gap:'6px',padding:'4px 10px',background:'var(--primary-soft)',color:'var(--primary)',borderRadius:'14px',fontSize:'12px'} },
        el('span', null, '📎 ' + pendingAttach.name + ' (' + Math.round((pendingAttach.size||0)/1024) + ' KB)'),
        el('span', { style:{cursor:'pointer'}, onclick: ()=> {
          if(pendingAttach && pendingAttach.key) { try { attachDelete(pendingAttach); } catch(e){} }
          pendingAttach = null; refreshAttachSlot();
        } }, '✗')
      );
      attachPreviewSlot.appendChild(chip);
    } else {
      attachPreviewSlot.style.display = 'none';
    }
  }
  fInp.addEventListener('change', async e => {
    const file = e.target.files[0]; if(!file) return;
    try {
      const data = await attachUpload(file);
      if(data){ pendingAttach = data; refreshAttachSlot(); }
    } catch(err){ toast(err.message || '上傳失敗','danger'); }
    fInp.value = '';
  });
  const attachBtn = el('button', { class:'btn btn-sm', title:'附加檔案', onclick:()=> fInp.click() }, '📎');
  const send = ()=>{
    const t = inp.value.trim();
    if(!t && !pendingAttach){ return; }
    onSend(t, pendingAttach);
    inp.value = '';
    pendingAttach = null;
    refreshAttachSlot();
  };
  inp.addEventListener('keydown', e => { if(e.key==='Enter') send(); });
  inputBar.appendChild(attachBtn);
  inputBar.appendChild(fInp);
  inputBar.appendChild(inp);
  inputBar.appendChild(el('button', { class:'btn btn-primary', onclick: send }, '送出'));
  return { inputBar, attachPreviewSlot };
}

function pushMsg(toId, text, attach, opts){
  const rec = {
    id: nid(),
    fromId: App.session.role === 'teacher' ? 'teacher' : App.session.id,
    fromName: App.session.name,
    fromRole: App.session.role,
    toId: toId || 'all',
    text: text || '',
    attach: attach || null,
    ts: Date.now()
  };
  App.db.messages.push(rec);
  saveDB();
  Sync.push('messages', rec);
  bcNotify();
  // batch 3: 通知對方（自己端不通知自己）
  try {
    // 對方 = 收件人；若是廣播 'all'，自己端只通知「不是自己發的」
    // pushMsg 是由自己呼叫的 → 自己端絕對 skip
    // 其它端則由 child_added listener 觸發後再通知
  } catch(e){}
  return rec;
}

/* ════════════════════════════════════════════════════════════
   ANONYMOUS FEEDBACK (batch 2)
   學生看「匿名」，老師後台看實名
   ────────────────────────────────────────────────────────────
   DB.feedbacks: [{
     id, studentId, studentName, cls,           // 老師才看得到
     ratings: { teaching, content, interaction, homework, overall }, // 各 1-5
     text,
     ts, term,                                  // term = 學期 key
     editHistory: [{ ts, ratings, text }]
   }]
   每位學生每學期只能填一份；可重新編輯（保留歷史）。
   ──────────────────────────────────────────────────────────── */
const FEEDBACK_DIMS = [
  { key:'teaching',    label:'🎓 教學品質' },
  { key:'content',     label:'📚 教材內容' },
  { key:'interaction', label:'💬 互動氛圍' },
  { key:'homework',    label:'🏠 作業合理性' },
  { key:'overall',     label:'🎯 整體滿意度' }
];

function currentTerm(){
  // 簡單規則：依年份 + 上/下學期（2 月 ~ 7 月為上、其餘下）
  const d = new Date();
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  return y + (m >= 2 && m <= 7 ? '-S1' : '-S2');
}

function studentFeedbackThisTerm(stuId){
  const term = currentTerm();
  return (App.db.feedbacks || []).find(f => f.studentId === stuId && f.term === term);
}

        s.addEventListener('click', ()=> { ratings[d.key] = i; repaint(); });

      }
      starsEl.appendChild(el('span', { class:'small muted', style:{marginLeft:'8px'} }, String(ratings[d.key]) + ' / 5'));
    }
    repaint();
    row.appendChild(starsEl);
    ratingRows.appendChild(row);

    const text = ta.value.trim();
    if(existing){
      // 更新並紀錄歷史
      const prevHistory = Array.isArray(existing.editHistory) ? existing.editHistory.slice() : [];
      prevHistory.push({ ts: existing.ts, ratings: Object.assign({}, existing.ratings), text: existing.text || '' });
      existing.ratings = Object.assign({}, ratings);
      existing.text = text;
      existing.ts = Date.now();
      existing.editHistory = prevHistory;

        id: nid(),

        studentName: me.name,

    toast('✅ 回饋已送出（匿名）','success');

  content.appendChild(formCard);
}

/* ─── 老師端：🗳️ 學生回饋（看實名） ─── */
function rFeedback(content){

  const term = currentTerm();

    ),

    )
  ));

  // 學期 tabs

  const list = all.filter(f => (f.term || term) === tab);
  // 統計
  const statsCard = el('div', { class:'card', style:{marginBottom:'14px'} });
  statsCard.appendChild(el('h3', null, '📊 學期統計：累積 ' + list.length + ' 份回饋'));
  if(list.length === 0){
    statsCard.appendChild(el('div', { class:'small muted', style:{marginTop:'6px'} }, '尚無資料'));
  } else {
    const dimGrid = el('div', { style:{marginTop:'10px'} });
    FEEDBACK_DIMS.forEach(d => {
      const vals = list.map(f => (f.ratings && f.ratings[d.key]) || 0).filter(v => v > 0);
      const avg = vals.length ? (vals.reduce((a,b)=>a+b,0) / vals.length) : 0;
      const avgFix = avg.toFixed(1);
      const row = el('div', { class:'bar-row' });
      row.appendChild(el('div', { class:'lab', style:{minWidth:'140px'} }, d.label));
      const barWrap = el('div', { class:'bar-wrap' });
      barWrap.appendChild(el('div', { class:'bar', style:{width: (avg/5*100) + '%'} }));
      row.appendChild(barWrap);
      row.appendChild(el('div', { class:'val', style:{minWidth:'90px',textAlign:'right'} },
        avgFix + ' ' + '★'.repeat(Math.round(avg)) + ' (' + vals.length + ')'));
      dimGrid.appendChild(row);
    });
    statsCard.appendChild(dimGrid);
  }
  content.appendChild(statsCard);

  // 排序工具列
  const sortKey = App._feedbackSort || 'ts';
  const sortBar = el('div', { class:'flex', style:{marginBottom:'10px',gap:'6px',flexWrap:'wrap'} },
    el('span', { class:'small muted' }, '排序：'),
    el('button', { class:'btn btn-sm ' + (sortKey==='ts'?'btn-primary':''), onclick:()=> { App._feedbackSort='ts'; rerender(); } }, '依時間'),
    el('button', { class:'btn btn-sm ' + (sortKey==='name'?'btn-primary':''), onclick:()=> { App._feedbackSort='name'; rerender(); } }, '依學生'),
    el('button', { class:'btn btn-sm ' + (sortKey==='high'?'btn-primary':''), onclick:()=> { App._feedbackSort='high'; rerender(); } }, '依評分高'),
    el('button', { class:'btn btn-sm ' + (sortKey==='low'?'btn-primary':''), onclick:()=> { App._feedbackSort='low'; rerender(); } }, '依評分低')
  );
  content.appendChild(sortBar);

  // 排序
  const sorted = list.slice();
  if(sortKey === 'ts') sorted.sort((a,b)=> (b.ts||0)-(a.ts||0));
  else if(sortKey === 'name') sorted.sort((a,b)=> (a.studentName||'').localeCompare(b.studentName||''));
  else if(sortKey === 'high') sorted.sort((a,b)=> avgOf(b.ratings) - avgOf(a.ratings));
  else if(sortKey === 'low') sorted.sort((a,b)=> avgOf(a.ratings) - avgOf(b.ratings));

  function avgOf(r){
    if(!r) return 0;
    const vs = Object.values(r).filter(v => typeof v === 'number');
    if(!vs.length) return 0;
    return vs.reduce((a,b)=>a+b,0) / vs.length;
  }

  if(sorted.length === 0){
    content.appendChild(el('div', { class:'empty card' },
      el('div', { class:'ico' }, '🗳️'),
      el('div', null, '尚無學生回饋')
    ));
    return;
  }

  // 渲染單一回饋卡（共用）
  function renderFeedbackCard(f){
    const avg = avgOf(f.ratings);
    const card = el('div', { class:'card', style:{marginBottom:'10px'} });
    card.appendChild(el('div', { class:'flex-between', style:{marginBottom:'6px',flexWrap:'wrap',gap:'6px'} },
      el('div', { class:'flex', style:{gap:'8px',alignItems:'center'} },
        el('div', { class:'avatar', style:{width:'36px',height:'36px',fontSize:'13px'} }, initials(f.studentName||'?')),
        el('div', null,
          el('div', { style:{fontWeight:'700'} }, '👤 ' + (f.studentName || '未知') + (f.cls?'（'+f.cls+'）':'')),
          el('div', { class:'tiny muted' },
            (f.sid?'學號 ' + f.sid + ' · ':'') + relTime(f.ts||0) +
            (f.editHistory && f.editHistory.length ? ' · ✏️ ' + f.editHistory.length + ' 次編輯' : ''))
        )
      ),
      el('div', { class:'flex', style:{gap:'6px',alignItems:'center'} },
        el('span', { class:'stars readonly' },
          ...Array.from({length:5}, (_,i) => el('span', { class:'s ' + (i < Math.round(avg) ? 'on' : '') }, '★'))
        ),
        el('span', { class:'pill', style:{background:'var(--primary-soft)',color:'var(--primary)',fontSize:'12px',fontWeight:'700'} }, avg.toFixed(1))
      )
    ));
    // 分項
    const dims = el('div', { class:'flex', style:{flexWrap:'wrap',gap:'6px',margin:'6px 0'} });
    FEEDBACK_DIMS.forEach(d => {
      const v = (f.ratings && f.ratings[d.key]) || 0;
      dims.appendChild(el('span', { class:'tag', style:{fontSize:'11px'} }, d.label + ' ' + v));
    });
    card.appendChild(dims);

    if(f.text){
      card.appendChild(el('div', { style:{marginTop:'6px',padding:'8px 10px',background:'var(--surface-2)',borderRadius:'8px',whiteSpace:'pre-wrap',fontSize:'13px'} }, '「' + f.text + '」'));
    }

    const acts = el('div', { class:'flex', style:{marginTop:'8px',gap:'6px',flexWrap:'wrap'} });
    acts.appendChild(el('button', { class:'btn btn-sm', onclick:()=> {
      // 一鍵私訊：開啟訊息 DM tab + 帶該學生
      App._dmActiveStu = f.studentId;
      go('messages','dm');
    } }, '💬 私訊回覆'));
    if(f.editHistory && f.editHistory.length){
      acts.appendChild(el('button', { class:'btn btn-sm', onclick:()=> showFeedbackHistory(f) }, '📜 歷史 (' + f.editHistory.length + ')'));
    }
    acts.appendChild(el('button', { class:'btn btn-sm btn-danger', onclick: async ()=> {
      const ok = await confirmDlg('確定刪除這份回饋？此動作無法復原', { danger:true });
      if(!ok) return;
      App.db.feedbacks = App.db.feedbacks.filter(x => x.id !== f.id);
      saveDB();
      try { Sync.setMap('feedbacks', App.db.feedbacks); } catch(e){}
      bcNotify();
      toast('已刪除','success');
      rerender();
    }}, '🗑'));
    card.appendChild(acts);
    return card;
  }

  // 班級分組（可摺疊）
  App._feedbackExpandedCls = App._feedbackExpandedCls || {};
  // 每筆回饋分配班級 (fallback 從學生資料反查)
  function clsOf(f){
    if(f.cls) return f.cls;
    const stu = f.studentId ? findStudent(f.studentId) : null;
    return (stu && stu.cls) || '未分班';
  }
  const classes = [...new Set(sorted.map(f => clsOf(f)))].sort();

  // 全展開 / 全收合工具列
  if(classes.length > 1){
    const toolbar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'flex-end'} },
      el('button', { class:'btn btn-sm', onclick:()=> {
        classes.forEach(c => { App._feedbackExpandedCls[c] = true; });
        rerender();
      }}, '全部展開 ▼'),
      el('button', { class:'btn btn-sm', onclick:()=> {
        classes.forEach(c => { App._feedbackExpandedCls[c] = false; });
        rerender();
      }}, '全部收合 ▲')
    );
    content.appendChild(toolbar);
  }

  classes.forEach(cls => {
    const inCls = sorted.filter(f => clsOf(f) === cls);
    // 班級統計
    const dimAvgs = FEEDBACK_DIMS.map(d => {
      const vs = inCls.map(f => (f.ratings && f.ratings[d.key]) || 0).filter(v => v > 0);
      return vs.length ? (vs.reduce((a,b)=>a+b,0)/vs.length) : 0;
    });
    const validDims = dimAvgs.filter(v => v > 0);
    const overallAvg = validDims.length ? (validDims.reduce((a,b)=>a+b,0)/validDims.length) : 0;
    // 該班學生 → 繳交率
    const stuInCls = App.db.students.filter(s => (s.cls || '未分班') === cls);
    const submittedStus = new Set(inCls.map(f => f.studentId).filter(Boolean));
    const submitRate = stuInCls.length ? Math.round([...submittedStus].filter(id => stuInCls.some(s => s.id === id)).length / stuInCls.length * 100) : 0;
    const avgColor = overallAvg >= 4 ? 'var(--success)' : overallAvg >= 3 ? 'var(--warn)' : 'var(--danger)';

    const isExpanded = App._feedbackExpandedCls[cls] !== false;

    const header = el('div', { class:'cls-section-header', style:{
      padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
      background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
      marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
      transition:'background .15s'
    }, onclick:()=> {
      App._feedbackExpandedCls[cls] = !isExpanded;
      rerender();
    }});
    header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
    header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
      el('span', { style:{fontWeight:'700',fontSize:'15px'} }, '🏫 ' + cls),
      el('span', { class:'small muted' }, '（' + inCls.length + ' 份）')
    ));
    header.appendChild(el('div', { class:'flex', style:{gap:'6px',flexWrap:'wrap',alignItems:'center'} },
      overallAvg > 0 ? el('span', { class:'stars readonly', style:{fontSize:'12px'} },
        ...Array.from({length:5}, (_,i) => el('span', { class:'s ' + (i < Math.round(overallAvg) ? 'on' : '') }, '★'))) : null,
      el('span', { class:'pill', style:{background:'var(--primary-soft)',color:avgColor,fontSize:'11px',fontWeight:'700'} }, '平均 ' + overallAvg.toFixed(1)),
      stuInCls.length > 0 ? el('span', { class:'pill', style:{background:'var(--surface)',color:'var(--text-muted)',fontSize:'11px',fontWeight:'700'} },
        '📝 ' + submittedStus.size + '/' + stuInCls.length + ' (' + submitRate + '%)') : null
    ));
    content.appendChild(header);

    if(isExpanded){
      const body = el('div', { style:{border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',background:'var(--surface)',marginBottom:'8px',padding:'12px'} });
      inCls.forEach(f => body.appendChild(renderFeedbackCard(f)));
      content.appendChild(body);
    }
  });
}

function exportFeedbackCSV(term){
  const list = (App.db.feedbacks || []).filter(f => (f.term || '') === term);
  if(!list.length) return toast('沒有資料','warn');
  const headers = ['學生','班級','學號','學期','時間','整體平均'];
  FEEDBACK_DIMS.forEach(d => headers.push(d.label.replace(/^\W+\s*/,'')));
  headers.push('文字回饋');
  const rows = [headers];
  list.forEach(f => {
    const vs = Object.values(f.ratings||{}).filter(v => typeof v === 'number');
    const avg = vs.length ? (vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(2) : '';
    const r = [f.studentName||'', f.cls||'', f.sid||'', f.term||'', new Date(f.ts||0).toLocaleString('zh-TW'), avg];
    FEEDBACK_DIMS.forEach(d => r.push((f.ratings && f.ratings[d.key]) || ''));
    r.push((f.text||'').replace(/\r?\n/g,' '));
    rows.push(r);
  });
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const bom = '﻿';
  const blob = new Blob([bom + csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'feedback_' + term + '_' + td() + '.csv';
  a.click();
  setTimeout(()=> URL.revokeObjectURL(url), 1000);
  toast('已匯出 CSV','success');
}

/* ════════════════════════════════════════════════════════════
   PAGINATION HELPER (batch 2)
   共用：renderPagination(total, page, perPage, onChange)
   ──────────────────────────────────────────────────────────── */
function renderPagination(total, page, perPage, onChange){
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  if(totalPages <= 1) return el('div'); // 不需要分頁

  const wrap = el('div', { class:'flex no-print', style:{margin:'12px 0',gap:'4px',justifyContent:'center',alignItems:'center',flexWrap:'wrap'} });
  function btn(label, p, disabled, active){
    const b = el('button', {
      class:'btn btn-sm ' + (active?'btn-primary':''),
      style:{minWidth:'34px',padding:'4px 10px',opacity: disabled?'0.4':'1', cursor: disabled?'not-allowed':'pointer'},
      onclick: disabled ? null : ()=> onChange(p)
    }, String(label));
    if(disabled) b.disabled = true;
    return b;
  }

  wrap.appendChild(btn('«', 1, page === 1));
  wrap.appendChild(btn('‹', page-1, page === 1));

  // 顯示頁碼：當前 +/- 2，加 ...
  const range = [];
  range.push(1);
  for(let p = Math.max(2, page-2); p <= Math.min(totalPages-1, page+2); p++) range.push(p);
  if(totalPages > 1) range.push(totalPages);
  const uniq = [...new Set(range)].sort((a,b)=> a-b);

  let prev = 0;
  uniq.forEach(p => {
    if(p - prev > 1) wrap.appendChild(el('span', { class:'small muted', style:{padding:'0 4px'} }, '…'));
    wrap.appendChild(btn(p, p, false, p === page));
    prev = p;
  });

  wrap.appendChild(btn('›', page+1, page === totalPages));
  wrap.appendChild(btn('»', totalPages, page === totalPages));

  // 跳到指定頁
  wrap.appendChild(el('span', { class:'small muted', style:{marginLeft:'8px'} }, '跳到'));
  const jInp = el('input', { type:'number', min:1, max:totalPages, value:page,
    style:{width:'56px',padding:'4px',border:'1px solid var(--border)',borderRadius:'6px',fontSize:'13px'} });
  jInp.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      const v = Math.max(1, Math.min(totalPages, parseInt(jInp.value)||1));
      onChange(v);
    }
  });
  wrap.appendChild(jInp);
  wrap.appendChild(el('span', { class:'small muted' }, '/ ' + totalPages));

  return wrap;
}

function renderPerPageSelect(current, options, onChange){
  const sel = el('select', { class:'select', style:{width:'auto',padding:'4px 8px',fontSize:'13px'},
    onchange: e => onChange(parseInt(e.target.value) || options[0]) });
  options.forEach(v => {
    const o = el('option', { value: String(v) }, '每頁 ' + v + ' 筆');
    if(v === current) o.selected = true;
    sel.appendChild(o);
  });
  return sel;
}

function approveStudent(pid){
  const p = App.db.pending.find(x => x.id === pid);
  if(!p) return;
  App.db.students.push({
    id: nid(), name:p.name, sid:p.sid||'', cls:p.cls, seat:p.seat,
    email:p.email||'',
    password:p.password,
    mustChangePw: !!p.mustChangePw,
    note:'學生自註冊'
  });
  App.db.pending = App.db.pending.filter(x => x.id !== pid);
  saveDB();
  Sync.setMap('students', App.db.students);
  Sync.setMap('pending', App.db.pending);
  bcNotify();
  if(typeof logOp === 'function') logOp('approveRegister', '核准 ' + p.name + ' 註冊');
  toast('已加入 ' + p.name,'success');
  rerender();
}

// 核准密碼重設請求
async function approvePwReset(rid){
  const r = (App.db.passwordResets || []).find(x => x.id === rid);
  if(!r) return;
  const s = App.db.students.find(x => x.id === r.studentId);
  if(!s){ toast('學生已不存在','danger'); return; }
  const defPw = String(s.sid||'0000').slice(-4);
  s.password = await hashPassword(defPw);
  s._defPwHint = defPw;
  s.mustChangePw = true;
  s.passwordChangedAt = null;
  s.passwordResetAt = Date.now();
  r.status = 'approved';
  r.processedAt = Date.now();
  saveDB();
  try { Sync.setMap('students', App.db.students); Sync.setMap('passwordResets', App.db.passwordResets); bcNotify(); } catch(e){}
  if(typeof logOp === 'function') logOp('pwResetApprove', '核准重設 ' + s.name + ' 密碼為 ' + defPw);
  toast('✅ 已重設 ' + s.name + ' 密碼為 ' + defPw + '，請告知學生','success', 5000);
  rerender();
}
function rejectPwReset(rid){
  confirmDlg('拒絕此密碼重設請求？', { danger:true }).then(ok => {
    if(!ok) return;
    const r = (App.db.passwordResets || []).find(x => x.id === rid);
    if(!r) return;
    r.status = 'rejected';
    r.processedAt = Date.now();
    saveDB();
    try { Sync.setMap('passwordResets', App.db.passwordResets); bcNotify(); } catch(e){}
    toast('已拒絕請求','warning');
    rerender();
  });
}
function rejectStudent(pid){
  confirmDlg('拒絕並刪除此申請？', { danger:true }).then(ok => {
    if(!ok) return;
    App.db.pending = App.db.pending.filter(x => x.id !== pid);
    saveDB();
    Sync.setMap('pending', App.db.pending);
    bcNotify();
    toast('已拒絕','warn');
    rerender();
  });
}

function renderNotifyCard(){
  const card = el('div', { class:'card', style:{marginTop:'12px'} });
  card.appendChild(el('h3', null, '🔔 通知設定'));
  card.appendChild(el('div', { class:'small muted', style:{marginBottom:'10px'} },
    '啟用後，瀏覽器會在收到新訊息 / 公告 / 學生事件時推送桌面通知（前景）。'));

  const perm = notifyPermission();
  const stateRow = el('div', { class:'flex-between', style:{alignItems:'center',marginBottom:'10px',flexWrap:'wrap',gap:'8px'} });
  const stateLabel = (() => {
    if(perm === 'unsupported') return el('span', { class:'tag' }, '此瀏覽器不支援');
    if(perm === 'granted')     return el('span', { class:'tag t-success' }, '已啟用 (granted)');
    if(perm === 'denied')      return el('span', { class:'tag t-danger' }, '已封鎖 (denied)');
    return el('span', { class:'tag t-warn' }, '尚未授權 (default)');
  })();
  stateRow.appendChild(el('div', null,
    el('div', { class:'small muted' }, '目前權限狀態'),
    stateLabel
  ));
  if(perm === 'default'){
    stateRow.appendChild(el('button', { class:'btn btn-primary', onclick: async ()=> {
      await notifyRequest();
      rerender();
    } }, '🔔 啟用通知'));
  } else if(perm === 'denied'){
    stateRow.appendChild(el('div', { class:'small muted' },
      '請到網址列旁的鎖頭圖示中將「通知」改為允許'));
  } else if(perm === 'granted'){
    stateRow.appendChild(el('button', { class:'btn', onclick: ()=> {
      notify('🔔 測試通知', '看到我，代表通知運作正常！', { silent:false });
    } }, '🧪 測試通知'));
  }
  card.appendChild(stateRow);

  // 通知類型偏好
  const role = App.session && App.session.role;
  const filtered = NOTIFY_TYPES.filter(t => role === 'teacher' ? t.forTeacher : t.forStudent);
  const prefs = (App.db.settings.notifications) || {};
  const list = el('div', { style:{display:'grid',gap:'6px',marginTop:'4px'} });
  filtered.forEach(t => {
    const checked = (prefs[t.key] === true);
    const lbl = el('label', { class:'flex', style:{alignItems:'center',gap:'8px',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:'8px',cursor:'pointer'} });
    const ck = el('input', { type:'checkbox' });
    if(checked) ck.checked = true;
    if(perm !== 'granted') ck.disabled = true;
    ck.onchange = ()=> {
      App.db.settings.notifications = App.db.settings.notifications || {};
      App.db.settings.notifications[t.key] = ck.checked;
      saveDB();
      try { Sync.setNode && Sync.setNode('settings', App.db.settings); } catch(e){}
    };
    lbl.appendChild(ck);
    lbl.appendChild(el('span', null, t.label));
    list.appendChild(lbl);
  });
  card.appendChild(list);

  if(perm !== 'granted'){
    card.appendChild(el('div', { class:'small muted', style:{marginTop:'8px'} },
      '提示：須先「啟用通知」才能勾選類型'));
  }
  return card;
}

function openAttendanceStatusEditor(existing, onDone){
  const isNew = !existing;
  const m = modal('', { dismissable:true });
  m.root.appendChild(el('h2', null, isNew ? '＋ 新增出席狀態' : '✏️ 編輯：' + existing.label));

  const fLabel = el('div', { class:'field' });
  fLabel.appendChild(el('label', { class:'label' }, '顯示文字 *'));
  const iLabel = el('input', { class:'input', placeholder:'例：公假', value: existing?.label || '' });
  fLabel.appendChild(iLabel);
  m.root.appendChild(fLabel);

  const fIcon = el('div', { class:'field' });
  fIcon.appendChild(el('label', { class:'label' }, 'Icon（emoji）'));
  const iIcon = el('input', { class:'input', placeholder:'🏃', value: existing?.icon || '✅' });
  fIcon.appendChild(iIcon);
  m.root.appendChild(fIcon);

  const fColor = el('div', { class:'field' });
  fColor.appendChild(el('label', { class:'label' }, '顏色'));
  const iColor = el('select', { class:'input select' });
  [
    ['success','綠（出席）'],
    ['warn','橙（注意）'],
    ['danger','紅（嚴重）'],
    ['accent','紫（特殊）'],
    ['primary','藍（一般）']
  ].forEach(([v,t]) => {
    const o = el('option', { value:v }, t);
    if((existing?.color || 'success') === v) o.setAttribute('selected','');
    iColor.appendChild(o);
  });
  fColor.appendChild(iColor);
  m.root.appendChild(fColor);

  const fCounts = el('div', { class:'field' });
  fCounts.appendChild(el('label', { class:'label' }, '出席權重（0 ~ 1，計算出席率用）'));
  const iCounts = el('input', { class:'input', type:'number', min:'0', max:'1', step:'0.1',
    value: (typeof existing?.counts === 'number') ? existing.counts : 1 });
  fCounts.appendChild(iCounts);
  fCounts.appendChild(el('div', { class:'tiny muted', style:{marginTop:'4px'} },
    '1 = 完整出席、0.5 = 半出席、0 = 完全缺席'));
  m.root.appendChild(fCounts);

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick: ()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick: ()=> {
    const label = iLabel.value.trim();
    if(!label) return toast('顯示文字必填','danger');
    const icon = iIcon.value.trim() || '•';
    const color = iColor.value || 'success';
    let counts = parseFloat(iCounts.value);
    if(isNaN(counts)) counts = 1;
    counts = Math.max(0, Math.min(1, counts));
    const statuses = getAttendanceStatuses();
    if(isNew){
      const key = 'custom_' + Math.random().toString(36).slice(2,8);
      statuses.push({ key, label, icon, color, counts, builtin:false });
    } else {
      existing.label = label;
      existing.icon = icon;
      existing.color = color;
      existing.counts = counts;
    }
    App.db.settings.attendanceStatuses = statuses;
    saveDB();
    try { Sync.setNode('settings', App.db.settings); bcNotify(); } catch(e){}
    toast(isNew ? '已新增' : '已更新','success');
    m.close();
    if(onDone) onDone();
  }}, isNew ? '新增' : '儲存'));
  m.root.appendChild(actions);
}

function rFirebase(content){
  content.appendChild(el('h1', null, '跨裝置同步'));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'14px'} }, '使用 Firebase Realtime Database，讓老師手機/平板/電腦即時同步'));

  const stateMap = {
    idle: { tag:'未啟用', cls:'' },
    connecting: { tag:'連線中', cls:'t-warn' },
    online: { tag:'已連線', cls:'t-success' },
    error: { tag:'錯誤', cls:'t-danger' }
  };
  const st = stateMap[App.fbStatus] || stateMap.idle;
  content.appendChild(el('div', { class:'card', style:{marginBottom:'12px'} },
    el('div', { class:'flex-between' },
      el('div', null,
        el('h3', null, '目前狀態'),
        el('div', { class:'small muted' }, '教室代碼：' + (App.cfg?.roomCode || '—'))
      ),
      el('span', { class:'tag ' + st.cls }, st.tag)
    )
  ));

  const card = el('div', { class:'card' });
  card.appendChild(el('h3', null, 'Firebase 設定'));
  card.appendChild(el('p', { class:'small muted' }, '到 Firebase 主控台 → 建立專案 → 啟用 Realtime Database → 設定為「測試模式」→ 複製 SDK 設定貼到下面'));

  const ta = el('textarea', { class:'textarea', style:{minHeight:'180px',fontFamily:'monospace',fontSize:'12px'},
    placeholder:'{\n  "apiKey": "...",\n  "authDomain": "...",\n  "databaseURL": "https://....firebaseio.com",\n  "projectId": "..."\n}'
  });
  const cur = localStorage.getItem(LS_FB);
  if(cur) ta.value = cur;
  card.appendChild(ta);

  card.appendChild(el('div', { class:'flex', style:{marginTop:'10px',flexWrap:'wrap'} },
    el('button', { class:'btn btn-primary', onclick:()=> {
      const text = ta.value.trim();
      if(!text){
        localStorage.removeItem(LS_FB);
        Sync.detachAll();
        toast('已清除 Firebase 設定','warn');
        rerender();
        return;
      }
      let cfg;
      try { cfg = JSON.parse(text); }
      catch(e){ return toast('JSON 格式錯誤','danger'); }
      if(!cfg.databaseURL) return toast('需要 databaseURL','danger');
      try { localStorage.setItem(LS_FB, JSON.stringify(cfg)); } catch(e){ return toast('儲存失敗','danger'); }
      Sync.init();
      toast('已套用，連線中...','success');
      setTimeout(rerender, 500);
    } }, '💾 套用'),
    el('button', { class:'btn', onclick:()=> {
      Sync.detachAll();
      try { localStorage.removeItem(LS_FB); } catch(e){}
      ta.value = '';
      toast('已停用同步','warn');
      rerender();
    } }, '⏏ 停用'),
    el('button', { class:'btn', onclick:()=> Sync.init() }, '🔄 重連')
  ));
  content.appendChild(card);

  // teacher's instructions to share with students
  const card2 = el('div', { class:'card', style:{marginTop:'12px'} });
  card2.appendChild(el('h3', null, '📲 分享給學生'));

  card2.appendChild(el('div', { class:'small muted', style:{marginTop:'8px'} }, '提示：學生也要設定相同的 Firebase（或老師可分享連結）'));
  content.appendChild(card2);
}

function rCheckIn(content){
  const me = currentStudent();

  // header
  content.appendChild(el('div', { style:{textAlign:'center',marginBottom:'8px'} },
    el('h1', null, '✋ 我要簽到'),

  if(onLeave){

      el('div', { class:'huge' }, '📆'),

      el('div', { class:'huge' }, '✅'),
      el('h2', { style:{color:'var(--success)'} }, '已完成簽到'),
      el('div', { class:'mono big' }, already.time),
      el('div', { class:'muted small' }, '今天 ' + already.date + ' · 看你真積極！')

        style:{ marginTop:'14px',padding:'10px 14px',background:'var(--surface)',borderRadius:'10px' }

      '按下大按鈕，立刻完成今日簽到'
    ));
  }

  content.appendChild(wrap);

  // ── my progress (compact stats) ──
  try {
    const attRate = attendanceRate(me.id);
    const subRate = submissionRate(me.id);
    const subAvg = submissionAvg(me.id);
    const unreadAnn = (typeof studentUnreadAnnouncements === 'function' ? studentUnreadAnnouncements() : 0) || 0;

    progress.appendChild(el('div', { class:'pbar primary' },

            el('div', { class:'small' }, '下次直接點圖示開啟，更方便')
          ),
          el('div', { style:{display:'flex',gap:'4px'} },
            el('button', { class:'btn btn-sm btn-primary', onclick:()=> go('install') }, '看說明'),
            el('button', { class:'btn btn-sm', onclick:()=> {
              try { localStorage.setItem('cms_v3_install_dismissed','1'); } catch(e){}
              rerender();
            }}, '不再提醒')
          )
        )
      );
      content.appendChild(hint);
    }
  } catch(e){}
}

function doStudentCheckIn(){
  const me = currentStudent();
  if(!me) return;
  if(studentSignedToday(me.id)){
    toast('你今天已經簽到過了','warn');
    return;
  }
  if(studentOnLeaveToday(me.id)){
    toast('你今天有請假，不需簽到','warn');
    return;
  }
  const btn = document.querySelector('.checkin-btn');
  if(btn){ btn.classList.remove('pulse'); btn.classList.add('done'); btn.disabled = true; }

  const rec = {
    id: nid(), studentId: me.id, studentName: me.name, cls: me.cls||'',
    date: td(), time: nt(), ts: Date.now(),
    status:'present', method:'student-self'
  };
  App.db.attendance.push(rec);
  saveDB();
  Sync.push('attendance', rec);
  bcNotify();

  // success animation
  const check = el('div', { class:'success-check' }, '✓');
  document.body.appendChild(check);
  setTimeout(()=> check.remove(), 900);

  // confetti
  const colors = ['#16a34a','#2563eb','#8b5cf6','#ea580c','#dc2626','#facc15'];
  for(let i=0;i<14;i++){
    const c = el('div', { class:'confetti', style:{
      left: (50 + (Math.random()*40 - 20)) + '%',
      top: '40%',
      background: colors[Math.floor(Math.random()*colors.length)],
      transform: 'rotate(' + (Math.random()*360) + 'deg)',
      animationDelay: (Math.random()*0.2) + 's'
    }});
    document.body.appendChild(c);
    setTimeout(()=> c.remove(), 1600);
  }

  toast('簽到成功！' + rec.time, 'success', 3000);
  setTimeout(()=> rerender(), 1400);
}

// batch 1：學生簽退
function studentCheckOut(){
  const me = currentStudent();

  const today = td();

    a.studentId === me.id && a.date === today

}
