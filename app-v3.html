<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<title>課程管理系統 v3</title>
<link rel="manifest" href="manifest.json">

<!-- Firebase (optional) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* ════════════════════════════════════════════════════════════
   課程管理系統 v3  —  完整重寫版（階段 1 核心基礎）
   --------------------------------------------------------
   - 保留 v1 60+ 功能、套用 v2 乾淨架構
   - 內建 Firebase 跨裝置同步（可選）
   - 手機優先 + 桌面完美
   - Linear / Notion 風格極簡
   ──────────────────────────────────────────────────────── */

/* ---------- design tokens ---------- */
:root{
  --bg:#fafafa; --surface:#ffffff; --surface-2:#f4f4f5; --surface-3:#ececef;
  --text:#18181b; --text-muted:#71717a; --text-faint:#a1a1aa;
  --border:#e4e4e7; --border-strong:#d4d4d8;
  --primary:#2563eb; --primary-hover:#1d4ed8; --primary-soft:#dbeafe; --primary-fg:#fff;
  --success:#16a34a; --success-soft:#dcfce7;
  --warn:#ea580c; --warn-soft:#ffedd5;
  --danger:#dc2626; --danger-soft:#fee2e2;
  --accent:#8b5cf6; --accent-soft:#ede9fe;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.04);
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:24px;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
  --tx:150ms ease-out;
  --sidebar-w:220px;
  --topbar-h:56px;
  --nav-h:64px;
  /* appearance tokens (overridable) */
  --font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  --font-size-base:15px;
  --pad-sm:6px; --pad-md:12px; --pad-lg:16px;
  --row-h:44px;
}
[data-theme="dark"]{
  --bg:#0a0a0a; --surface:#18181b; --surface-2:#27272a; --surface-3:#3f3f46;
  --text:#fafafa; --text-muted:#a1a1aa; --text-faint:#71717a;
  --border:#27272a; --border-strong:#3f3f46;
  --primary-soft:#1e3a8a; --success-soft:#14532d; --warn-soft:#7c2d12;
  --danger-soft:#7f1d1d; --accent-soft:#4c1d95;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 1px 3px rgba(0,0,0,.4);
  --shadow-lg:0 10px 25px rgba(0,0,0,.5);
}
[data-accent="blue"]   { --primary:#2563eb; --primary-hover:#1d4ed8; --primary-soft:#dbeafe;}
[data-accent="green"]  { --primary:#16a34a; --primary-hover:#15803d; --primary-soft:#dcfce7;}
[data-accent="violet"] { --primary:#8b5cf6; --primary-hover:#7c3aed; --primary-soft:#ede9fe;}
[data-accent="red"]    { --primary:#dc2626; --primary-hover:#b91c1c; --primary-soft:#fee2e2;}
[data-accent="orange"] { --primary:#ea580c; --primary-hover:#c2410c; --primary-soft:#ffedd5;}
[data-accent="amber"]  { --primary:#d97706; --primary-hover:#b45309; --primary-soft:#fef3c7;}
[data-accent="emerald"]{ --primary:#10b981; --primary-hover:#059669; --primary-soft:#d1fae5;}
[data-accent="teal"]   { --primary:#0d9488; --primary-hover:#0f766e; --primary-soft:#ccfbf1;}
[data-accent="cyan"]   { --primary:#0891b2; --primary-hover:#0e7490; --primary-soft:#cffafe;}
[data-accent="indigo"] { --primary:#4f46e5; --primary-hover:#4338ca; --primary-soft:#e0e7ff;}
[data-accent="pink"]   { --primary:#db2777; --primary-hover:#be185d; --primary-soft:#fce7f3;}
[data-accent="rose"]   { --primary:#e11d48; --primary-hover:#be123c; --primary-soft:#ffe4e6;}

/* font-size scaling */
[data-fontsize="xs"] { --font-size-base:12px; }
[data-fontsize="sm"] { --font-size-base:13px; }
[data-fontsize="md"] { --font-size-base:15px; }
[data-fontsize="lg"] { --font-size-base:17px; }
[data-fontsize="xl"] { --font-size-base:19px; }

/* density */
[data-density="compact"]    { --pad-sm:4px; --pad-md:8px;  --pad-lg:12px; --row-h:36px; }
[data-density="normal"]     { --pad-sm:6px; --pad-md:12px; --pad-lg:16px; --row-h:44px; }
[data-density="comfortable"]{ --pad-sm:8px; --pad-md:16px; --pad-lg:24px; --row-h:52px; }

/* density applied through commonly-used selectors so changes are visible without rewriting every rule */
[data-density="compact"] .card        { padding:var(--pad-md); }
[data-density="comfortable"] .card    { padding:calc(var(--pad-lg) + 4px); }
[data-density="compact"] .list-row    { min-height:var(--row-h); padding:var(--pad-sm) var(--pad-md); }
[data-density="comfortable"] .list-row{ min-height:var(--row-h); padding:var(--pad-md) var(--pad-lg); }
[data-density="compact"] .btn         { padding:var(--pad-sm) var(--pad-md); }
[data-density="comfortable"] .btn     { padding:var(--pad-md) var(--pad-lg); }
[data-density="compact"] .content     { padding-top:var(--pad-md); padding-left:var(--pad-md); padding-right:var(--pad-md); }
[data-density="comfortable"] .content { padding-top:calc(var(--pad-lg) + 4px); padding-left:calc(var(--pad-lg) + 4px); padding-right:calc(var(--pad-lg) + 4px); }
[data-density="compact"] .field       { margin-bottom:var(--pad-sm); }
[data-density="comfortable"] .field   { margin-bottom:var(--pad-lg); }

/* radius shape */
[data-radius="sharp"]  { --r-sm:4px; --r-md:6px;  --r-lg:8px;  --radius-sm:4px; --radius-md:6px;  --radius-lg:8px; }
[data-radius="normal"] { --r-sm:8px; --r-md:12px; --r-lg:16px; --radius-sm:8px; --radius-md:12px; --radius-lg:16px; }
[data-radius="pill"]   { --r-sm:12px;--r-md:18px; --r-lg:24px; --radius-sm:12px;--radius-md:18px; --radius-lg:24px; }
[data-radius="sharp"] .card,
[data-radius="sharp"] .btn,
[data-radius="sharp"] .input,
[data-radius="sharp"] .login-card { border-radius:var(--r-sm) !important; }
[data-radius="pill"] .card,
[data-radius="pill"] .login-card  { border-radius:var(--r-lg) !important; }
[data-radius="pill"] .btn,
[data-radius="pill"] .input       { border-radius:var(--r-md) !important; }

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{
  margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:var(--font-family);
  font-weight:500; font-size:var(--font-size-base); line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body{ min-height:100vh; min-height:100dvh; }
button,input,select,textarea{ font:inherit; color:inherit; }
a{ color:var(--primary); text-decoration:none; }
img{ max-width:100%; display:block; }

/* ---------- typography ---------- */
h1,h2,h3,h4{ margin:0; font-weight:700; letter-spacing:-.02em; line-height:1.2; }
h1{ font-size:24px; } h2{ font-size:20px; } h3{ font-size:16px; } h4{ font-size:14px; }
.muted{ color:var(--text-muted); }
.faint{ color:var(--text-faint); }
.tiny{ font-size:12px; }
.small{ font-size:13px; }
.big{ font-size:32px; font-weight:700; letter-spacing:-.03em; }
.huge{ font-size:48px; font-weight:800; letter-spacing:-.04em; }
.mono{ font-family:ui-monospace,"SF Mono",Menlo,monospace; }

/* ---------- layout ---------- */
.app{
  min-height:100vh; min-height:100dvh;
  display:grid; grid-template-columns:1fr;
  background:var(--bg);
}
.sidebar{ display:none; }
.main-area{ display:flex; flex-direction:column; min-width:0; }
.topbar{
  height:var(--topbar-h);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:30;
  padding-top:env(safe-area-inset-top);
  height:calc(var(--topbar-h) + env(safe-area-inset-top));
}
.topbar h1{ font-size:17px; font-weight:600; }
.topbar-actions{ display:flex; gap:8px; align-items:center; }
.content{
  flex:1; padding:16px;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
  max-width:1200px; margin:0 auto; width:100%;
}
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; z-index:25;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; align-items:stretch;
}
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:none; border:none; cursor:pointer; padding:8px 4px;
  color:var(--text-muted); transition:color var(--tx);
  position:relative;
  font-size:11px; font-weight:500;
}
.nav-item .ico{ font-size:22px; margin-bottom:2px; line-height:1; }
.nav-item.active{ color:var(--primary); }
.nav-item .badge{
  position:absolute; top:6px; right:calc(50% - 20px);
  background:var(--danger); color:#fff; font-size:10px;
  padding:1px 5px; border-radius:8px; min-width:16px; text-align:center;
}

@media (min-width:900px){
  .app{ grid-template-columns:var(--sidebar-w) 1fr; }
  .sidebar{
    display:flex; flex-direction:column;
    background:var(--surface); border-right:1px solid var(--border);
    height:100vh; height:100dvh; position:sticky; top:0;
    padding:16px 12px;
  }
  .brand{ display:flex; align-items:center; gap:8px; padding:6px 8px 16px; }
  .brand-logo{ width:32px; height:32px; border-radius:8px; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .brand-title{ font-weight:700; font-size:15px; }
  .side-section-title{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); padding:12px 8px 4px; font-weight:600; }
  .side-item{
    display:flex; align-items:center; gap:10px; padding:9px 10px;
    border-radius:8px; cursor:pointer; color:var(--text-muted);
    transition:background var(--tx),color var(--tx); font-size:14px;
    border:none; background:none; width:100%; text-align:left; font-weight:500;
    position:relative;
  }
  .side-item:hover{ background:var(--surface-2); color:var(--text); }
  .side-item.active{ background:var(--primary-soft); color:var(--primary); font-weight:600; }
  .side-item .ico{ font-size:18px; width:20px; text-align:center; }
  .side-item .badge{
    position:absolute; right:10px; background:var(--danger); color:#fff;
    font-size:10px; padding:1px 6px; border-radius:8px; min-width:18px; text-align:center;
  }
  .bottom-nav{ display:none; }
  .content{ padding:24px 32px; padding-bottom:32px; }

  /* ── sidebar collapse ── */
  .app.sb-collapsed{ grid-template-columns:56px 1fr; }
  .sidebar.collapsed{
    width:56px !important; min-width:56px !important;
    padding:16px 4px;
  }
  .sidebar.collapsed .brand-title,
  .sidebar.collapsed .side-section-title,
  .sidebar.collapsed .side-item > span:not(.ico):not(.badge),
  .sidebar.collapsed .side-label,
  .sidebar.collapsed .side-badge,
  .sidebar.collapsed .card{
    display:none !important;
  }
  .sidebar.collapsed .brand{ justify-content:center; padding:6px 4px 16px; }
  .sidebar.collapsed .side-item{
    justify-content:center;
    padding:10px 4px;
  }
  .sidebar.collapsed .side-item .ico{
    margin-right:0;
    font-size:22px;
    width:auto;
  }
  .sidebar.collapsed .side-item .badge{
    position:absolute; right:4px; top:4px;
    font-size:9px; padding:0 4px; min-width:14px;
  }
  .sidebar.collapsed .side-toggle-btn{
    transform:rotate(180deg);
  }
  .sidebar{ position:relative; }
  .sidebar .side-toggle-btn{
    position:absolute;
    top:10px;
    right:-12px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:var(--surface);
    border:1px solid var(--border-strong);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .2s, background var(--tx);
    z-index:6;
    color:var(--text-muted);
    font-size:12px;
    padding:0;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .sidebar .side-toggle-btn:hover{ background:var(--surface-2); color:var(--text); }
}

/* ---------- buttons & inputs ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  height:44px; padding:0 18px; border-radius:var(--r-sm);
  border:1px solid var(--border-strong); background:var(--surface);
  color:var(--text); font-weight:600; font-size:14px;
  cursor:pointer; transition:all var(--tx); white-space:nowrap;
}
.btn:hover{ background:var(--surface-2); }
.btn:active{ transform:scale(.98); }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn-primary{ background:var(--primary); color:var(--primary-fg); border-color:transparent; }
.btn-primary:hover{ background:var(--primary-hover); }
.btn-success{ background:var(--success); color:#fff; border-color:transparent; }
.btn-danger{ background:var(--danger); color:#fff; border-color:transparent; }
.btn-ghost{ background:transparent; border-color:transparent; }
.btn-ghost:hover{ background:var(--surface-2); }
.btn-sm{ height:32px; padding:0 10px; font-size:13px; border-radius:6px; }
.btn-lg{ height:56px; padding:0 28px; font-size:17px; font-weight:700; }
.btn-icon{ width:40px; padding:0; }
.btn-block{ width:100%; }
.input,.select,.textarea{
  height:44px; padding:0 12px; width:100%;
  border-radius:var(--r-sm); border:1px solid var(--border-strong);
  background:var(--surface); color:var(--text); font-size:15px;
  transition:border-color var(--tx),box-shadow var(--tx);
}
.input:focus,.select:focus,.textarea:focus{
  outline:none; border-color:var(--primary);
  box-shadow:0 0 0 3px var(--primary-soft);
}
.textarea{ height:auto; padding:10px 12px; resize:vertical; min-height:80px; }
.label{ display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px; }
.field{ margin-bottom:14px; }
.row{ display:flex; gap:10px; flex-wrap:wrap; }
.row > *{ flex:1; min-width:0; }

/* ---------- cards & lists ---------- */
.card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-md); padding:16px;
  box-shadow:var(--shadow-sm);
}
.card-hover{ transition:transform var(--tx),box-shadow var(--tx); cursor:pointer; }
.card-hover:hover{ transform:translateY(-1px); box-shadow:var(--shadow); }
.card h2{ margin-bottom:6px; }
.card h3{ margin-bottom:4px; }

.grid{ display:grid; gap:12px; }
.grid-2{ grid-template-columns:repeat(2,1fr); }
.grid-3{ grid-template-columns:repeat(3,1fr); }
.grid-4{ grid-template-columns:repeat(4,1fr); }
@media (max-width:680px){
  .grid-3,.grid-4{ grid-template-columns:repeat(2,1fr); }
}
@media (max-width:420px){
  .grid-2,.grid-3,.grid-4{ grid-template-columns:1fr; }
}

/* stat tiles */
.stat{
  display:flex; flex-direction:column; gap:4px;
  padding:14px 16px; border-radius:var(--r-md);
  background:var(--surface); border:1px solid var(--border);
  cursor:pointer; transition:all var(--tx);
}
.stat:hover{ transform:translateY(-1px); box-shadow:var(--shadow); }
.stat .num{ font-size:28px; font-weight:800; letter-spacing:-.03em; }
.stat .lbl{ color:var(--text-muted); font-size:12px; font-weight:600; }
.stat.s-success .num{ color:var(--success); }
.stat.s-warn .num{ color:var(--warn); }
.stat.s-danger .num{ color:var(--danger); }
.stat.s-accent .num{ color:var(--accent); }
.stat.s-primary .num{ color:var(--primary); }

/* tag / badge */
.tag{
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:999px;
  font-size:11px; font-weight:600;
  background:var(--surface-2); color:var(--text-muted);
}
.tag.t-success{ background:var(--success-soft); color:var(--success); }
.tag.t-warn{ background:var(--warn-soft); color:var(--warn); }
.tag.t-danger{ background:var(--danger-soft); color:var(--danger); }
.tag.t-primary{ background:var(--primary-soft); color:var(--primary); }
.tag.t-accent{ background:var(--accent-soft); color:var(--accent); }
.dot{ width:8px; height:8px; border-radius:50%; background:var(--text-faint); display:inline-block; }
.dot.d-success{ background:var(--success); }
.dot.d-warn{ background:var(--warn); }
.dot.d-danger{ background:var(--danger); }

/* ---------- student card / list rows ---------- */
.stu-grid{ display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); }
.stu-card{
  padding:12px; border-radius:var(--r-md);
  background:var(--surface); border:1px solid var(--border);
  display:flex; flex-direction:column; gap:6px;
  transition:all var(--tx);
}
.stu-card.signed{ background:var(--success-soft); border-color:var(--success); }
.stu-card.late{ background:var(--warn-soft); border-color:var(--warn); }
.stu-card.absent{ background:var(--danger-soft); border-color:var(--danger); }
.stu-card.leave{ background:var(--accent-soft); border-color:var(--accent); }
.stu-card .name{ font-weight:700; font-size:15px; }
.stu-card .meta{ font-size:12px; color:var(--text-muted); }
.stu-card .actions{ margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }

.list-row{
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--r-sm);
  transition:background var(--tx);
}
.list-row + .list-row{ margin-top:6px; }
.list-row:hover{ background:var(--surface-2); }
.list-row .avatar{
  width:38px; height:38px; border-radius:50%;
  background:var(--primary-soft); color:var(--primary);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; flex-shrink:0;
}
.list-row .info{ flex:1; min-width:0; }
.list-row .info .name{ font-weight:600; }
.list-row .info .sub{ font-size:12px; color:var(--text-muted); }
.list-row .actions{ display:flex; gap:4px; flex-shrink:0; }

/* ---------- toast ---------- */
.toast-host{
  position:fixed; top:env(safe-area-inset-top); left:0; right:0; z-index:9000;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:12px; pointer-events:none;
}
/* Desktop: toasts in bottom-right so they don't obscure the title/nav */
@media (min-width:900px){
  .toast-host{
    top:auto; left:auto; right:16px; bottom:16px;
    align-items:flex-end;
  }
  @keyframes toastInDesktop{
    from{ opacity:0; transform:translateX(20px); }
    to{ opacity:1; transform:translateX(0); }
  }
  .toast{ animation:toastInDesktop .25s ease-out; }
}
.toast{
  background:var(--surface); color:var(--text);
  border:1px solid var(--border); border-radius:var(--r-sm);
  padding:10px 16px; box-shadow:var(--shadow-lg);
  font-weight:600; font-size:14px;
  animation:toastIn .25s ease-out;
  pointer-events:auto;
  max-width:90vw;
}
.toast.t-success{ border-color:var(--success); color:var(--success); }
.toast.t-warn{ border-color:var(--warn); color:var(--warn); }
.toast.t-danger{ border-color:var(--danger); color:var(--danger); }
@keyframes toastIn{
  from{ opacity:0; transform:translateY(-12px); }
  to{ opacity:1; transform:translateY(0); }
}

/* ---------- modal ---------- */
.modal-host{
  position:fixed; inset:0; z-index:8000;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.5);
  padding:16px; animation:fadeIn .2s ease-out;
}
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
.modal{
  background:var(--surface); border-radius:var(--r-lg);
  padding:20px; max-width:480px; width:100%;
  max-height:90vh; overflow:auto;
  box-shadow:var(--shadow-lg);
  animation:modalIn .25s ease-out;
}
@keyframes modalIn{
  from{ opacity:0; transform:translateY(20px) scale(.96); }
  to{ opacity:1; transform:none; }
}
.modal h2{ margin-bottom:12px; }
.modal-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:16px; flex-wrap:wrap; }
.modal-actions .btn{ flex:0 1 auto; }
@media(max-width:480px){ .modal-actions .btn{ flex:1; } }

/* ---------- check-in big button ---------- */
.checkin-wrap{
  display:flex; flex-direction:column; align-items:center;
  padding:32px 16px;
}
.checkin-btn{
  width:240px; height:240px; border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff; font-size:28px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  border:none; cursor:pointer;
  box-shadow:0 12px 40px rgba(37,99,235,.35);
  transition:transform .15s ease-out;
  position:relative; overflow:hidden;
  letter-spacing:.04em;
}
.checkin-btn:hover{ transform:scale(1.03); }
.checkin-btn:active{ transform:scale(.96); }
.checkin-btn.pulse{ animation:pulse 1.4s infinite; }
@keyframes pulse{
  0%,100%{ box-shadow:0 12px 40px rgba(37,99,235,.35); }
  50%{ box-shadow:0 12px 48px rgba(37,99,235,.6); }
}
.checkin-btn.done{
  background:var(--success);
  animation:doneShrink .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes doneShrink{
  0%{ transform:scale(1); }
  40%{ transform:scale(.85); }
  100%{ transform:scale(1); background:var(--success); }
}
.success-check{
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:120px; color:var(--success); z-index:9999;
  animation:successPop .8s ease-out forwards;
  pointer-events:none;
  text-shadow:0 8px 24px rgba(22,163,74,.4);
}
@keyframes successPop{
  0%{ transform:translate(-50%,-50%) scale(.3); opacity:0; }
  30%{ transform:translate(-50%,-50%) scale(1.2); opacity:1; }
  60%{ transform:translate(-50%,-50%) scale(1); }
  100%{ transform:translate(-50%,-50%) scale(1); opacity:0; }
}
.confetti{
  position:fixed; width:8px; height:14px; z-index:9998;
  pointer-events:none; border-radius:2px;
  animation:fall 1.5s ease-out forwards;
}
@keyframes fall{
  to{ transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* ---------- tables ---------- */
.tbl{ width:100%; border-collapse:collapse; font-size:14px; }
.tbl th,.tbl td{ padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); }
.tbl th{ font-weight:600; color:var(--text-muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; background:var(--surface-2); }
.tbl tr:hover td{ background:var(--surface-2); }

/* ---------- wizard / login ---------- */
.center-wrap{
  min-height:100vh; min-height:100dvh;
  display:flex; align-items:center; justify-content:center;
  padding:16px; background:linear-gradient(160deg,var(--bg) 0%,var(--surface-2) 100%);
}
.login-card{
  background:var(--surface); border-radius:var(--r-lg);
  padding:32px 24px; max-width:420px; width:100%;
  box-shadow:var(--shadow-lg); border:1px solid var(--border);
}
.login-card .brand-big{
  display:flex; align-items:center; gap:12px; margin-bottom:24px;
}
.login-card .brand-big .logo{
  width:48px; height:48px; border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff; font-weight:800; font-size:22px;
  display:flex; align-items:center; justify-content:center;
}
.tab-bar{
  display:flex; gap:4px; padding:4px;
  background:var(--surface-2); border-radius:var(--r-sm);
  margin-bottom:18px;
}
.tab-bar button{
  flex:1; height:36px; border:none; background:none;
  border-radius:6px; cursor:pointer; font-weight:600; font-size:13px;
  color:var(--text-muted); transition:all var(--tx);
}
.tab-bar button.active{ background:var(--surface); color:var(--text); box-shadow:var(--shadow-sm); }

.role-card{
  padding:20px; border:2px solid var(--border);
  border-radius:var(--r-md); cursor:pointer;
  transition:all var(--tx); text-align:center;
}
.role-card:hover{ border-color:var(--primary); transform:translateY(-2px); }
.role-card .ico{ font-size:48px; margin-bottom:8px; }
.role-card h3{ margin-bottom:4px; }

/* ---------- misc ---------- */
.sep{ height:1px; background:var(--border); margin:16px 0; border:none; }
.flex{ display:flex; gap:10px; align-items:center; }
.flex-between{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
.flex-col{ display:flex; flex-direction:column; gap:8px; }
.space{ height:12px; }
.scroll-x{ overflow-x:auto; }
.empty{
  padding:48px 16px; text-align:center; color:var(--text-muted);
}
.empty .ico{ font-size:48px; opacity:.5; margin-bottom:8px; }

/* connection indicator */
.conn{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:600; color:var(--text-muted);
  padding:4px 8px; border-radius:999px; background:var(--surface-2);
}
.conn .dot{ width:6px; height:6px; }
.conn.online .dot{ background:var(--success); }
.conn.connecting .dot{ background:var(--warn); animation:blink 1s infinite; }
.conn.error .dot{ background:var(--danger); }
.conn.offline .dot{ background:var(--text-faint); }
@keyframes blink{ 50%{opacity:.3;} }

/* signed status row */
.status-row{
  display:flex; align-items:center; gap:8px;
  padding:10px 12px; border-radius:var(--r-sm);
  background:var(--surface);
}
.status-row.signed{ background:var(--success-soft); }
.status-row.absent{ background:var(--danger-soft); }
.status-row.leave{ background:var(--accent-soft); }

/* drawer (mobile sidebar) - reserved */
.drawer-host{
  position:fixed; inset:0; z-index:7000;
  background:rgba(0,0,0,.45); display:flex;
  animation:fadeIn .2s ease-out;
}
.drawer{
  width:280px; max-width:80%; background:var(--surface);
  display:flex; flex-direction:column; padding:16px 12px;
  animation:drawerIn .25s ease-out;
}
@keyframes drawerIn{ from{ transform:translateX(-100%);} to{ transform:none;} }

.kbd{ font-family:ui-monospace,monospace; background:var(--surface-2); padding:1px 6px; border-radius:4px; font-size:12px; border:1px solid var(--border); }

/* ════════ phase 2 additions ════════ */
.tabs-line{ display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:14px; overflow-x:auto; }
.tabs-line button{
  background:none; border:none; padding:10px 14px; cursor:pointer;
  font-weight:600; font-size:13px; color:var(--text-muted);
  border-bottom:2px solid transparent; white-space:nowrap;
  transition:color var(--tx),border-color var(--tx);
}
.tabs-line button.active{ color:var(--primary); border-color:var(--primary); }
.tabs-line button:hover{ color:var(--text); }

.pill{ display:inline-block; padding:1px 8px; border-radius:999px; font-size:11px; font-weight:600; background:var(--surface-2); color:var(--text-muted); }
.pill.urgent{ background:var(--danger-soft); color:var(--danger); }
.pill.ok{ background:var(--success-soft); color:var(--success); }
.pill.warn{ background:var(--warn-soft); color:var(--warn); }

.stars{ display:inline-flex; gap:2px; font-size:16px; }
.stars .s{ cursor:pointer; color:var(--text-faint); transition:color var(--tx); }
.stars .s.on{ color:#facc15; }
.stars.readonly .s{ cursor:default; }

.matrix{ width:100%; border-collapse:collapse; font-size:13px; }
.matrix th,.matrix td{ padding:8px 10px; text-align:center; border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
.matrix th:first-child,.matrix td:first-child{ text-align:left; font-weight:600; position:sticky; left:0; background:var(--surface); z-index:1; }
.matrix th{ background:var(--surface-2); font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); }
.matrix td input{ width:60px; padding:4px 6px; border:1px solid var(--border-strong); border-radius:6px; text-align:center; background:transparent; color:var(--text); }
.matrix td.total{ font-weight:700; color:var(--primary); background:var(--primary-soft); }

.chart-svg{ width:100%; height:auto; max-height:240px; display:block; }
.chart-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:16px; }
.chart-legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--text-muted); margin-top:8px; }
.chart-legend .lg{ display:inline-flex; align-items:center; gap:4px; }
.chart-legend .sw{ width:10px; height:10px; border-radius:2px; }

.bar-row{ display:flex; align-items:center; gap:10px; padding:6px 0; }
.bar-row .lab{ flex:0 0 80px; font-size:13px; font-weight:600; }
.bar-row .bar-wrap{ flex:1; height:18px; background:var(--surface-2); border-radius:9px; overflow:hidden; position:relative; }
.bar-row .bar{ height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:9px; transition:width .4s ease-out; }
.bar-row .val{ flex:0 0 50px; font-size:12px; text-align:right; color:var(--text-muted); font-variant-numeric:tabular-nums; }

.heatmap{ display:grid; grid-template-columns:repeat(7,1fr); gap:3px; max-width:340px; }
.heatmap .cell{ aspect-ratio:1; border-radius:3px; background:var(--surface-2); }
.heatmap .cell.l1{ background:var(--success-soft); }
.heatmap .cell.l2{ background:rgba(22,163,74,.4); }
.heatmap .cell.l3{ background:rgba(22,163,74,.65); }
.heatmap .cell.l4{ background:var(--success); }

.upload-area{
  border:2px dashed var(--border-strong); border-radius:var(--r-md);
  padding:24px 12px; text-align:center; cursor:pointer;
  transition:all var(--tx);
}
.upload-area:hover{ border-color:var(--primary); background:var(--primary-soft); }
.upload-area.has-file{ border-style:solid; border-color:var(--success); background:var(--success-soft); }
.upload-area input[type=file]{ display:none; }
.file-chip{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px; background:var(--surface-2);
  border-radius:999px; font-size:12px;
}
.file-chip .x{ cursor:pointer; color:var(--text-muted); }
.file-chip .x:hover{ color:var(--danger); }

.kanban{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
@media(max-width:680px){ .kanban{ grid-template-columns:1fr; } }
.kanban-col{ background:var(--surface-2); border-radius:var(--r-md); padding:10px; }
.kanban-col h4{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.kanban-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:10px; margin-bottom:8px; cursor:pointer;
  transition:all var(--tx);
}
.kanban-card:hover{ transform:translateY(-1px); box-shadow:var(--shadow); }

.search-box{
  position:relative; margin-bottom:12px;
}
.search-box input{ padding-left:36px; }
.search-box::before{
  content:'🔍'; position:absolute; left:12px; top:50%;
  transform:translateY(-50%); opacity:.5; pointer-events:none;
}

.feed-msg{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-md); padding:12px; margin-bottom:8px;
}
.feed-msg .who{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.feed-msg .who .avatar{ width:28px; height:28px; font-size:12px; }
.feed-msg .text{ font-size:14px; white-space:pre-wrap; word-break:break-word; }
.feed-msg .when{ font-size:11px; color:var(--text-muted); margin-top:4px; }

.ann-card{
  border-left:4px solid var(--primary); padding:12px 14px;
  background:var(--surface); border-radius:var(--r-sm);
  margin-bottom:8px; box-shadow:var(--shadow-sm);
}
.ann-card.pinned{ border-left-color:var(--warn); background:var(--warn-soft); }
.ann-card h4{ margin-bottom:4px; }

@media (max-width:680px){
  .matrix{ font-size:12px; }
  .matrix th,.matrix td{ padding:6px 4px; }
}

/* ════════ phase 3 additions ════════ */

/* QR code page */
.qr-wrap{
  display:flex; flex-direction:column; align-items:center;
  padding:24px 12px; gap:14px;
}
.qr-box{
  background:#fff; padding:18px; border-radius:var(--r-md);
  box-shadow:var(--shadow); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
}
.qr-box img{ width:300px; height:300px; max-width:80vw; max-height:80vw; }
.qr-meta{
  display:flex; flex-direction:column; align-items:center; gap:6px;
  text-align:center;
}
.qr-countdown{
  font-size:48px; font-weight:800; letter-spacing:-.04em;
  font-variant-numeric:tabular-nums; color:var(--primary);
}
.qr-countdown.warn{ color:var(--warn); }
.qr-countdown.danger{ color:var(--danger); animation:blink 1s infinite; }

/* AI chat */
.ai-chat{
  display:flex; flex-direction:column; gap:8px;
  max-height:60vh; overflow-y:auto; padding:4px;
}
.ai-msg{
  padding:10px 14px; border-radius:12px;
  max-width:85%; word-break:break-word; white-space:pre-wrap;
  font-size:14px; line-height:1.5;
}
.ai-msg.user{
  align-self:flex-end;
  background:var(--primary); color:var(--primary-fg);
  border-bottom-right-radius:4px;
}
.ai-msg.assistant{
  align-self:flex-start;
  background:var(--surface-2); color:var(--text);
  border-bottom-left-radius:4px;
}
.ai-msg.system{
  align-self:center; background:transparent;
  color:var(--text-muted); font-size:12px;
}
.ai-thinking{
  display:inline-flex; gap:4px; align-items:center;
}
.ai-thinking span{
  width:8px; height:8px; border-radius:50%; background:var(--text-faint);
  animation:thinkBlink 1.4s infinite;
}
.ai-thinking span:nth-child(2){ animation-delay:.2s; }
.ai-thinking span:nth-child(3){ animation-delay:.4s; }
@keyframes thinkBlink{
  0%,80%,100%{ opacity:.2; transform:scale(.8); }
  40%{ opacity:1; transform:scale(1); }
}
.ai-quick{
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;
}
.ai-quick button{
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:999px; padding:6px 12px; font-size:12px;
  cursor:pointer; color:var(--text); font-weight:500;
}
.ai-quick button:hover{ background:var(--primary-soft); color:var(--primary); border-color:var(--primary); }

/* Calendar */
.cal-grid{
  display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
  background:var(--border); padding:1px; border-radius:var(--r-sm);
  overflow:hidden;
}
.cal-head{
  background:var(--surface-2); text-align:center;
  padding:8px 4px; font-size:12px; font-weight:700;
  color:var(--text-muted);
}
.cal-cell{
  background:var(--surface); min-height:74px;
  padding:6px; display:flex; flex-direction:column; gap:2px;
  cursor:pointer; transition:background var(--tx);
  position:relative;
}
.cal-cell:hover{ background:var(--surface-2); }
.cal-cell.other{ background:var(--surface-2); opacity:.55; }
.cal-cell.today{ background:var(--primary-soft); }
.cal-cell .d{ font-weight:700; font-size:13px; }
.cal-cell.today .d{ color:var(--primary); }
.cal-cell .evs{ display:flex; flex-direction:column; gap:2px; font-size:10px; }
.cal-cell .ev{
  display:flex; align-items:center; gap:3px; padding:1px 4px;
  border-radius:3px; background:var(--surface-2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.cal-cell .ev.due{ background:var(--primary-soft); color:var(--primary); }
.cal-cell .ev.ann{ background:var(--warn-soft); color:var(--warn); }
.cal-cell .ev.att{ background:var(--success-soft); color:var(--success); }
@media(max-width:680px){
  .cal-cell{ min-height:54px; padding:3px; }
  .cal-cell .d{ font-size:11px; }
  .cal-cell .ev{ font-size:9px; padding:0 2px; }
}

/* Gantt */
.gantt-wrap{ overflow-x:auto; }
.gantt-table{ min-width:600px; width:100%; border-collapse:collapse; }
.gantt-table th,.gantt-table td{ padding:6px 4px; border-bottom:1px solid var(--border); font-size:12px; }
.gantt-table .gantt-name{ text-align:left; font-weight:600; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gantt-track{
  position:relative; height:24px; background:var(--surface-2);
  border-radius:4px; overflow:hidden;
}
.gantt-bar{
  position:absolute; top:3px; bottom:3px; border-radius:3px;
  background:var(--success); color:#fff; font-size:10px;
  display:flex; align-items:center; padding:0 6px;
  cursor:pointer; transition:transform var(--tx);
  white-space:nowrap; overflow:hidden;
}
.gantt-bar:hover{ transform:scaleY(1.15); }
.gantt-bar.warn{ background:var(--warn); }
.gantt-bar.danger{ background:var(--danger); }
.gantt-today{
  position:absolute; top:0; bottom:0; width:2px;
  background:var(--danger); opacity:.6; z-index:2;
}

/* Command palette */
.cmd-host{
  position:fixed; inset:0; z-index:9500;
  background:rgba(0,0,0,.4);
  display:flex; align-items:flex-start; justify-content:center;
  padding-top:12vh; padding-left:12px; padding-right:12px;
  animation:fadeIn .15s ease-out;
}
.cmd-box{
  background:var(--surface); border:1px solid var(--border-strong);
  border-radius:var(--r-md); width:100%; max-width:540px;
  box-shadow:var(--shadow-lg); overflow:hidden;
  display:flex; flex-direction:column; max-height:70vh;
}
.cmd-input{
  border:none; padding:14px 16px; font-size:15px;
  background:transparent; color:var(--text); outline:none;
  border-bottom:1px solid var(--border);
}
.cmd-list{ flex:1; overflow-y:auto; padding:4px; }
.cmd-item{
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  border-radius:6px; cursor:pointer; font-size:14px;
  color:var(--text);
}
.cmd-item.sel{ background:var(--primary-soft); color:var(--primary); }
.cmd-item:hover{ background:var(--surface-2); }
.cmd-item .ico{ font-size:18px; width:24px; }
.cmd-item .ttl{ flex:1; font-weight:500; }
.cmd-item .hint{ font-size:11px; color:var(--text-faint); }
.cmd-empty{ padding:20px; text-align:center; color:var(--text-muted); font-size:13px; }

/* Workspace list */
.ws-card{
  display:flex; align-items:center; gap:12px; padding:12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-sm); margin-bottom:8px;
}
.ws-card.active{ border-color:var(--primary); background:var(--primary-soft); }
.ws-card .ws-info{ flex:1; }
.ws-card .ws-name{ font-weight:700; font-size:15px; }
.ws-card .ws-meta{ font-size:12px; color:var(--text-muted); }

/* PWA install prompt */
.pwa-prompt{
  position:fixed; left:12px; right:12px; bottom:calc(var(--nav-h) + 12px);
  z-index:7500; background:var(--surface); border:1px solid var(--border-strong);
  border-radius:var(--r-md); padding:12px 14px;
  box-shadow:var(--shadow-lg);
  display:flex; gap:10px; align-items:center;
  animation:toastIn .3s ease-out;
}
@media(min-width:900px){
  .pwa-prompt{ left:auto; right:24px; bottom:24px; max-width:360px; }
}

/* notification badge dots in QR */
.qr-stats{
  display:flex; gap:24px; justify-content:center;
  padding:12px 16px; background:var(--surface-2);
  border-radius:var(--r-md);
}
.qr-stats .item{ text-align:center; }
.qr-stats .num{ font-size:28px; font-weight:800; color:var(--primary); }
.qr-stats .lbl{ font-size:11px; color:var(--text-muted); font-weight:600; }

/* Email picker */
.recip-chip{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--primary-soft); color:var(--primary);
  padding:3px 10px; border-radius:999px; font-size:12px;
  font-weight:600; margin:2px;
}
.recip-chip .x{ cursor:pointer; opacity:.7; }
.recip-chip .x:hover{ opacity:1; }

/* ──────────── PHASE 4 — Polish & Accessibility ──────────── */
/* focus rings */
:focus{ outline:none; }
:focus-visible{
  outline:2px solid var(--primary);
  outline-offset:2px;
  border-radius:var(--r-sm);
}
button:focus-visible, .btn:focus-visible, .side-item:focus-visible{
  box-shadow:0 0 0 3px var(--primary-soft);
}

/* loading spinner */
.spinner{
  display:inline-block; width:18px; height:18px;
  border:2px solid var(--border-strong);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .8s linear infinite;
  vertical-align:middle;
}
.spinner.big{ width:48px; height:48px; border-width:4px; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.loading-overlay{
  position:fixed; inset:0; z-index:99;
  background:rgba(0,0,0,.4); display:flex;
  align-items:center; justify-content:center;
  flex-direction:column; gap:12px; color:#fff;
}

/* fade-in for view */
.content > * { animation: fadeUp .25s ease-out both; }
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(6px); }
  to{ opacity:1; transform:translateY(0); }
}

/* empty state */
.empty-state{
  text-align:center; padding:48px 16px;
  background:var(--surface); border-radius:var(--r-lg);
  border:1px dashed var(--border);
}
.empty-state .ico{ font-size:48px; margin-bottom:8px; }
.empty-state h3{ margin:8px 0 4px; }
.empty-state p{ color:var(--text-muted); margin:4px 0 16px; font-size:14px; }
.empty-state .cta{ display:inline-flex; gap:8px; flex-wrap:wrap; justify-content:center; }

/* welcome journey */
.journey-card{
  background:linear-gradient(135deg, var(--primary-soft), var(--accent-soft));
  border:1px solid var(--primary);
  border-radius:var(--r-lg); padding:16px;
  margin-bottom:16px; position:relative;
}
.journey-card .close{
  position:absolute; right:10px; top:10px;
  background:transparent; border:none; cursor:pointer;
  font-size:18px; color:var(--text-muted);
  width:28px; height:28px; border-radius:50%;
}
.journey-card .close:hover{ background:rgba(0,0,0,.06); }
.journey-card h3{ margin-bottom:10px; }
.journey-steps{ display:flex; flex-direction:column; gap:8px; }
.journey-step{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; background:var(--surface);
  border-radius:var(--r-md); cursor:pointer;
  transition:transform var(--tx);
}
.journey-step:hover{ transform:translateX(3px); }
.journey-step.done{ opacity:.6; }
.journey-step .ix{
  width:28px; height:28px; border-radius:50%;
  background:var(--primary); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px; flex-shrink:0;
}
.journey-step.done .ix{ background:var(--success); }
.journey-step .ttl{ flex:1; font-weight:600; }
.journey-step .arr{ color:var(--text-muted); }

/* ───── v3.1 UX additions: hello bar / student picker / quick CTAs ───── */
.hello-bar{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; padding:10px 14px;
  background:linear-gradient(135deg, var(--primary-soft) 0%, var(--accent-soft) 100%);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  margin-bottom:14px;
  font-size:14px;
}
.hello-bar .greet{ font-weight:700; }
.hello-bar .date{ font-size:12px; color:var(--text-muted); }

/* student picker grid (login) */
.stu-picker{
  display:grid; gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  max-height:min(60vh,520px);
  overflow-y:auto;
  padding:4px;
}
.stu-picker .pcard{
  background:var(--surface); border:1px solid var(--border-strong);
  border-radius:var(--r-md); padding:14px 10px;
  cursor:pointer; text-align:center;
  transition:all var(--tx);
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.stu-picker .pcard:hover{
  border-color:var(--primary); transform:translateY(-2px);
  box-shadow:var(--shadow);
}
.stu-picker .pcard:active{ transform:scale(.97); }
.stu-picker .pcard .av{
  width:48px; height:48px; border-radius:50%;
  background:var(--primary); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:18px;
}
.stu-picker .pcard .nm{ font-weight:700; font-size:14px; }
.stu-picker .pcard .mt{ font-size:11px; color:var(--text-muted); }
.stu-picker-search{
  width:100%; margin-bottom:10px;
}

/* hueing avatars (deterministic) */
.av-color-0{ background:#2563eb; } .av-color-1{ background:#16a34a; }
.av-color-2{ background:#8b5cf6; } .av-color-3{ background:#ea580c; }
.av-color-4{ background:#dc2626; } .av-color-5{ background:#0891b2; }
.av-color-6{ background:#db2777; } .av-color-7{ background:#65a30d; }

/* quick-start onboarding (first run) */
.quick-start{
  display:grid; gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  margin-bottom:16px;
}
.qs-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:18px;
  cursor:pointer; transition:all var(--tx);
  display:flex; flex-direction:column; gap:6px;
  position:relative;
}
.qs-card:hover{
  border-color:var(--primary); transform:translateY(-2px);
  box-shadow:var(--shadow);
}
.qs-card.primary{
  background:linear-gradient(135deg, var(--primary), var(--primary-hover));
  color:#fff; border-color:transparent;
}
.qs-card.primary .ttl,.qs-card.primary .desc{ color:#fff; }
.qs-card .ico{ font-size:28px; line-height:1; margin-bottom:4px; }
.qs-card .ttl{ font-size:15px; font-weight:700; }
.qs-card .desc{ font-size:12px; color:var(--text-muted); line-height:1.4; }
.qs-card .tag{
  position:absolute; top:10px; right:10px;
  background:var(--warn); color:#fff;
  font-size:10px; padding:2px 8px; border-radius:6px; font-weight:700;
}

/* student progress bars */
.progress-bars{
  display:grid; gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
}
.pbar{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-md); padding:12px;
}
.pbar .ttl{ font-size:12px; color:var(--text-muted); margin-bottom:6px; }
.pbar .val{ font-size:24px; font-weight:800; letter-spacing:-.02em; line-height:1; }
.pbar .track{
  height:8px; background:var(--surface-3); border-radius:4px;
  overflow:hidden; margin-top:8px;
}
.pbar .fill{
  height:100%; border-radius:4px;
  transition:width .4s ease-out;
}
.pbar.success .fill{ background:var(--success); }
.pbar.primary .fill{ background:var(--primary); }
.pbar.warn .fill{ background:var(--warn); }
.pbar.accent .fill{ background:var(--accent); }

/* enhanced student check-in: bigger button */
.checkin-hero{
  display:flex; flex-direction:column; align-items:center;
  padding:24px 8px;
}
.checkin-hero .checkin-btn{
  width:min(340px,80vw); height:min(340px,80vw); max-height:34vh;
  font-size:32px;
}

@media (min-width:600px){
  .checkin-hero .checkin-btn{
    width:280px; height:280px; max-height:none;
    font-size:36px;
  }
}

/* heatmap grid */
.heatmap{
  display:grid; gap:2px;
  overflow-x:auto; padding:8px 0;
}
.heatmap .hcell{
  width:18px; height:18px; border-radius:3px;
  background:var(--surface-3);
  position:relative; cursor:default;
}
.heatmap .hcell.l1{ background:#ddebf3; }
.heatmap .hcell.l2{ background:#90b8de; }
.heatmap .hcell.l3{ background:#3478c8; }
.heatmap .hcell.l4{ background:#1a4d8a; }
.heatmap .hcell.abs{ background:#fee2e2; }
.heatmap .hcell.leave{ background:#ede9fe; }
[data-theme="dark"] .heatmap .hcell.l1{ background:#1e3a5f; }
[data-theme="dark"] .heatmap .hcell.l2{ background:#2a5a8c; }
[data-theme="dark"] .heatmap .hcell.l3{ background:#3478c8; }
[data-theme="dark"] .heatmap .hcell.l4{ background:#5a9adf; }
.heatmap-row{ display:flex; align-items:center; gap:6px; }
.heatmap-row .lbl{
  font-size:11px; width:90px; flex-shrink:0;
  white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; color:var(--text-muted);
}
.heatmap-row .cells{ display:flex; gap:2px; flex:1; }

/* drag drop overlay */
.drop-zone{
  position:fixed; inset:0; z-index:9999;
  background:rgba(37,99,235,.92); color:#fff;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:12px;
  pointer-events:none;
  font-size:18px; font-weight:600;
  backdrop-filter:blur(6px);
}
.drop-zone .icn{ font-size:64px; }

/* storage usage bar */
.usage-bar{
  height:12px; background:var(--surface-3); border-radius:6px;
  overflow:hidden; position:relative;
}
.usage-bar .fill{
  height:100%; background:var(--success); transition:width .3s;
}
.usage-bar.warn .fill{ background:var(--warn); }
.usage-bar.danger .fill{ background:var(--danger); }

/* log table */
.log-row{
  display:grid;
  grid-template-columns:120px 80px 1fr;
  gap:10px; padding:8px 10px; align-items:center;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.log-row:hover{ background:var(--surface-2); }
.log-row .tm{ color:var(--text-muted); font-size:11px; }
.log-row .typ{
  display:inline-block; padding:1px 8px; border-radius:999px;
  font-size:10px; font-weight:700;
  background:var(--surface-2);
}

/* multi-file chip */
.mfile-chip{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px; border-radius:8px;
  background:var(--surface-2); margin:2px;
  font-size:12px; max-width:100%;
}
.mfile-chip .nm{ max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mfile-chip .x{ cursor:pointer; color:var(--danger); }

/* teacher info badge in student topbar */
.teacher-badge{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface-2); padding:4px 10px;
  border-radius:999px; cursor:pointer; font-size:12px;
  font-weight:600;
}
.teacher-badge .av{
  width:22px; height:22px; border-radius:50%;
  background:var(--primary); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:11px;
}

/* print styles */
@media print{
  body{ background:#fff; color:#000; }
  .sidebar, .topbar, .bottom-nav, .toast-host,
  .modal-host, .pwa-prompt, .drop-zone,
  .topbar-actions, .nav-item, .actions, button,
  .btn, .side-item{ display:none !important; }
  .app{ display:block; }
  .main-area{ padding:0; }
  .content{ padding:0; max-width:100%; }
  .card, .stat, .chart-card{
    border:1px solid #ccc !important; box-shadow:none !important;
    page-break-inside:avoid;
    background:#fff !important;
  }
  table{
    width:100%; border-collapse:collapse; font-size:11px;
    page-break-inside:auto;
  }
  table th, table td{ border:1px solid #999 !important; padding:4px 6px; }
  tr{ page-break-inside:avoid; }
  thead{ display:table-header-group; }
  h1{ font-size:20px; } h2{ font-size:16px; } h3{ font-size:14px; }
  .no-print{ display:none !important; }
  .print-only{ display:block !important; }
  @page{ margin:1.2cm; size:A4; }
}
.print-only{ display:none; }

/* ════════════════════════════════════════════════════════════
   BATCH 1 EXTENSIONS — login redesign / peer eval / seat matrix
   ──────────────────────────────────────────────────────────── */

/* ---------- Login redesign ---------- */
.login-card.login-v2{ max-width:540px; padding:28px 22px; }
.login-hero{
  text-align:center; margin-bottom:18px;
}
.login-hero .logo-xl{
  width:72px; height:72px; border-radius:18px; margin:0 auto 10px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff; font-size:36px; display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-lg);
}
.login-hero h1.brand-h1{ font-size:22px; font-weight:800; letter-spacing:-.03em; }
.login-hero .brand-sub{ font-size:13px; color:var(--text-muted); margin-top:4px; }

.last-user-box{
  border:2px solid var(--primary-soft);
  background:linear-gradient(135deg,var(--primary-soft),var(--surface));
  border-radius:var(--r-md); padding:16px; margin-bottom:18px;
  display:flex; flex-direction:column; gap:10px;
}
.last-user-row{ display:flex; align-items:center; gap:12px; }
.last-user-av{
  width:48px; height:48px; border-radius:50%;
  color:#fff; font-weight:700; font-size:18px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; box-shadow:var(--shadow);
}
.last-user-info{ flex:1; min-width:0; }
.last-user-greet{ font-weight:700; font-size:15px; }
.last-user-meta{ font-size:12px; color:var(--text-muted); margin-top:2px; }
.last-user-quick{
  width:100%; padding:12px 16px;
  background:var(--primary); color:#fff; border:none;
  border-radius:var(--r-sm); cursor:pointer;
  font-weight:700; font-size:15px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:var(--shadow); transition:all var(--tx);
}
.last-user-quick:hover{ background:var(--primary-hover); transform:translateY(-1px); box-shadow:var(--shadow-lg); }
.last-user-quick:active{ transform:scale(.98); }
.last-user-clear{
  background:none; border:none; color:var(--text-muted);
  font-size:11px; cursor:pointer; padding:4px;
  text-align:center;
}
.last-user-clear:hover{ color:var(--danger); }

.sep-text{
  display:flex; align-items:center; gap:10px;
  color:var(--text-faint); font-size:12px; margin:16px 0;
}
.sep-text:before, .sep-text:after{
  content:''; flex:1; height:1px; background:var(--border);
}

.role-choice{
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
}
.role-choice-card{
  padding:24px 12px; border:2px solid var(--border);
  border-radius:var(--r-md); cursor:pointer; background:var(--surface);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  text-align:center; user-select:none;
}
.role-choice-card:hover{
  border-color:var(--primary); transform:translateY(-4px) scale(1.02);
  box-shadow:var(--shadow-lg);
}
.role-choice-card:active{ transform:scale(.96); }
.role-choice-card .rc-ico{
  font-size:48px; line-height:1; margin-bottom:10px;
  display:block;
}
.role-choice-card .rc-title{ font-weight:700; font-size:16px; margin-bottom:4px; }
.role-choice-card .rc-sub{ font-size:11px; color:var(--text-muted); }
@keyframes rc-pop{
  0%{ transform:scale(1); } 50%{ transform:scale(1.06); } 100%{ transform:scale(1); }
}
.role-choice-card.tapped{ animation:rc-pop .35s ease; }

.login-stage{ animation:fadeStage .25s ease-out; }
@keyframes fadeStage{
  from{ opacity:0; transform:translateY(6px); }
  to{ opacity:1; transform:translateY(0); }
}

.pw-input-wrap{ position:relative; }
.pw-input-wrap input{ padding-right:40px; }
.pw-toggle{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; padding:6px;
  font-size:18px; color:var(--text-muted); border-radius:6px;
}
.pw-toggle:hover{ background:var(--surface-2); color:var(--text); }

.remember-row{
  display:flex; align-items:center; gap:8px;
  font-size:13px; cursor:pointer; user-select:none;
  padding:6px 0;
}
.remember-row input{ width:16px; height:16px; cursor:pointer; }

.default-hint{
  background:var(--surface-2); border-radius:var(--r-sm);
  padding:10px 12px; font-size:12px; color:var(--text-muted);
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  margin:8px 0 12px;
}
.default-hint .dh-actions{ display:flex; gap:6px; margin-left:auto; }
.default-hint .dh-actions button{
  background:var(--surface); border:1px solid var(--border);
  padding:4px 8px; border-radius:6px; font-size:11px; cursor:pointer;
  color:var(--text);
}
.default-hint .dh-actions button:hover{ background:var(--surface-3); }

.cls-group{ margin:14px 0 8px; }
.cls-group-header{
  display:flex; align-items:center; gap:8px; cursor:pointer;
  padding:6px 4px; user-select:none;
  border-radius:6px;
}
.cls-group-header:hover{ background:var(--surface-2); }
.cls-group-header .chev{
  width:14px; height:14px; transition:transform .2s; font-size:10px;
  color:var(--text-faint);
}
.cls-group.collapsed .chev{ transform:rotate(-90deg); }
.cls-group-header .gtt{ font-weight:700; font-size:13px; }
.cls-group-header .gct{ font-size:11px; color:var(--text-muted); }
.cls-group-body{ display:grid; grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:8px; padding:6px 0; }
.cls-group.collapsed .cls-group-body{ display:none; }
.cls-group-body .pcard{
  background:var(--surface); border:1px solid var(--border-strong);
  border-radius:var(--r-md); padding:12px 8px;
  cursor:pointer; text-align:center;
  transition:all var(--tx);
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.cls-group-body .pcard:hover{
  border-color:var(--primary); transform:translateY(-2px);
  box-shadow:var(--shadow);
}
.cls-group-body .pcard:active{ transform:scale(.97); }
.cls-group-body .pcard .av{
  width:42px; height:42px; border-radius:50%;
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:15px;
}
.cls-group-body .pcard .nm{ font-weight:700; font-size:13px; }
.cls-group-body .pcard .mt{ font-size:10px; color:var(--text-muted); }

/* ---------- Peer evaluation ---------- */
.pe-task-card{
  padding:14px 16px; border:1px solid var(--border);
  border-radius:var(--r-md); background:var(--surface);
  display:flex; flex-direction:column; gap:8px;
  transition:all var(--tx);
}
.pe-task-card:hover{ border-color:var(--primary); box-shadow:var(--shadow); }
.pe-task-card.open{ border-left:3px solid var(--success); }
.pe-task-card.closed{ border-left:3px solid var(--text-faint); opacity:.85; }
.pe-task-head{ display:flex; align-items:flex-start; gap:10px; }
.pe-task-head h3{ flex:1; min-width:0; }
.pe-pill{
  font-size:11px; padding:2px 8px; border-radius:999px;
  background:var(--surface-2); color:var(--text-muted); font-weight:600;
}
.pe-pill.open{ background:var(--success-soft); color:var(--success); }
.pe-pill.closed{ background:var(--surface-3); color:var(--text-muted); }
.pe-pill.due{ background:var(--warn-soft); color:var(--warn); }

.pe-dim-row{
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; background:var(--surface-2); border-radius:8px;
  margin-bottom:6px;
}
.pe-dim-row .label{ flex:1; font-size:13px; font-weight:600; }
.pe-star-bar{ display:flex; gap:4px; }
.pe-star{
  width:30px; height:30px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; user-select:none;
  background:var(--surface); border:1px solid var(--border);
  transition:all var(--tx);
}
.pe-star:hover{ background:var(--warn-soft); border-color:var(--warn); }
.pe-star.active{ background:var(--warn); color:#fff; border-color:var(--warn); }
.pe-star.active.read{ background:var(--warn-soft); color:var(--warn); cursor:default; }

.pe-ratee-card{
  padding:12px 14px; border:1px solid var(--border);
  border-radius:var(--r-md); background:var(--surface);
  margin-bottom:10px;
}
.pe-ratee-head{
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
}
.pe-ratee-av{
  width:36px; height:36px; border-radius:50%;
  color:#fff; font-weight:700; font-size:14px;
  display:flex; align-items:center; justify-content:center;
}
.pe-ratee-name{ flex:1; font-weight:700; }
.pe-done-tag{
  font-size:11px; padding:2px 8px; border-radius:999px;
  background:var(--success-soft); color:var(--success); font-weight:600;
}

.pe-result-row{
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; border-bottom:1px solid var(--border);
}
.pe-result-row:last-child{ border-bottom:none; }
.pe-result-name{ flex:1; font-weight:600; }
.pe-result-score{
  font-size:20px; font-weight:700; color:var(--primary);
  letter-spacing:-.02em;
}
.pe-result-count{ font-size:11px; color:var(--text-muted); }
.pe-anomaly{
  display:inline-block; font-size:10px; padding:1px 6px;
  background:var(--danger-soft); color:var(--danger);
  border-radius:999px; font-weight:600; margin-left:4px;
}

/* ---------- Seat matrix ---------- */
.matrix-toolbar{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  margin-bottom:14px; padding:10px 12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-md);
}
.matrix-toolbar .legend{
  display:flex; gap:6px; flex-wrap:wrap;
}
.matrix-toolbar .legend .lg{
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; color:var(--text-muted);
}
.matrix-toolbar .legend .dot{
  width:10px; height:10px; border-radius:3px; display:inline-block;
}
.matrix-grid{
  display:grid; gap:8px; padding:14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-md); overflow-x:auto;
}
.matrix-podium{
  text-align:center; font-size:11px; color:var(--text-faint);
  padding:6px 0 10px; letter-spacing:.2em; font-weight:600;
  border-bottom:2px dashed var(--border); margin-bottom:10px;
}
.matrix-seat{
  min-height:64px; border:2px solid var(--border);
  border-radius:10px; background:var(--surface-2);
  padding:6px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; user-select:none; position:relative;
  transition:all var(--tx);
}
.matrix-seat:hover{ transform:translateY(-2px); box-shadow:var(--shadow); }
.matrix-seat .seat-no{
  position:absolute; top:2px; left:4px;
  font-size:9px; color:var(--text-faint); font-weight:600;
}
.matrix-seat .seat-nm{
  font-weight:700; font-size:12px; text-align:center;
  word-break:break-all; line-height:1.2;
}
.matrix-seat .seat-st{
  font-size:14px; margin-top:2px;
}
.matrix-seat.s-present{ background:var(--success-soft); border-color:var(--success); }
.matrix-seat.s-late{ background:var(--warn-soft); border-color:var(--warn); }
.matrix-seat.s-leave{ background:var(--accent-soft); border-color:var(--accent); }
.matrix-seat.s-absent{ background:var(--danger-soft); border-color:var(--danger); }
.matrix-seat.s-empty{ background:var(--surface-3); border-style:dashed; opacity:.45; cursor:default; }
.matrix-seat.s-empty:hover{ transform:none; box-shadow:none; }
.matrix-seat.dragging{ opacity:.5; transform:scale(.95); }
.matrix-seat.drag-over{ border-color:var(--primary); border-style:dashed; background:var(--primary-soft); }

.matrix-cls-tabs{

<div id="root"></div>

<script>
/* ════════════════════════════════════════════════════════════
   APP STATE & CONSTANTS
   ──────────────────────────────────────────────────────────── */
"use strict";

const LS_KEY = 'cms_v3';
const LS_CFG = LS_KEY + '_cfg';
const LS_DB  = LS_KEY + '_db';
const LS_FB  = LS_KEY + '_fb_cfg';
const LS_THEME = LS_KEY + '_theme';
const LS_ACCENT = LS_KEY + '_accent';
const LS_APPEARANCE = LS_KEY + '_appearance';

/* font presets — Google Fonts loaded lazily on first use */
const FONT_PRESETS = [
  { key:'system',  label:'系統預設', stack:'-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif' },
  { key:'sans',    label:'無襯線',   stack:'"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif',  gf:'Noto+Sans+TC:wght@400;500;700' },
  { key:'serif',   label:'襯線（明體）', stack:'"Noto Serif TC","Songti TC","PMingLiU",serif',              gf:'Noto+Serif+TC:wght@400;500;700' },
  { key:'rounded', label:'圓潤',     stack:'"Quicksand","Noto Sans TC",sans-serif',                         gf:'Quicksand:wght@400;500;700|Noto+Sans+TC:wght@400;500;700' },
  { key:'mono',    label:'等寬',     stack:'"JetBrains Mono","SF Mono",Menlo,Consolas,"Courier New",monospace' },
  { key:'kai',     label:'楷體',     stack:'"DFKai-SB","BiauKai","標楷體","Kaiti TC",serif' }
];
function _loadGoogleFont(gf){
  if(!gf) return;
  const id = 'gfont-' + gf.replace(/[^a-z0-9]/gi,'-');
  if(document.getElementById(id)) return;
  const link = document.createElement('link');
  link.id = id; link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + gf + '&display=swap';
  document.head.appendChild(link);
}
const LS_SESSION = LS_KEY + '_session';
const LS_LAST_USER  = LS_KEY + '_last_user';
const LS_REMEMBER   = LS_KEY + '_remember';
const LS_LOGIN_STEP = LS_KEY + '_login_step';

const App = {
  cfg: null,           // workspace config: {roomCode, role, ...}
  session: null,       // {role:'teacher'|'student', id, name, ...}
  db: null,            // the database object
  view: 'overview',    // current view id
  subview: null,       // sub-view (for drill-downs)
  theme: 'light',
  accent: 'blue',
  font: 'system',     // appearance: font preset key
  fontSize: 'md',     // xs|sm|md|lg|xl
  density: 'normal',  // compact|normal|comfortable
  radius: 'normal',   // sharp|normal|pill
  _customAccent: null,// hex string when accent === 'custom'
  fb: null,
  fbRef: null,
  fbStatus: 'idle',    // idle|connecting|online|error
  listeners: [],
  bc: null,            // BroadcastChannel
  pendingSync: [],
  _syncEchoes: {},     // batch 3: Firebase echo-suppression { 'node::id' : ts }
  _syncRerTimer: null, // batch 3: debounced rerender from sync events
  _notify: null,       // batch 3: notifications module state
};

/* ════════════════════════════════════════════════════════════
   TINY UTILITIES
   ──────────────────────────────────────────────────────────── */
const $  = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function el(tag, attrs, ...children){
  const e = document.createElement(tag);
  if(attrs){
    for(const k in attrs){
      const v = attrs[k];
      if(v == null || v === false) continue;
      if(k === 'class' || k === 'className') e.className = v;
      else if(k === 'style' && typeof v === 'object') Object.assign(e.style, v);
      else if(k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
      else if(k === 'html') e.innerHTML = v;
      else e.setAttribute(k, v);
    }
  }
  children.flat().forEach(c => {
    if(c == null || c === false) return;
    if(typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}

function esc(s){
  if(s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function td(){
  const d = new Date();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}-${m}-${day}`;
}
function nt(){
  const d = new Date();
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  const s = String(d.getSeconds()).padStart(2,'0');
  return `${h}:${m}:${s}`;
}
function nid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,9);
}
function fmtDateTime(ts){
  const d = new Date(ts);
  return d.toLocaleString('zh-TW', { hour12:false });
}
function relTime(ts){
  const diff = Date.now() - ts;
  const s = Math.floor(diff/1000);
  if(s < 60) return s + ' 秒前';
  const m = Math.floor(s/60);
  if(m < 60) return m + ' 分前';
  const h = Math.floor(m/60);
  if(h < 24) return h + ' 小時前';
  const dd = Math.floor(h/24);
  if(dd < 7) return dd + ' 天前';
  return new Date(ts).toLocaleDateString('zh-TW');
}
function hash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return h.toString(36);
}
function initials(name){
  if(!name) return '?';
  return name.trim().slice(0,2);
}

/* ════════════════════════════════════════════════════════════
   PASSWORD HASHING (SHA-256 with salt) — batch 1 安全強化
   保留向後相容：舊明文 password 仍能登入，下次修改自動升級
   ──────────────────────────────────────────────────────────── */
async function hashPassword(plain){
  if(plain == null || plain === '') return '';
  try {
    const enc = new TextEncoder();
    const data = enc.encode('cms-v3-salt-' + plain);
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2,'0')).join('');
  } catch(e){
    // fallback：crypto.subtle 不可用時，採用簡易雜湊（不安全但能跑）
    return 'plain:' + String(plain);
  }
}

async function verifyPassword(plain, stored){
  if(stored == null || stored === '') return false;
  if(plain == null) return false;
  const s = String(stored);
  // 已是 SHA-256 雜湊（64 字元 hex）
  if(/^[0-9a-f]{64}$/i.test(s)){
    const h = await hashPassword(plain);
    return h === s.toLowerCase();
  }
  // 否則為舊版明文 → 直接比對（向後相容）
  return String(plain) === s;
}

/**
 * 判斷一個密碼欄位是否已雜湊。
 */
function isPasswordHashed(stored){
  return typeof stored === 'string' && /^[0-9a-f]{64}$/i.test(stored);
}

/* ════════════════════════════════════════════════════════════
   TOAST + MODAL + CONFIRM
   ──────────────────────────────────────────────────────────── */
function toast(msg, type='', dur=2400){
  const host = $('#toast-host');
  const cls = type ? `toast t-${type}` : 'toast';
  const t = el('div', { class: cls }, msg);
  host.appendChild(t);
  setTimeout(()=> {
    t.style.transition = 'all .25s ease-out';
    t.style.opacity = '0';
    t.style.transform = 'translateY(-10px)';
    setTimeout(()=> t.remove(), 280);
  }, dur);
}

function modal(content, opts={}){
  const host = $('#modal-host');
  host.innerHTML = '';
  const wrap = el('div', { class:'modal-host', onclick: e => {
    if(e.target === wrap && opts.dismissable !== false) close();
  }});
  const m = el('div', { class:'modal' });
  if(typeof content === 'string') m.innerHTML = content;
  else if(Array.isArray(content)) content.forEach(c => m.appendChild(c));
  else m.appendChild(content);
  wrap.appendChild(m);
  host.appendChild(wrap);
  function close(){ wrap.style.animation = 'fadeIn .2s ease-out reverse'; setTimeout(()=> { host.innerHTML=''; }, 180); }
  return { close, root:m };
}

function closeModal(){ $('#modal-host').innerHTML = ''; }

function confirmDlg(msg, opts={}){
  return new Promise(resolve => {
    const m = modal('', { dismissable:false });
    m.root.appendChild(el('h2', null, opts.title || '確認'));
    m.root.appendChild(el('p', null, msg));
    const actions = el('div', { class:'modal-actions' });
    actions.appendChild(el('button', { class:'btn', onclick:()=> { m.close(); resolve(false); } }, opts.cancelText || '取消'));
    actions.appendChild(el('button', { class: opts.danger ? 'btn btn-danger' : 'btn btn-primary', onclick:()=> { m.close(); resolve(true); } }, opts.okText || '確定'));
    m.root.appendChild(actions);
  });
}

function promptDlg(label, defaultVal='', opts={}){
  return new Promise(resolve => {
    const m = modal('', { dismissable:false });
    m.root.appendChild(el('h2', null, opts.title || '輸入'));
    const lbl = el('label', { class:'label' }, label);
    const inp = el(opts.multiline?'textarea':'input', { class: opts.multiline?'textarea':'input', value:defaultVal });
    if(!opts.multiline) inp.setAttribute('value', defaultVal);
    inp.value = defaultVal;
    if(opts.type) inp.setAttribute('type', opts.type);
    if(opts.placeholder) inp.setAttribute('placeholder', opts.placeholder);
    m.root.appendChild(lbl); m.root.appendChild(inp);
    const actions = el('div', { class:'modal-actions' });
    actions.appendChild(el('button', { class:'btn', onclick:()=> { m.close(); resolve(null); } }, '取消'));
    actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> { const v = inp.value; m.close(); resolve(v); } }, '確定'));
    m.root.appendChild(actions);
    setTimeout(()=> inp.focus(), 60);
    inp.addEventListener('keydown', e => { if(e.key==='Enter' && !opts.multiline){ const v=inp.value; m.close(); resolve(v); } });
  });
}

/* ════════════════════════════════════════════════════════════
   STORAGE LAYER
   ──────────────────────────────────────────────────────────── */
/* 預設出席狀態（batch 1 自訂出席狀態）
   key:    內部識別（不能改）
   label:  顯示文字（可改）
   color:  CSS 變數 base 名（success / warn / danger / accent / primary）
   icon:   emoji
   counts: 權重，計算出席率時 sum(counts)/total
   builtin: true 表示預設，不能刪除
*/
function defaultAttendanceStatuses(){
  return [
    { key:'present', label:'到', color:'success', icon:'✅', counts:1.0, builtin:true },
    { key:'late',    label:'遲到', color:'warn',    icon:'⏰', counts:0.7, builtin:true },
    { key:'leave',   label:'請假', color:'accent',  icon:'📆', counts:0.5, builtin:true },
    { key:'absent',  label:'缺席', color:'danger',  icon:'❌', counts:0,   builtin:true }
  ];

/* ════════════════════════════════════════════════════════════
   V1 → V3 AUTO-IMPORT (one-shot on first boot)
   ──────────────────────────────────────────────────────────── */
const LS_V1_IMPORTED = LS_KEY + '_v1_imported';

function detectV1Students(){
  // V1 stores its DB at localStorage 'cmsDB'; if absent, no data to import.
  try {
    const raw = localStorage.getItem('cmsDB');
    if(!raw) return null;
    const v1 = JSON.parse(raw);
    if(!v1 || typeof v1 !== 'object') return null;
    const students = Array.isArray(v1.students) ? v1.students : [];
    if(!students.length) return null;
    return {
      students,
      courses: Array.isArray(v1.courses) ? v1.courses : [],
      accounts: Array.isArray(v1.accounts) ? v1.accounts : [],
      settings: v1.settings || null
    };
  } catch(e){
    console.warn('[v1-detect] failed', e);
    return null;
  }
}

function autoImportV1(){
  // Guard: only run once.
  try {
    if(localStorage.getItem(LS_V1_IMPORTED) === '1') return false;
  } catch(e){}
  const v1 = detectV1Students();
  if(!v1) return false;
  if(!App.db) return false;

  // Only import if V3 has no students yet — avoid clobbering anything
  // the teacher already entered manually.
  const existingStu = (App.db.students && App.db.students.length) ? App.db.students.length : 0;
  if(existingStu > 0){
    try { localStorage.setItem(LS_V1_IMPORTED, '1'); } catch(e){}
    return false;
  }

  // -- Map V1 students → V3 schema. V1 uses `pass` & `sid`; V3 uses `password`.
  const seenSids = new Set();
  const cleanStudents = (v1.students || []).map(s => {
    if(!s || !s.name) return null;
    const sid = s.sid != null ? String(s.sid).trim() : '';
    // dedupe by sid+name to be safe (V1 sometimes has _timeUnreliable etc.)
    const dupKey = (sid || '') + '|' + s.name;
    if(seenSids.has(dupKey)) return null;
    seenSids.add(dupKey);
    const passFromV1 = s.pass || s.password || '';
    const fallbackPass = sid ? sid.slice(-4).padStart(4,'0') : '0000';
    return {
      id: s.id || nid(),
      name: String(s.name).trim(),
      sid,
      cls: s.cls || s.class || '',
      seat: typeof s.seat === 'number' ? s.seat : (parseInt(s.seat,10) || 0),
      email: s.email || '',
      phone: s.phone || '',
      parentName: s.parentName || s.guardianName || '',
      parentPhone: s.parentPhone || s.guardianPhone || '',
      parentEmail: s.parentEmail || s.guardianEmail || '',
      // V3 reads `password` field — keep V1 password if present, else last 4 of sid
      password: passFromV1 || fallbackPass,
      mustChangePw: !!s.mustChangePw,
      note: s.note || 'V1 匯入'
    };
  }).filter(Boolean);

  if(!cleanStudents.length){
    try { localStorage.setItem(LS_V1_IMPORTED, '1'); } catch(e){}
    return false;
  }

  App.db.students = cleanStudents;

  // -- Courses
  if(v1.courses && v1.courses.length && (!App.db.courses || !App.db.courses.length)){
    App.db.courses = v1.courses.map(c => ({
      id: c.id || nid(),
      name: c.name || '課程',
      code: c.code || '',
      teacher: c.teacher || ''
    }));
  }

  // -- Accounts: V1 may use {user,pass} or {username,password}. Convert all
  //    to V3 schema. Only adopt if V3 has no teacher accounts yet.
  if(v1.accounts && v1.accounts.length && (!App.db.accounts || !App.db.accounts.length)){
    App.db.accounts = v1.accounts.map(a => ({
      id: a.id || nid(),
      username: a.user || a.username || 'admin',
      password: a.pass || a.password || 'admin123',
      name: a.name || a.fullName || '老師',
      role: 'teacher',
      ts: a.ts || Date.now()
    }));
  }

  // -- Settings: pick up school/teacher names if useful
  if(v1.settings && App.db.settings){
    if(v1.settings.schoolName) App.db.settings.schoolName = v1.settings.schoolName;
    if(v1.settings.teacherName) App.db.settings.teacherName = v1.settings.teacherName;
    if(v1.settings.startTime) App.db.settings.startTime = v1.settings.startTime;
    if(typeof v1.settings.lateMinutes === 'number') App.db.settings.lateMinutes = v1.settings.lateMinutes;
    if(App.db.branding && v1.settings.schoolName) App.db.branding.title = v1.settings.schoolName;
  }

  // NOTE: we deliberately do NOT import V1 attendance/leaves/messages — those
  //       are often timestamped with the wrong day ("_timeUnreliable"), so
  //       importing them would pollute today's stats.

  saveDB();
  try { localStorage.setItem(LS_V1_IMPORTED, '1'); } catch(e){}
  console.log('[v3] auto-imported ' + cleanStudents.length + ' students from V1');
  // toast comes later (after rerender) so it actually shows
  App._v1ImportedCount = cleanStudents.length;
  return true;
}

function loadAppearance(){
