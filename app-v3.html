      el('button', { class:'btn btn-primary', onclick:()=> {
        if(!sel.value) return;
        g.members = g.members || [];
        if(g.maxMembers && g.members.length >= g.maxMembers){
          toast('已達人數上限','warning'); return;
        }
        g.members.push(sel.value);
        saveDB();
        m.close();
        openGroupDetail(g.id);
      }}, '加入')
    ));
  } else if(g.maxMembers && (g.members||[]).length >= g.maxMembers){
    m.root.appendChild(el('div', { class:'small', style:{color:'var(--warn)',padding:'8px'} }, '⚠️ 已達人數上限'));
  }

  m.root.appendChild(el('div', { class:'modal-actions' },
    el('button', { class:'btn', onclick:()=> m.close() }, '關閉')
  ));
}

function openAutoGroup(){
  const students = App.db.students.slice();
  if(!students.length){ toast('沒有學生可分組','warning'); return; }

  const m = modal('');
  m.root.appendChild(el('h2', null, '🎲 自動分組'));
  m.root.appendChild(el('div', { class:'muted small', style:{marginBottom:'10px'} },
    '系統將自動建立多個小組，學生平均分配。'));

  const clsSel = el('select', { class:'input' });
  clsSel.appendChild(el('option', { value:'' }, '— 全部學生 —'));
  Array.from(new Set(students.map(s => s.cls).filter(Boolean))).sort().forEach(c => {
    clsSel.appendChild(el('option', { value:c }, c + '（' + students.filter(s => s.cls === c).length + ' 人）'));
  });

  const modeSel = el('select', { class:'input' });
  [['random','🎲 完全隨機'],['avgClass','⚖️ 班級平均（每組各班均勻）'],['avgAtt','📊 按出席率平均']].forEach(([v,t]) => {
    modeSel.appendChild(el('option', { value:v }, t));
  });

  const nGroups = el('input', { class:'input', type:'number', min:2, max:50, value:4 });
  const namePrefix = el('input', { class:'input', value:'第', placeholder:'前綴（如：第）' });
  const nameSuffix = el('input', { class:'input', value:'組', placeholder:'後綴（如：組）' });

  m.root.appendChild(el('div', { class:'form-row' }, el('label', null, '範圍'), clsSel));
  m.root.appendChild(el('div', { class:'form-row' }, el('label', null, '模式'), modeSel));
  m.root.appendChild(el('div', { class:'form-row' }, el('label', null, '組數'), nGroups));
  m.root.appendChild(el('div', { class:'form-row' }, el('label', null, '命名'),
    el('div', { class:'flex', style:{gap:'4px'} }, namePrefix, el('span', { class:'mono' }, '1/2/3…'), nameSuffix)
  ));

  m.root.appendChild(el('div', { class:'modal-actions' },
    el('button', { class:'btn', onclick:()=> m.close() }, '取消'),
    el('button', { class:'btn btn-primary', onclick: async ()=> {
      const cls = clsSel.value;
      const mode = modeSel.value;
      const n = Math.max(2, Math.min(50, parseInt(nGroups.value, 10) || 4));
      let pool = cls ? students.filter(s => s.cls === cls) : students.slice();
      if(pool.length < n){ toast('學生人數少於組數','warning'); return; }
      if(!await confirmDlg('將建立 '+n+' 個新小組，共 '+pool.length+' 位學生。','確定？')) return;

      // sort/shuffle by mode
      if(mode === 'random'){
        for(let i = pool.length-1; i>0; i--){
          const j = Math.floor(Math.random()*(i+1));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
      } else if(mode === 'avgAtt'){
        pool.sort((a,b)=> attendanceRate(b.id) - attendanceRate(a.id));
      } else if(mode === 'avgClass'){
        // group by class then snake-distribute
        const byCls = {};
        pool.forEach(s => { (byCls[s.cls||'無']=byCls[s.cls||'無']||[]).push(s); });
        pool = [];
        Object.keys(byCls).forEach(c => {
          for(let i = byCls[c].length-1; i>0; i--){
            const j = Math.floor(Math.random()*(i+1));
            [byCls[c][i], byCls[c][j]] = [byCls[c][j], byCls[c][i]];
          }
          pool = pool.concat(byCls[c]);
        });
      }

      // snake-fill into n groups
      const groups = Array.from({length:n}, ()=> []);
      let dir = 1, idx = 0;
      pool.forEach(s => {
        groups[idx].push(s.id);
        if(dir > 0){
          if(idx === n-1){ dir = -1; } else idx++;
        } else {
          if(idx === 0){ dir = 1; } else idx--;
        }
      });

      App.db.groups = App.db.groups || [];
      const prefix = namePrefix.value;
      const suffix = nameSuffix.value;
      groups.forEach((mems, i) => {
        App.db.groups.push({
          id: 'g_' + nid() + '_' + i,
          name: prefix + (i+1) + suffix,
          desc: '自動分組' + (cls ? '（'+cls+'）' : '') + '（' + (mode === 'random' ? '隨機' : mode === 'avgAtt' ? '按出席率' : '班級平均') + '）',
          cls: cls || '',
          maxMembers: 0,
          members: mems,
          createdAt: Date.now(),
          openJoin: false
        });
      });
      saveDB();
      m.close();
      toast('已建立 '+n+' 個小組','success');
      rerender();
    }}, '建立')
  ));
}

  m.root.appendChild(el('h2', null, '👥 ' + (g.name || '小組')));

        if(!await confirmDlg('要退出此小組？',{ title:'退出小組' })) return;

        saveDB();
        m.close();
        toast('已退出','info');
        rerender();
      }}, '退出小組'));
    }

    actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> {
      g.members = g.members || [];

  }
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '關閉'));
  m.root.appendChild(actions);
}

/* ════════════════════════════════════════════════════════════
   BATCH 2 ▒▒  SELF-EVALUATION  (rSelfEval student)
   ──────────────────────────────────────────────────────────── */

const SELF_EVAL_DIMS = [
  { k:'attitude', t:'學習態度' },
  { k:'progress', t:'進步幅度' },
  { k:'contrib',  t:'課堂貢獻' },
  { k:'attend',   t:'出席表現' },
  { k:'effort',   t:'努力程度' }
];

function rSelfEval(content){
  const me = currentStudent();
  if(!me){ content.appendChild(renderEmpty({ title:'尚未登入' })); return; }

  content.appendChild(renderBreadcrumb([
    { label:'首頁', go:'checkin' },
    { label:'學期自評' }
  ]));

  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'12px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '學期自評'),
      el('div', { class:'muted small' }, '誠實評估自己，是進步的開始')
    )
  ));

  const mine = (App.db.selfEvals || []).filter(s => s.studentId === me.id).sort((a,b)=> (b.submittedAt||0)-(a.submittedAt||0));

  // current term
  const now = new Date();
  const term = now.getFullYear() + (now.getMonth() < 7 ? '-春' : '-秋');
  const current = mine.find(s => s.term === term);

  const card = el('div', { class:'card', style:{marginBottom:'14px'} });
  card.appendChild(el('h3', null, '🗓 本學期：' + term + (current ? '（已寫過，可修改）' : '（尚未填寫）')));
  if(current){
    card.appendChild(el('div', { class:'muted small', style:{marginTop:'4px'} },
      '上次提交：' + fmtDateTime(current.submittedAt || 0)
    ));
  }

  // ratings
  const ratings = {};
  SELF_EVAL_DIMS.forEach(d => { ratings[d.k] = (current && current.dims && current.dims[d.k]) || 0; });

  const dimWrap = el('div', { style:{margin:'12px 0'} });
  SELF_EVAL_DIMS.forEach(d => {
    const row = el('div', { class:'dim-row' });
    row.appendChild(el('div', { class:'dim-lbl' }, d.t));
    const stars = el('div', { class:'dim-stars' });
    const valEl = el('div', { class:'dim-val' }, ratings[d.k] ? String(ratings[d.k]) + '/5' : '—');
    for(let i = 1; i <= 5; i++){
      const s = el('span', { class:'s' + (i <= ratings[d.k] ? ' on' : ''), 'data-i':String(i) }, '★');
      s.addEventListener('click', () => {
        ratings[d.k] = i;
        Array.from(stars.children).forEach((x, idx) => {
          x.classList.toggle('on', idx < i);
        });
        valEl.textContent = i + '/5';
      });
      stars.appendChild(s);
    }
    row.appendChild(stars);
    row.appendChild(valEl);
    dimWrap.appendChild(row);
  });
  card.appendChild(dimWrap);

  const ref = el('textarea', { class:'input', rows:5, placeholder:'寫下你的學習反思、優點、待改進的地方…' }, current ? (current.reflection || '') : '');
  card.appendChild(el('div', { class:'form-row' }, el('label', null, '反思文字'), ref));

  card.appendChild(el('div', { class:'flex', style:{gap:'8px',marginTop:'8px',flexWrap:'wrap'} },
    el('button', { class:'btn btn-primary', onclick: ()=> {
      const text = ref.value.trim();
      const total = SELF_EVAL_DIMS.reduce((t,d)=> t + (ratings[d.k] || 0), 0);
      if(total === 0 && !text){
        toast('請至少評分或寫下反思','warning');
        return;
      }
      const ev = current || {
        id: 'se_' + nid(),
        studentId: me.id,
        studentName: me.name,
        term: term,
        date: td(),
        dims: {},
        reflection: '',
        submittedAt: 0,
        history: []
      };
      // record history
      if(ev.id && (App.db.selfEvals||[]).find(s => s.id === ev.id)){
        ev.history = ev.history || [];
        ev.history.push({
          dims: Object.assign({}, ev.dims || {}),
          reflection: ev.reflection || '',
          at: ev.submittedAt || 0
        });
      }
      ev.dims = Object.assign({}, ratings);
      ev.reflection = text;
      ev.submittedAt = Date.now();
      App.db.selfEvals = App.db.selfEvals || [];
      const i = App.db.selfEvals.findIndex(s => s.id === ev.id);
      if(i >= 0) App.db.selfEvals[i] = ev;
      else App.db.selfEvals.push(ev);
      saveDB();
      toast(current ? '已更新自評' : '已送出自評','success');
      rerender();
    }}, current ? '💾 更新自評' : '✅ 送出自評'),
    el('div', { class:'small muted', style:{alignSelf:'center'} }, '送出後仍可修改，會保留修改記錄')
  ));
  content.appendChild(card);

  // history
  if(mine.length > (current ? 1 : 0)){
    content.appendChild(el('h2', { style:{margin:'18px 0 8px'} }, '📚 歷次紀錄'));
    mine.filter(s => !current || s.id !== current.id).forEach(s => {
      const c = el('div', { class:'feed-msg' });
      c.appendChild(el('div', { class:'flex-between' },
        el('div', { style:{fontWeight:'600'} }, s.term || s.date),
        el('div', { class:'tiny muted' }, fmtDateTime(s.submittedAt || 0))
      ));
      const sum = SELF_EVAL_DIMS.reduce((t,d)=> t + ((s.dims||{})[d.k] || 0), 0);
      const cnt = SELF_EVAL_DIMS.filter(d => (s.dims||{})[d.k]).length;
      const avg = cnt ? (sum/cnt).toFixed(1) : '—';
      c.appendChild(el('div', { class:'small muted', style:{marginTop:'4px'} }, '平均：⭐ ' + avg));
      if(s.reflection) c.appendChild(el('div', { class:'text', style:{marginTop:'6px'} }, s.reflection));
      content.appendChild(c);
    });
  }
}

/* Teacher view: list of all student self-evals (used inside rEv as 4th tab) */
function renderTeacherSelfEvals(parent){
  const all = (App.db.selfEvals || []).slice().sort((a,b)=> (b.submittedAt||0)-(a.submittedAt||0));
  const q = (App._evSearch || '').toLowerCase();
  let list = all;
  if(q) list = list.filter(s => (s.reflection||'').toLowerCase().includes(q) || (s.studentName||'').toLowerCase().includes(q));

  // stats
  if(list.length){
    const dimStats = {};
    SELF_EVAL_DIMS.forEach(d => { dimStats[d.k] = { sum:0, cnt:0 }; });
    list.forEach(s => {
      SELF_EVAL_DIMS.forEach(d => {
        const v = (s.dims||{})[d.k];
        if(typeof v === 'number' && v > 0){ dimStats[d.k].sum += v; dimStats[d.k].cnt++; }
      });
    });
    const statCard = el('div', { class:'card', style:{marginBottom:'12px'} });
    statCard.appendChild(el('h3', null, '⭐ 各維度平均分（共 ' + list.length + ' 份）'));
    const bar = el('div', { style:{marginTop:'8px'} });
    SELF_EVAL_DIMS.forEach(d => {
      const ds = dimStats[d.k];
      const avg = ds.cnt ? ds.sum/ds.cnt : 0;
      bar.appendChild(el('div', { class:'bar-row' },
        el('div', { class:'lab' }, d.t),
        el('div', { class:'bar-wrap' }, el('div', { class:'bar', style:{width: (avg*20) + '%'} })),
        el('div', { class:'val' }, avg ? avg.toFixed(1) : '—')
      ));
    });
    statCard.appendChild(bar);
    parent.appendChild(statCard);

    // crude word cloud (top words from reflections)
    const wcount = {};
    list.forEach(s => {
      const t = String(s.reflection || '');
      const matches = t.match(/[一-龥]{2,4}|[A-Za-z]{3,}/g) || [];
      const stop = new Set(['可以','需要','我覺得','非常','比較','還有','還是','應該','沒有','時候','希望','學習','自己']);
      matches.forEach(w => {
        if(stop.has(w)) return;
        wcount[w] = (wcount[w] || 0) + 1;
      });
    });
    const top = Object.entries(wcount).sort((a,b)=> b[1]-a[1]).slice(0, 20);
    if(top.length){
      const cloud = el('div', { class:'card', style:{marginBottom:'12px'} });
      cloud.appendChild(el('h3', null, '☁️ 常見關鍵詞'));
      const wrap = el('div', { style:{display:'flex',gap:'6px',flexWrap:'wrap',marginTop:'8px'} });
      const maxC = top[0][1];
      top.forEach(([w, c]) => {
        const sz = 12 + Math.round((c/maxC) * 14);
        wrap.appendChild(el('span', {
          style:{
            fontSize: sz + 'px',
            padding:'2px 8px',
            background:'var(--primary-soft)',
            color:'var(--primary)',
            borderRadius:'999px',
            fontWeight: c > maxC*0.5 ? '700' : '500'
          },
          title: w + ' × ' + c
        }, w));
      });
      cloud.appendChild(wrap);
      parent.appendChild(cloud);
    }
  }

  if(!list.length){
    parent.appendChild(renderEmpty({
      icon:'✍️',
      title: q ? '無符合條件的自評' : '尚無學生自評',
      desc: q ? '試試其他關鍵字' : '學生填寫自評後，會出現在這裡'
    }));
    return;
  }

  list.forEach(s => {
    const c = el('div', { class:'feed-msg' });
    const who = el('div', { class:'who' });
    who.appendChild(el('div', { class:'avatar' }, initials(s.studentName || '?')));
    who.appendChild(el('div', null,
      el('div', { style:{fontWeight:'600'} }, s.studentName || '?'),
      el('div', { class:'tiny muted' }, (s.term || '') + ' · ' + fmtDateTime(s.submittedAt||0))
    ));
    c.appendChild(who);

    // mini star line
    const sum = SELF_EVAL_DIMS.reduce((t,d)=> t + ((s.dims||{})[d.k] || 0), 0);
    const cnt = SELF_EVAL_DIMS.filter(d => (s.dims||{})[d.k]).length;
    const avg = cnt ? (sum/cnt).toFixed(1) : '—';
    const ratings = el('div', { class:'small', style:{display:'flex',gap:'10px',flexWrap:'wrap',marginTop:'4px'} });
    SELF_EVAL_DIMS.forEach(d => {
      const v = (s.dims||{})[d.k] || 0;
      if(v > 0){
        ratings.appendChild(el('span', null, d.t + '：', el('span', { style:{color:'#f59e0b',fontWeight:'700'} }, '★'.repeat(v))));
      }
    });
    ratings.appendChild(el('span', { class:'muted' }, '平均 ' + avg));
    c.appendChild(ratings);

    if(s.reflection) c.appendChild(el('div', { class:'text', style:{marginTop:'6px',whiteSpace:'pre-wrap'} }, s.reflection));
    if(s.history && s.history.length){
      c.appendChild(el('div', { class:'tiny muted', style:{marginTop:'4px'} }, '🔄 已修改 ' + s.history.length + ' 次'));
    }
    parent.appendChild(c);
  });
}

function rAttReport(content){

function initAttRange(){
  const d = new Date();
  const fmt = x => x.toISOString().slice(0,10);
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  return { from: fmt(first), to: td() };
}

function filteredAttendance(){
  const r = App._attRange || { from:'', to:'' };
  return App.db.attendance.filter(a => {
    if(r.from && a.date < r.from) return false;
    if(r.to && a.date > r.to) return false;
    return true;
  });
}

function uniqueDatesInRange(){
  const r = App._attRange || { from:'', to:'' };
  const dates = new Set(App.db.attendance.map(a => a.date));
  return Array.from(dates).filter(d => (!r.from || d >= r.from) && (!r.to || d <= r.to)).sort();
}

function studentAttSummary(studentId){
  const dates = uniqueDatesInRange();
  if(!dates.length) return { rate:0, days:0, total:0, late:0, absent:0, leave:0 };
  const att = App.db.attendance.filter(a => a.studentId === studentId && (!App._attRange.from || a.date >= App._attRange.from) && (!App._attRange.to || a.date <= App._attRange.to));
  const myDays = new Set(att.map(a => a.date));
  const leaves = App.db.leaves.filter(l => l.studentId === studentId && l.status === 'approved' && (!App._attRange.from || l.date >= App._attRange.from) && (!App._attRange.to || l.date <= App._attRange.to));
  const leaveDays = new Set(leaves.map(l => l.date));
  const lateMin = App.db.settings.lateMinutes || 10;
  const startT = App.db.settings.startTime || '08:00';
  const [sh, sm] = startT.split(':').map(Number);
  const thresh = sh*60 + sm + lateMin;
  let late = 0;
  att.forEach(a => {
    if(a.time){
      const [h,m] = a.time.split(':').map(Number);
      if(h*60+m > thresh) late++;
    }
  });
  let attended = 0;
  dates.forEach(d => {
    if(myDays.has(d) || leaveDays.has(d)) attended++;
  });
  return {
    rate: Math.round(100*attended/dates.length),
    days: attended,
    total: dates.length,
    late: late,
    absent: dates.length - attended,
    leave: leaveDays.size
  };
}

function renderAttReportMonthly(content){
  const dates = uniqueDatesInRange();
  if(!dates.length){
    content.appendChild(renderEmpty({ icon:'📅', title:'區間內無資料' }));
    return;
  }
  // group by month
  const byMonth = {};
  dates.forEach(d => {
    const m = d.slice(0,7);
    byMonth[m] = byMonth[m] || [];
    byMonth[m].push(d);
  });

  const card = el('div', { class:'card' });
  card.appendChild(el('h3', null, '📅 月度出席趨勢'));
  const months = Object.keys(byMonth).sort();
  const monthRates = months.map(m => {
    const mDates = byMonth[m];
    let sum = 0, cnt = 0;
    App.db.students.forEach(s => {
      const att = new Set(App.db.attendance.filter(a => a.studentId === s.id && mDates.includes(a.date)).map(a => a.date));
      const lvs = new Set(App.db.leaves.filter(l => l.studentId === s.id && l.status === 'approved' && mDates.includes(l.date)).map(l => l.date));
      const attended = mDates.filter(d => att.has(d) || lvs.has(d)).length;
      sum += Math.round(100 * attended / mDates.length);
      cnt++;
    });
    return cnt ? Math.round(sum/cnt) : 0;
  });

  const bar = el('div', { style:{marginTop:'8px'} });
  months.forEach((m, i) => {
    bar.appendChild(el('div', { class:'bar-row' },
      el('div', { class:'lab' }, m),
      el('div', { class:'bar-wrap' }, el('div', { class:'bar', style:{width: monthRates[i] + '%'} })),
      el('div', { class:'val' }, monthRates[i] + '%')
    ));
  });
  card.appendChild(bar);
  content.appendChild(card);

  // simple line chart svg
  if(months.length >= 2){
    const W = 600, H = 180, P = 30;
    const max = 100;
    const stepX = (W - P*2) / (months.length - 1);
    let path = '';
    let pts = '';
    months.forEach((m, i) => {
      const x = P + i*stepX;
      const y = H - P - (monthRates[i] / max) * (H - P*2);
      path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      pts += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="var(--primary)" />`;
    });
    const svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="margin-top:14px;background:var(--surface-2);border-radius:8px">
      <path d="${path}" fill="none" stroke="var(--primary)" stroke-width="2"/>
      ${pts}
      ${months.map((m,i)=> `<text x="${(P + i*stepX).toFixed(1)}" y="${H - 8}" font-size="10" text-anchor="middle" fill="var(--text-muted)">${m.slice(5)}</text>`).join('')}
      <text x="${P-4}" y="${P+4}" font-size="10" fill="var(--text-muted)" text-anchor="end">100%</text>
      <text x="${P-4}" y="${H-P+4}" font-size="10" fill="var(--text-muted)" text-anchor="end">0%</text>
    </svg>`;
    const wrap = el('div'); wrap.innerHTML = svg;
    content.appendChild(wrap);
  }
}

function renderAttReportStudents(content){
  if(!App.db.students.length){
    content.appendChild(renderEmpty({ icon:'👥', title:'尚無學生' }));
    return;
  }

  App._attSort = App._attSort || { key:'rate', dir:-1 };
  App._attStuSearch = App._attStuSearch || '';

  content.appendChild(renderSearchbox({
    placeholder:'搜尋學生姓名 / 班級…',
    value: App._attStuSearch,
    onChange: v => { App._attStuSearch = v; rerender(); }
  }));

  const q = App._attStuSearch.toLowerCase();
  let arr = App.db.students.slice();
  if(q) arr = arr.filter(s => (s.name||'').toLowerCase().includes(q) || (s.cls||'').toLowerCase().includes(q));

  // augment with stats
  const rows = arr.map(s => Object.assign({ student:s }, studentAttSummary(s.id)));
  const k = App._attSort.key;
  const dir = App._attSort.dir;
  rows.sort((a,b) => {
    let x = a[k], y = b[k];
    if(k === 'name'){ x = a.student.name || ''; y = b.student.name || ''; return dir * x.localeCompare(y); }
    if(k === 'cls'){ x = a.student.cls || ''; y = b.student.cls || ''; return dir * x.localeCompare(y); }
    return dir * ((y||0) - (x||0)) * -1 * (dir < 0 ? -1 : 1);
  });
  // simpler sort
  rows.sort((a,b) => {
    if(k === 'name') return dir * (a.student.name||'').localeCompare(b.student.name||'');
    if(k === 'cls')  return dir * (a.student.cls||'').localeCompare(b.student.cls||'');
    return dir * ((b[k]||0) - (a[k]||0));
  });

  if(!rows.length){
    content.appendChild(renderEmpty({ icon:'🔍', title:'查無學生' }));
    return;
  }

  function sortBy(key){
    if(App._attSort.key === key) App._attSort.dir = -App._attSort.dir;
    else App._attSort = { key, dir: key === 'name' || key === 'cls' ? 1 : -1 };
    rerender();
  }
  function sIcon(key){
    if(App._attSort.key !== key) return '↕';
    return App._attSort.dir > 0 ? '↑' : '↓';
  }

  // desktop table
  const tblWrap = el('div', { class:'rep-table-wrap', style:{overflowX:'auto'} });
  const tbl = el('table', { class:'rep-table' });
  const thead = el('thead');
  const hdr = el('tr');
  [
    ['name','姓名'],['cls','班級'],['rate','出席率'],
    ['days','出席'],['absent','缺席'],['late','遲到'],['leave','請假']
  ].forEach(([key, label]) => {
    const th = el('th', { class: App._attSort.key === key ? 'sorted' : '', onclick: ()=> sortBy(key) }, label);
    th.appendChild(el('span', { class:'sort-i' }, sIcon(key)));
    hdr.appendChild(th);
  });
  hdr.appendChild(el('th', null, '評語'));
  thead.appendChild(hdr);
  tbl.appendChild(thead);
  const tb = el('tbody');
  rows.forEach(r => {
    const cls = r.rate >= 80 ? 'ok' : r.rate >= 60 ? 'warn' : 'bad';
    const tr = el('tr');
    tr.appendChild(el('td', null, r.student.name || ''));
    tr.appendChild(el('td', null, r.student.cls || ''));
    tr.appendChild(el('td', { class:'num' }, el('span', { class:'pill-att ' + cls }, r.rate + '%')));
    tr.appendChild(el('td', { class:'num' }, String(r.days)));
    tr.appendChild(el('td', { class:'num' }, String(r.absent)));
    tr.appendChild(el('td', { class:'num' }, String(r.late)));
    tr.appendChild(el('td', { class:'num' }, String(r.leave)));
    const noteCount = (App.db.attendanceNotes || []).filter(n => n.studentId === r.student.id).length;
    tr.appendChild(el('td', null,
      el('button', { class:'btn btn-sm', onclick: (e)=> { e.stopPropagation(); openAttNoteEditor(r.student); }},
        noteCount ? '💬 '+noteCount : '➕ 寫評語'
      )
    ));
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  tblWrap.appendChild(tbl);
  content.appendChild(tblWrap);

  // mobile cards
  const cardWrap = el('div', { class:'rep-cards' });
  rows.forEach(r => {
    const cls = r.rate >= 80 ? 'ok' : r.rate >= 60 ? 'warn' : 'bad';
    const c = el('div', { class:'rep-card' });
    c.appendChild(el('div', { class:'rc-name' }, r.student.name + (r.student.cls ? ' · ' + r.student.cls : '')));
    c.appendChild(el('div', { class:'rc-meta' }, el('span', { class:'pill-att ' + cls }, r.rate + '%'), ' 出席率'));
    c.appendChild(el('div', { class:'rc-grid' },
      el('div', null, el('span', { class:'rc-k' }, '出席：'), String(r.days)+'/'+r.total),
      el('div', null, el('span', { class:'rc-k' }, '缺席：'), String(r.absent)),
      el('div', null, el('span', { class:'rc-k' }, '遲到：'), String(r.late)),
      el('div', null, el('span', { class:'rc-k' }, '請假：'), String(r.leave))
    ));
    c.appendChild(el('button', { class:'btn btn-sm', style:{marginTop:'6px'}, onclick:()=> openAttNoteEditor(r.student) }, '💬 寫評語'));
    cardWrap.appendChild(c);
  });
  content.appendChild(cardWrap);
}

function renderAttReportIssues(content){
  const dates = uniqueDatesInRange();
  if(!dates.length){
    content.appendChild(renderEmpty({ icon:'⚠️', title:'區間內無資料' }));
    return;
  }
  const issues = [];
  App.db.students.forEach(s => {
    const sum = studentAttSummary(s.id);
    // consec absent
    const sortedDates = dates.slice();
    const att = new Set(App.db.attendance.filter(a => a.studentId === s.id).map(a => a.date));
    const lvs = new Set(App.db.leaves.filter(l => l.studentId === s.id && l.status === 'approved').map(l => l.date));
    let consec = 0, maxConsec = 0;
    sortedDates.forEach(d => {
      if(!att.has(d) && !lvs.has(d)){ consec++; if(consec > maxConsec) maxConsec = consec; }
      else consec = 0;
    });
    const flags = [];
    if(sum.rate < 60) flags.push({ k:'low', t:'⚠️ 出席率 < 60%' });
    if(maxConsec >= 3) flags.push({ k:'consec', t:'❌ 連續缺席 '+maxConsec+' 天' });
    if(sum.late >= 5)  flags.push({ k:'late', t:'⏰ 遲到 '+sum.late+' 次' });
    if(flags.length) issues.push({ student:s, sum, maxConsec, flags });
  });

  if(!issues.length){
    content.appendChild(renderEmpty({
      icon:'✅', title:'目前無異常',
      desc:'學生都很乖，出席狀況良好！'
    }));
    return;
  }

  content.appendChild(el('div', { class:'card', style:{background:'var(--warn-soft)',borderColor:'var(--warn)',marginBottom:'12px'} },
    el('h3', null, '⚠️ 需要關注 ' + issues.length + ' 位學生'),
    el('div', { class:'small muted' }, '出席率低於 60% 或連續缺席 3 天以上的學生')
  ));

  issues.sort((a,b)=> a.sum.rate - b.sum.rate);
  issues.forEach(it => {
    const card = el('div', { class:'card', style:{marginBottom:'8px'} });
    card.appendChild(el('div', { class:'flex-between' },
      el('div', null,
        el('div', { style:{fontWeight:'700',fontSize:'15px'} }, it.student.name + (it.student.cls ? ' · ' + it.student.cls : '')),
        el('div', { class:'small muted' }, '出席率：' + it.sum.rate + '%　缺席 ' + it.sum.absent + ' 天　遲到 ' + it.sum.late + ' 次')
      ),
      el('button', { class:'btn btn-sm', onclick:()=> openAttNoteEditor(it.student) }, '💬 寫評語')
    ));
    const flags = el('div', { class:'flex', style:{gap:'6px',marginTop:'6px',flexWrap:'wrap'} });
    it.flags.forEach(f => flags.appendChild(el('span', {
      style:{padding:'2px 10px',borderRadius:'999px',background:'var(--danger-soft)',color:'var(--danger)',fontSize:'12px',fontWeight:'700'}
    }, f.t)));
    card.appendChild(flags);
    content.appendChild(card);
  });
}

function openAttNoteEditor(student){
  const m = modal('');
  m.root.appendChild(el('h2', null, '💬 出席評語：' + student.name));
  const list = (App.db.attendanceNotes || []).filter(n => n.studentId === student.id).sort((a,b)=> (b.ts||0)-(a.ts||0));
  if(list.length){
    m.root.appendChild(el('h3', { style:{margin:'8px 0 6px'} }, '歷次評語'));
    list.forEach(n => {
      const c = el('div', { class:'feed-msg' });
      c.appendChild(el('div', { class:'small muted' }, fmtDateTime(n.ts||0) + ' · ' + (n.by || '老師')));
      c.appendChild(el('div', { class:'text', style:{marginTop:'4px',whiteSpace:'pre-wrap'} }, n.text || ''));
      c.appendChild(el('button', { class:'btn btn-sm btn-danger', style:{marginTop:'4px'}, onclick: async ()=> {
        if(!await confirmDlg('刪除這條評語？', { title:'刪除', danger:true })) return;
        App.db.attendanceNotes = App.db.attendanceNotes.filter(x => x.id !== n.id);
        saveDB();
        m.close();
        openAttNoteEditor(student);
      }}, '🗑'));
      m.root.appendChild(c);
    });
  }
  const ta = el('textarea', { class:'input', rows:4, placeholder:'例如：最近缺席較多，已聯繫家長…' });
  m.root.appendChild(el('div', { class:'form-row', style:{marginTop:'12px'} },
    el('label', null, '新增評語'), ta
  ));
  m.root.appendChild(el('div', { class:'modal-actions' },
    el('button', { class:'btn', onclick:()=> m.close() }, '關閉'),
    el('button', { class:'btn btn-primary', onclick:()=> {
      const t = ta.value.trim();
      if(!t){ toast('請輸入內容','warning'); return; }
      App.db.attendanceNotes = App.db.attendanceNotes || [];
      App.db.attendanceNotes.push({
        id: 'an_' + nid(),
        studentId: student.id,
        text: t,
        ts: Date.now(),
        by: (App.db.settings.teacherName || '老師')
      });
      saveDB();
      m.close();
      toast('已新增評語','success');
    }}, '送出')
  ));
}

function exportAttReportCSV(){
  const rows = [['姓名','班級','出席率','出席天數','總天數','遲到','缺席','請假']];
  App.db.students.forEach(s => {
    const r = studentAttSummary(s.id);
    rows.push([s.name||'', s.cls||'', r.rate+'%', r.days, r.total, r.late, r.absent, r.leave]);
  });
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const bom = '﻿';
  const blob = new Blob([bom + csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '出席報表_' + (App._attRange.from||'all') + '_' + (App._attRange.to||'all') + '.csv';
  a.click();
  setTimeout(()=> URL.revokeObjectURL(url), 1000);
  toast('已匯出 CSV','success');
}

async function applyBranding(){
  const b = (App.db && App.db.branding) || {};
  const body = document.body;
  if(!body) return;
  if(b.bgImage){
    try {
      const url = await attachGetUrl(b.bgImage);
      if(url){
        const opacity = ((b.bgOpacity != null) ? b.bgOpacity : 50) / 100;
        // 用半透明遮罩 + 背景圖（遮罩用底色或預設白/黑依主題）
        const themeDark = (App.theme === 'dark');
        const overlayBase = b.bgColor || (themeDark ? '0,0,0' : '255,255,255');
        // 將 hex 轉成 rgb
        const rgb = (function(c){
          if(!c) return themeDark ? '0,0,0' : '255,255,255';
          if(c.startsWith('rgb')) return c.replace(/rgba?\(|\)/g,'');
          if(c[0] === '#'){
            const hex = c.slice(1);
            const n = hex.length === 3
              ? hex.split('').map(x => parseInt(x+x,16))
              : [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
            return n.join(',');
          }
          return themeDark ? '0,0,0' : '255,255,255';
        })(b.bgColor);
        const alpha = (1 - opacity).toFixed(3);
        const overlay = `linear-gradient(rgba(${rgb},${alpha}),rgba(${rgb},${alpha}))`;
        body.style.backgroundImage = overlay + `, url("${url}")`;
        body.style.backgroundSize = 'cover';
        body.style.backgroundPosition = 'center';
        body.style.backgroundAttachment = 'fixed';
        body.style.backgroundRepeat = 'no-repeat';
        return;
      }
    } catch(e){ console.warn('[applyBranding]', e); }
  }
  // 沒背景圖
  body.style.backgroundImage = '';
  body.style.backgroundAttachment = '';
  body.style.backgroundSize = '';
  body.style.backgroundPosition = '';
  body.style.backgroundRepeat = '';
  if(b.bgColor){
    body.style.backgroundColor = b.bgColor;
  } else {
    body.style.backgroundColor = '';
  }
}

  }}, '🗑 清紀錄');
  btnRow.appendChild(btnStart);
  btnRow.appendChild(btnReset);
  content.appendChild(btnRow);

  // 歷史
  const hist = App._pickerHistory || [];
  if(hist.length){
    const histCard = el('div', { class:'card', style:{marginTop:'14px'} });
    histCard.appendChild(el('h3', null, '📜 本次紀錄（' + hist.length + ' 人次）'));
    const histRow = el('div', { class:'flex', style:{flexWrap:'wrap',gap:'6px',marginTop:'8px'} });
    hist.slice(-20).reverse().forEach(h => {
      histRow.appendChild(el('span', { class:'pill', style:{background:'var(--primary-soft)',color:'var(--primary)'} },
        h.name + (h.cls ? ' (' + h.cls + ')' : '')));
    });
    histCard.appendChild(histRow);
    content.appendChild(histCard);
  }

  function doPick(){
    App._pickerCls = sel.value;
    App._pickerExAbsent = chkAbsent.checked;
    App._pickerExRecent = chkRecent.checked;

    const today = td();
    let pool = (App.db.students || []).slice();
    if(App._pickerCls !== 'all'){
      pool = pool.filter(s => (s.cls || '未分班') === App._pickerCls);
    }
    if(chkAbsent.checked){
      pool = pool.filter(s => {
        const att = (App.db.attendance || []).find(a => a.studentId === s.id && a.date === today);
        if(att && (att.status === 'leave' || att.status === 'absent')) return false;
        return true;
      });
    }
    if(chkRecent.checked){
      const recentIds = new Set((App._pickerHistory||[])
        .filter(h => Date.now() - h.ts < 3600 * 1000)
        .map(h => h.id));
      pool = pool.filter(s => !recentIds.has(s.id));
    }
    if(!pool.length){
      toast('沒有符合的學生','warn');
      return;
    }

    btnStart.disabled = true;
    let count = 0;
    const colors = ['#2563eb','#16a34a','#ea580c','#8b5cf6','#dc2626'];
    const interval = setInterval(()=> {
      const rand = pool[Math.floor(Math.random() * pool.length)];
      display.textContent = rand.name;
      display.style.color = colors[count % colors.length];
      meta.textContent = '抽籤中...';
      count++;
      if(count >= 20){
        clearInterval(interval);
        const final = pool[Math.floor(Math.random() * pool.length)];
        display.textContent = final.name;
        display.style.color = 'var(--success)';
        meta.textContent = (final.cls || '無班級')
          + (final.seat ? ' · 座號 ' + final.seat : '')
          + (final.sid ? ' · 學號 ' + final.sid : '');
        App._pickerHistory = App._pickerHistory || [];
        App._pickerHistory.push({ id: final.id, name: final.name, cls: final.cls, ts: Date.now() });
        btnStart.disabled = false;
        if(typeof logOp === 'function') logOp('random-pick', final.name);
        setTimeout(()=> rerender(), 1800);
      }
    }, 75);
  }
}

function rTimer(content){
  content.appendChild(renderBreadcrumb([{label:'課堂工具'},{label:'⏰ 計時器'}]));
  content.appendChild(el('h1', null, '⏰ 課堂計時器'));
  content.appendChild(el('p', { class:'muted small', style:{marginBottom:'14px'} },
    '倒數計時 / 正計時 / 番茄鐘工作法'));

  const mode = App._timerMode || 'countdown';

  // 模式切換
  const tabBar = el('div', { class:'tabs-line', style:{marginBottom:'14px'} });
  [['countdown','⏳ 倒數計時'],['stopwatch','⏱ 正計時'],['pomodoro','🍅 番茄鐘']].forEach(([k, label]) => {
    const active = mode === k;
    const b = el('button', {
      class: active ? 'active' : '',
      style: active ? { color:'var(--primary)', borderBottomColor:'var(--primary)' } : {},
      onclick: ()=> {
        if(App._timerMode === k) return;
        App._timerMode = k;
        resetTimer();
        rerender();
      }
    }, label);
    tabBar.appendChild(b);
  });
  content.appendChild(tabBar);

  // 顯示
  const stage = el('div', { class:'card', style:{textAlign:'center',padding:'40px 20px'} });
  const display = el('div', { id:'timer-display', style:{fontSize:'80px',fontWeight:'800',fontFamily:'ui-monospace,"SF Mono",Menlo,monospace',letterSpacing:'-2px',lineHeight:'1'} }, '00:00');
  const status = el('div', { class:'muted', id:'timer-status', style:{fontSize:'16px',marginTop:'10px'} }, '就緒');
  stage.appendChild(display);
  stage.appendChild(status);
  if(mode === 'pomodoro'){
    const cyc = App._pomCycle || 'work';
    stage.appendChild(el('div', { id:'timer-pom', style:{fontSize:'14px',marginTop:'8px',color:'var(--primary)',fontWeight:'600'} },
      cyc === 'work' ? '🍅 工作時段（25 分鐘）' : '☕ 休息時段（5 分鐘）'));
  }
  content.appendChild(stage);

  // 倒數設定
  if(mode === 'countdown'){
    const setBar = el('div', { class:'card', style:{marginTop:'14px',display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'} });
    setBar.appendChild(el('label', { class:'small' }, '時間（分）：'));
    const i = el('input', { type:'number', class:'input', value: App._timerMin || 5, min:'1', max:'120', style:{width:'80px'} });
    i.addEventListener('change', ()=> {
      const v = parseInt(i.value);
      if(v >= 1 && v <= 120){
        App._timerMin = v;
        if(!App._timerRunning && !App._timerElapsed) updateTimerDisplay();
      }
    });
    setBar.appendChild(i);
    [1,3,5,10,15,30].forEach(m => {
      setBar.appendChild(el('button', { class:'btn btn-sm', onclick: ()=> {
        i.value = m;
        App._timerMin = m;
        if(!App._timerRunning && !App._timerElapsed) updateTimerDisplay();
      }}, m + '分'));
    });
    content.appendChild(setBar);
  }

  // 控制按鈕
  const ctrl = el('div', { class:'flex', style:{gap:'10px',justifyContent:'center',marginTop:'14px',flexWrap:'wrap'} });
  ctrl.appendChild(el('button', { class:'btn btn-primary btn-lg', onclick:()=> startTimer() }, '▶ 開始'));
  ctrl.appendChild(el('button', { class:'btn btn-lg', onclick:()=> pauseTimer() }, '⏸ 暫停'));
  ctrl.appendChild(el('button', { class:'btn btn-lg', onclick:()=> { resetTimer(); updateTimerDisplay(); } }, '⏹ 重置'));
  content.appendChild(ctrl);

  // 立即更新顯示
  setTimeout(updateTimerDisplay, 50);
}

function getTimerSeconds(){
  const mode = App._timerMode || 'countdown';
  if(mode === 'countdown'){
    const total = (App._timerMin || 5) * 60;
    let elapsed = App._timerElapsed || 0;
    if(App._timerRunning) elapsed += (Date.now() - App._timerStart) / 1000;
    return Math.max(0, total - elapsed);
  } else if(mode === 'stopwatch'){
    let elapsed = App._timerElapsed || 0;
    if(App._timerRunning) elapsed += (Date.now() - App._timerStart) / 1000;
    return elapsed;
  } else if(mode === 'pomodoro'){
    const cyc = App._pomCycle || 'work';
    const cycle = (cyc === 'work') ? 25 * 60 : 5 * 60;
    let elapsed = App._timerElapsed || 0;
    if(App._timerRunning) elapsed += (Date.now() - App._timerStart) / 1000;
    return Math.max(0, cycle - elapsed);
  }
  return 0;
}

function updateTimerDisplay(){
  const d = document.getElementById('timer-display');
  if(!d) return;
  const sec = Math.max(0, Math.round(getTimerSeconds()));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  d.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  const st = document.getElementById('timer-status');
  if(st){
    if(App._timerRunning) st.textContent = '⏱ 計時中';
    else if((App._timerElapsed || 0) > 0) st.textContent = '⏸ 已暫停';
    else st.textContent = '就緒';
  }
  // countdown / pomodoro 時間到
  const mode = App._timerMode || 'countdown';
  if(mode !== 'stopwatch' && App._timerRunning && sec <= 0){
    pauseTimer();
    if(mode === 'pomodoro'){
      // 切換工作/休息
      const wasWork = (App._pomCycle || 'work') === 'work';
      App._pomCycle = wasWork ? 'rest' : 'work';
      App._timerElapsed = 0;
      try { notify('🍅 番茄鐘', wasWork ? '工作時段結束，休息 5 分鐘' : '休息結束，回到工作', { type:'timer' }); } catch(e){}
      toast(wasWork ? '工作時段結束！休息 5 分鐘' : '休息結束！回到工作','success', 5000);
      rerender();
    } else {
      try { notify('⏰ 時間到', '倒數計時結束', { type:'timer' }); } catch(e){}
      toast('⏰ 時間到！','success', 5000);
    }
    // 響鈴（嘗試）
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.8);
      osc.start(); osc.stop(ctx.currentTime + 0.8);
    } catch(e){}
  }
}

function startTimer(){
  if(App._timerRunning) return;
  App._timerRunning = true;
  App._timerStart = Date.now();
  if(App._timerTick){ clearInterval(App._timerTick); }
  App._timerTick = setInterval(updateTimerDisplay, 200);
  updateTimerDisplay();
}
function pauseTimer(){
  if(!App._timerRunning) return;
  App._timerElapsed = (App._timerElapsed || 0) + (Date.now() - App._timerStart) / 1000;
  App._timerRunning = false;
  if(App._timerTick){ clearInterval(App._timerTick); App._timerTick = null; }
  updateTimerDisplay();
}
function resetTimer(){
  App._timerElapsed = 0;
  App._timerRunning = false;
  if(App._timerTick){ clearInterval(App._timerTick); App._timerTick = null; }
}

  // QR Code
  const url = location.origin + location.pathname;
  const qrSide = el('div', { style:{textAlign:'center'} });
  const qrImg = el('img', {
    src: 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=' + encodeURIComponent(url),

      el('div', { style:{fontWeight:'600'} }, '【iPhone Safari】'),

      el('div', { style:{marginTop:'10px',fontWeight:'600'} }, '【電腦】'),
      el('div', null, '1. 網址列旁有「安裝」圖示'),
      el('div', null, '2. 點擊即可')

  row.appendChild(textSide);

  // URL + copy button

    try {
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=> toast('已複製連結','success'));

        urlInput.select();

      '💡 若瀏覽器支援，可從網址列旁的安裝按鈕直接安裝'));

  return card;
