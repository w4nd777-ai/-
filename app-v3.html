/* ════════════════════════════════════════════════════════════
   STUDENT: MY ATTENDANCE
   ──────────────────────────────────────────────────────────── */
function rMyAtt(content){
  const me = currentStudent(); if(!me) return;
  content.appendChild(el('h1', null, '我的出席紀錄'));
  const records = App.db.attendance.filter(a => a.studentId === me.id).sort((a,b)=> (b.ts||0)-(a.ts||0));
  const leaves = App.db.leaves.filter(l => l.studentId === me.id).sort((a,b)=> (b.ts||0)-(a.ts||0));

  const tot = records.length;
  const lateMin = App.db.settings.lateMinutes || 10;
  const start = App.db.settings.startTime || '08:00';
  const [sh,sm] = start.split(':').map(Number);
  const thr = sh*60+sm+lateMin;
  const lateCount = records.filter(r => {
    if(!r.time) return false;
    const [h,m] = r.time.split(':').map(Number);
    return h*60+m > thr;
  }).length;
  const approvedLeave = leaves.filter(l => l.status === 'approved').length;

  const grid = el('div', { class:'grid grid-3', style:{marginBottom:'14px'} });
  grid.appendChild(el('div', { class:'stat s-success' }, el('div',{class:'num'}, String(tot)), el('div',{class:'lbl'}, '出席次數')));
  grid.appendChild(el('div', { class:'stat s-warn' }, el('div',{class:'num'}, String(lateCount)), el('div',{class:'lbl'}, '遲到')));
  grid.appendChild(el('div', { class:'stat s-accent' }, el('div',{class:'num'}, String(approvedLeave)), el('div',{class:'lbl'}, '請假')));
  content.appendChild(grid);

  const card = el('div', { class:'card' });
  card.appendChild(el('h3', null, '紀錄'));
  if(records.length === 0){
    card.appendChild(el('div', { class:'empty' },
      el('div', { class:'ico' }, '📅'),
      el('div', null, '尚無紀錄')
    ));
  } else {
    records.forEach(r => {
      const isLate = r.time && (() => {
        const [h,m] = r.time.split(':').map(Number);
        return h*60+m > thr;
      })();
      const row = el('div', { class:'list-row' });
      row.appendChild(el('div', { class:'avatar', style: isLate?{background:'var(--warn-soft)',color:'var(--warn)'}:null }, isLate?'⚠':'✓'));
      row.appendChild(el('div', { class:'info' },
        el('div', { class:'name' }, r.date),
        el('div', { class:'sub' }, r.time + ' · ' + (r.method==='student-self'?'自助簽到':'老師標記'))
      ));
      row.appendChild(el('span', { class:'tag t-' + (isLate?'warn':'success') }, isLate?'遲到':'準時'));
      card.appendChild(row);
    });
  }
  content.appendChild(card);
}

    const row = el('div', { class:'list-row' });
    const stat = l.status||'pending';
    row.appendChild(el('div', { class:'avatar', style: stat==='approved'?{background:'var(--success-soft)',color:'var(--success)'}:stat==='rejected'?{background:'var(--danger-soft)',color:'var(--danger)'}:{background:'var(--warn-soft)',color:'var(--warn)'} }, stat==='approved'?'✓':stat==='rejected'?'✗':'⌛'));
    row.appendChild(el('div', { class:'info' },
      el('div', { class:'name' }, l.date),
      el('div', { class:'sub' }, l.reason + ' · ' + relTime(l.ts||0))
    ));
    row.appendChild(el('span', { class:'tag t-' + (stat==='approved'?'success':stat==='rejected'?'danger':'warn') }, stat==='approved'?'已批准':stat==='rejected'?'已拒絕':'待審核'));
    card.appendChild(row);
  });
  content.appendChild(card);
}

/* ════════════════════════════════════════════════════════════
   STUDENT: PROFILE (me)
   ──────────────────────────────────────────────────────────── */
function rMe(content){
  const me = currentStudent(); if(!me) return;
  content.appendChild(el('h1', null, '個人資料'));
  const card = el('div', { class:'card', style:{textAlign:'center',padding:'24px'} });
  // batch 2: 頭像（若有自訂則顯示圖片，否則顯示縮寫）
  if(me.avatar){
    card.appendChild(el('img', { src: me.avatar, alt: me.name,
      style:{width:'80px',height:'80px',borderRadius:'50%',objectFit:'cover',margin:'0 auto 12px',display:'block',border:'2px solid var(--border)'} }));
  } else {
    card.appendChild(el('div', { class:'avatar', style:{width:'80px',height:'80px',fontSize:'28px',margin:'0 auto 12px'} }, initials(me.name)));
  }
  card.appendChild(el('h2', null, me.name));
  card.appendChild(el('div', { class:'muted' }, (me.cls||'') + (me.seat?' · '+me.seat+'號':'')));
  if(me.sid) card.appendChild(el('div', { class:'small muted' }, '學號 ' + me.sid));
  if(me.email) card.appendChild(el('div', { class:'small muted' }, '📧 ' + me.email));
  if(me.phone) card.appendChild(el('div', { class:'small muted' }, '📞 ' + me.phone));
  if(me.parentName) card.appendChild(el('div', { class:'small muted' }, '👨‍👩‍👧 家長：' + me.parentName + (me.parentPhone?' · '+me.parentPhone:'')));
  // batch 2: 編輯按鈕
  card.appendChild(el('button', { class:'btn btn-primary', style:{marginTop:'14px'}, onclick: openStudentSelfEdit }, '✏️ 編輯資料'));
  content.appendChild(card);

  // settings
  const card2 = el('div', { class:'card', style:{marginTop:'12px'} });
  card2.appendChild(el('h3', null, '🎨 外觀'));
  const row = el('div', { class:'flex', style:{marginTop:'8px',flexWrap:'wrap'} },
    el('button', { class:'btn ' + (App.theme==='light'?'btn-primary':''), onclick:()=> { App.theme='light'; saveTheme(); rerender(); } }, '☀️ 亮色'),
    el('button', { class:'btn ' + (App.theme==='dark'?'btn-primary':''), onclick:()=> { App.theme='dark'; saveTheme(); rerender(); } }, '🌙 暗色')
  );
  card2.appendChild(row);
  content.appendChild(card2);

  const card3 = el('div', { class:'card', style:{marginTop:'12px'} });
  card3.appendChild(el('h3', null, '🔐 修改密碼'));
  card3.appendChild(el('button', { class:'btn btn-block', style:{marginTop:'8px'}, onclick: async ()=> {
    const oldpw = await promptDlg('目前密碼', '', { type:'password' });
    if(oldpw === null) return;
    const ok = await verifyPassword(oldpw, me.password);
    if(!ok) return toast('密碼錯誤','danger');
    const newpw = await promptDlg('新密碼', '', { type:'password' });
    if(newpw === null) return;
    if(!newpw) return toast('不可空','danger');
    me.password = await hashPassword(newpw);
    me.passwordChangedAt = Date.now();
    saveDB(); Sync.setMap('students', App.db.students); bcNotify();
    toast('已更新','success');
  } }, '🔑 修改密碼'));
  content.appendChild(card3);

  // logout
  const card4 = el('div', { class:'card', style:{marginTop:'12px'} });
  card4.appendChild(el('button', { class:'btn btn-danger btn-block', onclick: doLogout }, '⎋ 登出'));
  content.appendChild(card4);
}

/* ════════════════════════════════════════════════════════════
   STUDENT SELF-EDIT (batch 2)
   學生可修改：頭像、Email、電話、家長資訊
   不可修改：姓名、學號、班級、座號（敏感欄位由老師管理）
   ──────────────────────────────────────────────────────────── */
function openStudentSelfEdit(){
  const me = currentStudent(); if(!me) return;
  const m = modal('', { dismissable:true });
  m.root.appendChild(el('h2', null, '✏️ 編輯個人資料'));
  m.root.appendChild(el('p', { class:'small muted' },
    '🔒 姓名、學號、班級為身分資料，僅老師可修改。如有錯誤請聯絡老師。'
  ));

  // 頭像
  const avBox = el('div', { class:'field', style:{textAlign:'center'} });
  avBox.appendChild(el('label', { class:'label' }, '頭像'));
  let avatarData = me.avatar || '';
  const avImg = el('img', {
    src: avatarData || '',
    style:{width:'90px',height:'90px',borderRadius:'50%',objectFit:'cover',display: avatarData?'block':'none',margin:'0 auto 8px',border:'2px solid var(--border)'}
  });
  const avInitials = el('div', { class:'avatar', style:{width:'90px',height:'90px',fontSize:'32px',margin:'0 auto 8px',display: avatarData?'none':'flex'} }, initials(me.name));
  avBox.appendChild(avImg);
  avBox.appendChild(avInitials);
  const avFile = el('input', { type:'file', accept:'image/*', style:{display:'none'} });
  avFile.addEventListener('change', e => {
    const f = e.target.files[0]; if(!f) return;
    if(f.size > 2 * 1024 * 1024){ return toast('圖片不可超過 2MB','danger'); }
    const reader = new FileReader();
    reader.onload = ()=> {
      avatarData = reader.result;
      avImg.src = avatarData;
      avImg.style.display = 'block';
      avInitials.style.display = 'none';
    };
    reader.readAsDataURL(f);
  });
  const avRow = el('div', { class:'flex', style:{justifyContent:'center',gap:'6px',flexWrap:'wrap'} },
    el('button', { class:'btn btn-sm', onclick:()=> avFile.click() }, '📷 選擇圖片'),
    avatarData ? el('button', { class:'btn btn-sm btn-danger', onclick:()=> {
      avatarData = '';
      avImg.style.display = 'none';
      avInitials.style.display = 'flex';
    }}, '🗑 移除') : null
  );
  avBox.appendChild(avRow);
  avBox.appendChild(avFile);
  m.root.appendChild(avBox);

  // 不可改欄位（顯示用）
  const lockedBox = el('div', { class:'card', style:{background:'var(--surface-2)',padding:'10px',marginBottom:'12px'} });
  lockedBox.appendChild(el('div', { class:'tiny muted', style:{marginBottom:'4px'} }, '🔒 由老師管理'));
  lockedBox.appendChild(el('div', { class:'small' }, '👤 姓名：' + me.name));
  lockedBox.appendChild(el('div', { class:'small' }, '🆔 學號：' + (me.sid || '—')));
  lockedBox.appendChild(el('div', { class:'small' }, '🏫 班級：' + (me.cls || '—') + (me.seat?' · '+me.seat+'號':'')));
  m.root.appendChild(lockedBox);

  // 可改欄位
  const fEmail = el('div', { class:'field' });
  fEmail.appendChild(el('label', { class:'label' }, '📧 Email'));
  const iEmail = el('input', { class:'input', type:'email', value: me.email || '', placeholder:'student@example.com' });
  fEmail.appendChild(iEmail); m.root.appendChild(fEmail);

  const fPhone = el('div', { class:'field' });
  fPhone.appendChild(el('label', { class:'label' }, '📞 電話'));
  const iPhone = el('input', { class:'input', value: me.phone || '', placeholder:'0912-345-678' });
  fPhone.appendChild(iPhone); m.root.appendChild(fPhone);

  m.root.appendChild(el('div', { class:'side-section-title', style:{margin:'6px 0'} }, '👨‍👩‍👧 家長資訊'));

  const fPName = el('div', { class:'field' });
  fPName.appendChild(el('label', { class:'label' }, '家長姓名'));
  const iPName = el('input', { class:'input', value: me.parentName || '' });
  fPName.appendChild(iPName); m.root.appendChild(fPName);

  const fPPhone = el('div', { class:'field' });
  fPPhone.appendChild(el('label', { class:'label' }, '家長電話'));
  const iPPhone = el('input', { class:'input', value: me.parentPhone || '' });
  fPPhone.appendChild(iPPhone); m.root.appendChild(fPPhone);

  const fPEmail = el('div', { class:'field' });
  fPEmail.appendChild(el('label', { class:'label' }, '家長 Email'));
  const iPEmail = el('input', { class:'input', type:'email', value: me.parentEmail || '' });
  fPEmail.appendChild(iPEmail); m.root.appendChild(fPEmail);

  // 動作
  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> {
    // email 基本驗證
    const em = iEmail.value.trim();
    if(em && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){
      return toast('Email 格式不正確','danger');
    }
    const pem = iPEmail.value.trim();
    if(pem && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(pem)){
      return toast('家長 Email 格式不正確','danger');
    }
    // 寫回 students（找實際物件再改，避免 currentStudent 是 copy）
    const stu = App.db.students.find(s => s.id === me.id);
    if(!stu){ return toast('找不到帳號','danger'); }
    stu.email = em;
    stu.phone = iPhone.value.trim();
    stu.parentName = iPName.value.trim();
    stu.parentPhone = iPPhone.value.trim();
    stu.parentEmail = pem;
    stu.avatar = avatarData;
    stu.profileUpdatedAt = Date.now();
    saveDB();
    try { Sync.setMap('students', App.db.students); } catch(e){}
    bcNotify();
    if(typeof logOp === 'function') logOp('profileSelfEdit', stu.name + ' 自行更新個人資料');
    toast('✅ 已更新個人資料','success');
    m.close();
    rerender();
  }}, '💾 儲存'));
  m.root.appendChild(actions);
}

/* ════════════════════════════════════════════════════════════
   PHASE 2 — TEACHER: ASSIGNMENTS (rAsgn)
   ──────────────────────────────────────────────────────────── */
function rAsgn(content){
  const sub = App.subview;
  if(sub && sub !== 'all' && sub !== 'active' && sub !== 'past'){
    // detail view
    const asg = App.db.assignments.find(a => a.id === sub);
    if(asg) return rAsgnDetail(content, asg);
  }
  const tab = (sub === 'past' || sub === 'active') ? sub : 'all';

  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'12px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '作業管理'),
      el('div', { class:'muted small' }, '共 ' + App.db.assignments.length + ' 份作業')
    ),
    el('div', { class:'flex' },
      el('button', { class:'btn btn-sm', onclick: exportAssignmentsCSV }, '📤 CSV'),
      el('button', { class:'btn btn-primary', onclick:()=> openAssignmentEdit() }, '＋ 新增作業')
    )
  ));

  const tabs = el('div', { class:'tabs-line' });
  [['all','全部'],['active','進行中'],['past','已截止']].forEach(([v,t]) => {
    tabs.appendChild(el('button', { class: tab===v?'active':'', onclick:()=> go('assignments', v==='all'?null:v) }, t));
  });
  content.appendChild(tabs);

  // search
  const sBox = el('div', { class:'search-box' });
  const sInp = el('input', { class:'input', placeholder:'搜尋作業標題 / 說明', oninput: e => {
    App._asgnSearch = e.target.value.toLowerCase();
    renderList();
  }});
  if(App._asgnSearch) sInp.value = App._asgnSearch;
  sBox.appendChild(sInp);
  content.appendChild(sBox);

  const listWrap = el('div');
  content.appendChild(listWrap);

  function renderList(){
    listWrap.innerHTML = '';
    let list = App.db.assignments.slice().sort((a,b)=> (b.ts||0)-(a.ts||0));
    if(tab === 'active') list = list.filter(a => !isAssignmentOverdue(a));
    else if(tab === 'past') list = list.filter(a => isAssignmentOverdue(a));
    const q = App._asgnSearch || '';
    if(q) list = list.filter(a => (a.title||'').toLowerCase().includes(q) || (a.desc||'').toLowerCase().includes(q));
    if(list.length === 0){
      listWrap.appendChild(el('div', { class:'empty card' },
        el('div', { class:'ico' }, '📋'),
        el('div', null, '沒有作業'),
        el('button', { class:'btn btn-primary', style:{marginTop:'12px'}, onclick:()=> openAssignmentEdit() }, '＋ 新增第一份作業')
      ));
      return;
    }
    list.forEach(a => {
      const st = assignmentStats(a);
      const overdue = isAssignmentOverdue(a);
      const soon = isAssignmentDueSoon(a);
      const card = el('div', { class:'card card-hover', style:{marginBottom:'8px'}, onclick:()=> go('assignments', a.id) });
      card.appendChild(el('div', { class:'flex-between', style:{marginBottom:'6px'} },
        el('h3', null, a.title || '(未命名)'),
        el('div', { class:'flex', style:{gap:'4px'} },
          overdue ? el('span', { class:'pill urgent' }, '已截止') :
          soon ? el('span', { class:'pill warn' }, '24h 內到期') :
          el('span', { class:'pill ok' }, '進行中')
        )
      ));
      if(a.desc) card.appendChild(el('div', { class:'small muted', style:{marginBottom:'8px',whiteSpace:'pre-wrap'} }, (a.desc||'').slice(0,80) + (a.desc.length>80?'...':'')));
      card.appendChild(el('div', { class:'flex', style:{flexWrap:'wrap',gap:'6px',fontSize:'12px'} },
        el('span', { class:'tag' }, '⏰ ' + (a.dueAt ? new Date(a.dueAt).toLocaleString('zh-TW',{hour12:false}) : '無截止')),
        el('span', { class:'tag' }, '💯 ' + (a.points||100) + ' 分'),
        (Number(a.weight) > 1) ? el('span', { class:'tag t-accent' }, '⚖ ×' + a.weight) : null,
        el('span', { class:'tag t-primary' }, '📊 ' + st.submitted + '/' + st.total + ' (' + st.rate + '%)'),
        st.graded > 0 ? el('span', { class:'tag t-success' }, '平均 ' + st.avg) : null,
        st.late > 0 ? el('span', { class:'tag t-warn' }, '遲交 ' + st.late) : null
      ));
      listWrap.appendChild(card);
    });
  }
  renderList();
}

function rAsgnDetail(content, asg){
  const st = assignmentStats(asg);
  const targets = assignmentTargets(asg);
  const subsByStu = new Map();
  App.db.submissions.filter(s => s.assignmentId === asg.id).forEach(s => subsByStu.set(s.studentId, s));

  // 麵包屑（batch 1）
  content.appendChild(renderBreadcrumb([
    { label: '作業管理', go: 'assignments' },
    { label: asg.title || '(未命名)' }
  ]));

  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'12px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('button', { class:'btn-ghost small', style:{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)'}, onclick:()=> go('assignments') }, '← 返回'),
      el('h1', null, asg.title || '作業'),
      el('div', { class:'muted small' }, '截止：' + (asg.dueAt ? new Date(asg.dueAt).toLocaleString('zh-TW',{hour12:false}) : '無'))
    ),
    el('div', { class:'flex' },
      el('button', { class:'btn btn-sm', onclick:()=> openAssignmentEdit(asg) }, '✏️ 編輯'),
      el('button', { class:'btn btn-sm btn-danger', onclick:()=> deleteAssignment(asg) }, '🗑 刪除')
    )
  ));

  if(asg.desc){
    content.appendChild(el('div', { class:'card', style:{marginBottom:'12px'} },
      el('h3', null, '📝 作業說明'),
      el('div', { class:'small', style:{whiteSpace:'pre-wrap',marginTop:'6px'} }, asg.desc)
    ));
  }
  if(asg.attach){
    content.appendChild(el('div', { class:'card', style:{marginBottom:'12px'} },
      el('h3', null, '📎 附件'),
      el('div', { class:'flex', style:{marginTop:'6px',flexWrap:'wrap',gap:'6px'} },
        el('button', { class:'btn btn-sm', onclick:()=> attachDownload(asg.attach) }, '⬇ ' + asg.attach.name),
        el('button', { class:'btn btn-sm', onclick:()=> attachPreview(asg.attach) }, '👁 預覽')
      )
    ));
  }

  // stats
  const grid = el('div', { class:'grid grid-4', style:{marginBottom:'12px'} });
  grid.appendChild(el('div', { class:'stat s-primary' }, el('div',{class:'num'}, String(st.total)), el('div',{class:'lbl'}, '應繳人數')));
  grid.appendChild(el('div', { class:'stat s-success' }, el('div',{class:'num'}, String(st.submitted)), el('div',{class:'lbl'}, '已繳交 ('+st.rate+'%)')));
  grid.appendChild(el('div', { class:'stat s-warn' }, el('div',{class:'num'}, String(st.late)), el('div',{class:'lbl'}, '遲交')));
  grid.appendChild(el('div', { class:'stat s-accent' }, el('div',{class:'num'}, String(st.avg)), el('div',{class:'lbl'}, '平均分')));
  content.appendChild(grid);

  // kanban: not submitted / submitted / graded
  const board = el('div', { class:'kanban' });
  const colNot = el('div', { class:'kanban-col' });
  colNot.appendChild(el('h4', null, el('span',null,'❌ 未繳'), el('span', { class:'pill urgent' }, String(st.total - st.submitted))));
  const colSub = el('div', { class:'kanban-col' });
  colSub.appendChild(el('h4', null, el('span',null,'📥 已繳·待批'), el('span', { class:'pill warn' }, String(st.submitted - st.graded))));
  const colGr = el('div', { class:'kanban-col' });
  colGr.appendChild(el('h4', null, el('span',null,'✅ 已批改'), el('span', { class:'pill ok' }, String(st.graded))));

  App.db.students.filter(s => targets.has(s.id)).sort((a,b)=> (a.cls||'').localeCompare(b.cls||'') || (a.seat||0)-(b.seat||0)).forEach(s => {
    const sub = subsByStu.get(s.id);
    const k = el('div', { class:'kanban-card', onclick: ()=> sub ? openSubmissionGrade(sub) : null });
    k.appendChild(el('div', { style:{fontWeight:'600'} }, s.name + (s.seat?` (${s.seat})`:'')));
    k.appendChild(el('div', { class:'tiny muted' }, s.cls || ''));
    if(!sub){
      colNot.appendChild(k);
    } else {
      const late = isSubmissionLate(asg, sub);
      k.appendChild(el('div', { class:'tiny', style:{marginTop:'4px'} }, '繳交：' + relTime(sub.ts||0) + (late?' ⚠遲':'') ));
      if(typeof sub.score === 'number'){
        k.appendChild(el('div', { style:{marginTop:'4px',fontWeight:'700',color:'var(--success)'} }, sub.score + ' / ' + (asg.points||100)));
        colGr.appendChild(k);
      } else {
        colSub.appendChild(k);
      }
    }
  });
  board.appendChild(colNot); board.appendChild(colSub); board.appendChild(colGr);
  content.appendChild(board);
}

function openAssignmentEdit(asg){
  const isNew = !asg;
  const m = modal('');
  m.root.appendChild(el('h2', null, isNew?'新增作業':'編輯作業'));

  const fT = el('div', { class:'field' });
  fT.appendChild(el('label', { class:'label' }, '標題 *'));
  const iT = el('input', { class:'input', value: asg?.title || '' });
  fT.appendChild(iT); m.root.appendChild(fT);

  const fD = el('div', { class:'field' });
  fD.appendChild(el('label', { class:'label' }, '說明'));
  const iD = el('textarea', { class:'textarea', placeholder:'作業內容、評分標準...' });
  iD.value = asg?.desc || '';
  fD.appendChild(iD); m.root.appendChild(fD);

  const row1 = el('div', { class:'row' });
  const fDue = el('div', { class:'field' });
  fDue.appendChild(el('label', { class:'label' }, '截止日期時間'));
  const iDue = el('input', { class:'input', type:'datetime-local', value: asg?.dueAt || '' });
  fDue.appendChild(iDue); row1.appendChild(fDue);
  const fPts = el('div', { class:'field' });
  fPts.appendChild(el('label', { class:'label' }, '滿分'));
  const iPts = el('input', { class:'input', type:'number', value: asg?.points || 100 });
  fPts.appendChild(iPts); row1.appendChild(fPts);
  m.root.appendChild(row1);

  const row2 = el('div', { class:'row' });
  const fLate = el('div', { class:'field' });
  fLate.appendChild(el('label', { class:'label' }, '遲交扣分 (%)'));
  const iLate = el('input', { class:'input', type:'number', value: asg?.latePenalty || 0, min:0, max:100 });
  fLate.appendChild(iLate); row2.appendChild(fLate);
  const fTgt = el('div', { class:'field' });
  fTgt.appendChild(el('label', { class:'label' }, '派發對象'));
  const iTgt = el('select', { class:'select' });
  ['all','class','students'].forEach(v => {
    const opt = el('option', { value:v }, { all:'全班', class:'指定班級', students:'指定學生' }[v]);
    iTgt.appendChild(opt);
  });
  iTgt.value = asg?.target || 'all';
  fTgt.appendChild(iTgt); row2.appendChild(fTgt);
  m.root.appendChild(row2);

  // batch 1：加權倍數
  const fWeight = el('div', { class:'field' });
  fWeight.appendChild(el('label', { class:'label' }, '加權倍數（1 ~ 10，預設 1）'));
  const iWeight = el('input', { class:'input', type:'number', value: (asg && Number(asg.weight) > 0) ? asg.weight : 1, min:'1', max:'10', step:'0.5' });
  fWeight.appendChild(iWeight);
  fWeight.appendChild(el('div', { class:'tiny muted', style:{marginTop:'4px'} },
    '此作業在「平均分」計算中佔的權重（例：期末報告設 3，等同 3 份普通作業）'));
  m.root.appendChild(fWeight);

  // class picker (only when target=class)
  const fCls = el('div', { class:'field', style:{display:'none'} });
  fCls.appendChild(el('label', { class:'label' }, '班級'));
  const iCls = el('select', { class:'select' });
  const classes = Array.from(new Set(App.db.students.map(s => s.cls).filter(Boolean)));
  classes.forEach(c => iCls.appendChild(el('option', { value:c }, c)));
  iCls.value = asg?.targetCls || (classes[0]||'');
  fCls.appendChild(iCls); m.root.appendChild(fCls);

  // student multi-select (when target=students)
  const fStu = el('div', { class:'field', style:{display:'none'} });
  fStu.appendChild(el('label', { class:'label' }, '選擇學生'));
  const stuBox = el('div', { style:{maxHeight:'160px',overflow:'auto',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px'} });
  const stuChecks = {};
  App.db.students.forEach(s => {
    const row = el('label', { class:'flex', style:{padding:'4px'} });
    const cb = el('input', { type:'checkbox' });
    if(asg?.targetIds && asg.targetIds.includes(s.id)) cb.checked = true;
    stuChecks[s.id] = cb;
    row.appendChild(cb);
    row.appendChild(el('span', null, ' ' + (s.cls?s.cls+' · ':'') + s.name));
    stuBox.appendChild(row);
  });
  fStu.appendChild(stuBox); m.root.appendChild(fStu);

  function syncTgt(){
    fCls.style.display = iTgt.value === 'class' ? '' : 'none';
    fStu.style.display = iTgt.value === 'students' ? '' : 'none';
  }
  iTgt.addEventListener('change', syncTgt);
  syncTgt();

  // attachment
  const fAtt = el('div', { class:'field' });
  fAtt.appendChild(el('label', { class:'label' }, '題目附件（單檔 ≤ 50MB，可選）'));
  let attached = asg?.attach || null;
  const upBox = el('div', { class:'upload-area' + (attached?' has-file':'') });
  function refreshAtt(){
    upBox.innerHTML = '';
    if(attached){
      const chip = el('div', { class:'file-chip' },
        el('span', null, '📎 ' + attached.name),
        el('span', { class:'x', onclick: e => { e.stopPropagation(); attachDelete(attached); attached = null; upBox.classList.remove('has-file'); refreshAtt(); } }, '✗')
      );
      upBox.appendChild(chip);
    } else {
      upBox.appendChild(el('div', null, '點此選擇檔案或拖曳'));
      upBox.appendChild(el('div', { class:'tiny muted' }, '上限 50MB（PDF / Word / 圖片等）'));
    }
  }
  const fInp = el('input', { type:'file' });
  fInp.addEventListener('change', async e => {
    try {
      const file = e.target.files[0];
      if(!file) return;
      const data = await attachUpload(file);
      if(data){ attached = data; upBox.classList.add('has-file'); refreshAtt(); toast('已加入附件','success'); }
    } catch(err){ toast(err.message || '上傳失敗','danger'); }
  });
  upBox.appendChild(fInp);
  upBox.addEventListener('click', ()=> fInp.click());
  fAtt.appendChild(upBox); m.root.appendChild(fAtt);
  refreshAtt();

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> {
    const title = iT.value.trim();
    if(!title) return toast('標題必填','danger');
    const rec = isNew ? { id: nid(), ts: Date.now() } : asg;
    rec.title = title;
    rec.desc = iD.value;
    rec.dueAt = iDue.value;
    rec.points = parseInt(iPts.value,10) || 100;
    rec.latePenalty = parseInt(iLate.value,10) || 0;
    rec.weight = Math.max(1, Math.min(10, parseFloat(iWeight.value) || 1));
    rec.target = iTgt.value;
    rec.targetCls = iCls.value;
    rec.targetIds = Object.keys(stuChecks).filter(k => stuChecks[k].checked);
    rec.attach = attached;
    rec.createdBy = App.session?.name || '老師';
    if(isNew) App.db.assignments.push(rec);
    saveDB();
    Sync.setMap('assignments', App.db.assignments);
    bcNotify();
    toast(isNew?'已新增':'已更新','success');
    m.close();
    rerender();
  }}, isNew?'新增':'儲存'));
  m.root.appendChild(actions);
}

async function deleteAssignment(asg){
  const ok = await confirmDlg('確定刪除「' + asg.title + '」？所有相關繳交也會清除', { danger:true });
  if(!ok) return;
  // 刪除前先收集所有要釋放的 IDB key（題目附件 + 學生繳交附件）
  const keysToFree = [];
  if(asg.attach && asg.attach.key) keysToFree.push(asg.attach.key);
  App.db.submissions.filter(s => s.assignmentId === asg.id).forEach(s => {
    if(s.attach && s.attach.key) keysToFree.push(s.attach.key);
    if(Array.isArray(s.attaches)) s.attaches.forEach(a => { if(a && a.key) keysToFree.push(a.key); });
  });
  App.db.assignments = App.db.assignments.filter(a => a.id !== asg.id);
  App.db.submissions = App.db.submissions.filter(s => s.assignmentId !== asg.id);
  saveDB();
  Sync.setMap('assignments', App.db.assignments);
  Sync.setMap('submissions', App.db.submissions);
  bcNotify();
  // 非同步釋放 IDB 空間
  (async () => { for(const k of keysToFree){ try { await idbDelete(k); } catch(e){} } })();
  toast('已刪除','warn');
  go('assignments');
}

function exportAssignmentsCSV(){
  const rows = [['標題','截止','滿分','應繳','已繳','繳交率','平均分','遲交']];
  App.db.assignments.forEach(a => {
    const st = assignmentStats(a);
    rows.push([a.title, a.dueAt||'', a.points||100, st.total, st.submitted, st.rate+'%', st.avg, st.late]);
  });
  downloadCSV(rows, 'assignments_' + td() + '.csv');
  toast('已匯出','success');
}

/* ════════════════════════════════════════════════════════════
   PHASE 2 — TEACHER: SUBMISSIONS (rSub)
   ──────────────────────────────────────────────────────────── */
function rSub(content){
  const tab = App.subview || 'pending';
  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'12px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '繳交記錄'),
      el('div', { class:'muted small' }, '共 ' + App.db.submissions.length + ' 筆繳交')
    )
  ));

  const tabs = el('div', { class:'tabs-line' });
  [['pending','🟡 待批改'],['graded','✅ 已批改'],['late','⚠️ 遲交'],['all','全部']].forEach(([v,t]) => {
    tabs.appendChild(el('button', { class: tab===v?'active':'', onclick:()=> go('submissions', v) }, t));
  });
  content.appendChild(tabs);

  const sBox = el('div', { class:'search-box' });
  const sInp = el('input', { class:'input', placeholder:'搜尋學生 / 作業', oninput: e => {
    App._subSearch = e.target.value.toLowerCase();
    renderList();
  }});
  if(App._subSearch) sInp.value = App._subSearch;
  sBox.appendChild(sInp);
  content.appendChild(sBox);

  const listWrap = el('div');
  content.appendChild(listWrap);

  function renderList(){
    listWrap.innerHTML = '';
    let list = App.db.submissions.slice();
    if(tab === 'pending') list = list.filter(s => typeof s.score !== 'number');
    else if(tab === 'graded') list = list.filter(s => typeof s.score === 'number');
    else if(tab === 'late') list = list.filter(s => {
      const asg = App.db.assignments.find(a => a.id === s.assignmentId);
      return asg && isSubmissionLate(asg, s);
    });
    list.sort((a,b) => (b.ts||0)-(a.ts||0));
    const q = App._subSearch || '';
    if(q){
      list = list.filter(s => {
        const stu = findStudent(s.studentId);
        const asg = App.db.assignments.find(x => x.id === s.assignmentId);
        return (stu?.name||'').toLowerCase().includes(q) || (asg?.title||'').toLowerCase().includes(q);
      });
    }
    if(list.length === 0){
      listWrap.appendChild(el('div', { class:'empty card' },
        el('div', { class:'ico' }, '📭'),
        el('div', null, '沒有符合的繳交記錄')
      ));
      return;
    }

    // 共用：渲染單一繳交 row
    function renderSubRow(s, i){
      const stu = findStudent(s.studentId);
      const asg = App.db.assignments.find(x => x.id === s.assignmentId);
      const late = asg && isSubmissionLate(asg, s);
      const row = el('div', { class:'list-row' });
      row.appendChild(el('div', { class:'avatar' }, initials(stu?.name||'?')));
      row.appendChild(el('div', { class:'info' },
        el('div', { class:'name' }, (stu?.name||'?') + ' · ' + (asg?.title||'?')),
        el('div', { class:'sub' },
          '繳交於 ' + relTime(s.ts||0) +
          (late?' · ⚠遲交':'') +
          (typeof s.score === 'number' ? ' · 分數 ' + s.score + '/' + (asg?.points||100) : '')
        )
      ));
      const acts = el('div', { class:'actions' });
      if(typeof s.score === 'number'){
        acts.appendChild(el('span', { class:'tag t-success' }, '✓ 已批'));
      } else {
        acts.appendChild(el('span', { class:'tag t-warn' }, '待批'));
      }
      acts.appendChild(el('button', { class:'btn btn-sm', onclick:()=> openSubmissionGrade(s, list, i) }, '批改'));
      row.appendChild(acts);
      return row;
    }

    // 將繳交紀錄按「學生所屬班級」分組
    App._subExpandedCls = App._subExpandedCls || {};
    // 給每筆繳交補上學生班級資料
    const grouped = {};  // cls -> [{sub, origIdx}]
    list.forEach((s, i) => {
      const stu = findStudent(s.studentId);
      const cls = (stu && stu.cls) ? stu.cls : (s.cls || '未分班');
      if(!grouped[cls]) grouped[cls] = [];
      grouped[cls].push({ sub:s, origIdx:i });
    });
    const classes = Object.keys(grouped).sort();

    // 全展開 / 全收合工具列
    if(classes.length > 1){
      const toolbar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'flex-end'} },
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._subExpandedCls[c] = true; });
          renderList();
        }}, '全部展開 ▼'),
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._subExpandedCls[c] = false; });
          renderList();
        }}, '全部收合 ▲')
      );
      listWrap.appendChild(toolbar);
    }

    classes.forEach(cls => {
      const items = grouped[cls];
      const studentIdsInCls = new Set(items.map(x => x.sub.studentId));
      const peopleCount = studentIdsInCls.size;
      const gradedCount = items.filter(x => typeof x.sub.score === 'number').length;
      const pendingCount = items.length - gradedCount;
      const totalCount = items.length;
      const rate = totalCount ? Math.round(gradedCount / totalCount * 100) : 0;
      const rateColor = rate >= 80 ? 'var(--success)' : rate >= 50 ? 'var(--warn)' : 'var(--danger)';

      const isExpanded = App._subExpandedCls[cls] !== false;

      // 班級 header
      const header = el('div', { class:'cls-section-header', style:{
        padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
        background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
        marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
        transition:'background .15s'
      }, onclick:()=> {
        App._subExpandedCls[cls] = !isExpanded;
        renderList();
      }});
      header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
      header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
        el('span', { style:{fontWeight:'700',fontSize:'15px'} }, '🏫 ' + cls),
        el('span', { class:'small muted' }, '（' + peopleCount + ' 人 · ' + totalCount + ' 筆）')
      ));
      header.appendChild(el('div', { class:'flex', style:{gap:'6px',flexWrap:'wrap',alignItems:'center'} },
        el('span', { class:'pill', style:{background:'var(--success-soft)',color:'var(--success)',fontSize:'11px',fontWeight:'700'} }, '✅ ' + gradedCount),
        pendingCount > 0 ? el('span', { class:'pill', style:{background:'var(--warn-soft)',color:'var(--warn)',fontSize:'11px',fontWeight:'700'} }, '🟡 ' + pendingCount) : null,
        el('span', { style:{fontWeight:'700',fontSize:'14px',color:rateColor,marginLeft:'4px'} }, rate + '%')
      ));
      listWrap.appendChild(header);

      if(isExpanded){
        const body = el('div', { style:{border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',background:'var(--surface)',marginBottom:'8px'} });
        items.forEach(({sub, origIdx}) => body.appendChild(renderSubRow(sub, origIdx)));
        listWrap.appendChild(body);
      }
    });
  }
  renderList();
}

function openSubmissionGrade(sub, list=null, idx=0){
  const asg = App.db.assignments.find(a => a.id === sub.assignmentId);
  const stu = findStudent(sub.studentId);
  if(!asg || !stu) return toast('找不到資料','danger');
  const late = isSubmissionLate(asg, sub);

  const m = modal('');
  m.root.style.maxWidth = '600px';
  // 麵包屑（batch 1）
  m.root.appendChild(renderBreadcrumb([
    { label: '繳交紀錄', go: ()=> { m.close(); go('submissions'); } },
    { label: stu.name },
    { label: asg.title || '作業' }
  ]));
  m.root.appendChild(el('h2', null, '批改：' + stu.name));
  m.root.appendChild(el('div', { class:'small muted', style:{marginBottom:'10px'} },
    asg.title + ' · 滿分 ' + (asg.points||100) + (late?' · ⚠遲交':'')
  ));

  // submission content
  const subCard = el('div', { class:'card', style:{marginBottom:'10px',background:'var(--surface-2)'} });
  subCard.appendChild(el('h4', null, '📥 學生繳交'));
  if(sub.text){
    subCard.appendChild(el('div', { style:{whiteSpace:'pre-wrap',marginTop:'6px',fontSize:'13px'} }, sub.text));
  }
  if(sub.link){
    subCard.appendChild(el('div', { style:{marginTop:'6px'} }, el('a', { href: sub.link, target:'_blank' }, '🔗 ' + sub.link)));
  }
  if(sub.attach){
    subCard.appendChild(el('div', { style:{marginTop:'6px',display:'flex',gap:'6px',flexWrap:'wrap'} },
      el('button', { class:'btn btn-sm', onclick:()=> attachDownload(sub.attach) }, '⬇ ' + sub.attach.name),
      el('button', { class:'btn btn-sm', onclick:()=> attachPreview(sub.attach) }, '👁 預覽')
    ));
  }
  if(!sub.text && !sub.link && !sub.attach){
    subCard.appendChild(el('div', { class:'small muted', style:{marginTop:'6px'} }, '(無內容)'));
  }
  m.root.appendChild(subCard);

  // grade fields
  const points = asg.points || 100;
  let rawScore = typeof sub.score === 'number' ? sub.score : '';
  const fScore = el('div', { class:'field' });
  fScore.appendChild(el('label', { class:'label' }, '分數 (0 - ' + points + ')'));
  const iScore = el('input', { class:'input', type:'number', min:0, max:points, value: rawScore });
  fScore.appendChild(iScore);
  m.root.appendChild(fScore);

  if(late && asg.latePenalty > 0){
    m.root.appendChild(el('div', { class:'small muted', style:{margin:'-8px 0 8px'} },
      '⚠ 遲交將自動扣 ' + asg.latePenalty + '%（最終分數會自動計算）'
    ));
  }

  const fCmt = el('div', { class:'field' });
  fCmt.appendChild(el('label', { class:'label' }, '評語'));
  const iCmt = el('textarea', { class:'textarea', placeholder:'寫給學生看的回饋...' });
  iCmt.value = sub.comment || '';
  fCmt.appendChild(iCmt);
  m.root.appendChild(fCmt);

  // AI suggest buttons: real Claude or quick presets
  m.root.appendChild(el('div', { class:'flex', style:{marginBottom:'10px',flexWrap:'wrap'} },
    el('button', { class:'btn btn-sm btn-primary', onclick: async ()=> {
      const txt = await aiSuggestComment(sub, asg);
      if(txt){
        iCmt.value = txt;
        toast('已套用 AI 評語建議','success');
      }
    }}, '🤖 AI 生成評語'),
    el('button', { class:'btn btn-sm', onclick: ()=> {
      const suggestions = [
        '寫得很完整，論點清晰，條理分明，請繼續保持！',
        '基本內容正確，但可以再多舉幾個例子佐證。',
        '架構不錯，建議再加強結論部分的論述。',
        '想法很有創意！下次可以更注意細節。',
        '完成度高，文字表達流暢，給予肯定。'
      ];
      iCmt.value = suggestions[Math.floor(Math.random()*suggestions.length)];
      toast('已套用範本評語','success');
    }}, '📝 範本評語')
  ));

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));

  function saveGrade(advance){
    const sc = parseFloat(iScore.value);
    if(isNaN(sc)) return toast('請輸入分數','danger');
    let finalScore = sc;
    if(late && asg.latePenalty > 0){
      finalScore = Math.round(sc * (1 - asg.latePenalty/100));
    }
    sub.score = finalScore;
    sub.rawScore = sc;
    sub.comment = iCmt.value;
    sub.gradedAt = Date.now();
    sub.gradedBy = App.session?.name || '老師';
    saveDB();
    Sync.push('submissions', sub);
    bcNotify();
    toast('已儲存批改','success');
    m.close();
    if(advance && list && list.length){
      // find next pending
      const after = list.slice(idx+1).find(x => typeof x.score !== 'number');
      if(after){
        setTimeout(()=> openSubmissionGrade(after, list, list.indexOf(after)), 200);
      } else {
        toast('沒有更多待批改！','success');
        rerender();
      }
    } else {
      rerender();
    }
  }

  actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> saveGrade(false) }, '儲存'));
  if(list && list.length > 1){
    actions.appendChild(el('button', { class:'btn btn-success', onclick:()=> saveGrade(true) }, '儲存並下一位 →'));
  }
  m.root.appendChild(actions);
}

/* ════════════════════════════════════════════════════════════
   PHASE 2 — TEACHER: GRADES (rGrades)
   ──────────────────────────────────────────────────────────── */
function rGrades(content){
  if(!App.db.settings.gradeWeights) App.db.settings.gradeWeights = defaultWeights();
  const w = App.db.settings.gradeWeights;

  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'12px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '學期成績'),
      el('div', { class:'muted small' }, '加權公式：出席 ' + w.att + '% + 作業 ' + w.asgn + '% + 期中 ' + w.mid + '% + 期末 ' + w.final + '%')
    ),
    el('div', { class:'flex' },
      el('button', { class:'btn btn-sm', onclick: openGradeWeights }, '⚖ 加權設定'),
      el('button', { class:'btn btn-sm', onclick: exportGradesCSV }, '📤 CSV'),
      el('button', { class:'btn btn-sm', onclick: exportGradesPDF }, '📄 PDF')
    )
  ));

  if(App.db.students.length === 0){
    content.appendChild(el('div', { class:'empty card' },
      el('div', { class:'ico' }, '🎯'),
      el('div', null, '尚無學生')
    ));
    return;
  }

  // search
  const sBox = el('div', { class:'search-box' });
  const sInp = el('input', { class:'input', placeholder:'搜尋學生', oninput: e => {
    App._grSearch = e.target.value.toLowerCase();
    renderTbl();
  }});
  if(App._grSearch) sInp.value = App._grSearch;
  sBox.appendChild(sInp);
  content.appendChild(sBox);

  const wrap = el('div');
  content.appendChild(wrap);

  // 建立單一學生的成績表格 row
  function buildRow(s, renderTbl){
    const g = calcGrade(s.id);
    const r = studentRank(s.id);
    const tr = el('tr');
    tr.appendChild(el('td', null, s.name + (s.seat?` (${s.seat})`:'')));
    tr.appendChild(el('td', null, s.cls || '—'));
    tr.appendChild(el('td', null, g.att + '%'));
    tr.appendChild(el('td', null, String(g.asgn)));
    const tdMid = el('td');
    const iMid = el('input', { type:'number', min:0, max:100, value: g.mid });
    iMid.addEventListener('change', () => {
      if(!App.db.grades[s.id]) App.db.grades[s.id] = {};
      App.db.grades[s.id].midterm = parseFloat(iMid.value) || 0;
      saveDB(); Sync.setNode('grades', App.db.grades); bcNotify();
      renderTbl();
    });
    tdMid.appendChild(iMid); tr.appendChild(tdMid);
    const tdFinal = el('td');
    const iFinal = el('input', { type:'number', min:0, max:100, value: g.final });
    iFinal.addEventListener('change', () => {
      if(!App.db.grades[s.id]) App.db.grades[s.id] = {};
      App.db.grades[s.id].final = parseFloat(iFinal.value) || 0;
      saveDB(); Sync.setNode('grades', App.db.grades); bcNotify();
      renderTbl();
    });
    tdFinal.appendChild(iFinal); tr.appendChild(tdFinal);
    tr.appendChild(el('td', { class:'total' }, String(g.total)));
    tr.appendChild(el('td', null, r.rank ? '#' + r.rank : '-'));
    const tdActs = el('td');
    tdActs.appendChild(el('button', { class:'btn btn-sm', onclick:()=> openGradeComment(s) }, '💬'));
    tr.appendChild(tdActs);
    return tr;
  }

  function renderTbl(){
    wrap.innerHTML = '';
    const q = App._grSearch || '';
    let stus = App.db.students.slice();
    if(q) stus = stus.filter(s => (s.name||'').toLowerCase().includes(q) || (s.cls||'').toLowerCase().includes(q));
    stus.sort((a,b)=> (a.cls||'').localeCompare(b.cls||'') || (a.seat||0)-(b.seat||0));

    if(stus.length === 0){
      wrap.appendChild(el('div', { class:'empty card' },
        el('div', { class:'ico' }, '🔍'),
        el('div', null, '沒有符合的學生')
      ));
      return;
    }

    // 顯示全部，不分頁
    const pagedStus = stus;

    // 班級分組（每班一獨立成績矩陣）
    App._gradesExpandedCls = App._gradesExpandedCls || {};
    const classes = [...new Set(pagedStus.map(s => s.cls || '未分班'))].sort();

    // 工具列：全展開/收合 + 總人數
    const headerBar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'space-between',flexWrap:'wrap',alignItems:'center'} });
    const leftBar = el('div', { class:'flex', style:{gap:'6px',alignItems:'center',flexWrap:'wrap'} });
    leftBar.appendChild(el('span', { class:'small muted' }, '共 ' + stus.length + ' 位學生'));
    headerBar.appendChild(leftBar);
    if(classes.length > 1){
      const ctrl = el('div', { class:'flex', style:{gap:'6px'} },
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._gradesExpandedCls[c] = true; });
          renderTbl();
        }}, '全部展開 ▼'),
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._gradesExpandedCls[c] = false; });
          renderTbl();
        }}, '全部收合 ▲')
      );
      headerBar.appendChild(ctrl);
    }
    wrap.appendChild(headerBar);

    classes.forEach(cls => {
      const stuInCls = pagedStus.filter(s => (s.cls || '未分班') === cls)
        .sort((a,b)=> (a.seat||0) - (b.seat||0));

      // 班級統計
      const totals = stuInCls.map(s => calcGrade(s.id).total).filter(t => typeof t === 'number' && !isNaN(t));
      const avg = totals.length ? Math.round(totals.reduce((a,b)=>a+b,0) / totals.length) : 0;
      const maxScore = totals.length ? Math.max(...totals) : 0;
      const minScore = totals.length ? Math.min(...totals) : 0;
      const avgColor = avg >= 80 ? 'var(--success)' : avg >= 60 ? 'var(--warn)' : 'var(--danger)';

      const isExpanded = App._gradesExpandedCls[cls] !== false;

      // 班級 header
      const header = el('div', { class:'cls-section-header', style:{
        padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
        background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
        marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
        transition:'background .15s'
      }, onclick:()=> {
        App._gradesExpandedCls[cls] = !isExpanded;
        renderTbl();
      }});
      header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
      header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
        el('span', { style:{fontWeight:'700',fontSize:'15px'} }, '🏫 ' + cls),
        el('span', { class:'small muted' }, '（' + stuInCls.length + ' 人）')
      ));
      header.appendChild(el('div', { class:'flex', style:{gap:'6px',flexWrap:'wrap',alignItems:'center'} },
        el('span', { class:'pill', style:{background:'var(--surface)',color:avgColor,fontSize:'11px',fontWeight:'700',border:'1px solid var(--border)'} }, '平均 ' + avg),
        el('span', { class:'pill', style:{background:'var(--success-soft)',color:'var(--success)',fontSize:'11px',fontWeight:'700'} }, '↑ ' + maxScore),
        el('span', { class:'pill', style:{background:'var(--danger-soft)',color:'var(--danger)',fontSize:'11px',fontWeight:'700'} }, '↓ ' + minScore)
      ));
      wrap.appendChild(header);

      if(isExpanded){
        const body = el('div', { class:'scroll-x', style:{border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',background:'var(--surface)',marginBottom:'8px',padding:'0'} });
        const tbl = el('table', { class:'matrix' });
        const thead = el('thead');
        const trh = el('tr');
        ['學生','班級','出席','作業','期中','期末','總分','排名',''].forEach(h => trh.appendChild(el('th', null, h)));
        thead.appendChild(trh); tbl.appendChild(thead);

        const tbody = el('tbody');
        stuInCls.forEach(s => tbody.appendChild(buildRow(s, renderTbl)));
        tbl.appendChild(tbody);
        body.appendChild(tbl);
        wrap.appendChild(body);
      }
    });

  }
  renderTbl();
}

function openGradeWeights(){
  const w = App.db.settings.gradeWeights || defaultWeights();
  const m = modal('');
  m.root.appendChild(el('h2', null, '⚖ 加權設定'));
  m.root.appendChild(el('p', { class:'small muted' }, '四項權重總和需為 100%'));
  const inps = {};
  [['att','出席'],['asgn','作業'],['mid','期中'],['final','期末']].forEach(([k,t]) => {
    const f = el('div', { class:'field' });
    f.appendChild(el('label', { class:'label' }, t + ' 權重 (%)'));
    const i = el('input', { class:'input', type:'number', min:0, max:100, value: w[k]||0 });
    inps[k] = i; f.appendChild(i);
    m.root.appendChild(f);
  });
  const tot = el('div', { class:'small muted', style:{marginBottom:'10px'} });
  function recalc(){
    const s = Object.keys(inps).reduce((t,k) => t + (parseFloat(inps[k].value)||0), 0);
    tot.textContent = '目前總和：' + s + '%' + (s !== 100 ? ' ⚠ 不等於 100%':'');
    tot.style.color = s === 100 ? 'var(--success)' : 'var(--warn)';
  }
  Object.values(inps).forEach(i => i.addEventListener('input', recalc));
  recalc();
  m.root.appendChild(tot);

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> {
    App.db.settings.gradeWeights = {
      att: parseFloat(inps.att.value)||0,
      asgn: parseFloat(inps.asgn.value)||0,
      mid: parseFloat(inps.mid.value)||0,
      final: parseFloat(inps.final.value)||0
    };
    saveDB(); Sync.setNode('settings', App.db.settings); bcNotify();
    toast('已儲存','success');
    m.close(); rerender();
  }}, '儲存'));
  m.root.appendChild(actions);
}

function openGradeComment(s){

function exportGradesCSV(){
  const rows = [['學生','班級','座號','出席%','作業','期中','期末','總分','排名']];
  App.db.students.forEach(s => {
    const g = calcGrade(s.id);

    rows.push([s.name, s.cls||'', s.seat||'', g.att, g.asgn, g.mid, g.final, g.total, r.rank||'-']);
  });

function exportGradesPDF(){
  let html = '<h1>學期成績單</h1><p>' + esc(App.db.settings.schoolName||'') + ' · ' + td() + '</p>';
  html += '<table><thead><tr><th>學生</th><th>班級</th><th>出席%</th><th>作業</th><th>期中</th><th>期末</th><th>總分</th><th>排名</th></tr></thead><tbody>';

/* ════════════════════════════════════════════════════════════
   PHASE 2 — TEACHER: COURSE EVALS (rEv)
   ──────────────────────────────────────────────────────────── */
function rEv(content){
  const tab = App.subview || 'semester';
  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'12px'} },
    el('div', null,
      el('h1', null, '課程評價'),
      el('div', { class:'muted small' }, '學生對課程的回饋')
    )
  ));

  const tabs = el('div', { class:'tabs-line' });
  [['semester','⭐ 學期評價'],['daily','📅 每日評價'],['wall','💬 留言牆'],['self','✍️ 自評']].forEach(([v,t]) => {
    tabs.appendChild(el('button', { class: tab===v?'active':'', onclick:()=> go('evals', v) }, t));
  });
  content.appendChild(tabs);

  // search
  const sBox = el('div', { class:'search-box' });
  const sInp = el('input', { class:'input', placeholder:'搜尋評語 / 學生', oninput: e => {
    App._evSearch = e.target.value.toLowerCase();
    renderInner();
  }});
  if(App._evSearch) sInp.value = App._evSearch;
  sBox.appendChild(sInp);
  content.appendChild(sBox);

  const inner = el('div'); content.appendChild(inner);

  function renderInner(){
    inner.innerHTML = '';
    if(tab === 'self'){
      renderTeacherSelfEvals(inner);
      return;
    }
    const all = App.db.evals.filter(e => e.type === tab);
    const q = App._evSearch || '';
    let list = all.slice();
    if(q) list = list.filter(e => (e.text||'').toLowerCase().includes(q) || (e.fromName||'').toLowerCase().includes(q));
    list.sort((a,b)=> (b.ts||0)-(a.ts||0));

    if(tab === 'semester' || tab === 'daily'){
      // stats
      const stars = list.filter(e => typeof e.stars === 'number').map(e => e.stars);
      const avg = stars.length ? (stars.reduce((a,b)=>a+b,0)/stars.length).toFixed(1) : '—';
      const dist = [1,2,3,4,5].map(n => stars.filter(s => s === n).length);
      const statCard = el('div', { class:'card', style:{marginBottom:'12px'} });
      statCard.appendChild(el('div', { class:'flex-between' },
        el('h3', null, '⭐ 平均評分：' + avg + ' / 5 · 共 ' + list.length + ' 則'),
        el('span', null)
      ));
      const barWrap = el('div', { style:{marginTop:'8px'} });
      [5,4,3,2,1].forEach(n => {
        const c = dist[n-1] || 0;
        const pct = stars.length ? 100 * c / stars.length : 0;
        const row = el('div', { class:'bar-row' },
          el('div', { class:'lab' }, '★'.repeat(n)),
          el('div', { class:'bar-wrap' }, el('div', { class:'bar', style:{width: pct + '%'} })),
          el('div', { class:'val' }, String(c))
        );
        barWrap.appendChild(row);
      });
      statCard.appendChild(barWrap);
      inner.appendChild(statCard);
    }

    if(list.length === 0){
      inner.appendChild(el('div', { class:'empty card' },
        el('div', { class:'ico' }, '💬'),
        el('div', null, '尚無內容')
      ));
      return;
    }

    // 單筆評價卡片（共用）
    function renderEvCard(e){
      const card = el('div', { class:'feed-msg' });
      const who = el('div', { class:'who' });
      who.appendChild(el('div', { class:'avatar' }, initials(e.fromName||'?')));
      who.appendChild(el('div', null,
        el('div', { style:{fontWeight:'600'} }, (e.anonymous?'匿名':e.fromName) || '匿名'),
        el('div', { class:'tiny muted' }, (e.date||'') + ' · ' + relTime(e.ts||0))
      ));
      card.appendChild(who);
      if(typeof e.stars === 'number'){
        card.appendChild(el('div', { class:'stars readonly' },
          ...Array.from({length:5}, (_,i) => el('span', { class: 's ' + (i < e.stars?'on':'') }, '★'))
        ));
      }
      if(e.text) card.appendChild(el('div', { class:'text', style:{marginTop:'4px'} }, e.text));
      return card;
    }

    // 班級分組（從 fromId 反查學生 → 班級；找不到 / 教師發的 → 匿名/其他）
    App._evExpandedCls = App._evExpandedCls || {};
    function clsOf(e){
      if(!e.fromId) return '匿名/其他';
      const stu = findStudent(e.fromId);
      if(!stu) return '匿名/其他';
      return stu.cls || '未分班';
    }
    const classes = [...new Set(list.map(e => clsOf(e)))].sort((a,b)=> {
      // 「匿名/其他」放最後
      if(a === '匿名/其他') return 1;
      if(b === '匿名/其他') return -1;
      return a.localeCompare(b);
    });

    if(classes.length > 1){
      const toolbar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'flex-end'} },
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._evExpandedCls[c] = true; });
          rerender();
        }}, '全部展開 ▼'),
        el('button', { class:'btn btn-sm', onclick:()=> {
          classes.forEach(c => { App._evExpandedCls[c] = false; });
          rerender();
        }}, '全部收合 ▲')
      );
      inner.appendChild(toolbar);
    }

    classes.forEach(cls => {
      const inCls = list.filter(e => clsOf(e) === cls);
      // 平均星等（只對有 stars 的計算）
      const starVals = inCls.map(e => e.stars).filter(s => typeof s === 'number');
      const avg = starVals.length ? (starVals.reduce((a,b)=>a+b,0)/starVals.length) : 0;
      const avgColor = avg >= 4 ? 'var(--success)' : avg >= 3 ? 'var(--warn)' : avg > 0 ? 'var(--danger)' : 'var(--text-muted)';

      const isExpanded = App._evExpandedCls[cls] !== false;

      const header = el('div', { class:'cls-section-header', style:{
        padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
        background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
        marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
        transition:'background .15s'
      }, onclick:()=> {
        App._evExpandedCls[cls] = !isExpanded;
        renderInner();
      }});
      header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
      header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
        el('span', { style:{fontWeight:'700',fontSize:'15px'} }, (cls === '匿名/其他' ? '👻 ' : '🏫 ') + cls),
        el('span', { class:'small muted' }, '（' + inCls.length + ' 則）')
      ));
      header.appendChild(el('div', { class:'flex', style:{gap:'6px',flexWrap:'wrap',alignItems:'center'} },
        starVals.length > 0 ? el('span', { class:'stars readonly', style:{fontSize:'12px'} },
          ...Array.from({length:5}, (_,i) => el('span', { class:'s ' + (i < Math.round(avg) ? 'on' : '') }, '★'))) : null,
        starVals.length > 0 ? el('span', { class:'pill', style:{background:'var(--primary-soft)',color:avgColor,fontSize:'11px',fontWeight:'700'} }, '平均 ' + avg.toFixed(1)) : null
      ));
      inner.appendChild(header);

      if(isExpanded){
        const body = el('div', { style:{border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',background:'var(--surface)',marginBottom:'8px',padding:'12px'} });
        inCls.forEach(e => body.appendChild(renderEvCard(e)));
        inner.appendChild(body);
      }
    });
  }
  renderInner();
}

/* ════════════════════════════════════════════════════════════
   PHASE 2 — TEACHER: ANNOUNCEMENTS (rAnn)
   ──────────────────────────────────────────────────────────── */
function rAnn(content){
  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'12px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '公告管理'),
      el('div', { class:'muted small' }, '發布給全班學生')
    ),
    el('button', { class:'btn btn-primary', onclick:()=> openAnnouncementEdit() }, '＋ 新公告')
  ));

  const sBox = el('div', { class:'search-box' });
  const sInp = el('input', { class:'input', placeholder:'搜尋', oninput: e => {
    App._annSearch = e.target.value.toLowerCase(); renderList();
  }});
  if(App._annSearch) sInp.value = App._annSearch;
  sBox.appendChild(sInp);
  content.appendChild(sBox);

  const listWrap = el('div');
  content.appendChild(listWrap);
  function renderList(){
    listWrap.innerHTML = '';
    let list = App.db.announcements.slice();
    const q = App._annSearch || '';
    if(q) list = list.filter(a => (a.title||'').toLowerCase().includes(q) || (a.body||'').toLowerCase().includes(q));
    list.sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0) || (b.ts||0)-(a.ts||0));
    if(list.length === 0){
      listWrap.appendChild(el('div', { class:'empty card' },
        el('div', { class:'ico' }, '📢'),
        el('div', null, '尚無公告')
      ));
      return;
    }
    list.forEach(a => {
      const expired = isAnnouncementExpired(a);
      const card = el('div', { class:'ann-card' + (a.pinned?' pinned':'') });
      card.appendChild(el('div', { class:'flex-between' },
        el('h4', null, (a.pinned?'📌 ':'') + (a.title||'') + (expired?' (已過期)':'')),
        el('div', { class:'flex', style:{gap:'4px'} },
          el('button', { class:'btn btn-sm', onclick:()=> openAnnouncementEdit(a) }, '✏️'),
          el('button', { class:'btn btn-sm btn-danger', onclick: async ()=> {
            const ok = await confirmDlg('刪除這則公告？', { danger:true });
            if(!ok) return;
            App.db.announcements = App.db.announcements.filter(x => x.id !== a.id);
            saveDB(); Sync.setMap('announcements', App.db.announcements); bcNotify();
            toast('已刪除','warn'); rerender();
          }}, '🗑')
        )
      ));
      if(a.body) card.appendChild(el('div', { class:'small', style:{marginTop:'4px',whiteSpace:'pre-wrap'} }, a.body));
      card.appendChild(el('div', { class:'tiny muted', style:{marginTop:'4px'} },
        relTime(a.ts||0) + ' · 由 ' + (a.author||'老師') + ' 發布' +
        (a.expireAt ? ' · 期限 ' + a.expireAt : '')
      ));
      listWrap.appendChild(card);
    });
  }
  renderList();
}

function openAnnouncementEdit(a){
  const isNew = !a;
  const m = modal('');
  m.root.appendChild(el('h2', null, isNew?'新增公告':'編輯公告'));

  const fT = el('div', { class:'field' });
  fT.appendChild(el('label', { class:'label' }, '標題 *'));
  const iT = el('input', { class:'input', value: a?.title||'' });
  fT.appendChild(iT); m.root.appendChild(fT);

  const fB = el('div', { class:'field' });
  fB.appendChild(el('label', { class:'label' }, '內容'));
  const iB = el('textarea', { class:'textarea', placeholder:'公告內容...' });
  iB.value = a?.body||''; iB.style.minHeight = '120px';
  fB.appendChild(iB); m.root.appendChild(fB);

  const row = el('div', { class:'row' });
  const fE = el('div', { class:'field' });
  fE.appendChild(el('label', { class:'label' }, '過期日期（可選）'));
  const iE = el('input', { class:'input', type:'date', value: a?.expireAt||'' });
  fE.appendChild(iE); row.appendChild(fE);
  const fP = el('div', { class:'field' });
  fP.appendChild(el('label', { class:'label' }, '置頂'));
  const lblP = el('label', { class:'flex', style:{height:'44px',alignItems:'center',padding:'0 12px',border:'1px solid var(--border-strong)',borderRadius:'8px'} });
  const iP = el('input', { type:'checkbox' });
  if(a?.pinned) iP.checked = true;
  lblP.appendChild(iP);
  lblP.appendChild(el('span', null, ' 釘選此公告'));
  fP.appendChild(lblP); row.appendChild(fP);
  m.root.appendChild(row);

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> {
    const t = iT.value.trim();
    if(!t) return toast('標題必填','danger');
    const rec = isNew ? { id:nid(), ts:Date.now() } : a;
    rec.title = t;
    rec.body = iB.value;
    rec.expireAt = iE.value;
    rec.pinned = iP.checked;
    rec.author = App.session?.name || '老師';
    if(isNew) App.db.announcements.push(rec);
    saveDB();
    Sync.setMap('announcements', App.db.announcements);
    bcNotify();
    if(isNew) triggerWebhook('announcement', { title: rec.title, author: rec.author });
    toast(isNew?'已發布':'已更新','success');
    m.close(); rerender();
  }}, isNew?'發布':'儲存'));
  m.root.appendChild(actions);
}

function rAnalyticsMain(content){
  const total = App.db.students.length;
  const allAtt = App.db.attendance;
  const totalAtt = allAtt.length;
  const totalAsg = App.db.assignments.length;
  const totalSub = App.db.submissions.length;

function rAnalyticsHealth(content){
  // simple health: attendance rate, submission rate, avg grade
  const allStu = App.db.students;
  const totalStu = allStu.length || 1;
  const att = Math.round(allStu.reduce((t,s)=> t + attendanceRate(s.id), 0) / totalStu);
  const sub = Math.round(allStu.reduce((t,s)=> t + submissionRate(s.id), 0) / totalStu);
  const grade = Math.round(allStu.reduce((t,s)=> t + calcGrade(s.id).total, 0) / totalStu);
  const health = Math.round((att + sub + grade) / 3);

  content.appendChild(el('div', { class:'card', style:{marginBottom:'12px',textAlign:'center'} },
    el('h2', null, '💚 整體健康度'),
    el('div', { class:'huge', style:{color: health>=80?'var(--success)':health>=60?'var(--warn)':'var(--danger)'} }, String(health)),
    el('div', { class:'muted' }, '綜合分數（0-100）')
  ));

  const grid = el('div', { class:'grid grid-3' });
  grid.appendChild(el('div', { class:'stat s-success' }, el('div',{class:'num'}, att+'%'), el('div',{class:'lbl'},'平均出席率')));
  grid.appendChild(el('div', { class:'stat s-primary' }, el('div',{class:'num'}, sub+'%'), el('div',{class:'lbl'},'平均繳交率')));
  grid.appendChild(el('div', { class:'stat s-accent' }, el('div',{class:'num'}, String(grade)), el('div',{class:'lbl'},'平均成績')));
  content.appendChild(grid);

  // donut of today's stats
  const stats = computeTodayStats();
  const donutCard = el('div', { class:'chart-card', style:{marginTop:'12px'} });
  donutCard.appendChild(el('h3', null, '🎯 今日班況分布'));
  donutCard.innerHTML += donutChart([
    { label:'已簽', value: stats.signed, color:'var(--success)' },
    { label:'未簽', value: stats.absent, color:'var(--danger)' },
    { label:'請假', value: stats.leave, color:'var(--accent)' }
  ], { label:'今日' });
  donutCard.innerHTML += '<div class="chart-legend"><span class="lg"><span class="sw" style="background:var(--success)"></span>已簽 '+stats.signed+'</span><span class="lg"><span class="sw" style="background:var(--danger)"></span>未簽 '+stats.absent+'</span><span class="lg"><span class="sw" style="background:var(--accent)"></span>請假 '+stats.leave+'</span></div>';
  content.appendChild(donutCard);
}

function rAnalyticsOverdue(content){
  // students with most missing submissions
  const rows = App.db.students.map(s => {
    const required = App.db.assignments.filter(a => assignmentTargets(a).has(s.id));
    const submittedIds = new Set(App.db.submissions.filter(x => x.studentId === s.id).map(x => x.assignmentId));
    const missing = required.filter(a => !submittedIds.has(a.id) && isAssignmentOverdue(a)).length;
    return { s, missing, total: required.length };
  }).filter(r => r.missing > 0).sort((a,b) => b.missing - a.missing);

  content.appendChild(el('h2', null, '⌛ 逾期未繳排行'));
  if(rows.length === 0){
    content.appendChild(el('div', { class:'empty card' }, el('div',{class:'ico'},'✨'),el('div',null,'沒有人逾期未繳！')));
    return;
  }
  const card = el('div', { class:'card', style:{marginTop:'10px'} });
  rows.forEach(({s,missing,total}) => {
    const row = el('div', { class:'list-row' });
    row.appendChild(el('div', { class:'avatar' }, initials(s.name)));
    row.appendChild(el('div', { class:'info' },
      el('div', { class:'name' }, s.name),
      el('div', { class:'sub' }, s.cls||'—')
    ));
    row.appendChild(el('span', { class:'tag t-danger' }, '⚠ ' + missing + ' / ' + total + ' 份未繳'));
    card.appendChild(row);
  });
  content.appendChild(card);
}

function rAnalyticsDist(content){
  // distribution buckets
  const buckets = [0,0,0,0,0]; // 0-59, 60-69, 70-79, 80-89, 90-100
  App.db.students.forEach(s => {
    const t = calcGrade(s.id).total;
    if(t < 60) buckets[0]++;
    else if(t < 70) buckets[1]++;
    else if(t < 80) buckets[2]++;
    else if(t < 90) buckets[3]++;
    else buckets[4]++;
  });
  content.appendChild(el('h2', null, '📊 成績分布'));
  const card = el('div', { class:'chart-card', style:{marginTop:'10px'} });
  card.innerHTML += barChart([
    { label:'0-59', value: buckets[0] },
    { label:'60-69', value: buckets[1] },
    { label:'70-79', value: buckets[2] },
    { label:'80-89', value: buckets[3] },
    { label:'90-100', value: buckets[4] }
  ], { colors:['var(--danger)','var(--warn)','#facc15','var(--success)','var(--primary)'] });
  content.appendChild(card);
}

function rAnalyticsTrend(content){
  // last 14 days attendance rate
  const dates = [];
  for(let i = 13; i >= 0; i--){
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    dates.push(ds);
  }
  const totalStu = App.db.students.length || 1;
  const data = dates.map(ds => {
    const signed = new Set(App.db.attendance.filter(a => a.date === ds).map(a => a.studentId)).size;
    return { label: ds.slice(5), value: Math.round(100 * signed / totalStu) };
  });
  content.appendChild(el('h2', null, '📈 14 日出席率趨勢'));
  const card = el('div', { class:'chart-card', style:{marginTop:'10px'} });
  card.innerHTML += lineChart(data, { max:100, min:0 });
  content.appendChild(card);
}

function rAnalyticsCompare(content){
  const classes = Array.from(new Set(App.db.students.map(s => s.cls).filter(Boolean)));
  content.appendChild(el('h2', null, '🔬 班級比較'));
  if(classes.length === 0){
    content.appendChild(el('div', { class:'empty card' }, el('div',{class:'ico'},'🏫'),el('div',null,'學生未分班')));

  }
  const data = classes.map(c => {

    return {
      label: c,
      att: Math.round(stus.reduce((t,s)=> t + attendanceRate(s.id), 0) / stus.length),
      sub: Math.round(stus.reduce((t,s)=> t + submissionRate(s.id), 0) / stus.length),
      grade: Math.round(stus.reduce((t,s)=> t + calcGrade(s.id).total, 0) / stus.length)
    };
  });

  const card1 = el('div', { class:'chart-card', style:{marginTop:'10px'} });
  card1.appendChild(el('h3', null, '出席率比較'));
  card1.innerHTML += barChart(data.map(d => ({ label:d.label, value:d.att })), { max:100 });
  content.appendChild(card1);

  const card2 = el('div', { class:'chart-card', style:{marginTop:'10px'} });
  card2.appendChild(el('h3', null, '繳交率比較'));
  card2.innerHTML += barChart(data.map(d => ({ label:d.label, value:d.sub })), { max:100, colors: data.map(()=>'var(--accent)') });
  content.appendChild(card2);

  const card3 = el('div', { class:'chart-card', style:{marginTop:'10px'} });

  card3.innerHTML += barChart(data.map(d => ({ label:d.label, value:d.grade })), { max:100, colors: data.map(()=>'var(--success)') });
  content.appendChild(card3);
}

/* ════════════════════════════════════════════════════════════
   PHASE 2 — STUDENT: ASSIGNMENTS (rSAsgn)
   ──────────────────────────────────────────────────────────── */
function rSAsgn(content){
  const me = currentStudent(); if(!me) return;

  // detail?
  if(App.subview && !['all','pending','done','overdue'].includes(App.subview)){
    const asg = App.db.assignments.find(a => a.id === App.subview);
    if(asg) return rSAsgnDetailV2(content, asg, me);
  }

  const tab = App.subview || 'pending';
  content.appendChild(el('h1', null, '📤 我的作業'));

  const all = App.db.assignments.filter(a => assignmentTargets(a).has(me.id));
  const subs = App.db.submissions.filter(s => s.studentId === me.id);
  const subMap = new Map(subs.map(s => [s.assignmentId, s]));

  const tabs = el('div', { class:'tabs-line' });
  const counts = {
    pending: all.filter(a => !subMap.has(a.id) && !isAssignmentOverdue(a)).length,
    done: all.filter(a => subMap.has(a.id)).length,
    overdue: all.filter(a => !subMap.has(a.id) && isAssignmentOverdue(a)).length,
    all: all.length
  };
  [['pending','未繳','urgent'],['done','已繳','ok'],['overdue','逾期','urgent'],['all','全部','']].forEach(([v,t,p]) => {
    const b = el('button', { class: tab===v?'active':'', onclick:()=> go('sasgn', v) }, t);
    if(counts[v] > 0) b.appendChild(el('span', { class:'pill ' + p, style:{marginLeft:'4px'} }, String(counts[v])));
    tabs.appendChild(b);
  });
  content.appendChild(tabs);

  let list = all.slice();
  if(tab === 'pending') list = list.filter(a => !subMap.has(a.id) && !isAssignmentOverdue(a));
  else if(tab === 'done') list = list.filter(a => subMap.has(a.id));
  else if(tab === 'overdue') list = list.filter(a => !subMap.has(a.id) && isAssignmentOverdue(a));
  list.sort((a,b) => {
    const da = a.dueAt ? new Date(a.dueAt).getTime() : Infinity;
    const db = b.dueAt ? new Date(b.dueAt).getTime() : Infinity;
    return da - db;
  });

  if(list.length === 0){
    content.appendChild(el('div', { class:'empty card' },
      el('div', { class:'ico' }, '✨'),
      el('div', null, '沒有作業')
    ));
    return;
  }
  list.forEach(a => {
    const sub = subMap.get(a.id);
    const soon = isAssignmentDueSoon(a);
    const overdue = isAssignmentOverdue(a) && !sub;
    const card = el('div', { class:'card card-hover', style:{marginBottom:'8px', borderColor: soon&&!sub ? 'var(--danger)' : ''}, onclick:()=> go('sasgn', a.id) });
    card.appendChild(el('div', { class:'flex-between' },
      el('h3', null, a.title || ''),
      sub ?
        (typeof sub.score === 'number' ? el('span', { class:'pill ok' }, '✓ 已批 ' + sub.score + '/' + (a.points||100))
                                       : el('span', { class:'pill warn' }, '已繳·待批'))
      : overdue ? el('span', { class:'pill urgent' }, '已逾期')
      : soon ? el('span', { class:'pill urgent' }, '⚠ 24h 內到期')
      : el('span', { class:'pill' }, '未繳')
    ));
    if(a.desc) card.appendChild(el('div', { class:'small muted', style:{margin:'4px 0',whiteSpace:'pre-wrap'} }, (a.desc||'').slice(0,80)));
    card.appendChild(el('div', { class:'flex', style:{flexWrap:'wrap',gap:'6px',fontSize:'12px'} },
      el('span', { class:'tag' }, '⏰ ' + (a.dueAt ? new Date(a.dueAt).toLocaleString('zh-TW',{hour12:false}) : '無截止')),
      el('span', { class:'tag' }, '💯 ' + (a.points||100))
    ));
    content.appendChild(card);
  });
}

function rSAsgnDetail(content, asg, me){
  content.appendChild(el('button', { class:'btn-ghost small', style:{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',marginBottom:'8px'}, onclick:()=> go('sasgn') }, '← 返回'));
  content.appendChild(el('h1', null, asg.title || ''));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'12px'} },
    '截止：' + (asg.dueAt ? new Date(asg.dueAt).toLocaleString('zh-TW',{hour12:false}) : '無') + ' · 滿分 ' + (asg.points||100)
  ));

  const soon = isAssignmentDueSoon(asg);
  const overdue = isAssignmentOverdue(asg);
  if(soon){
    content.appendChild(el('div', { class:'card', style:{borderColor:'var(--danger)',background:'var(--danger-soft)',marginBottom:'10px'} },
      el('div', { style:{color:'var(--danger)',fontWeight:'700'} }, '⚠ 24 小時內到期！請盡快繳交')
    ));
  }

  if(asg.desc){
    content.appendChild(el('div', { class:'card', style:{marginBottom:'10px'} },
      el('h3', null, '📝 作業說明'),
      el('div', { class:'small', style:{whiteSpace:'pre-wrap',marginTop:'4px'} }, asg.desc)
    ));
  }
  if(asg.attach){
    content.appendChild(el('div', { class:'card', style:{marginBottom:'10px'} },
      el('h3', null, '📎 老師附件'),
      el('div', { class:'flex', style:{marginTop:'4px',gap:'6px',flexWrap:'wrap'} },
        el('button', { class:'btn btn-sm', onclick:()=> attachDownload(asg.attach) }, '⬇ ' + asg.attach.name),
        el('button', { class:'btn btn-sm', onclick:()=> attachPreview(asg.attach) }, '👁 預覽')
      )
    ));
  }

  const existing = App.db.submissions.find(s => s.studentId === me.id && s.assignmentId === asg.id);

  if(existing && typeof existing.score === 'number'){
    // graded view
    const card = el('div', { class:'card', style:{borderColor:'var(--success)',background:'var(--success-soft)'} });
    card.appendChild(el('h3', null, '✅ 已批改'));
    card.appendChild(el('div', { class:'huge', style:{color:'var(--success)',textAlign:'center',marginTop:'4px'} }, existing.score + ' / ' + (asg.points||100)));
    if(existing.comment){
      card.appendChild(el('div', { style:{marginTop:'8px',padding:'8px',background:'var(--surface)',borderRadius:'8px'} },
        el('div', { class:'small', style:{fontWeight:'600',marginBottom:'4px'} }, '💬 老師評語'),
        el('div', { class:'small', style:{whiteSpace:'pre-wrap'} }, existing.comment)
      ));
    }
    card.appendChild(el('button', { class:'btn btn-sm', style:{marginTop:'8px'}, onclick: ()=> markSubmissionRead(existing) }, '✓ 標記已讀'));
    content.appendChild(card);
    return;
  }

  if(existing){
    content.appendChild(el('div', { class:'card', style:{borderColor:'var(--warn)',background:'var(--warn-soft)',marginBottom:'10px'} },
      el('h3', null, '⌛ 已繳交，等待批改'),
      el('div', { class:'small muted', style:{marginTop:'4px'} }, '繳交於 ' + relTime(existing.ts||0))
    ));
    content.appendChild(el('button', { class:'btn btn-sm btn-danger', onclick: async ()=> {
      const ok = await confirmDlg('要撤回這次繳交以重新提交嗎？', { danger:true });
      if(!ok) return;
      App.db.submissions = App.db.submissions.filter(x => x.id !== existing.id);
      saveDB(); Sync.setMap('submissions', App.db.submissions); bcNotify();
      toast('已撤回','warn'); rerender();
    }}, '🔄 撤回繳交'));
    return;
  }

  // submission form
  const card = el('div', { class:'card' });
  card.appendChild(el('h3', null, '📤 ' + (overdue?'(已逾期) ':'') + '繳交作業'));

  const fT = el('div', { class:'field' });
  fT.appendChild(el('label', { class:'label' }, '文字內容（可選）'));
  const iT = el('textarea', { class:'textarea', placeholder:'寫下你的回答...' });
  fT.appendChild(iT); card.appendChild(fT);

  const fL = el('div', { class:'field' });
  fL.appendChild(el('label', { class:'label' }, '連結（可選）'));
  const iL = el('input', { class:'input', placeholder:'https://...' });
  fL.appendChild(iL); card.appendChild(fL);

  // file
  const fF = el('div', { class:'field' });
  fF.appendChild(el('label', { class:'label' }, '檔案（單檔 ≤ 50MB，可選）'));
  let attached = null;
  const upBox = el('div', { class:'upload-area' });
  const fInp = el('input', { type:'file' });
  function refresh(){
    upBox.innerHTML = '';
    if(attached){
      upBox.classList.add('has-file');
      const chip = el('div', { class:'file-chip' },
        el('span', null, '📎 ' + attached.name),
        el('span', { class:'x', onclick: e => { e.stopPropagation(); attachDelete(attached); attached = null; upBox.classList.remove('has-file'); refresh(); }}, '✗')
      );
      upBox.appendChild(chip);
    } else {
      upBox.appendChild(el('div', null, '點此選擇檔案'));
      upBox.appendChild(el('div', { class:'tiny muted' }, '上限 50MB（PDF / Word / 圖片等）'));
    }
  }
  fInp.addEventListener('change', async e => {
    try {
      const file = e.target.files[0];
      if(!file) return;
      const data = await attachUpload(file);
      if(data){ attached = data; refresh(); }
    } catch(err){ toast(err.message,'danger'); }
  });
  upBox.appendChild(fInp);
  upBox.addEventListener('click', ()=> fInp.click());
  fF.appendChild(upBox); card.appendChild(fF);
  refresh();

  card.appendChild(el('button', { class:'btn btn-primary btn-block', style:{marginTop:'10px'}, onclick:()=> {
    const txt = iT.value.trim();
    const lnk = iL.value.trim();
    if(!txt && !lnk && !attached) return toast('至少填一項內容','danger');
    const rec = {
      id: nid(), assignmentId: asg.id,
      studentId: me.id, studentName: me.name,
      text: txt, link: lnk, attach: attached,
      ts: Date.now()
    };
    App.db.submissions.push(rec);
    saveDB();
    Sync.push('submissions', rec);
    bcNotify();
    toast('已繳交！','success');
    rerender();
  }}, '✅ 送出繳交'));
  content.appendChild(card);
}

function markSubmissionRead(sub){
  sub.read = true;
  saveDB();
  Sync.push('submissions', sub);
  bcNotify();
  toast('已標記','success');
  rerender();
}

/* ════════════════════════════════════════════════════════════
   PHASE 3 ▒▒  QR CODE CHECK-IN
   ──────────────────────────────────────────────────────────── */
function genAttCode(){
  // 6-char base32 token, valid for 5 min
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

/* ─── 5-minute QR token registry (batch 1 安全強化) ─────────────
   產生代碼時同步寫入 DB._qrCodes，學生 / 其他裝置可驗證有效性。
   防偽造：學生只能用「老師確實派發過、未過期」的代碼簽到。
*/
const QR_CODE_TTL_MS = 5 * 60 * 1000;

function generateQrPayload(){
  const code = genAttCode();
  const expireTs = Date.now() + QR_CODE_TTL_MS;
  App.db._qrCodes = Array.isArray(App.db._qrCodes) ? App.db._qrCodes : [];
  // 清掉過期 + 太久遠的舊代碼（保留最近 30 分鐘內紀錄）
  const cutoff = Date.now() - 30*60*1000;
  App.db._qrCodes = App.db._qrCodes.filter(q => q && q.expireTs > cutoff);
  App.db._qrCodes.push({
    code, expireTs,
    createdAt: Date.now(),
    used: [],
    room: (App.cfg && App.cfg.roomCode) || ''
  });
  // 控制數量上限
  if(App.db._qrCodes.length > 50) App.db._qrCodes = App.db._qrCodes.slice(-50);
  saveDB();
  try { Sync.setMap('_qrCodes', App.db._qrCodes); } catch(e){}
  return code;
}

function validateQrCode(code){
  if(!code) return { ok:false, reason:'缺少代碼' };
  const list = Array.isArray(App.db._qrCodes) ? App.db._qrCodes : [];
  const c = list.find(q => q && q.code === String(code));
  if(!c){
    return { ok:false, reason:'代碼無效（可能是舊版 QR，請老師重新產生）' };
  }
  if(c.expireTs < Date.now()){
    return { ok:false, reason:'代碼已過期（每 5 分鐘自動更換，請重新掃描）' };
  }
  return { ok:true, qr:c };
}

function markQrUsed(code, studentId){
  const list = Array.isArray(App.db._qrCodes) ? App.db._qrCodes : [];
  const c = list.find(q => q && q.code === String(code));
  if(c){
    c.used = c.used || [];
    if(c.used.indexOf(studentId) < 0) c.used.push(studentId);
    saveDB();
    try { Sync.setMap('_qrCodes', App.db._qrCodes); } catch(e){}
  }
}

function currentSiteOrigin(){
  // Honor whatever URL the file is opened from
  const o = location.origin + location.pathname.replace(/[^/]*$/, '');
  return o;
}

function buildQRJoinUrl(attCode){
  const base = location.origin + location.pathname;
  const room = (App.cfg && App.cfg.roomCode) || '';
  return base + '#join=' + encodeURIComponent(room) + '&att=' + encodeURIComponent(attCode);
}
