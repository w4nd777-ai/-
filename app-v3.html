    const elc = document.getElementById('qr-cd');
    if(!elc){ clearInterval(App.qrTimer); App.qrTimer = null; return; }
    const remain = Math.max(0, App.qrAttExpires - Date.now());
    const mm = Math.floor(remain/60000);
    const ss = Math.floor((remain%60000)/1000);
    elc.textContent = mm + ':' + String(ss).padStart(2,'0');
    elc.classList.toggle('warn', remain > 0 && remain < 60000);
    elc.classList.toggle('danger', remain > 0 && remain < 15000);
    if(remain <= 0){
      qrRegenerate(false);
    }
  }, 500);
}

function qrRegenerate(notify){
  App.qrAttCode = generateQrPayload();
  App.qrAttExpires = Date.now() + QR_CODE_TTL_MS;
  if(notify) toast('已產生新碼','success');
  if(App.view === 'qr') rerender();
}

/* QR auto-checkin from URL hash */
function handleQrJoinHash(){
  // accept #join=ROOM&att=CODE  (also #att=CODE alone for already-joined students)
  const h = location.hash.slice(1);
  if(!h) return false;
  const params = {};
  h.split('&').forEach(p => {
    const i = p.indexOf('=');
    if(i > 0) params[p.slice(0,i)] = decodeURIComponent(p.slice(i+1));
    else params[p] = '';
  });
  if(!params.att && !params.join) return false;

  // if a room is requested AND it differs from current, switch
  if(params.join && (!App.cfg || App.cfg.roomCode !== params.join)){
    if(App.cfg && App.cfg.roomCode){
      // already in different room: prompt
      const ok = confirm('要切換到教室 "' + params.join + '" 並嘗試簽到？');
      if(!ok){ location.hash = ''; return false; }
    }
    try { Sync.detachAll(); } catch(e){}
    App.cfg = { roomCode: params.join, role: (App.cfg && App.cfg.role) || 'student' };
    saveCfg();
    loadDB();
    initBC();
    Sync.init();
  }

  if(params.att){
    // store for after-login auto-check
    App.pendingAttCode = params.att;
    location.hash = '';
    // attempt right now if student already logged in
    setTimeout(()=> tryAutoCheckin(), 300);
    return true;
  }
  return false;
}

function tryAutoCheckin(){
  if(!App.pendingAttCode) return;
  if(!App.session || App.session.role !== 'student') return;
  const me = currentStudent();
  if(!me) return;

  // batch 1：嚴格驗證 QR 代碼必須來自老師端、未過期
  const code = App.pendingAttCode;
  App.pendingAttCode = null;

  const v = validateQrCode(code);
  if(!v.ok){
    toast('❌ ' + v.reason, 'danger', 4000);
    return;
  }

  if(studentSignedToday(me.id)){
    toast('你今天已經簽到過了','warn', 3000);
    return;
  }
  if(studentOnLeaveToday(me.id)){
    toast('你今天有請假，不需簽到','warn', 3000);
    return;
  }

  const rec = {
    id: nid(), studentId: me.id, studentName: me.name, cls: me.cls||'',
    date: td(), time: nt(), ts: Date.now(),
    status:'present', method:'qr', code
  };
  App.db.attendance.push(rec);
  markQrUsed(code, me.id);
  saveDB();
  Sync.push('attendance', rec);
  bcNotify();

  // success animation
  const check = el('div', { class:'success-check' }, '✓');
  document.body.appendChild(check);
  setTimeout(()=> check.remove(), 900);

  toast('📱 QR 簽到成功！' + rec.time, 'success', 3500);
  triggerWebhook('checkin', { student: me.name, time: rec.time, method:'qr' });

  // do not change route — stay on whatever the student was on
  if(App.view === 'checkin') setTimeout(()=> rerender(), 800);
}

async function askClaude(prompt, system){
  const key = localStorage.getItem(LS_CLAUDE_KEY);
  if(!key){
    toast('請先在設定中填入 Claude API Key','warn', 3500);
    return null;
  }
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-5-20250929',
        max_tokens: 1024,
        system: system || '你是一位友善、簡潔的中文教師助理',
        messages:[{ role:'user', content: prompt }]
      })
    });
    const data = await r.json();
    if(data.error){
      toast('AI 錯誤：' + (data.error.message||''),'danger', 4000);
      return null;
    }
    return (data.content && data.content[0] && data.content[0].text) || '';
  } catch(e){
    toast('AI 呼叫失敗：' + (e.message||e),'danger', 4000);
    return null;
  }
}

function buildTeacherContext(){
  const s = computeTodayStats();
  const recent = App.db.assignments.slice().sort((a,b)=> (b.ts||0)-(a.ts||0)).slice(0,5);
  const overdue = App.db.assignments.filter(a => isAssignmentOverdue(a));
  const recentAtt = App.db.attendance.slice(-30);
  return [
    '【班級資訊】',
    '學校：' + (App.db.settings.schoolName||''),
    '學生總數：' + App.db.students.length,
    '今日出席：' + s.signed + '/' + s.total + '（缺席 ' + s.absent + '、請假 ' + s.leave + '、遲到 ' + s.late + '）',
    '近期作業：' + recent.map(a => a.title + (isAssignmentOverdue(a)?'（逾期）':'')).join('、'),
    '逾期作業數：' + overdue.length,
    '最近 30 筆簽到平均時間：' + (recentAtt.length ? recentAtt.map(a=>a.time).filter(Boolean).slice(0,5).join('、') : '無'),
    ''
  ].join('\n');
}
function buildStudentContext(me){
  if(!me) return '';
  const att = attendanceRate(me.id);
  const avg = submissionAvg(me.id);
  const rate = submissionRate(me.id);
  const unsub = App.db.assignments.filter(a => assignmentTargets(a).has(me.id)
    && !App.db.submissions.find(s => s.assignmentId === a.id && s.studentId === me.id));
  return [
    '【你的學習狀況】',
    '姓名：' + me.name + (me.cls?' · '+me.cls:''),
    '出席率：' + att + '%',
    '作業平均分：' + avg,
    '作業繳交率：' + rate + '%',
    '未繳作業：' + (unsub.length ? unsub.map(a=>a.title).join('、') : '無'),
    ''
  ].join('\n');
}

    ['怎麼進步','我該如何提升我的成績和出席率？'],

  ];
  presets.forEach(([label, q]) => {
    quick.appendChild(el('button', { onclick:()=> sendAI(q) }, label));
  });
  m.root.appendChild(quick);

  const chat = el('div', { class:'ai-chat', id:'ai-chat' });
  chat.appendChild(el('div', { class:'ai-msg system' }, '👋 ' + (isTeacher?'我可以幫你分析班級資料、寫公告、給教學建議':'我會根據你的學習狀況給友善的建議')));

  const inputRow = el('div', { class:'flex', style:{marginTop:'10px'} });
  const inp = el('input', { class:'input', placeholder:'問個問題…', style:{flex:'1'} });
  const sendBtn = el('button', { class:'btn btn-primary', onclick:()=> {
    const v = inp.value.trim(); if(!v) return; inp.value=''; sendAI(v);
  }}, '送出');
  inp.addEventListener('keydown', e => { if(e.key==='Enter'){ const v=inp.value.trim(); if(!v) return; inp.value=''; sendAI(v); } });
  inputRow.appendChild(inp); inputRow.appendChild(sendBtn);
  m.root.appendChild(inputRow);

  async function sendAI(q){
    const chatEl = document.getElementById('ai-chat');
    if(!chatEl) return;
    const ctx = isTeacher ? buildTeacherContext() : buildStudentContext(me);
    const sys = isTeacher
      ? '你是教師助理，回答簡潔具體，能引用以下班級脈絡。不要回答與教學無關的內容。\n\n' + ctx

    chatEl.scrollTop = chatEl.scrollHeight;
    const ans = await askClaude(q, sys);
    ph.innerHTML = '';
    ph.textContent = ans || '（無回應）';
    chatEl.scrollTop = chatEl.scrollHeight;
    App.aiHistory.push({ q, a: ans });
  }

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '關閉'));
  m.root.appendChild(actions);
  setTimeout(()=> inp.focus(), 80);

function whLoad(){
  try { return JSON.parse(localStorage.getItem(LS_WEBHOOK) || 'null'); }
  catch(e){ return null; }
}
function whSave(cfg){
  try { localStorage.setItem(LS_WEBHOOK, JSON.stringify(cfg)); } catch(e){}
}

async function triggerWebhook(eventType, payload){
  const cfg = whLoad();
  if(!cfg || !cfg.enabled || !cfg.url) return;
  if(cfg.events && !cfg.events[eventType]) return;

  const titleMap = {
    'announcement':'📢 新公告',
    'assignment-due':'⏰ 作業即將到期',
    'attendance-issue':'⚠️ 出席異常',
    'leave-request':'📆 請假申請',
    'checkin':'✅ 學生簽到',
    'test':'🧪 測試訊息'
  };
  const title = titleMap[eventType] || '通知';
  const text = title + '\n' +
    '教室：' + (App.db.branding.title||'') + '\n' +
    Object.entries(payload||{}).map(([k,v])=> k+': '+(typeof v==='object'?JSON.stringify(v):v)).join('\n');

  let body;
  if(cfg.platform === 'discord'){
    body = JSON.stringify({ content: text });
  } else if(cfg.platform === 'telegram'){
    // expects url like https://api.telegram.org/botTOKEN/sendMessage?chat_id=XXX
    body = JSON.stringify({ text });
  } else if(cfg.platform === 'line'){
    body = JSON.stringify({ messages:[{ type:'text', text }] });
  } else {
    body = JSON.stringify({ event: eventType, title, text, payload, ts: Date.now() });
  }

  try {
    const opts = {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body
    };
    if(cfg.platform === 'line' && cfg.token){
      opts.headers['Authorization'] = 'Bearer ' + cfg.token;
    }
    await fetch(cfg.url, opts).catch(()=>null);
  } catch(e){ /* CORS may block; user is told in UI */ }
}

function openEmailComposer(){
  const m = modal('');
  m.root.style.maxWidth = '560px';
  m.root.appendChild(el('h2', null, '📧 寄送 Email'));
  m.root.appendChild(el('div', { class:'small muted', style:{marginBottom:'10px'} }, '會用系統預設郵件 App 開啟，支援批次（BCC）'));

  // recipient type
  const fT = el('div', { class:'field' });
  fT.appendChild(el('label', { class:'label' }, '對象'));
  const selT = el('select', { class:'select' });
  selT.appendChild(el('option', { value:'student' }, '學生本人'));
  selT.appendChild(el('option', { value:'parent' }, '家長'));
  fT.appendChild(selT);
  m.root.appendChild(fT);

  // class filter
  const classes = Array.from(new Set(App.db.students.map(s => s.cls).filter(Boolean)));
  const fC = el('div', { class:'field' });
  fC.appendChild(el('label', { class:'label' }, '班級篩選'));
  const selC = el('select', { class:'select' });
  selC.appendChild(el('option', { value:'' }, '— 全部 —'));
  classes.forEach(c => selC.appendChild(el('option', { value:c }, c)));
  fC.appendChild(selC);
  m.root.appendChild(fC);

  // chips
  const chipBox = el('div', { style:{minHeight:'40px',padding:'6px 0'} });
  const countSpan = el('span', { id:'recip-count' }, '0');
  m.root.appendChild(el('label', { class:'label' }, '收件人（', countSpan, '）'));
  m.root.appendChild(chipBox);

  function buildChips(){
    chipBox.innerHTML = '';
    const which = selT.value;
    const cls = selC.value;
    let students = App.db.students.filter(s => !cls || s.cls === cls);
    let emails = students.map(s => which === 'parent' ? s.parentEmail : s.email).filter(Boolean);
    countSpan.textContent = String(emails.length);
    if(!emails.length){
      chipBox.appendChild(el('div', { class:'muted small' }, '無有效 Email — 請先在學生資料填入'));
      return;
    }
    emails.slice(0,10).forEach(e => {
      chipBox.appendChild(el('span', { class:'recip-chip' }, e));
    });
    if(emails.length > 10){
      chipBox.appendChild(el('span', { class:'recip-chip' }, '+' + (emails.length-10) + ' 人'));
    }
    chipBox._emails = emails;
  }
  selT.addEventListener('change', buildChips);
  selC.addEventListener('change', buildChips);
  buildChips();

  // subject
  const fS = el('div', { class:'field' });
  fS.appendChild(el('label', { class:'label' }, '主旨'));
  const iS = el('input', { class:'input', value:'【' + (App.db.branding.title||'') + '】通知' });
  fS.appendChild(iS);
  m.root.appendChild(fS);

  // body
  const fB = el('div', { class:'field' });
  fB.appendChild(el('label', { class:'label' }, '內容'));
  const iB = el('textarea', { class:'textarea', placeholder:'郵件內容…', style:{minHeight:'120px'} });
  fB.appendChild(iB);
  m.root.appendChild(fB);

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick:()=> {
    const emails = chipBox._emails || [];
    if(!emails.length) return toast('無收件人','warn');
    const subj = encodeURIComponent(iS.value);
    const body = encodeURIComponent(iB.value);
    const bcc = emails.join(',');
    const mailto = 'mailto:?bcc=' + bcc + '&subject=' + subj + '&body=' + body;
    if(mailto.length > 7500){
      // some clients have URL limits
      toast('收件人過多，已嘗試開啟，若失敗請分批','warn', 4000);
    }
    location.href = mailto;
    m.close();
  } }, '✉️ 開啟郵件 App'));
  m.root.appendChild(actions);
}

    el('div', { class:'flex tiny muted' },
      el('span', null, '🟦 作業到期'),
      el('span', null, '🟧 公告'),
      el('span', null, '🟩 出席')
    )
  );
  content.appendChild(hdr);

  // build event map keyed by 'YYYY-MM-DD'
  const evMap = {};
  function pushEv(date, ev){ (evMap[date] = evMap[date] || []).push(ev); }
  App.db.assignments.forEach(a => {
    if(a.dueAt){
      const d = new Date(a.dueAt);
      const dk = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      pushEv(dk, { kind:'due', label:'作業：'+a.title, id:a.id });
    }
  });
  App.db.announcements.forEach(a => {
    const t = a.ts ? new Date(a.ts) : null;
    if(!t) return;
    const dk = t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
    pushEv(dk, { kind:'ann', label:'公告：'+(a.title||a.text||'').slice(0,16), id:a.id });
  });
  const attDays = new Set();
  App.db.attendance.forEach(at => attDays.add(at.date));
  attDays.forEach(d => pushEv(d, { kind:'att', label:'簽到記錄', date:d }));

  const grid = el('div', { class:'cal-grid' });
  ['日','一','二','三','四','五','六'].forEach(d => grid.appendChild(el('div', { class:'cal-head' }, d)));

  const firstDay = new Date(cur.y, cur.m, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(cur.y, cur.m+1, 0).getDate();
  const prevMonthDays = new Date(cur.y, cur.m, 0).getDate();
  const today = td();

  // leading cells
  for(let i=startWeekday-1; i>=0; i--){
    const d = prevMonthDays - i;
    grid.appendChild(el('div', { class:'cal-cell other' }, el('div', { class:'d' }, String(d))));
  }
  // current month
  for(let day=1; day<=daysInMonth; day++){
    const dk = cur.y + '-' + String(cur.m+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const cls = 'cal-cell' + (dk === today ? ' today' : '');
    const evs = evMap[dk] || [];
    const cell = el('div', { class:cls, onclick: ()=> openDayDetail(dk, evs) });
    cell.appendChild(el('div', { class:'d' }, String(day)));
    if(evs.length){
      const evWrap = el('div', { class:'evs' });
      evs.slice(0,3).forEach(ev => evWrap.appendChild(el('div', { class:'ev '+ev.kind }, ev.label)));
      if(evs.length > 3) evWrap.appendChild(el('div', { class:'tiny muted' }, '+' + (evs.length-3)));
      cell.appendChild(evWrap);
    }
    grid.appendChild(cell);
  }
  // trailing cells
  const totalCells = startWeekday + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for(let i=1;i<=trailing;i++){
    grid.appendChild(el('div', { class:'cal-cell other' }, el('div', { class:'d' }, String(i))));
  }
  content.appendChild(grid);
}

function openDayDetail(dateKey, evs){
  const m = modal('');

  if(!evs || !evs.length){
    m.root.appendChild(el('div', { class:'empty' }, '當天無事件'));

    evs.forEach(ev => {
      const cls = ev.kind === 'due' ? 'tag t-primary' : ev.kind === 'ann' ? 'tag t-warn' : 'tag t-success';
      const row = el('div', { class:'list-row', onclick:()=> {
        m.close();
        if(ev.kind === 'due') { App.subview = ev.id; go('assignments', ev.id); }
        else if(ev.kind === 'ann') go('announcements');
        else if(ev.kind === 'att') go('attendance');
      }});
      row.appendChild(el('span', { class:cls }, ev.kind==='due'?'作業':ev.kind==='ann'?'公告':'出席'));
      row.appendChild(el('div', { class:'info' }, el('div', { class:'name' }, ev.label)));

}

function rGantt(content){
  content.appendChild(el('h1', null, '📊 作業甘特圖'));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'14px'} }, '最近 30 天作業時間軸 — 綠：未到期、橘：即將到期、紅：逾期'));

  const today = new Date();
  const days = 30;
  const start = new Date(today.getTime() - 7*86400*1000); // 7 days back
  const end = new Date(start.getTime() + days*86400*1000);
  const range = end.getTime() - start.getTime();

  // filter
  const assigns = App.db.assignments.filter(a => {
    if(!a.dueAt && !a.ts) return false;
    const cs = a.ts ? new Date(a.ts).getTime() : new Date(a.dueAt).getTime();
    const ce = a.dueAt ? new Date(a.dueAt).getTime() : cs;
    return ce >= start.getTime() && cs <= end.getTime();
  }).sort((a,b)=> new Date(a.dueAt||a.ts) - new Date(b.dueAt||b.ts));

  if(!assigns.length){
    content.appendChild(el('div', { class:'empty card' },
      el('div', { class:'ico' }, '📊'),
      el('div', null, '近 30 天無作業')
    ));
    return;
  }

  const wrap = el('div', { class:'gantt-wrap card' });
  const tbl = el('table', { class:'gantt-table' });
  const thead = el('tr');
  thead.appendChild(el('th', { class:'gantt-name' }, '作業'));
  thead.appendChild(el('th', null, '時間軸 (' +
    (start.getMonth()+1) + '/' + start.getDate() + ' → ' +
    (end.getMonth()+1) + '/' + end.getDate() + ')'));
  tbl.appendChild(thead);

  assigns.forEach(a => {
    const cs = a.ts ? new Date(a.ts).getTime() : new Date(a.dueAt).getTime();
    const ce = a.dueAt ? new Date(a.dueAt).getTime() : cs + 86400*1000;
    const x0 = Math.max(0, (cs - start.getTime()) / range * 100);
    const x1 = Math.min(100, (ce - start.getTime()) / range * 100);
    const w = Math.max(2, x1 - x0);
    const overdue = isAssignmentOverdue(a);
    const dueSoon = isAssignmentDueSoon(a);
    const cls = 'gantt-bar' + (overdue ? ' danger' : dueSoon ? ' warn' : '');

    const tr = el('tr');
    tr.appendChild(el('td', { class:'gantt-name', title:a.title }, a.title));
    const td2 = el('td');
    const track = el('div', { class:'gantt-track' });
    // today line
    const tx = Math.max(0, Math.min(100, (Date.now() - start.getTime()) / range * 100));
    track.appendChild(el('div', { class:'gantt-today', style:{ left: tx + '%' } }));
    const bar = el('div', { class:cls, style:{ left:x0+'%', width:w+'%' }, onclick:()=>{
      App.subview = a.id; go('assignments', a.id);
    }}, a.title);
    track.appendChild(bar);
    td2.appendChild(track);
    tr.appendChild(td2);
    tbl.appendChild(tr);
  });
  wrap.appendChild(tbl);
  content.appendChild(wrap);
}

/* ---- LS keys for Phase 4 ---- */
const LS_BACKUP_PREFIX = LS_KEY + '_backup_';
const LS_BACKUP_LAST   = LS_KEY + '_backup_last';
const LS_LOGS          = LS_KEY + '_logs';
const LS_JOURNEY_DONE  = LS_KEY + '_journey_done';

/* ---- Operation log ---- */
function logOp(type, msg, meta){
  try {
    if(!App.db) return;
    if(!Array.isArray(App.db._logs)) App.db._logs = [];
    App.db._logs.push({
      id: nid(), ts: Date.now(),
      type: type || 'info',
      msg: String(msg || ''),
      who: (App.session && App.session.name) || 'system',
      meta: meta || null
    });
    if(App.db._logs.length > 1000) App.db._logs = App.db._logs.slice(-1000);
    // do not call saveDB here to avoid recursion; assume caller will save
  } catch(e){}
}

/* ---- Backup system (auto-once-per-day + manual) ---- */
function backupList(){
  const list = [];
  try {
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.startsWith(LS_BACKUP_PREFIX)){
        const date = k.slice(LS_BACKUP_PREFIX.length);
        let size = 0;
        try { size = localStorage.getItem(k).length; } catch(e){}
        list.push({ key:k, date, size });
      }
    }
  } catch(e){}
  return list.sort((a,b) => b.date.localeCompare(a.date));
}
function backupCreate(label){
  if(!App.db) return null;
  const today = td();
  const tag = label || today;
  const key = LS_BACKUP_PREFIX + tag;
  try {
    const data = {
      ts: Date.now(),
      version: 'v3',
      room: (App.cfg && App.cfg.roomCode) || 'local',
      db: App.db
    };
    localStorage.setItem(key, JSON.stringify(data));
    // keep last 7
    const all = backupList();
    if(all.length > 7){
      all.slice(7).forEach(b => {
        try { localStorage.removeItem(b.key); } catch(e){}
      });
    }
    try { localStorage.setItem(LS_BACKUP_LAST, today); } catch(e){}
    return key;
  } catch(e){
    console.warn('backup failed', e);
    return null;
  }
}
function backupAutoIfNeeded(){
  try {
    if(!App.db) return;
    const last = localStorage.getItem(LS_BACKUP_LAST) || '';
    if(last === td()) return;
    backupCreate(td());
  } catch(e){}
}
async function backupRestore(key){
  try {
    const raw = localStorage.getItem(key);
    if(!raw) { toast('找不到備份','danger'); return false; }
    const obj = JSON.parse(raw);
    if(!obj || !obj.db) { toast('備份格式錯誤','danger'); return false; }
    const ok = await confirmDlg('還原這份備份？目前的資料會被覆蓋（建議先匯出）',
      { danger:true, title:'⚠ 確認還原 ' + (key.slice(LS_BACKUP_PREFIX.length)) });
    if(!ok) return false;
    App.db = Object.assign(defaultDB(), obj.db);
    logOp('restore','還原備份 ' + key);
    saveDB(); Sync.setNode('', App.db); bcNotify();
    toast('已還原','success');
    rerender();
    return true;
  } catch(e){
    toast('還原失敗：' + e.message,'danger');
    return false;
  }
}

    if(!raw) return null;

    return v1;

async function importFromV1(){

  const cnt = (v1.students||[]).length + ' 學生／' + (v1.attendance||[]).length + ' 出席';

  if(!App.db) App.db = defaultDB();
  // shallow merge
  ['students','attendance','assignments','submissions','leaves','announcements','evals','feeds','messages','groups'].forEach(k => {
    if(Array.isArray(v1[k])) {
      const existing = new Set((App.db[k]||[]).map(x => x.id).filter(Boolean));

  saveDB(); Sync.setNode('', App.db); bcNotify();

/* ---- Storage usage ---- */
function storageUsage(){
  let total = 0;
  let cms = 0;
  try {
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      const v = localStorage.getItem(k) || '';
      const size = k.length + v.length;
      total += size;
      if(k.startsWith(LS_KEY)) cms += size;
    }
  } catch(e){}
  // browsers usually allow 5MB
  const LIMIT = 5 * 1024 * 1024;
  return {
    total, cms, limit:LIMIT,
    pct: Math.min(100, Math.round(100 * total / LIMIT))
  };
}
function fmtBytes(n){
  if(n < 1024) return n + ' B';
  if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}

/* ---- Drag & drop global ---- */
function initDragDrop(){
  if(App._dragInit) return; App._dragInit = true;
  let counter = 0;
  let overlay = null;
  function showOverlay(){
    if(overlay) return;
    overlay = el('div', { class:'drop-zone' },
      el('div', { class:'icn' }, '📁'),
      el('div', null, '放開以匯入 JSON / CSV')
    );
    document.body.appendChild(overlay);
  }
  function hideOverlay(){
    if(overlay){ overlay.remove(); overlay = null; }
  }
  window.addEventListener('dragenter', e => {
    if(!App.cfg || !App.session) return;
    if(!e.dataTransfer || !Array.from(e.dataTransfer.types||[]).includes('Files')) return;
    counter++;
    showOverlay();
  });
  window.addEventListener('dragover', e => {
    if(!App.cfg || !App.session) return;
    e.preventDefault();
  });
  window.addEventListener('dragleave', e => {
    counter--;
    if(counter <= 0){ counter = 0; hideOverlay(); }
  });
  window.addEventListener('drop', async e => {
    if(!App.cfg || !App.session) return;
    e.preventDefault();
    counter = 0; hideOverlay();
    if(App.session.role !== 'teacher') { toast('僅老師可匯入','warn'); return; }
    const files = Array.from(e.dataTransfer.files || []);
    if(!files.length) return;
    const f = files[0];
    if(f.name.toLowerCase().endsWith('.json')) await importFullJSON(f);
    else if(f.name.toLowerCase().endsWith('.csv')) await importStudentsCSVFile(f);
    else toast('僅支援 JSON / CSV','warn');
  });
}

async function importStudentsCSVFile(file){
  try {
    const text = await file.text();
    const lines = text.split(/\r?\n/).filter(Boolean);
    if(!lines.length) { toast('CSV 為空','warn'); return; }
    // skip BOM and header heuristically
    const startIdx = (lines[0].includes('姓名') || lines[0].toLowerCase().includes('name')) ? 1 : 0;
    const added = [];
    for(let i = startIdx; i < lines.length; i++){
      const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
      const name = cols[0]; if(!name) continue;
      added.push({
        id:nid(), name,
        seat:cols[1]||'', cls:cols[2]||'',
        email:cols[3]||'', phone:cols[4]||'', note:cols[5]||'',
        ts:Date.now()
      });
    }
    if(!added.length){ toast('沒有有效資料','warn'); return; }
    const ok = await confirmDlg('從 CSV 匯入 ' + added.length + ' 位學生？');
    if(!ok) return;
    App.db.students.push(...added);
    logOp('import','CSV 匯入 ' + added.length + ' 學生');
    saveDB(); Sync.setMap('students', App.db.students); bcNotify();
    toast('已匯入 ' + added.length + ' 學生','success');
    rerender();
  } catch(e){
    toast('CSV 解析失敗：' + e.message, 'danger');
  }
}

  if(h >= 5 && h < 11) return '早安';
  if(h >= 11 && h < 14) return '中午好';
  if(h >= 14 && h < 18) return '午安';

/* ---- Keyboard shortcut sequence (g+s, g+a, g+o, c, l) ---- */
function initKeyShortcuts(){
  if(App._keyInit) return; App._keyInit = true;
  let buf = ''; let bufT = 0;
  document.addEventListener('keydown', e => {
    if(!App.session || !App.cfg) return;
    const tag = (e.target && e.target.tagName) || '';
    if(/INPUT|TEXTAREA|SELECT/.test(tag)) return;
    if(e.ctrlKey || e.metaKey || e.altKey) return;

    // Esc closes modal
    if(e.key === 'Escape'){
      const host = $('#modal-host');
      if(host && host.firstChild){ host.innerHTML = ''; return; }
    }

    const now = Date.now();
    if(now - bufT > 1000) buf = '';
    bufT = now;
    const k = (e.key || '').toLowerCase();

    if(App.session.role === 'teacher'){
      if(buf === 'g'){
        buf = '';
        if(k === 's'){ e.preventDefault(); go('students'); return; }
        if(k === 'a'){ e.preventDefault(); go('assignments'); return; }
        if(k === 'o'){ e.preventDefault(); go('overview'); return; }
        if(k === 'q'){ e.preventDefault(); go('qr'); return; }
        if(k === 'g'){ e.preventDefault(); go('grades'); return; }
        return;
      }
      if(k === 'g'){ buf = 'g'; return; }
      if(k === '?'){ e.preventDefault(); openShortcutHelp(); return; }
      if(k === '/'){ e.preventDefault(); openCmdPalette(); return; }
    } else {
      if(k === 'c'){ e.preventDefault(); go('checkin'); return; }
      if(k === 'l'){ e.preventDefault(); go('myleave'); return; }
      if(k === '?'){ e.preventDefault(); openShortcutHelp(); return; }
    }
  });
}

function rAnHeatmap(content){
  // student × last-30-days
  const dates = [];
  for(let i = 29; i >= 0; i--){
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }
  content.appendChild(el('h2', null, '🔥 30 日出席熱圖'));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'10px'} },
    '🟦 深=多次簽到 · 🟥 淡紅=缺席 · 🟪 紫=請假'));
  if(App.db.students.length === 0){
    content.appendChild(emptyState({ icon:'👥', title:'尚無學生', msg:'加入學生後即可看到熱圖',
      actions:[['＋ 加入學生', ()=> go('students')]] }));
    return;
  }
  // map student -> date -> attendance count + leave?
  const attMap = {};
  App.db.attendance.forEach(a => {
    const k = a.studentId + '|' + a.date;
    attMap[k] = (attMap[k] || 0) + 1;
  });
  const leaveSet = new Set(App.db.leaves
    .filter(l => l.status === 'approved' || l.status === 'pending')
    .map(l => l.studentId + '|' + l.date));

  const wrap = el('div', { class:'card heatmap', style:{padding:'8px 12px'} });
  // header row with month markers
  const hdr = el('div', { class:'heatmap-row' });
  hdr.appendChild(el('div', { class:'lbl' }, ''));
  const cellsHdr = el('div', { class:'cells' });
  dates.forEach((ds,i) => {
    const lbl = (i === 0 || ds.slice(8) === '01') ? ds.slice(5,7) + '月' : '';
    const c = el('div', { style:{width:'18px',fontSize:'9px',color:'var(--text-faint)',textAlign:'center'} }, lbl);
    cellsHdr.appendChild(c);
  });
  hdr.appendChild(cellsHdr);
  wrap.appendChild(hdr);

  App.db.students.slice(0, 60).forEach(s => {
    const row = el('div', { class:'heatmap-row' });
    row.appendChild(el('div', { class:'lbl', title:s.name }, s.name));
    const cells = el('div', { class:'cells' });
    dates.forEach(ds => {
      const k = s.id + '|' + ds;
      const ct = attMap[k] || 0;
      let cls = '';
      if(leaveSet.has(k)) cls = 'leave';
      else if(ct === 0) cls = 'abs';
      else if(ct === 1) cls = 'l2';
      else if(ct === 2) cls = 'l3';
      else if(ct >= 3) cls = 'l4';
      const c = el('div', { class:'hcell ' + cls, title: s.name + ' · ' + ds + ' · ' + (ct?(ct+'次'):(leaveSet.has(k)?'請假':'未簽')) });
      cells.appendChild(c);
    });
    row.appendChild(cells);
    wrap.appendChild(row);
  });
  content.appendChild(wrap);

  // legend
  const legend = el('div', { class:'flex small muted', style:{marginTop:'10px',gap:'12px',flexWrap:'wrap'} });
  [
    ['未簽','abs'],['請假','leave'],['1次','l2'],['2次','l3'],['3+','l4']
  ].forEach(([t,cls]) => {
    legend.appendChild(el('span', { class:'flex', style:{alignItems:'center',gap:'4px'} },
      el('span', { class:'hcell '+cls, style:{display:'inline-block'} }),
      el('span', null, t)
    ));
  });
  content.appendChild(legend);
}

function rAnRisk(content){
  content.appendChild(el('h2', null, '⚠ 風險預警'));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'10px'} },
    '依出席率、繳交率、平均分自動計算風險指數'));

  const rows = App.db.students.map(s => {
    const att = attendanceRate(s.id);
    const sub = submissionRate(s.id);
    const avg = submissionAvg(s.id);
    let risk = 0; const reasons = [];
    if(att < 60){ risk += 40; reasons.push('出席率 '+att+'%'); }
    else if(att < 75){ risk += 20; reasons.push('出席偏低 '+att+'%'); }
    if(sub < 50){ risk += 30; reasons.push('繳交率 '+sub+'%'); }
    else if(sub < 70){ risk += 15; reasons.push('繳交偏低 '+sub+'%'); }
    if(avg && avg < 60){ risk += 30; reasons.push('作業平均 '+avg); }
    else if(avg && avg < 70){ risk += 15; reasons.push('作業偏低 '+avg); }
    return { s, risk, reasons };
  }).filter(r => r.risk >= 15).sort((a,b) => b.risk - a.risk);

  if(!rows.length){
    content.appendChild(emptyState({icon:'✨',title:'目前沒有風險學生',msg:'所有學生表現都不錯！'}));
    return;
  }
  const card = el('div', { class:'card', style:{marginTop:'10px'} });
  rows.forEach(r => {
    const level = r.risk >= 60 ? 'danger' : r.risk >= 35 ? 'warn' : 'primary';
    const row = el('div', { class:'list-row' });
    row.appendChild(el('div', { class:'avatar', style:{background:'var(--'+level+'-soft)',color:'var(--'+level+')'} }, '⚠'));
    row.appendChild(el('div', { class:'info' },

function rAnReliab(content){
  content.appendChild(el('h2', null, '📊 互評可靠度'));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'10px'} },
    '比較學生互評的分數與最終批改分數的偏離（偏離越大，可靠度越低）'));

  // evals: assume each is {id, raterId, targetId, score, ts, type?}
  const evals = (App.db.evals || []).filter(e => typeof e.score === 'number' && e.raterId && e.targetId);
  if(!evals.length){
    content.appendChild(emptyState({icon:'⭐',title:'尚無互評資料'}));
    return;
  }
  // group by rater, compute avg deviation vs final
  const byRater = {};
  evals.forEach(e => {
    if(!byRater[e.raterId]) byRater[e.raterId] = [];
    byRater[e.raterId].push(e);
  });
  const rows = Object.keys(byRater).map(rid => {
    const list = byRater[rid];
    let totalDev = 0, n = 0;
    list.forEach(e => {
      const final = calcGrade(e.targetId).total;
      if(typeof e.score === 'number'){
        totalDev += Math.abs(e.score - final);
        n++;
      }
    });
    const s = findStudent(rid);
    const dev = n ? Math.round(totalDev / n) : 0;
    const reliab = Math.max(0, 100 - dev * 2);
    return { s, dev, n, reliab };
  }).filter(r => r.s).sort((a,b) => b.reliab - a.reliab);

  if(!rows.length){
    content.appendChild(emptyState({icon:'⭐',title:'尚無有效互評'}));
    return;
  }
  const card = el('div', { class:'card', style:{marginTop:'10px'} });
  rows.forEach(r => {
    const cls = r.reliab>=80?'success':r.reliab>=60?'primary':'warn';
    const row = el('div', { class:'bar-row' },
      el('div', { class:'lab' }, r.s.name + '  ('+r.n+'評)'),
      el('div', { class:'bar-wrap' }, el('div', { class:'bar', style:{
        width: r.reliab+'%',
        background: 'var(--'+cls+')'
      }})),
      el('div', { class:'val' }, r.reliab + '%')
    );
    card.appendChild(row);
  });
  content.appendChild(card);
}

function rAnPattern(content){
  content.appendChild(el('h2', null, '📅 出席模式'));
  content.appendChild(el('div', { class:'muted small', style:{marginBottom:'10px'} },
    '分析每週各天的出席率，找出常被「翹掉」的日子'));

  // count signed students per day-of-week
  const days = ['週日','週一','週二','週三','週四','週五','週六'];
  const dayCount = [0,0,0,0,0,0,0];
  const dayPresent = [0,0,0,0,0,0,0];
  // unique date+dayOfWeek
  const seenDates = new Set();
  App.db.attendance.forEach(a => {
    if(!a.date) return;
    seenDates.add(a.date);
  });
  // also include any leave dates to count "had class"
  App.db.leaves.forEach(l => { if(l.date) seenDates.add(l.date); });

  const total = App.db.students.length || 1;
  seenDates.forEach(ds => {
    const d = new Date(ds + 'T00:00');
    const dow = d.getDay();
    dayCount[dow] += total; // possible slots
    const signed = new Set(App.db.attendance.filter(a => a.date === ds).map(a => a.studentId));
    dayPresent[dow] += signed.size;
  });

  const data = days.map((lbl,i) => ({
    label: lbl,
    value: dayCount[i] ? Math.round(100 * dayPresent[i] / dayCount[i]) : 0
  }));
  const card = el('div', { class:'chart-card', style:{marginTop:'10px'} });
  card.appendChild(el('h3', null, '各週天出席率'));
  card.innerHTML += barChart(data, { max:100,
    colors: data.map(d => d.value < 60 ? 'var(--danger)' : d.value < 80 ? 'var(--warn)' : 'var(--success)') });
  content.appendChild(card);

  // most-absent date list
  const dateAbs = {};
  Array.from(seenDates).forEach(ds => {
    const signed = new Set(App.db.attendance.filter(a => a.date === ds).map(a => a.studentId));
    const onLeave = new Set(App.db.leaves.filter(l => l.date === ds && (l.status==='approved'||l.status==='pending')).map(l => l.studentId));
    const abs = total - signed.size - onLeave.size;
    dateAbs[ds] = abs;
  });
  const topAbs = Object.entries(dateAbs).filter(([d,n]) => n > 0).sort((a,b) => b[1] - a[1]).slice(0, 10);
  if(topAbs.length){
    const card2 = el('div', { class:'card', style:{marginTop:'12px'} });
    card2.appendChild(el('h3', null, '🔻 缺席最多的日期'));
    topAbs.forEach(([ds, n]) => {
      const row = el('div', { class:'list-row' });
      row.appendChild(el('div', { class:'info' },
        el('div', { class:'name' }, ds),
        el('div', { class:'sub' }, days[new Date(ds+'T00:00').getDay()])
      ));
      row.appendChild(el('span', { class:'tag t-danger' }, n + ' 人缺席'));
      card2.appendChild(row);
    });
    content.appendChild(card2);
  }
}

function rLogs(content){
  content.appendChild(el('h1', null, '📜 操作紀錄'));

  const logs = (App.db._logs || []).slice().reverse();
  const types = Array.from(new Set(logs.map(l => l.type))).sort();

  // filter
  if(!App._logFilter) App._logFilter = { type:'', q:'' };
  const ctrl = el('div', { class:'flex', style:{flexWrap:'wrap',gap:'8px',marginBottom:'10px'} });
  const sel = el('select', { class:'select', style:{flex:'0 0 140px'}, onchange: e => { App._logFilter.type = e.target.value; rerender(); }});
  sel.appendChild(el('option', { value:'' }, '所有類型'));
  types.forEach(t => {
    const o = el('option', { value:t }, t);
    if(App._logFilter.type === t) o.setAttribute('selected','');
    sel.appendChild(o);
  });
  ctrl.appendChild(sel);
  const iQ = el('input', { class:'input', style:{flex:'1',minWidth:'120px'}, placeholder:'搜尋…', value: App._logFilter.q });
  iQ.addEventListener('input', e => { App._logFilter.q = e.target.value; setTimeout(()=> { rerender(); setTimeout(()=> { const ii = $('input[placeholder="搜尋…"]'); if(ii){ ii.focus(); ii.setSelectionRange(ii.value.length, ii.value.length); } }, 30); }, 80); });
  ctrl.appendChild(iQ);
  ctrl.appendChild(el('button', { class:'btn no-print', onclick: ()=> {
    const rows = [['時間','類型','人','內容']];
    logs.forEach(l => rows.push([fmtDateTime(l.ts), l.type, l.who, l.msg]));
    downloadCSV(rows, 'logs_' + td() + '.csv');
  }}, '⬇ CSV'));
  ctrl.appendChild(el('button', { class:'btn no-print', onclick: ()=> printCurrent() }, '🖨 列印'));
  ctrl.appendChild(el('button', { class:'btn btn-danger no-print', onclick: async ()=> {
    const ok = await confirmDlg('清空所有操作紀錄？', { danger:true });
    if(!ok) return;
    App.db._logs = []; saveDB(); rerender(); toast('已清空','success');
  }}, '🗑 清空'));
  content.appendChild(ctrl);

  const filtered = logs.filter(l => {
    if(App._logFilter.type && l.type !== App._logFilter.type) return false;
    if(App._logFilter.q){
      const q = App._logFilter.q.toLowerCase();
      const hay = (l.type+' '+l.msg+' '+(l.who||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  if(!filtered.length){
    content.appendChild(emptyState({icon:'📜',title:'尚無紀錄'}));

function buildSubmissionForm(asg, me, existing){
  const overdue = isAssignmentOverdue(asg);
  const card = el('div', { class:'card', style:{marginTop:'10px'} });
  card.appendChild(el('h3', null, '📤 ' + (overdue?'(已逾期) ':'') + (existing?'修改繳交':'繳交作業')));

  const fT = el('div', { class:'field' });
  fT.appendChild(el('label', { class:'label' }, '文字內容（可選）'));
  const iT = el('textarea', { class:'textarea', placeholder:'寫下你的回答...' });
  if(existing && existing.text) iT.value = existing.text;
  fT.appendChild(iT); card.appendChild(fT);

  const fL = el('div', { class:'field' });
  fL.appendChild(el('label', { class:'label' }, '連結（可選）'));
  const iL = el('input', { class:'input', placeholder:'https://...', value: (existing && existing.link) || '' });
  fL.appendChild(iL); card.appendChild(fL);

  // multi-file
  const fF = el('div', { class:'field' });
  fF.appendChild(el('label', { class:'label' }, '檔案（最多 5 個，每個 ≤ 50MB）'));
  let attaches = existing ? (existing.attaches || (existing.attach?[existing.attach]:[])).slice() : [];
  const upBox = el('div', { class:'upload-area' });
  const fInp = el('input', { type:'file', multiple:'multiple', style:{display:'none'} });
  function refresh(){
    upBox.innerHTML = '';
    if(attaches.length){
      attaches.forEach((a,idx) => {
        const chip = el('div', { class:'mfile-chip' },
          el('span', null, '📎'),
          el('span', { class:'nm', title:a.name }, a.name),
          el('span', { class:'x', onclick: e => {
            e.stopPropagation();
            const removed = attaches.splice(idx,1)[0];
            if(removed) attachDelete(removed);
            refresh();
          }}, '✗')
        );
        upBox.appendChild(chip);
      });
      if(attaches.length < 5){
        upBox.appendChild(el('div', { class:'small muted', style:{marginTop:'6px',cursor:'pointer'} }, '＋ 再加一個'));
      }
    } else {
      upBox.appendChild(el('div', null, '點此選擇檔案'));
      upBox.appendChild(el('div', { class:'tiny muted' }, '上限 50MB · 最多 5 個 (PDF / Word / 圖片)'));
    }
  }
  fInp.addEventListener('change', async e => {
    const files = Array.from(e.target.files || []);
    for(const file of files){
      if(attaches.length >= 5){ toast('最多 5 個檔案','warn'); break; }
      try {
        const data = await attachUpload(file);
        if(data) attaches.push(data);
      } catch(err){ toast(err.message,'danger'); }
    }
    fInp.value = '';
    refresh();
  });
  upBox.addEventListener('click', ()=> fInp.click());
  fF.appendChild(upBox); fF.appendChild(fInp); card.appendChild(fF);
  refresh();

  card.appendChild(el('div', { class:'flex', style:{marginTop:'10px',gap:'8px'} },
    el('button', { class:'btn btn-primary', style:{flex:'1'}, onclick:()=> {
      const txt = iT.value.trim();
      const lnk = iL.value.trim();
      if(!txt && !lnk && !attaches.length) return toast('至少填一項內容','danger');
      if(existing){
        // update
        existing.text = txt; existing.link = lnk;
        existing.attaches = attaches.slice();
        existing.attach = attaches[0] || null;
        existing.ts = Date.now();
        logOp('submit','修改繳交：' + asg.title);
        saveDB(); Sync.push('submissions', existing); bcNotify();
        toast('已更新','success');
        App._editSub = null;
        rerender();
        return;
      }
      const rec = {
        id: nid(), assignmentId: asg.id,
        studentId: me.id, studentName: me.name,
        text: txt, link: lnk,
        attaches: attaches.slice(),
        attach: attaches[0] || null,
        ts: Date.now()
      };
      App.db.submissions.push(rec);
      logOp('submit','繳交：' + asg.title);
      saveDB(); Sync.push('submissions', rec); bcNotify();
      toast('已繳交！','success'); rerender();
    }}, existing?'💾 儲存修改':'✅ 送出繳交'),
    existing ? el('button', { class:'btn', onclick:()=> { App._editSub = null; rerender(); } }, '取消') : null
  ));
  return card;
}

/* ════════════════════════════════════════════════════════════
   BATCH 1 ▒▒  PEER EVALUATIONS  (rPeer / rSPeer)
   ────────────────────────────────────────────────────────────
   DB.peerEvals = [{
     id, title, desc, dueDate, scope:'class'|'group'|'custom',
     targetCls, targetGroupId, targetStudentIds (array),
     dimensions:[{key, label}],
     status:'open'|'closed',
     scores:[{ raterId, rateeId, dims:{key:1-5}, comment, anonymous, ts }],
     createdBy, createdAt
   }]
   ──────────────────────────────────────────────────────────── */

function peerEvalIsDueClosed(pe){
  if(pe.status === 'closed') return true;
  if(pe.dueDate){
    const due = new Date(pe.dueDate + 'T23:59:59').getTime();
    if(Date.now() > due) return true;
  }
  return false;
}

function peerEvalRatees(pe, me){
  // Returns list of student records the given rater (me) should rate.
  if(!me) return [];
  let pool = App.db.students.slice();
  if(pe.scope === 'class' && pe.targetCls){
    pool = pool.filter(s => (s.cls||'') === pe.targetCls);
  } else if(pe.scope === 'group' && pe.targetGroupId){
    const g = App.db.groups.find(x => x.id === pe.targetGroupId);
    const ids = new Set((g && g.memberIds) || []);
    pool = pool.filter(s => ids.has(s.id));
  } else if(pe.scope === 'custom' && Array.isArray(pe.targetStudentIds)){
    const ids = new Set(pe.targetStudentIds);
    pool = pool.filter(s => ids.has(s.id));
  }
  // Exclude self by default
  return pool.filter(s => s.id !== me.id);
}

function peerEvalAggregate(pe){
  // Returns { rateeId: { name, count, perDim:{key:avg}, total } }
  const out = {};
  (pe.scores || []).forEach(sc => {
    if(!sc.rateeId) return;
    if(!out[sc.rateeId]){
      const s = App.db.students.find(x => x.id === sc.rateeId);
      out[sc.rateeId] = { name: s ? s.name : '?', cls: s ? s.cls : '', count:0, sums:{}, perDim:{}, scoresPerDim:{} };
    }
    out[sc.rateeId].count++;
    (pe.dimensions || []).forEach(d => {
      const v = sc.dims && typeof sc.dims[d.key] === 'number' ? sc.dims[d.key] : null;
      if(v == null) return;
      out[sc.rateeId].sums[d.key] = (out[sc.rateeId].sums[d.key] || 0) + v;
      if(!out[sc.rateeId].scoresPerDim[d.key]) out[sc.rateeId].scoresPerDim[d.key] = [];
      out[sc.rateeId].scoresPerDim[d.key].push(v);
    });
  });
  Object.values(out).forEach(o => {
    let total = 0, n = 0;
    (pe.dimensions || []).forEach(d => {
      const list = o.scoresPerDim[d.key] || [];
      if(list.length){
        o.perDim[d.key] = list.reduce((a,b)=>a+b,0) / list.length;
        total += o.perDim[d.key]; n++;
      }
    });
    o.total = n ? (total / n) : 0;
  });
  return out;
}

function peerEvalDetectOutliers(pe){
  // For each ratee, mark scores that are more than 2 stdev from mean per dim
  // Returns Set of "raterId:rateeId" keys with anomalies
  const out = new Set();
  if(!pe.scores || pe.scores.length < 3) return out;
  (pe.dimensions || []).forEach(d => {
    // group by ratee
    const byRatee = {};
    pe.scores.forEach(sc => {
      const v = sc.dims && typeof sc.dims[d.key] === 'number' ? sc.dims[d.key] : null;
      if(v == null) return;
      if(!byRatee[sc.rateeId]) byRatee[sc.rateeId] = [];
      byRatee[sc.rateeId].push({ raterId: sc.raterId, v });
    });
    Object.values(byRatee).forEach(arr => {
      if(arr.length < 3) return;
      const mean = arr.reduce((a,b)=>a+b.v,0) / arr.length;
      const sd = Math.sqrt(arr.reduce((a,b)=>a + Math.pow(b.v-mean,2), 0) / arr.length);
      if(sd < 0.1) return;
      arr.forEach(x => {
        if(Math.abs(x.v - mean) > 2*sd){
          // store with rater id only for AI inspect
          out.add(x.raterId);
        }
      });
    });
  });
  return out;
}

function rPeer(content){
  // Teacher view: list / create / detail of peer eval tasks
  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'14px',flexWrap:'wrap',gap:'8px'} },

    el('button', { class:'btn btn-primary', onclick: openPeerEvalCreator }, '＋ 新增互評')
  ));

  if(App.subview && App.subview.startsWith('p_')){
    const pid = App.subview.slice(2);
    const pe = App.db.peerEvals.find(x => x.id === pid);
    if(pe) return rPeerDetail(content, pe);
  }

  const list = App.db.peerEvals.slice().sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
  if(!list.length){
    content.appendChild(el('div', { class:'empty', style:{padding:'40px 20px'} },
      el('div', { class:'ico', style:{fontSize:'48px'} }, '⭐'),
      el('div', null, '還沒有互評任務'),
      el('div', { class:'tiny muted', style:{marginTop:'6px'} }, '點右上「新增互評」開始')
    ));
    return;
  }

  // 渲染單一互評任務卡（共用）
  function renderPeerCard(pe){
    const closed = peerEvalIsDueClosed(pe);
    const card = el('div', { class:'pe-task-card ' + (closed?'closed':'open'), onclick: ()=> go('peer', 'p_'+pe.id) });
    const head = el('div', { class:'pe-task-head' },
      el('h3', null, pe.title || '未命名互評'),
      el('span', { class:'pe-pill ' + (closed?'closed':'open') }, closed ? '已結束' : '進行中')
    );
    card.appendChild(head);
    if(pe.desc) card.appendChild(el('div', { class:'small muted' }, pe.desc));
    const meta = [];
    meta.push((pe.dimensions||[]).length + ' 個維度');
    meta.push((pe.scores||[]).length + ' 筆回應');
    if(pe.dueDate) meta.push('截止 ' + pe.dueDate);
    card.appendChild(el('div', { class:'tiny muted' }, meta.join(' · ')));
    return card;
  }

  // 分組鍵：scope='class' → targetCls；'group' → '__group__'；'custom' → '__custom__'
  function groupKeyOf(pe){
    if(pe.scope === 'class') return pe.targetCls || '未分班';
    if(pe.scope === 'group') return '__group__';
    if(pe.scope === 'custom') return '__custom__';
    return '其他';
  }
  function groupLabelOf(key){
    if(key === '__group__') return '👥 群組指派';
    if(key === '__custom__') return '✍️ 自定指派';
    return '🏫 ' + key;
  }

  App._peerExpandedCls = App._peerExpandedCls || {};
  // 收集所有分組鍵；班級放前、群組/自定放後
  const allKeys = [...new Set(list.map(pe => groupKeyOf(pe)))];
  const classKeys = allKeys.filter(k => k !== '__group__' && k !== '__custom__').sort();
  const specialKeys = allKeys.filter(k => k === '__group__' || k === '__custom__');
  const groupKeys = classKeys.concat(specialKeys);

  if(groupKeys.length > 1){
    const toolbar = el('div', { class:'flex no-print', style:{margin:'4px 0 10px',gap:'6px',justifyContent:'flex-end'} },
      el('button', { class:'btn btn-sm', onclick:()=> {
        groupKeys.forEach(c => { App._peerExpandedCls[c] = true; });
        rerender();
      }}, '全部展開 ▼'),
      el('button', { class:'btn btn-sm', onclick:()=> {
        groupKeys.forEach(c => { App._peerExpandedCls[c] = false; });
        rerender();
      }}, '全部收合 ▲')
    );
    content.appendChild(toolbar);
  }

  groupKeys.forEach(key => {
    const inGroup = list.filter(pe => groupKeyOf(pe) === key);
    const openCount = inGroup.filter(pe => !peerEvalIsDueClosed(pe)).length;
    const closedCount = inGroup.length - openCount;

    const isExpanded = App._peerExpandedCls[key] !== false;

    const header = el('div', { class:'cls-section-header', style:{
      padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',
      background:'var(--surface-2)',borderRadius: isExpanded ? '8px 8px 0 0' : '8px',
      marginTop:'10px',marginBottom: isExpanded ? '0' : '4px',
      transition:'background .15s'
    }, onclick:()=> {
      App._peerExpandedCls[key] = !isExpanded;
      rerender();
    }});
    header.appendChild(el('span', { style:{fontSize:'13px',display:'inline-block',transform: isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)',transition:'transform .2s'} }, '▼'));
    header.appendChild(el('div', { style:{flex:'1',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'} },
      el('span', { style:{fontWeight:'700',fontSize:'15px'} }, groupLabelOf(key)),
      el('span', { class:'small muted' }, '（' + inGroup.length + ' 件）')
    ));
    header.appendChild(el('div', { class:'flex', style:{gap:'6px',flexWrap:'wrap',alignItems:'center'} },
      openCount > 0 ? el('span', { class:'pill', style:{background:'var(--success-soft)',color:'var(--success)',fontSize:'11px',fontWeight:'700'} }, '🔵 進行 ' + openCount) : null,
      closedCount > 0 ? el('span', { class:'pill', style:{background:'var(--surface)',color:'var(--text-muted)',fontSize:'11px',fontWeight:'700'} }, '⚫ 結束 ' + closedCount) : null
    ));
    content.appendChild(header);

    if(isExpanded){
      const body = el('div', { style:{border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',borderTop:'none',background:'var(--surface)',marginBottom:'8px',padding:'12px'} });
      const grid = el('div', { class:'grid', style:{gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'12px'} });
      inGroup.forEach(pe => grid.appendChild(renderPeerCard(pe)));
      body.appendChild(grid);
      content.appendChild(body);
    }
  });
}

function rSPeer(content){
  const me = currentStudent();
  if(!me){
    content.appendChild(el('div', { class:'empty' }, '請先登入'));
    return;
  }
  content.appendChild(el('h1', { style:{marginBottom:'10px'} }, '⭐ 我的互評任務'));

  // detail view
  if(App.subview && App.subview.startsWith('p_')){
    const pid = App.subview.slice(2);
    const pe = App.db.peerEvals.find(x => x.id === pid);
    if(pe) return rSPeerDetail(content, pe, me);
  }

  // list: tasks that include me as a ratee/rater scope
  const all = (App.db.peerEvals || []).filter(pe => {
    // I am part of the ratees pool (= someone else can rate me OR I can rate them)
    const ratees = peerEvalRatees(pe, me);
    return ratees.length > 0;
  });

  if(!all.length){
    content.appendChild(el('div', { class:'empty', style:{padding:'40px 20px'} },
      el('div', { class:'ico', style:{fontSize:'48px'} }, '⭐'),
      el('div', null, '目前沒有互評任務'),
      el('div', { class:'tiny muted' }, '老師發佈後會在此顯示')
    ));
    return;
  }

  all.sort((a,b)=> {
    const ac = peerEvalIsDueClosed(a) ? 1 : 0;
    const bc = peerEvalIsDueClosed(b) ? 1 : 0;
    if(ac !== bc) return ac - bc;
    return (b.createdAt||0) - (a.createdAt||0);
  });

  const grid = el('div', { class:'grid', style:{gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'12px'} });
  all.forEach(pe => {
    const closed = peerEvalIsDueClosed(pe);
    const myCount = (pe.scores||[]).filter(s => s.raterId === me.id).length;
    const totalRatees = peerEvalRatees(pe, me).length;
    const card = el('div', { class:'pe-task-card ' + (closed?'closed':'open'), onclick: ()=> go('speer', 'p_'+pe.id) });
    card.appendChild(el('div', { class:'pe-task-head' },
      el('h3', null, pe.title),
      el('span', { class:'pe-pill ' + (closed?'closed':'open') }, closed ? '已結束' : '進行中')
    ));
    if(pe.desc) card.appendChild(el('div', { class:'small muted' }, pe.desc));
    const status = closed ? '已結束' : (myCount >= totalRatees ? '✅ 已完成' : (myCount > 0 ? '🟡 進行中 ('+myCount+'/'+totalRatees+')' : '⬜ 未開始'));
    card.appendChild(el('div', { class:'tiny' }, status + (pe.dueDate ? ' · 截止 '+pe.dueDate : '')));
    grid.appendChild(card);
  });
  content.appendChild(grid);
}

function rSPeerDetail(content, pe, me){
  content.appendChild(el('button', { class:'btn btn-sm', style:{marginBottom:'10px'}, onclick:()=> go('speer') }, '← 回任務列表'));

      (pe.dimensions||[]).length + ' 個維度 · ' +
      (closed ? '已結束' : '進行中')
    )
  ));

  // If closed → show my received average
  if(closed){
    const agg = peerEvalAggregate(pe);

    if(mine){
      const rcard = el('div', { class:'card', style:{padding:'14px',marginBottom:'12px'} });

      ));
      (pe.dimensions||[]).forEach(d => {
        const v = mine.perDim[d.key];
        if(v == null) return;
        rcard.appendChild(el('div', { class:'pe-dim-row' },
          el('span', { class:'label' }, d.label),
          el('span', { style:{fontWeight:'700',color:'var(--primary)'} }, v.toFixed(2))
        ));
      });
      content.appendChild(rcard);
    } else {
      content.appendChild(el('div', { class:'empty' }, '本次互評沒有收到評分'));
    }
    return;
  }

  // Open: list ratees
  const ratees = peerEvalRatees(pe, me);
  if(!ratees.length){
    content.appendChild(el('div', { class:'empty' }, '本次互評沒有可評對象'));
    return;
  }

  // Per-ratee rating card
  ratees.forEach(r => {
    const existing = (pe.scores||[]).find(sc => sc.raterId === me.id && sc.rateeId === r.id);
    const colorIdx = (r.id ? String(r.id).charCodeAt(0) : 0) % 8;
    const card = el('div', { class:'pe-ratee-card' });
    const head = el('div', { class:'pe-ratee-head' },
      el('div', { class:'pe-ratee-av av-color-' + colorIdx }, initials(r.name)),
      el('div', { class:'pe-ratee-name' }, r.name +
        (r.cls ? ' · ' + r.cls : '') +
        (r.seat ? ' · ' + r.seat + '號' : '')
      ),
      existing ? el('span', { class:'pe-done-tag' }, '已評') : null
    );
    card.appendChild(head);

    // dims
    const formDims = {};
    (pe.dimensions||[]).forEach(d => {
      const cur = existing ? (existing.dims[d.key] || 0) : 0;
      formDims[d.key] = cur;
      const row = el('div', { class:'pe-dim-row' });
      row.appendChild(el('span', { class:'label' }, d.label));
      const bar = el('div', { class:'pe-star-bar' });
      [1,2,3,4,5].forEach(n => {
        const star = el('div', { class:'pe-star' + (n <= cur ? ' active' : '') }, '★');
        star.addEventListener('click', ()=> {
          formDims[d.key] = n;
          // re-render bar
          Array.from(bar.children).forEach((c,i)=> {
            c.classList.toggle('active', (i+1) <= n);
          });
        });
        bar.appendChild(star);
      });
      row.appendChild(bar);
      card.appendChild(row);
    });

    // comment + anon
    const cmtRow = el('div', { class:'field', style:{margin:'6px 0'} });
    const cmtIn = el('textarea', { class:'textarea', rows:'2', placeholder:'（選填）給對方的評語',
      value: existing ? (existing.comment||'') : '' });
    cmtRow.appendChild(cmtIn);
    card.appendChild(cmtRow);

    const anonRow = el('label', { class:'remember-row' });
    const anonChk = el('input', { type:'checkbox' });
    if(!existing || existing.anonymous) anonChk.checked = true;
    anonRow.appendChild(anonChk);
    anonRow.appendChild(document.createTextNode(' 匿名提交'));
    card.appendChild(anonRow);

    card.appendChild(el('button', { class:'btn btn-primary btn-sm', style:{marginTop:'6px'}, onclick: ()=> {
      const someZero = (pe.dimensions||[]).some(d => !formDims[d.key]);
      if(someZero){ toast('每個維度都要評分','danger'); return; }
      // upsert
      const idx = (pe.scores || []).findIndex(s => s.raterId === me.id && s.rateeId === r.id);
      const rec = {
        raterId: me.id, rateeId: r.id,
        dims: Object.assign({}, formDims),
        comment: cmtIn.value.trim(),
        anonymous: anonChk.checked,
        ts: Date.now()
      };
      if(idx >= 0) pe.scores[idx] = rec;
      else (pe.scores = pe.scores || []).push(rec);
      saveDB();
      if(typeof Sync !== 'undefined' && Sync.push) Sync.push('peerEvals', pe);
      if(typeof bcNotify === 'function') bcNotify();
      toast('已送出對 ' + r.name + ' 的評分','success');
      rerender();
    }}, existing ? '💾 更新評分' : '✅ 送出評分'));
    content.appendChild(card);
  });
}

/* ════════════════════════════════════════════════════════════
   BATCH 1 ▒▒  SEAT MATRIX  (rMatrix)
   ────────────────────────────────────────────────────────────
   Visual seat map per class. Each cell = student card with
   today's attendance status. Tap to cycle status.
   ──────────────────────────────────────────────────────────── */

function matrixCurrentStatus(stuId){
  const att = studentSignedToday(stuId);
  if(att){
    // try detect 'late' via lateMinutes
    const lateMin = App.db.settings.lateMinutes || 10;
    const start = App.db.settings.startTime || '08:00';
    const [sh, sm] = start.split(':').map(Number);
    const lateThreshold = sh*60 + sm + lateMin;
    if(att.time){
      const [h,m] = att.time.split(':').map(Number);
      if(h*60+m > lateThreshold) return 'late';
    }
    if(att.status === 'late') return 'late';
    return 'present';
  }
  if(studentOnLeaveToday(stuId)) return 'leave';
  return 'absent';
}

function matrixSetStatus(stuId, status){
  const s = findStudent(stuId);
  if(!s) return;
  const today = td();
  // Remove existing attendance for today
  App.db.attendance = App.db.attendance.filter(a => !(a.studentId === stuId && a.date === today));
  // Remove today's leave too if not 'leave'
  if(status !== 'leave'){
    App.db.leaves = App.db.leaves.filter(l => !(l.studentId === stuId && l.date === today));
  }
  if(status === 'present'){
    App.db.attendance.push({
      id: nid(), studentId: stuId, studentName: s.name, cls: s.cls||'',
      date: today, time: nt(), ts: Date.now(),
      status: 'present', method: 'matrix'
    });
  } else if(status === 'late'){
    App.db.attendance.push({
      id: nid(), studentId: stuId, studentName: s.name, cls: s.cls||'',
      date: today, time: nt(), ts: Date.now(),
      status: 'late', method: 'matrix'
    });
  } else if(status === 'leave'){
    // ensure a leave exists
    const ex = App.db.leaves.find(l => l.studentId === stuId && l.date === today);
    if(!ex){
      App.db.leaves.push({
        id: nid(), studentId: stuId, name: s.name, cls: s.cls||'',
        date: today, reason: '老師標記',
        status: 'approved', ts: Date.now(),
        reviewer: App.session?.name || '老師'
      });
    }
  } else {
    // absent: already cleared
  }
  saveDB();

}

function rMatrix(content){
  // determine all classes
  const classes = Array.from(new Set(App.db.students.map(s => s.cls).filter(Boolean))).sort();
  if(!classes.length) classes.push('');
  if(!App._matrixCls || !classes.includes(App._matrixCls)) App._matrixCls = classes[0];

  // ensure settings.seatLayout exists
  App.db.settings.seatLayout = App.db.settings.seatLayout || {};
  const cls = App._matrixCls;
  const layout = App.db.settings.seatLayout[cls] || { rows: 0, cols: 6 };

  content.appendChild(el('div', { class:'flex-between', style:{marginBottom:'10px',flexWrap:'wrap',gap:'8px'} },
    el('div', null,
      el('h1', null, '🪑 座位矩陣'),
      el('div', { class:'small muted' }, '點座位切換出席狀態 · 拖放可換位')
    )
  ));

  // class tabs
  if(classes.length > 1 || classes[0]){
    const tabs = el('div', { class:'matrix-cls-tabs' });
    classes.forEach(c => {
      tabs.appendChild(el('button', {
        class: (c === cls ? 'active' : ''),
        onclick: ()=> { App._matrixCls = c; rerender(); }
      }, c || '未分班'));
    });
    content.appendChild(tabs);
  }

  // students for this class, sorted by seat
  const students = App.db.students
    .filter(s => (s.cls||'') === cls)
    .sort((a,b)=> (a.seat||999)-(b.seat||999) || (a.name||'').localeCompare(b.name||''));

  // Toolbar
  const cols = layout.cols || 6;
  let rows = layout.rows || Math.max(1, Math.ceil(students.length / cols));

  const toolbar = el('div', { class:'matrix-toolbar' });
  toolbar.appendChild(el('div', { class:'small', style:{fontWeight:'600'} }, cls || '未分班'));
  toolbar.appendChild(el('div', { class:'small muted' }, students.length + ' 位學生'));
  // cols input
  const colsBox = el('div', { class:'flex', style:{gap:'4px',alignItems:'center'} },
    el('span', { class:'tiny muted' }, '欄'),
    (function(){
      const inp = el('input', { type:'number', class:'input', style:{width:'60px',padding:'4px 8px'}, value: String(cols), min:'1', max:'12' });
      inp.addEventListener('change', ()=> {
        const v = Math.max(1, Math.min(12, parseInt(inp.value,10) || 6));
        layout.cols = v;
        App.db.settings.seatLayout[cls] = layout;
        saveDB(); rerender();
      });
      return inp;
    })()
  );
  toolbar.appendChild(colsBox);

  // Legend
  toolbar.appendChild(el('div', { class:'legend' },
    el('span', { class:'lg' }, el('span', { class:'dot', style:{background:'var(--success)'} }), '出席'),
    el('span', { class:'lg' }, el('span', { class:'dot', style:{background:'var(--warn)'} }), '遲到'),
    el('span', { class:'lg' }, el('span', { class:'dot', style:{background:'var(--accent)'} }), '請假'),
    el('span', { class:'lg' }, el('span', { class:'dot', style:{background:'var(--danger)'} }), '缺席')
  ));

  toolbar.appendChild(el('button', { class:'btn btn-sm btn-primary', onclick: ()=> {
    layout.cols = cols;
    layout.rows = rows;
    App.db.settings.seatLayout[cls] = layout;
    saveDB();
    toast('座位配置已儲存','success');
  }}, '💾 儲存配置'));

  toolbar.appendChild(el('button', { class:'btn btn-sm', onclick: ()=> {
    // Re-assign seat numbers based on visual order — useful when teacher rearranges
    students.forEach((s, i) => { s.seat = i + 1; });
    saveDB();
    toast('已依目前順序重新編號座號','success');
    rerender();
  }}, '🔢 重編座號'));

  content.appendChild(toolbar);

  // Compute total cells
  const totalSlots = Math.max(students.length, cols * Math.max(rows, Math.ceil(students.length/cols)));
  const effRows = Math.ceil(totalSlots / cols);

  // Podium
  content.appendChild(el('div', { class:'matrix-podium' }, '╴╴╴ 講  台 ╴╴╴'));

  // Grid
  const grid = el('div', { class:'matrix-grid', style:{ gridTemplateColumns:'repeat(' + cols + ', minmax(70px, 1fr))' } });

  // pad students with placeholders
  const slots = students.slice();
  while(slots.length < effRows * cols) slots.push(null);

  slots.forEach((s, idx) => {
    if(!s){
      const empty = el('div', { class:'matrix-seat s-empty' },
        el('span', { class:'tiny muted' }, '空位')
      );
      grid.appendChild(empty);
      return;
    }
    const status = matrixCurrentStatus(s.id);
    const cell = el('div', { class:'matrix-seat s-' + status, draggable:'true' });
    cell.appendChild(el('span', { class:'seat-no' }, '#' + (s.seat || idx+1)));
    cell.appendChild(el('div', { class:'seat-nm' }, s.name));
    const stMap = { present:'✅', late:'🟡', leave:'📆', absent:'❌' };
    cell.appendChild(el('div', { class:'seat-st' }, stMap[status] || '⬜'));

    cell.addEventListener('click', ()=> {
      // cycle: absent → present → late → leave → absent
      const cur = matrixCurrentStatus(s.id);
      const cycle = { absent:'present', present:'late', late:'leave', leave:'absent' };
      const next = cycle[cur] || 'present';
      matrixSetStatus(s.id, next);
      rerender();
    });

    // drag-and-drop seat swap
    cell.addEventListener('dragstart', e => {
      cell.classList.add('dragging');
      try { e.dataTransfer.setData('text/plain', s.id); } catch(err){}
      e.dataTransfer.effectAllowed = 'move';
    });
    cell.addEventListener('dragend', ()=> {
      cell.classList.remove('dragging');
      grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave', ()=> cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      let srcId = '';
      try { srcId = e.dataTransfer.getData('text/plain'); } catch(err){}
      if(!srcId || srcId === s.id) return;
      const src = App.db.students.find(x => x.id === srcId);
      if(!src) return;
      const tmp = src.seat;
      src.seat = s.seat;
      s.seat = tmp;
      saveDB();
      if(typeof bcNotify === 'function') bcNotify();
      toast('已交換 ' + src.name + ' ↔ ' + s.name + ' 的座位','success');
      rerender();
    });

    grid.appendChild(cell);
  });

  content.appendChild(grid);

  // Today summary
  const counts = { present:0, late:0, leave:0, absent:0 };
  students.forEach(s => { counts[matrixCurrentStatus(s.id)]++; });
  content.appendChild(el('div', { class:'card', style:{padding:'12px',marginTop:'12px'} },
    el('div', { class:'flex', style:{justifyContent:'space-around',flexWrap:'wrap',gap:'10px'} },
      el('div', { style:{textAlign:'center'} }, el('div', { style:{fontSize:'20px',fontWeight:'700',color:'var(--success)'}}, counts.present), el('div', { class:'tiny muted' }, '出席')),
      el('div', { style:{textAlign:'center'} }, el('div', { style:{fontSize:'20px',fontWeight:'700',color:'var(--warn)'}}, counts.late), el('div', { class:'tiny muted' }, '遲到')),
      el('div', { style:{textAlign:'center'} }, el('div', { style:{fontSize:'20px',fontWeight:'700',color:'var(--accent)'}}, counts.leave), el('div', { class:'tiny muted' }, '請假')),
      el('div', { style:{textAlign:'center'} }, el('div', { style:{fontSize:'20px',fontWeight:'700',color:'var(--danger)'}}, counts.absent), el('div', { class:'tiny muted' }, '缺席'))
    )
  ));
}

function openCmdPalette(){
  if(App.cmdOpen) return;
  App.cmdOpen = true;
  const all = cmdItems();
  let filtered = all.slice();
  let sel = 0;

  const host = el('div', { class:'cmd-host', onclick: e => { if(e.target === host) close(); } });
  const box = el('div', { class:'cmd-box' });
  const inp = el('input', { class:'cmd-input', placeholder:'輸入指令… (Esc 關閉)' });
  const list = el('div', { class:'cmd-list' });

  function render(){
    list.innerHTML = '';
    if(!filtered.length){
      list.appendChild(el('div', { class:'cmd-empty' }, '沒有符合的指令'));
      return;
    }
    filtered.forEach((it, i) => {
      const row = el('div', { class:'cmd-item ' + (i===sel?'sel':''), onclick: ()=> { exec(it); } },
        el('span', { class:'ico' }, it.i),
        el('span', { class:'ttl' }, it.t),
        el('span', { class:'hint' }, it.h)
      );
      list.appendChild(row);
    });
  }
  function filter(){
    const q = inp.value.trim().toLowerCase();
    if(!q){ filtered = all.slice(); sel=0; render(); return; }
    filtered = all.filter(it =>
      it.t.toLowerCase().includes(q) ||
      (it.h && it.h.toLowerCase().includes(q))
    );
    sel = 0;
    render();
  }
  function exec(it){
    close();
    setTimeout(()=> { try { it.go(); } catch(e){ console.error(e); } }, 80);
  }
  function close(){
    App.cmdOpen = false;
    host.remove();
    if(App.cmdHandler){
      document.removeEventListener('keydown', App.cmdHandler, true);
      App.cmdHandler = null;
    }
  }

  inp.addEventListener('input', filter);
  inp.addEventListener('keydown', e => {
    if(e.key === 'Escape'){ e.preventDefault(); close(); }
    else if(e.key === 'ArrowDown'){ e.preventDefault(); sel = Math.min(filtered.length-1, sel+1); render(); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); sel = Math.max(0, sel-1); render(); }
    else if(e.key === 'Enter'){ e.preventDefault(); if(filtered[sel]) exec(filtered[sel]); }
  });

  box.appendChild(inp); box.appendChild(list);
  host.appendChild(box);
  document.body.appendChild(host);
  render();
  setTimeout(()=> inp.focus(), 50);
}

function initCmdPaletteShortcut(){
  if(App._cmdInit) return;
  App._cmdInit = true;
  document.addEventListener('keydown', e => {
    const isMod = e.ctrlKey || e.metaKey;
    if(isMod && (e.key === 'k' || e.key === 'K' || e.key === 'p' || e.key === 'P')){
      // skip if user typing in plain input/textarea? actually we want to open even then for productivity
      if(!App.session || !App.cfg) return;
      e.preventDefault();
      openCmdPalette();
    }
  });
}

function initPWA(){

    try {
      navigator.serviceWorker.register('sw-v3.js').catch(()=>null);
    } catch(e){}
  }
  // listen for install prompt
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();

    showPwaInstallChip();

  window.addEventListener('appinstalled', ()=> {
    App.pwaPrompt = null;
    const p = document.querySelector('.pwa-prompt');
    if(p) p.remove();
    toast('已安裝到主畫面','success');
  });

               String(d.getMonth()+1).padStart(2,'0') + '-' +
               String(d.getDate()).padStart(2,'0');
      })();

          + '<a href="' + location.pathname + '" style="background:#2563eb;color:#fff;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:600;font-size:16px;display:inline-block">→ 回到登入頁</a>'
          + '</div>';
        return;
      }
      // 驗證通過 → 執行重設
      // 解除 SW + 清快取（確保看新版）
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      }
      if('caches' in window){
        caches.keys().then(names => names.forEach(n => caches.delete(n)));
      }
      // 找出所有 v3 db key 並重設 admin（密碼存「明文 admin123」以便雜湊向後相容驗證）
      let resetCount = 0;
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(k && k.indexOf('cms_v3_db_') === 0){
          try {
            const db = JSON.parse(localStorage.getItem(k));
            db.accounts = db.accounts || [];
            let acc = db.accounts.find(a => a.username === 'admin');
            if(!acc) acc = db.accounts[0];
            if(acc){
              acc.username = 'admin';
              acc.password = 'admin123';  // 登入時自動升級為 hash
              acc.role = 'teacher';
              if(!acc.name) acc.name = '管理員';
            } else {
              db.accounts.push({
                id: Date.now(),
                username: 'admin', password: 'admin123',
                name: '管理員', role: 'teacher',
                createdAt: Date.now()
              });
            }
            localStorage.setItem(k, JSON.stringify(db));
            resetCount++;
          } catch(e){}
        }
      }
      // 清登入狀態
      try {
        localStorage.removeItem('cms_v3_session');
        localStorage.removeItem('cms_v3_remember');
      } catch(e){}
      document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui;text-align:center;padding:20px">'
        + '<div style="font-size:64px;margin-bottom:20px">✅</div>'
        + '<h1 style="font-size:24px;margin:0 0 10px;color:#16a34a">老師密碼已重設！</h1>'
        + '<div style="font-size:16px;color:#666;margin-bottom:20px;line-height:1.8">已重設 ' + resetCount + ' 個工作區的老師密碼<br><br>'
        + '<span style="background:#dbeafe;color:#1e40af;padding:8px 16px;border-radius:8px;font-weight:600">帳號：admin<br>密碼：admin123</span></div>'
        + '<div style="font-size:14px;color:#999;margin-bottom:30px">所有學生資料、出席紀錄都已保留<br>建議登入後立即修改密碼</div>'
        + '<a href="' + location.pathname + '" style="background:#2563eb;color:#fff;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:600;font-size:16px;display:inline-block">→ 前往登入頁</a>'
        + '</div>';
      return;
    }
    if(location.search.indexOf('reset=1') >= 0){
      // 清除所有 v3 相關的 localStorage
      const keysToDelete = [];
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(k && (k.indexOf('cms_v3') === 0 || k.indexOf('cms-v3') === 0)){
          keysToDelete.push(k);
        }
      }
      keysToDelete.forEach(k => localStorage.removeItem(k));
      // 解除 Service Worker
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }
      // 清除 CacheStorage
      if('caches' in window){
        caches.keys().then(names => names.forEach(n => caches.delete(n)));
      }
      // 重新導向到乾淨網址
      setTimeout(() => {
        location.replace(location.pathname);
      }, 500);
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;font-size:18px;color:#666">🔄 重設中，請稍候...</div>';
      return;
    }
  } catch(e){ console.warn('[reset]', e); }

  // theme + appearance
  loadAppearance();
  applyTheme();

  // cfg & session
  App.cfg = loadCfg();
  App.session = loadSession();

  // QR join URL handling — runs before db so we can switch room first
  const handled = handleQrJoinHash();

  if(!App.cfg){
    // 沒設定過 → 使用固定預設教室 DEMO01（不每次變）
    App.cfg = { roomCode: 'DEMO01', role: 'teacher', createdAt: Date.now() };
    saveCfg(App.cfg);
  }
  loadDB();
  initBC();
  Sync.init();
  wsRegisterCurrent();

  // 確保有管理員帳號 + 學生資料
  try { ensureDefaultsAndDemo(); } catch(e){ console.warn('[v3 defaults]', e); }

  // route from hash if present (and not a join hash we already consumed)
  if(!handled){
    const h = location.hash.slice(1);
    if(h && !h.startsWith('att=') && !h.startsWith('join=')){
      const [v, sv] = h.split('/');
      App.view = v; App.subview = sv || null;
    }
  }

  // PWA + shortcuts
  initPWA();
  initCmdPaletteShortcut();
  initKeyShortcuts();
  initDragDrop();

  // Phase 4: auto-backup once per day
  try { backupAutoIfNeeded(); } catch(e){}

  rerender();

  // batch 4: 套用背景設定（圖片、顏色、透明度）
  try { applyBranding(); } catch(e){ console.warn('[applyBranding]', e); }

  // V1 import toast (after first render so the user actually sees it)
  if(App._v1ImportedCount){
    const n = App._v1ImportedCount;
    App._v1ImportedCount = 0;
    setTimeout(()=> {
      try { toast('✅ 已從舊版自動匯入 ' + n + ' 位學生','success', 5000); } catch(e){}
    }, 1500);
  }

  // try auto-checkin if there was a pending code
  if(App.pendingAttCode){
    setTimeout(()=> tryAutoCheckin(), 600);
  }

  // background scheduler for assignment-due notifications
  schedulePeriodicNotifications();

  // batch 3: 啟動學生端「作業到期」桌面通知排程
  try { scheduleDueReminders(); } catch(e){ console.warn('[scheduleDueReminders]', e); }

  // ═══ IndexedDB 持久化 + 舊版 attach 自動遷移 ═══
  try { requestPersistentStorage(); } catch(e){}
  setTimeout(async () => {
    try {
      const n = await migrateAllAttachments();
      if(n > 0) console.log('[v3] 已移轉 ' + n + ' 個附件到 IndexedDB');
    } catch(e){ console.warn('[migrate]', e); }
  }, 2500);
}

function schedulePeriodicNotifications(){
  // Check assignments due in 24h once per hour
  if(App._notifyTimer) return;
  function check(){
    if(!App.db || !App.session || App.session.role !== 'teacher') return;
    const cfg = whLoad();
    if(!cfg || !cfg.enabled || !cfg.events || !cfg.events['assignment-due']) return;
    const last = parseInt(localStorage.getItem(LS_KEY + '_notif_due') || '0', 10);
    if(Date.now() - last < 12*3600*1000) return; // throttle 12h
    const soon = App.db.assignments.filter(a => isAssignmentDueSoon(a));
    if(soon.length){
      triggerWebhook('assignment-due', { count: soon.length, titles: soon.map(s=>s.title).join('、') });
      try { localStorage.setItem(LS_KEY + '_notif_due', String(Date.now())); } catch(e){}
    }
  }
  App._notifyTimer = setInterval(check, 3600*1000);
  setTimeout(check, 8000);
}

/**
 * Render a breadcrumb trail.
 * @param {Array<{label:string, go?:string|Function}>} items - last item is current page (no go)
 */
function renderBreadcrumb(items){
  const wrap = el('div', { class:'breadcrumb' });
  items.forEach((it, i) => {
    const last = i === items.length - 1;
    if(last){
      wrap.appendChild(el('span', { class:'current' }, it.label));
    } else {
      const a = el('span', { class:'crumb', onclick: () => {
        if(typeof it.go === 'function') it.go();
        else if(typeof it.go === 'string'){
          const [v, sv] = it.go.split('/');
          go(v, sv || null);
        }
      }}, it.label);
      wrap.appendChild(a);
      wrap.appendChild(el('span', { class:'sep' }, '›'));
    }
  });
  return wrap;
}

/**
 * Render a friendly empty state card.
 */
function renderEmpty(opts){
  const o = opts || {};
  const card = el('div', { class:'empty-state' });
  card.appendChild(el('div', { class:'es-ico' }, o.icon || '📭'));
  card.appendChild(el('div', { class:'es-title' }, o.title || '尚無資料'));

      }, a.label));
    });
    card.appendChild(ac);

}

/**
 * Render a unified searchbox with debounce + clear button.
 */
function renderSearchbox(opts){
  const o = opts || {};
  const wrap = el('div', { class:'usearch' });
  const ic = el('span', { class:'usi' }, '🔍');
  const inp = el('input', {
    type:'search',
    placeholder: o.placeholder || '搜尋…',
    value: o.value || '',
    'aria-label': o.placeholder || '搜尋'
  });
  // IME-friendly debounce
  let timer = null, composing = false;
  inp.addEventListener('compositionstart', ()=> composing = true);
  inp.addEventListener('compositionend', ()=> {
    composing = false;
    if(timer) clearTimeout(timer);
    timer = setTimeout(()=> { if(o.onChange) o.onChange(inp.value); }, o.debounce || 200);
    wrap.classList.toggle('has-val', !!inp.value);
  });
  inp.addEventListener('input', ()=> {
    wrap.classList.toggle('has-val', !!inp.value);
    if(composing) return;
    if(timer) clearTimeout(timer);
    timer = setTimeout(()=> { if(o.onChange) o.onChange(inp.value); }, o.debounce || 200);
  });
  const x = el('span', { class:'ux', title:'清除', onclick: ()=> {
    inp.value = '';
    wrap.classList.remove('has-val');
    if(o.onChange) o.onChange('');
    inp.focus();
  }}, '✕');
  if(o.value) wrap.classList.add('has-val');
  wrap.appendChild(ic);
  wrap.appendChild(inp);
  wrap.appendChild(x);
  return wrap;
}

function groupAvgAttendance(g){
  if(!g.members || !g.members.length) return 0;
  const rates = g.members.map(id => attendanceRate(id));
  return Math.round(rates.reduce((a,b)=>a+b,0) / rates.length);
}
function groupAvgSubmission(g){
  if(!g.members || !g.members.length) return 0;
  const rates = g.members.map(id => submissionRate(id));
  return Math.round(rates.reduce((a,b)=>a+b,0) / rates.length);
}

      );

  // add member

  if(eligible.length && (!g.maxMembers || (g.members||[]).length < g.maxMembers)){
    const sel = el('select', { class:'input' });
    sel.appendChild(el('option', { value:'' }, '— 選擇學生加入 —'));
    eligible.sort((a,b)=> (a.cls||'').localeCompare(b.cls||'') || (a.name||'').localeCompare(b.name||''));
    eligible.forEach(s => sel.appendChild(el('option', { value:s.id }, (s.cls?'['+s.cls+'] ':'') + s.name)));
    m.root.appendChild(el('div', { class:'flex', style:{gap:'8px'} },
