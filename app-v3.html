      if(v.font)         App.font         = v.font;
      if(v.fontSize)     App.fontSize     = v.fontSize;
      if(v.density)      App.density      = v.density;
      if(v.radius)       App.radius       = v.radius;
      if(v.customAccent) App._customAccent= v.customAccent;
      loaded = true;
    }
  } catch(e){}
  // legacy fallback (older installs only had LS_THEME / LS_ACCENT)
  if(!loaded){
    try {
      const t = localStorage.getItem(LS_THEME);
      const a = localStorage.getItem(LS_ACCENT);
      if(t) App.theme  = t;
      if(a) App.accent = a;
    } catch(e){}
  }
  // safe defaults
  if(!App.theme)    App.theme    = 'light';
  if(!App.accent)   App.accent   = 'blue';
  if(!App.font)     App.font     = 'system';
  if(!App.fontSize) App.fontSize = 'md';
  if(!App.density)  App.density  = 'normal';
  if(!App.radius)   App.radius   = 'normal';
}

function applyTheme(){
  const root = document.documentElement;
  // auto theme follows system
  let effectiveTheme = App.theme || 'light';
  if(effectiveTheme === 'auto'){
    const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    effectiveTheme = dark ? 'dark' : 'light';
  }
  root.setAttribute('data-theme',    effectiveTheme);
  root.setAttribute('data-accent',   App.accent   || 'blue');
  root.setAttribute('data-fontsize', App.fontSize || 'md');
  root.setAttribute('data-density',  App.density  || 'normal');
  root.setAttribute('data-radius',   App.radius   || 'normal');

  // font family
  const fp = FONT_PRESETS.find(f => f.key === (App.font || 'system')) || FONT_PRESETS[0];
  try { _loadGoogleFont(fp.gf); } catch(e){}
  root.style.setProperty('--font-family', fp.stack);

  // custom accent — clear inline overrides first, then re-apply if active
  root.style.removeProperty('--primary');
  root.style.removeProperty('--primary-hover');
  root.style.removeProperty('--primary-soft');
  if(App.accent === 'custom' && App._customAccent){
    applyCustomAccent(App._customAccent);
  }

  // attach a 'auto-theme' listener once for live OS-theme changes
  if(!App._autoThemeBound){
    App._autoThemeBound = true;
    try {
      const mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      if(mq && mq.addEventListener){
        mq.addEventListener('change', ()=> { if(App.theme === 'auto') applyTheme(); });
      } else if(mq && mq.addListener){
        mq.addListener(()=> { if(App.theme === 'auto') applyTheme(); });
      }
    } catch(e){}
  }
}

/* graceful hex -> primary/hover/soft */
function applyCustomAccent(color){
  const c = (color || '').trim();
  const hex = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(c);
  if(!hex) return; // ignore invalid input — fall back to data-accent presets
  let h = c.slice(1);
  if(h.length === 3) h = h.split('').map(x => x+x).join('');
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  // darken ~12% for hover
  const dk = v => Math.max(0, Math.round(v * 0.85));
  const hover = '#' + [dk(r),dk(g),dk(b)].map(v => v.toString(16).padStart(2,'0')).join('');
  const root = document.documentElement;
  root.style.setProperty('--primary', c);
  root.style.setProperty('--primary-hover', hover);
  root.style.setProperty('--primary-soft', `rgba(${r},${g},${b},0.15)`);
}

/* ════════════════════════════════════════════════════════════
   FIREBASE SYNC
   ──────────────────────────────────────────────────────────── */
const Sync = (() => {
  let connectTimer = null;
  function detachAll(){
    App.listeners.forEach(fn => { try{fn();}catch(e){} });
    App.listeners = [];
    if(App.fb){
      try { App.fb.delete(); } catch(e){}
      App.fb = null; App.fbRef = null;
    }
    App.fbStatus = 'idle';
    if(connectTimer){ clearTimeout(connectTimer); connectTimer = null; }
  }
  function init(){
    detachAll();
    if(typeof firebase === 'undefined') return false;
    const fbCfg = (() => { try{ return JSON.parse(localStorage.getItem(LS_FB) || 'null'); }catch(e){return null;} })();
    if(!fbCfg || !fbCfg.databaseURL){
      App.fbStatus = 'idle';
      return false;
    }
    try {
      if(firebase.apps.length){ try{firebase.app().delete();}catch(e){} }
      App.fb = firebase.initializeApp(fbCfg);
      const room = (App.cfg && App.cfg.roomCode) || 'default';
      App.fbRef = firebase.database().ref('cms-v3/' + room);
      App.fbStatus = 'connecting';
      attachListeners();
      connectTimer = setTimeout(()=> {
        if(App.fbStatus === 'connecting'){
          App.fbStatus = 'error';
          toast('Firebase 連線逾時', 'warn');
          rerender();
        }
      }, 8000);
      return true;
    } catch(e){
      App.fbStatus = 'error';
      toast('Firebase 設定錯誤：' + (e.message || e), 'danger');
      return false;
    }
  }
  // batch 3：child-level listeners — 避免多裝置同時編輯時整包覆寫造成丟資料
  //   * child_added / child_changed / child_removed 各自處理單筆，不再 Object.values 整包替換
  //   * 自己 push 的記錄會被 echo-suppression 過濾掉（避免無限迴圈）
  // 各 array-style collection
  const ARRAY_COLLECTIONS = [
    'students','attendance','messages','leaves','pending','announcements',
    'assignments','submissions','evals','peerEvals','selfEvals','feedbacks',
    'attendanceNotes','passwordResets','accounts','_qrCodes'
  ];
  // 物件型（key→value）的 collection
  const OBJ_COLLECTIONS = ['settings','grades','branding'];

  function _saveDBLocal(){
    // 只寫 localStorage，不會推回 Firebase（避免 listener 觸發 -> push -> listener 迴圈）
    try { saveDB(); } catch(e){}
  }
  function _shouldIgnoreEcho(node, id){
    // 自己 push 後 2 秒內忽略相同 id 的 echo
    if(!App._syncEchoes) return false;
    const key = node + '::' + id;
    const ts = App._syncEchoes[key];
    if(!ts) return false;
    if(Date.now() - ts < 2500) return true;
    delete App._syncEchoes[key];
    return false;
  }
  function _markEcho(node, id){
    App._syncEchoes = App._syncEchoes || {};
    App._syncEchoes[node + '::' + id] = Date.now();
  }
  function _scheduleRerender(){
    // debounce 避免大量 child_added 時暴衝
    if(App._syncRerTimer) return;
    App._syncRerTimer = setTimeout(()=> {
      App._syncRerTimer = null;
      try { rerender(); } catch(e){}
    }, 80);
  }

  function attachListeners(){
    if(!App.fbRef) return;

    // ── Array collections：child-level listener ──
    ARRAY_COLLECTIONS.forEach(node => {
      const ref = App.fbRef.child(node);

      const addCb = ref.on('child_added', snap => {
        const v = snap.val();
        if(!v) return;
        const id = v.id != null ? v.id : snap.key;
        if(_shouldIgnoreEcho(node, id)) return;
        App.db[node] = App.db[node] || [];
        const idx = App.db[node].findIndex(x => x && (x.id == id));
        const isNew = idx < 0;
        if(idx >= 0){
          App.db[node][idx] = v;
        } else {
          App.db[node].push(v);
        }
        _saveDBLocal();
        _scheduleRerender();
        // batch 3: 收到其它裝置 push 來的新項 → 觸發桌面通知
        if(isNew){
          try { dispatchInboundNotify(node, v); } catch(e){ console.warn('[notify dispatch]', e); }
        }
      });

      const chgCb = ref.on('child_changed', snap => {
        const v = snap.val();
        if(!v) return;
        const id = v.id != null ? v.id : snap.key;
        if(_shouldIgnoreEcho(node, id)) return;
        App.db[node] = App.db[node] || [];
        const idx = App.db[node].findIndex(x => x && (x.id == id));
        if(idx >= 0){
          App.db[node][idx] = v;
        } else {
          App.db[node].push(v);
        }
        _saveDBLocal();
        _scheduleRerender();
      });

      const rmCb = ref.on('child_removed', snap => {
        const v = snap.val();
        const id = (v && v.id != null) ? v.id : snap.key;
        if(_shouldIgnoreEcho(node, id)) return;
        if(!Array.isArray(App.db[node])) return;
        App.db[node] = App.db[node].filter(x => x && (x.id != id));
        _saveDBLocal();
        _scheduleRerender();
      });

      App.listeners.push(()=> ref.off('child_added', addCb));
      App.listeners.push(()=> ref.off('child_changed', chgCb));
      App.listeners.push(()=> ref.off('child_removed', rmCb));
    });

    // ── 物件型 collections：仍用 value listener（settings/grades/branding）──
    OBJ_COLLECTIONS.forEach(node => {
      const ref = App.fbRef.child(node);
      const cb = ref.on('value', snap => {
        const v = snap.val();
        if(!v) return;
        if(node === 'settings'){
          App.db.settings = Object.assign(defaultDB().settings, App.db.settings || {}, v);
        } else if(node === 'branding'){
          App.db.branding = Object.assign(defaultDB().branding, App.db.branding || {}, v);
        } else {
          App.db[node] = v;
        }
        _saveDBLocal();
        _scheduleRerender();
      });
      App.listeners.push(()=> ref.off('value', cb));
    });

    // connection
    const cref = firebase.database().ref('.info/connected');
    const ccb = cref.on('value', snap => {
      const ok = !!snap.val();
      if(connectTimer && ok){ clearTimeout(connectTimer); connectTimer = null; }
      App.fbStatus = ok ? 'online' : (App.fbStatus === 'error' ? 'error' : 'connecting');
      rerender();
    });
    App.listeners.push(()=> cref.off('value', ccb));
  }
  function push(node, data){
    saveDB();
    if(!App.fbRef) return Promise.resolve(false);
    // batch 3: data 可能為 null（表示「同步整個 collection」的舊呼叫慣例）
    if(!data){
      if(Array.isArray(App.db[node])) return setMap(node, App.db[node]);
      return Promise.resolve(false);
    }
    // use the data's id as the key for idempotency
    const key = data.id || App.fbRef.child(node).push().key;
    // batch 3: 標記 echo，避免 listener 把自己 push 的東西重新 apply（造成 rerender 迴圈）
    _markEcho(node, key);
    return App.fbRef.child(node).child(key).set(data).then(()=>true).catch(()=>false);
  }
  function setNode(node, data){
    saveDB();
    if(!App.fbRef) return Promise.resolve(false);
    return App.fbRef.child(node).set(data).then(()=>true).catch(()=>false);
  }
  function setMap(node, arr, keyField='id'){
    saveDB();
    if(!App.fbRef) return Promise.resolve(false);
    const obj = {};
    (arr || []).forEach(x => {
      if(!x) return;
      const k = String(x[keyField] != null ? x[keyField] : nid());
      obj[k] = x;
      // batch 3: 每一筆都要標記 echo
      _markEcho(node, k);
    });
    return App.fbRef.child(node).set(obj).then(()=>true).catch(()=>false);
  }
  function remove(node, id){
    saveDB();
    if(!App.fbRef) return Promise.resolve(false);
    // batch 3: 移除也算自己造成的事件，標記 echo
    _markEcho(node, id);
    return App.fbRef.child(node).child(String(id)).remove().then(()=>true).catch(()=>false);
  }
  return { init, push, setNode, setMap, remove, detachAll };
})();

/* ════════════════════════════════════════════════════════════
   BATCH 3 — WEB PUSH / NOTIFICATIONS（前景通知，使用瀏覽器 Notification API）
   不需要 VAPID server；只要使用者授權即可在前景與背景（Service Worker tag）顯示
   ──────────────────────────────────────────────────────────── */
const NOTIFY_TYPES = [
  { key:'message',       label:'收到新訊息',     forStudent:true,  forTeacher:true  },
  { key:'announcement',  label:'收到新公告',     forStudent:true,  forTeacher:false },
  { key:'leaveRequest',  label:'學生請假申請',   forStudent:false, forTeacher:true  },
  { key:'studentSignin', label:'學生簽到',       forStudent:false, forTeacher:true  },
  { key:'dueReminder',   label:'作業到期提醒',   forStudent:true,  forTeacher:false }
];

function notifyPermission(){
  if(!('Notification' in window)) return 'unsupported';
  return Notification.permission; // 'default' | 'granted' | 'denied'
}

function notifyRequest(){
  if(!('Notification' in window)){
    toast('此瀏覽器不支援通知','warn');
    return Promise.resolve('unsupported');
  }
  if(Notification.permission === 'granted') return Promise.resolve('granted');
  if(Notification.permission === 'denied'){
    toast('已被封鎖，請到瀏覽器網址列旁的鎖頭圖示重設權限','warn', 5000);
    return Promise.resolve('denied');
  }
  return Notification.requestPermission().then(p => {
    if(p === 'granted'){
      toast('通知已啟用','success');
      // 啟用後預設打勾全部
      const prefs = (App.db.settings.notifications) || {};
      NOTIFY_TYPES.forEach(t => { if(prefs[t.key] !== false) prefs[t.key] = true; });
      App.db.settings.notifications = prefs;
      saveDB();
      try { Sync.setNode && Sync.setNode('settings', App.db.settings); } catch(e){}
      // 顯示測試
      notify('🔔 通知已啟用', '之後重要事件會推到桌面 / 鎖定畫面', { silent:true });
    } else if(p === 'denied'){
      toast('使用者已拒絕通知','warn');
    }
    return p;
  });
}

function notifyEnabledFor(type){
  if(notifyPermission() !== 'granted') return false;
  const prefs = (App.db && App.db.settings && App.db.settings.notifications) || {};
  // 預設：未設定的視為「不啟用」（避免使用者沒看過設定就被連環通知）
  return prefs[type] === true;
}

function notify(title, body, options){
  options = options || {};
  try {
    if(!('Notification' in window)) return null;
    if(Notification.permission !== 'granted') return null;
    if(options.type && !notifyEnabledFor(options.type)) return null;
    // 自己觸發的（例如老師自己發訊息），不要通知自己
    if(options.skipSelf) return null;

    const opts = {
      body: body || '',
      icon: options.icon || './icon-192.png',
      tag: options.tag || (options.type || 'cms-v3'),
      silent: !!options.silent,
      requireInteraction: !!options.requireInteraction
    };
    if(options.badge) opts.badge = options.badge;
    if(options.data) opts.data = options.data;
    let n;
    try {
      n = new Notification(title, opts);
    } catch(e){
      // 某些瀏覽器（特別是 Android Chrome）不允許直接 new Notification，必須透過 SW
      if(navigator.serviceWorker && navigator.serviceWorker.ready){
        navigator.serviceWorker.ready.then(reg => {
          try { reg.showNotification(title, opts); } catch(_){}
        });
      }
      return null;
    }
    n.onclick = () => {
      try { window.focus(); } catch(_){}
      if(options.url){
        try { location.hash = options.url; } catch(_){}
      }
      try { n.close(); } catch(_){}
    };
    // 沒指定 requireInteraction 時自動 5 秒後關閉
    if(!options.requireInteraction){
      setTimeout(()=> { try { n.close(); } catch(_){} }, 5500);
    }
    return n;
  } catch(e){
    console.warn('[notify]', e);
    return null;
  }
}

// 收到其它裝置同步來的新項，分派到適當的通知類型
function dispatchInboundNotify(node, v){
  if(!App.session) return;
  if(notifyPermission() !== 'granted') return;
  // 來自啟動時的 backlog 不通知（看 ts 是否太舊）
  const ts = v && v.ts;
  if(ts && (Date.now() - ts > 60 * 1000)) return; // 1 分鐘前的事件不再 ping
  const role = App.session.role;
  const meId = role === 'teacher' ? 'teacher' : App.session.id;

  // 不要因為自己「另一個分頁」push 的事件而通知自己
  if(v.fromId === meId) return;

  if(node === 'messages'){
    const to = v.toId || 'all';
    // 只在這位使用者是收件人時通知
    if(to !== 'all' && to !== meId) return;
    const title = '💬 ' + (v.fromName || '未知') + ' ' + (to === 'all' ? '在公開留言' : '私訊你');
    notify(title, (v.text || '(附件)').slice(0, 120), {
      type:'message', tag:'msg-' + (v.fromId || ''),
      url: role === 'teacher' ? 'messages/dm' : 'smsg'
    });
    return;
  }
  if(node === 'announcements'){
    if(role !== 'student') return;
    notify('📢 新公告：' + (v.title || ''), (v.body || '').slice(0, 160), {
      type:'announcement', tag:'ann-' + v.id, url:'sannouncements'
    });
    return;
  }
  if(node === 'leaves'){
    if(role !== 'teacher') return;
    if(v.status && v.status !== 'pending') return; // 自動批准的、或已審核的不通知
    notify('📝 學生請假申請', (v.name || '') + ' · ' + (v.date || '') + ' · ' + (v.reason || ''), {
      type:'leaveRequest', tag:'lv-' + v.id, url:'leaves'
    });
    return;
  }
  if(node === 'attendance'){
    if(role !== 'teacher') return;
    if(v.method !== 'student-self' && v.method !== 'qr') return;
    notify('✋ 學生簽到', (v.studentName || '') + ' · ' + (v.time || ''), {
      type:'studentSignin', tag:'att-' + v.studentId, silent:true,
      url:'overview'
    });
    return;
  }
}

// 啟動排程：學生端 — 作業到期提醒（每小時跑一次，剩 < 24h 提醒一次）
function scheduleDueReminders(){
  if(App._dueReminderTimer) return;
  function check(){
    try {
      if(!App.db || !App.session || App.session.role !== 'student') return;
      if(!notifyEnabledFor('dueReminder')) return;
      const me = currentStudent();
      if(!me) return;
      (App.db.assignments || []).forEach(asg => {
        const dueAt = asg.dueAt || asg.dueDate;
        if(!dueAt) return;
        const due = new Date(dueAt).getTime();
        if(isNaN(due)) return;
        const hoursLeft = (due - Date.now()) / 3600000;
        if(hoursLeft <= 0 || hoursLeft > 24) return;
        // 該學生是否在目標範圍內
        try {
          const targets = assignmentTargets(asg);
          if(!targets.has(me.id)) return;
        } catch(e){}
        // 已繳交？
        const sub = (App.db.submissions || []).find(s => s.studentId === me.id && s.assignmentId === asg.id);
        if(sub) return;
        const key = 'cms_v3_reminded_' + asg.id + '_' + me.id;
        if(localStorage.getItem(key)) return;
        notify('📚 作業即將到期', (asg.title || '未命名作業') + ' 剩 ' + Math.max(1, Math.round(hoursLeft)) + ' 小時',
          { type:'dueReminder', tag:'due-' + asg.id, url:'sasgn/' + asg.id });
        try { localStorage.setItem(key, '1'); } catch(e){}
      });
    } catch(e){ console.warn('[dueReminder]', e); }
  }
  App._dueReminderTimer = setInterval(check, 3600 * 1000); // 1 hr
  setTimeout(check, 5000); // 啟動 5 秒後跑一次
}

function currentStudent(){
  if(!App.session || App.session.role !== 'student') return null;
  return App.db.students.find(s => s.id === App.session.id) || null;
}
function findStudent(id){ return App.db.students.find(s => s.id === id); }

function todayAttendance(){
  const today = td();
  return App.db.attendance.filter(a => a.date === today);
}
function studentSignedToday(studentId){
  return todayAttendance().find(a => a.studentId === studentId) || null;
}
function studentOnLeaveToday(studentId){
  const today = td();
  return App.db.leaves.find(l => l.studentId === studentId && l.date === today && l.status === 'approved') || null;
}

function computeTodayStats(){
  const today = td();
  const todayAtt = todayAttendance();
  const signedIds = new Set(todayAtt.map(a => a.studentId));
  const leaveIds = new Set(App.db.leaves.filter(l => l.date === today && l.status === 'approved').map(l => l.studentId));
  const lateMin = App.db.settings.lateMinutes || 10;
  const start = App.db.settings.startTime || '08:00';
  const [sh, sm] = start.split(':').map(Number);
  const lateThreshold = sh*60 + sm + lateMin;
  let lateCount = 0;
  todayAtt.forEach(a => {
    if(a.time){
      const [h,m] = a.time.split(':').map(Number);
      if(h*60+m > lateThreshold) lateCount++;
    }
  });
  return {
    total: App.db.students.length,
    signed: signedIds.size,
    absent: App.db.students.filter(s => !signedIds.has(s.id) && !leaveIds.has(s.id)).length,
    leave: leaveIds.size,
    late: lateCount,
    signedIds, leaveIds
  };
}

function unreadMessages(){
  if(!App.session) return 0;
  const meId = App.session.role === 'teacher' ? 'teacher' : App.session.id;
  const key = LS_KEY + '_lastread_' + (App.cfg?.roomCode||'local') + '_' + meId;
  const lastRead = parseInt(localStorage.getItem(key) || '0', 10);
  // batch 2: 訊息 toId-aware：私訊收件人 / 公開廣播。null/undef 視為 'all'（向後相容）
  return App.db.messages.filter(m => {
    if((m.ts||0) <= lastRead) return false;
    if(m.fromId === meId) return false;
    const to = m.toId || 'all';
    if(to === 'all') return true;
    return to === meId;
  }).length;
}
function unreadFromStudent(stuId){
  // batch 2: 老師端側欄用：來自指定學生且尚未讀的數
  if(!App.session || App.session.role !== 'teacher') return 0;
  const key = LS_KEY + '_lastread_dm_' + (App.cfg?.roomCode||'local') + '_teacher_' + stuId;
  const lastRead = parseInt(localStorage.getItem(key) || '0', 10);
  return App.db.messages.filter(m => {

/* ════════════════════════════════════════════════════════════
   PHASE 2: DOMAIN HELPERS
   ──────────────────────────────────────────────────────────── */
const FILE_LIMIT = 1024 * 1024; // 1MB

function defaultWeights(){
  return { att:30, asgn:30, mid:20, final:20 };
}

function attendanceRate(studentId){
  // total days = unique dates with at least one attendance
  const allDates = Array.from(new Set(App.db.attendance.map(a=>a.date))).sort();
  if(!allDates.length) return 0;
  const myDays = new Set(App.db.attendance.filter(a => a.studentId === studentId).map(a=>a.date));
  const leaveDays = new Set(App.db.leaves.filter(l => l.studentId === studentId && l.status === 'approved').map(l=>l.date));
  let attended = 0;
  allDates.forEach(d => {
    if(myDays.has(d) || leaveDays.has(d)) attended++;
  });
  return Math.round(100 * attended / allDates.length);
}

function submissionAvg(studentId){
  // batch 1：改為加權平均（依作業 weight，預設 1）
  const subs = App.db.submissions.filter(s => s.studentId === studentId && typeof s.score === 'number');
  if(!subs.length) return 0;
  let totalW = 0, totalScore = 0;
  subs.forEach(s => {
    const asg = (App.db.assignments || []).find(a => a.id === s.assignmentId);
    const w = (asg && Number(asg.weight) > 0) ? Number(asg.weight) : 1;
    totalW += w;
    totalScore += (s.score || 0) * w;
  });
  if(totalW <= 0) return 0;
  return Math.round(totalScore / totalW);
}

function submissionRate(studentId){
  const total = App.db.assignments.filter(a => assignmentTargets(a).has(studentId)).length;
  if(!total) return 0;
  const sent = App.db.submissions.filter(s => s.studentId === studentId).length;
  return Math.round(100 * sent / total);
}

function assignmentTargets(asg){
  // returns Set of studentIds this assignment applies to
  const set = new Set();
  if(!asg || !asg.target || asg.target === 'all'){
    App.db.students.forEach(s => set.add(s.id));
  } else if(asg.target === 'class' && asg.targetCls){
    App.db.students.filter(s => s.cls === asg.targetCls).forEach(s => set.add(s.id));
  } else if(asg.target === 'students' && Array.isArray(asg.targetIds)){
    asg.targetIds.forEach(id => set.add(id));
  } else {
    App.db.students.forEach(s => set.add(s.id));
  }
  return set;
}

function assignmentStats(asg){
  const targets = assignmentTargets(asg);
  const total = targets.size;
  const subs = App.db.submissions.filter(s => s.assignmentId === asg.id && targets.has(s.studentId));
  const submitted = subs.length;
  const graded = subs.filter(s => typeof s.score === 'number').length;
  const scores = subs.filter(s => typeof s.score === 'number').map(s => s.score);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const late = subs.filter(s => isSubmissionLate(asg, s)).length;
  return { total, submitted, graded, avg, late, rate: total ? Math.round(100*submitted/total) : 0 };
}

function isSubmissionLate(asg, sub){
  if(!asg || !asg.dueAt || !sub || !sub.ts) return false;
  return sub.ts > new Date(asg.dueAt).getTime();
}

function isAssignmentDueSoon(asg){
  if(!asg.dueAt) return false;
  const ms = new Date(asg.dueAt).getTime() - Date.now();
  return ms > 0 && ms < 24 * 3600 * 1000;
}
function isAssignmentOverdue(asg){
  if(!asg.dueAt) return false;
  return new Date(asg.dueAt).getTime() < Date.now();
}

function calcGrade(studentId){
  const w = (App.db.settings.gradeWeights) || defaultWeights();
  const att = attendanceRate(studentId);
  const asgn = submissionAvg(studentId);
  const g = App.db.grades[studentId] || {};
  const mid = Number(g.midterm) || 0;
  const final = Number(g.final) || 0;
  const total = att * (w.att||0)/100 + asgn * (w.asgn||0)/100
              + mid * (w.mid||0)/100 + final * (w.final||0)/100;
  return { att, asgn, mid, final, total: Math.round(total), w };
}

function studentRank(studentId){
  const rows = App.db.students.map(s => ({ id:s.id, total: calcGrade(s.id).total }))
    .sort((a,b) => b.total - a.total);
  const idx = rows.findIndex(r => r.id === studentId);
  return { rank: idx < 0 ? null : idx+1, of: rows.length };
}

function readFileAsBase64(file){
  return new Promise((resolve, reject) => {
    if(!file) return resolve(null);
    if(file.size > FILE_LIMIT) return reject(new Error('檔案超過 1MB 限制'));
    const fr = new FileReader();
    fr.onload = () => resolve({
      name: file.name, type: file.type, size: file.size, data: fr.result
    });
    fr.onerror = () => reject(new Error('讀取失敗'));
    fr.readAsDataURL(file);
  });
}

function downloadDataUrl(dataUrl, filename){
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename || 'download';
  a.click();
}

/* ════════════════════════════════════════════════════════════
   IndexedDB 大檔案儲存（PDF / Word / 圖片 / 影片 等）
   ──────────────────────────────────────────────────────────── */
const IDB_NAME = 'cms_v3_files';
const IDB_STORE = 'attachments';
const IDB_VERSION = 1;
const ATTACH_MAX_SIZE = 50 * 1024 * 1024; // 50 MB 單檔上限
let _idbPromise = null;

function idbOpen(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject) => {
    if(!('indexedDB' in window)) return reject(new Error('IndexedDB 不支援'));
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains(IDB_STORE)){
        db.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _idbPromise;
}

async function idbPut(key, blob){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).put(blob, key);
    req.onsuccess = () => resolve(key);
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbDelete(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function idbKeys(){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).getAllKeys();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function idbUsage(){
  if(navigator.storage && navigator.storage.estimate){
    try { return await navigator.storage.estimate(); } catch(e){}
  }
  return { usage: 0, quota: 0 };
}

/* ════════════════════════════════════════════════════════════
   GOOGLE DRIVE 整合
   ──────────────────────────────────────────────────────────── */
let _gapiReady = false;
let _gisReady = false;
let _gdToken = null;
let _gdTokenExpiry = 0;
const GD_SCOPE = 'https://www.googleapis.com/auth/drive.file';

// 載入 Google API + Google Identity Services（lazy）
async function gdLoadScripts(){
  if(_gapiReady && _gisReady) return;
  await Promise.all([
    new Promise((res, rej) => {
      if(window.gapi){ _gapiReady = true; res(); return; }
      const s = document.createElement('script');
      s.src = 'https://apis.google.com/js/api.js';
      s.onload = () => { _gapiReady = true; res(); };
      s.onerror = () => rej(new Error('無法載入 Google API'));
      document.head.appendChild(s);
    }),
    new Promise((res, rej) => {
      if(window.google && window.google.accounts){ _gisReady = true; res(); return; }
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => { _gisReady = true; res(); };
      s.onerror = () => rej(new Error('無法載入 Google Identity'));
      document.head.appendChild(s);
    })
  ]);
  await new Promise(res => gapi.load('client', res));
  try {
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
    });
  } catch(e){ /* 即使 init 失敗仍可走 raw fetch */ }
}

function gdConfig(){
  if(!App.db || !App.db.settings) return {};
  return App.db.settings.googleDrive || {};
}

function gdIsConfigured(){
  const c = gdConfig();
  return !!c.clientId;
}

function gdIsAuthed(){
  return !!_gdToken && Date.now() < _gdTokenExpiry;
}

// 授權登入（取得 access token）
async function gdAuth(){
  await gdLoadScripts();
  const cfg = gdConfig();
  if(!cfg.clientId) throw new Error('未設定 Google Client ID');
  return new Promise((res, rej) => {
    try {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: cfg.clientId,
        scope: GD_SCOPE,
        callback: (resp) => {
          if(resp.error){ rej(new Error(resp.error)); return; }
          _gdToken = resp.access_token;
          _gdTokenExpiry = Date.now() + (parseInt(resp.expires_in) || 3600) * 1000;
          try { gapi.client.setToken({ access_token: _gdToken }); } catch(e){}
          res(resp);
        },
      });
      client.requestAccessToken({ prompt: cfg.skipPrompt ? '' : 'consent' });
    } catch(e){ rej(e); }
  });
}

// 上傳檔案到 Drive（multipart）
async function gdUpload(file, folderId){
  if(!gdIsAuthed()) await gdAuth();
  const metadata = {
    name: file.name,
    mimeType: file.type || 'application/octet-stream'
  };
  if(folderId) metadata.parents = [folderId];
  const boundary = '-------314159265358979323846';
  const delim = '\r\n--' + boundary + '\r\n';
  const close = '\r\n--' + boundary + '--';

  const base64 = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => {
      const r = reader.result;
      const idx = r.indexOf(',');
      res(idx >= 0 ? r.slice(idx + 1) : r);
    };
    reader.onerror = () => rej(reader.error);
    reader.readAsDataURL(file);
  });

  const body =
    delim +
    'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
    JSON.stringify(metadata) +
    delim +
    'Content-Type: ' + (file.type || 'application/octet-stream') + '\r\n' +
    'Content-Transfer-Encoding: base64\r\n\r\n' +
    base64 +
    close;

  const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,webContentLink,name,size', {
    method: 'POST',
    headers: {
      Authorization: 'Bearer ' + _gdToken,
      'Content-Type': 'multipart/related; boundary="' + boundary + '"'
    },
    body
  });
  if(!resp.ok){
    const err = await resp.text();
    throw new Error('Drive 上傳失敗：' + err);
  }
  const data = await resp.json();

  // 設為任何人有連結就可看（學生 ↔ 老師共用）
  try {
    await fetch('https://www.googleapis.com/drive/v3/files/' + data.id + '/permissions', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + _gdToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'reader', type: 'anyone' })
    });
  } catch(e){ console.warn('[gdUpload permission]', e); }

  return data;
}

// 上傳 File，回傳 metadata：依設定智能切換 IDB / Google Drive
async function attachUpload(file){
  if(!file) throw new Error('沒有檔案');
  const DRIVE_MAX = 1024 * 1024 * 1024; // 1 GB（單檔 Drive 限制；Drive 本身允許更大但保守）

  const cfg = gdConfig();
  const driveEnabled = !!(cfg && cfg.enabled && cfg.clientId);
  const useDriveForAll = driveEnabled && cfg.mode === 'always';
  const useDriveOverflow = driveEnabled && cfg.mode === 'overflow';
  const overflowThreshold = ((cfg && cfg.overflowThreshold) || 80) / 100;

  // 決定儲存目標
  let target = 'idb';
  if(useDriveForAll){
    target = 'drive';
  } else if(useDriveOverflow){
    try {
      const usage = await idbUsage();
      const pct = usage.quota ? (usage.usage / usage.quota) : 0;
      if(pct >= overflowThreshold) target = 'drive';
    } catch(e){}
  }

  // 強制 Drive：超過 IDB 單檔上限
  if(file.size > ATTACH_MAX_SIZE){
    if(driveEnabled){
      target = 'drive';
    } else {
      throw new Error('檔案太大（' + Math.round(file.size/1024/1024) + ' MB），請啟用 Google Drive 儲存');
    }
  }

  if(file.size > DRIVE_MAX){
    throw new Error('檔案超過 1 GB');
  }

  if(target === 'drive'){
    try {
      const data = await gdUpload(file, cfg.folderId);
      return {
        name: file.name,
        type: file.type || '',
        size: file.size,
        storage: 'drive',
        driveFileId: data.id,
        driveLink: data.webViewLink,
        driveDownloadLink: data.webContentLink,
        storedAt: Date.now()
      };
    } catch(e){
      console.warn('[Drive upload failed, fallback to IDB]', e);
      if(file.size > ATTACH_MAX_SIZE){
        throw new Error('Drive 上傳失敗且本機容量不足：' + e.message);
      }
      try { toast('Drive 上傳失敗，改用本機儲存：' + e.message, 'warn', 5000); } catch(_){}
      // fallthrough to IDB
    }
  }

  // IDB 儲存（預設路徑）
  const key = _newAttachKey();
  await idbPut(key, file);
  return {
    name: file.name,
    type: file.type || '',
    size: file.size,
    storage: 'idb',
    key: key,
    storedAt: Date.now()
  };
}

// 取得附件的可訪問 URL（IDB → blob: URL；Drive → webViewLink）
async function attachGetUrl(meta){
  if(!meta) return null;
  // Drive 檔案：直接回 webViewLink（公開連結）
  if(meta.storage === 'drive' || meta.driveFileId){
    return meta.driveLink || ('https://drive.google.com/file/d/' + meta.driveFileId + '/view');
  }
  // 新版：key 在 IDB
  if(meta.key){
    try {
      const blob = await idbGet(meta.key);
      if(!blob) return null;
      return URL.createObjectURL(blob);
    } catch(e){ return null; }
  }
  // 舊版：base64 data URL
  if(meta.data && typeof meta.data === 'string'){
    return meta.data;
  }
  return null;
}

// 下載附件（新舊版 + Drive 皆可）
async function attachDownload(meta){
  if(!meta){ toast('找不到附件','danger'); return; }
  // Drive：直接開連結讓使用者下載
  if(meta.storage === 'drive' || meta.driveFileId){
    const url = meta.driveLink || ('https://drive.google.com/file/d/' + meta.driveFileId + '/view');
    window.open(url, '_blank');
    return;
  }
  const url = await attachGetUrl(meta);
  if(!url){ toast('找不到附件檔案','danger'); return; }
  const a = document.createElement('a');
  a.href = url;
  a.download = meta.name || 'attachment';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    a.remove();
    // 只 revoke Blob URL（base64 data URL 不需要）
    if(url.indexOf('blob:') === 0) URL.revokeObjectURL(url);
  }, 200);
}

// 預覽附件（新分頁）

async function attachDelete(meta){
  if(!meta) return;

    try { await gdDelete(meta.driveFileId); } catch(e){ console.warn('[gdDelete]', e); }
    return;
  }
  if(meta.key){
    try { await idbDelete(meta.key); } catch(e){}
  }
}

// 把舊版 base64 data URL → 轉成 Blob → 存 IDB
async function migrateAttachIfNeeded(meta){
  if(!meta) return meta;
  if(meta.key) return meta; // 已是新版
  if(meta.data && typeof meta.data === 'string' && meta.data.indexOf('data:') === 0){
    try {
      const resp = await fetch(meta.data);
      const blob = await resp.blob();
      const key = _newAttachKey();
      await idbPut(key, blob);
      return {
        name: meta.name,
        type: meta.type || blob.type || '',
        size: meta.size || blob.size,
        key: key,
        storedAt: Date.now(),
        migrated: true
      };
    } catch(e){
      console.warn('[migrate attach]', e);
      return meta;
    }
  }
  return meta;
}

// 啟動時批量 migrate
async function migrateAllAttachments(){
  if(!App.db) return 0;
  let migrated = 0;
  // submissions: attach + attaches[]
  for(const s of App.db.submissions || []){
    if(s.attach && !s.attach.key && s.attach.data){
      const nm = await migrateAttachIfNeeded(s.attach);
      if(nm && nm.key){ s.attach = nm; migrated++; }
    }
    if(Array.isArray(s.attaches)){
      for(let i = 0; i < s.attaches.length; i++){
        const a = s.attaches[i];
        if(a && !a.key && a.data){
          const nm = await migrateAttachIfNeeded(a);
          if(nm && nm.key){ s.attaches[i] = nm; migrated++; }
        }
      }
    }
  }
  // assignments: attach
  for(const a of App.db.assignments || []){
    if(a.attach && !a.attach.key && a.attach.data){
      const nm = await migrateAttachIfNeeded(a.attach);
      if(nm && nm.key){ a.attach = nm; migrated++; }
    }
  }
  if(migrated > 0) saveDB();
  return migrated;
}

// 清理沒被引用的孤兒附件
async function cleanupOrphanAttachments(){
  let allKeys;
  try { allKeys = await idbKeys(); } catch(e){ toast('讀取 IDB 失敗','danger'); return; }
  const used = new Set();
  (App.db.submissions || []).forEach(s => {
    if(s.attach && s.attach.key) used.add(s.attach.key);
    if(Array.isArray(s.attaches)) s.attaches.forEach(a => { if(a && a.key) used.add(a.key); });
  });
  (App.db.assignments || []).forEach(a => {
    if(a.attach && a.attach.key) used.add(a.attach.key);
  });
  const orphans = allKeys.filter(k => typeof k === 'string' && k.indexOf('attach_') === 0 && !used.has(k));
  if(!orphans.length){ toast('沒有孤兒附件','info'); return; }
  const ok = await confirmDlg('找到 ' + orphans.length + ' 個未被引用的附件，是否刪除？', { danger:true });
  if(!ok) return;
  let n = 0;
  for(const k of orphans){
    try { await idbDelete(k); n++; } catch(e){}
  }
  toast('已清除 ' + n + ' 個孤兒附件','success');
  if(typeof rerender === 'function') rerender();
}

/* ════════════════════════════════════════════════════════════
   PHASE 2: SVG CHART HELPERS
   ──────────────────────────────────────────────────────────── */
function lineChart(data, opts={}){
  // data: array of {label, value} or numbers
  if(!data || !data.length) return '<div class="empty"><div class="ico">📊</div><div>無資料</div></div>';
  const pts = data.map(d => typeof d === 'number' ? d : (d.value||0));
  const labels = data.map((d,i) => typeof d === 'object' ? (d.label||String(i)) : String(i));
  const w = opts.width || 480, h = opts.height || 180;
  const padL = 36, padR = 12, padT = 14, padB = 26;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const max = opts.max || Math.max.apply(null, pts.concat([1]));
  const min = opts.min || 0;
  const stepX = pts.length > 1 ? innerW / (pts.length - 1) : 0;
  const sy = v => padT + innerH - (innerH * (v - min) / (max - min || 1));
  const sx = i => padL + i * stepX;
  const poly = pts.map((v,i) => sx(i)+','+sy(v)).join(' ');
  const area = poly + ' ' + sx(pts.length-1) + ',' + (padT+innerH) + ' ' + padL + ',' + (padT+innerH);
  let g = `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  // grid
  for(let i=0;i<=4;i++){
    const y = padT + (innerH * i / 4);
    g += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    g += `<text x="${padL-6}" y="${y+4}" font-size="10" text-anchor="end" fill="var(--text-muted)">${Math.round(max - (max-min)*i/4)}</text>`;
  }
  g += `<polygon points="${area}" fill="var(--primary-soft)" opacity=".5"/>`;
  g += `<polyline points="${poly}" fill="none" stroke="var(--primary)" stroke-width="2"/>`;
  pts.forEach((v,i) => {
    g += `<circle cx="${sx(i)}" cy="${sy(v)}" r="3" fill="var(--primary)"/>`;
    if(labels[i] && pts.length <= 14){
      g += `<text x="${sx(i)}" y="${h-8}" font-size="10" text-anchor="middle" fill="var(--text-muted)">${esc(labels[i])}</text>`;
    }
  });
  g += `</svg>`;
  return g;
}

function barChart(data, opts={}){
  if(!data || !data.length) return '<div class="empty"><div class="ico">📊</div><div>無資料</div></div>';
  const labels = data.map(d => d.label||'');
  const vals = data.map(d => d.value||0);
  const w = opts.width || 480, h = opts.height || 180;
  const padL = 36, padR = 12, padT = 14, padB = 30;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const max = opts.max || Math.max.apply(null, vals.concat([1]));
  const bw = innerW / vals.length * 0.7;
  const gap = innerW / vals.length * 0.3;
  let g = `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<=4;i++){
    const y = padT + (innerH * i / 4);
    g += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    g += `<text x="${padL-6}" y="${y+4}" font-size="10" text-anchor="end" fill="var(--text-muted)">${Math.round(max - max*i/4)}</text>`;
  }
  vals.forEach((v,i) => {
    const x = padL + i * (bw + gap) + gap/2;
    const bh = innerH * v / (max||1);
    const y = padT + innerH - bh;
    const color = (opts.colors && opts.colors[i]) || 'var(--primary)';
    g += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="3"><title>${esc(labels[i])}: ${v}</title></rect>`;
    g += `<text x="${x+bw/2}" y="${h-12}" font-size="10" text-anchor="middle" fill="var(--text-muted)">${esc(labels[i])}</text>`;
    if(v > 0){
      g += `<text x="${x+bw/2}" y="${y-3}" font-size="10" text-anchor="middle" fill="var(--text)">${v}</text>`;
    }
  });
  g += `</svg>`;
  return g;
}

function donutChart(parts, opts={}){
  // parts: [{label, value, color}]
  const total = parts.reduce((a,b)=> a + (b.value||0), 0);
  if(!total) return '<div class="empty"><div class="ico">🍩</div><div>無資料</div></div>';
  const r = 60, cx = 80, cy = 80;
  let acc = 0;
  let g = `<svg class="chart-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" style="max-width:200px">`;
  parts.forEach(p => {
    const v = p.value||0;
    if(!v) return;
    const a0 = acc/total * Math.PI*2 - Math.PI/2;
    const a1 = (acc+v)/total * Math.PI*2 - Math.PI/2;
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const large = (v/total > 0.5) ? 1 : 0;
    g += `<path d="M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z" fill="${p.color||'var(--primary)'}"><title>${esc(p.label||'')}: ${v}</title></path>`;
    acc += v;
  });
  g += `<circle cx="${cx}" cy="${cy}" r="${r*0.55}" fill="var(--surface)"/>`;
  g += `<text x="${cx}" y="${cy-2}" font-size="22" font-weight="700" text-anchor="middle" fill="var(--text)">${total}</text>`;
  g += `<text x="${cx}" y="${cy+14}" font-size="10" text-anchor="middle" fill="var(--text-muted)">${esc(opts.label||'總計')}</text>`;
  g += `</svg>`;
  return g;
}

function studentRegisterFlow(){
  // 完整註冊：姓名 + 學號 + email + 班級 + 座號 + 密碼
  const m = modal('', { dismissable:false });
  m.root.appendChild(el('h2', null, '🧑‍🎓 學生註冊'));
  m.root.appendChild(el('p', { style:{color:'var(--text-muted)',fontSize:'13px',marginBottom:'10px'} },
    '請完整填寫資料，等待老師審核'));

  function field(label, input, hint){
    const f = el('div', { class:'field' });
    const lbl = el('label', { class:'label' }, label);
    f.appendChild(lbl);
    f.appendChild(input);
    if(hint) f.appendChild(el('div', { class:'small muted', style:{marginTop:'4px'} }, hint));
    return f;
  }

  const iName = el('input', { class:'input', placeholder:'王小明' });
  const iSid = el('input', { class:'input', placeholder:'例：1095001', inputmode:'numeric' });
  const iCls = el('input', { class:'input', placeholder:'例：202' });
  const iSeat = el('input', { class:'input', type:'number', placeholder:'例：5', min:'0' });
  const iEmail = el('input', { class:'input', type:'email', placeholder:'your@example.com', autocomplete:'email' });
  const iPw = el('input', { class:'input', type:'password', placeholder:'至少 4 字元' });
  const iPw2 = el('input', { class:'input', type:'password', placeholder:'再輸入一次' });

  m.root.appendChild(field('姓名 *', iName));
  m.root.appendChild(field('學號 *', iSid, '預設密碼為學號末 4 碼'));

  // 兩欄並排（班級+座號）
  const row2 = el('div', { class:'grid-2', style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'} },
    field('班級', iCls),
    field('座號', iSeat)
  );
  m.root.appendChild(row2);

  m.root.appendChild(field('📧 Email *', iEmail, '忘記密碼時可使用此 email 重設'));
  m.root.appendChild(field('密碼 *', iPw, '至少 4 字元'));
  m.root.appendChild(field('確認密碼 *', iPw2));

  const err = el('div', { class:'small', style:{color:'var(--danger)',display:'none',padding:'8px 12px',background:'var(--danger-soft)',borderRadius:'8px',marginTop:'8px'} });
  m.root.appendChild(err);

  function showErr(msg){ err.textContent = msg; err.style.display = 'block'; }

  const submit = async ()=> {
    const name = iName.value.trim();
    const sid = iSid.value.trim();
    const cls = iCls.value.trim();
    const seat = parseInt(iSeat.value, 10) || 0;
    const email = iEmail.value.trim();
    const pw = iPw.value;
    const pw2 = iPw2.value;

    err.style.display = 'none';
    if(!name) return showErr('請輸入姓名');
    if(!sid) return showErr('請輸入學號');
    if(!email) return showErr('請輸入 Email（忘記密碼時需要）');
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showErr('Email 格式錯誤');
    if(!pw || pw.length < 4) return showErr('密碼至少 4 字元');
    if(pw !== pw2) return showErr('兩次密碼不一致');

    // 檢查學號重複
    const dupStu = App.db.students.find(s => String(s.sid||'') === sid);
    const dupPending = App.db.pending.find(p => String(p.sid||'') === sid);
    if(dupStu || dupPending) return showErr('此學號已被使用');

    const pending = {
      id: nid(),
      name, sid, cls, seat, email,
      password: await hashPassword(pw),
      mustChangePw: false,  // 自己註冊的不用再改
      ts: Date.now()
    };
    App.db.pending.push(pending);
    saveDB();
    try { Sync.setMap('pending', App.db.pending); bcNotify(); } catch(e){}
    if(typeof logOp === 'function') logOp('register', name + ' 註冊申請');
    m.close();
    toast('✅ 註冊已送出！等待老師審核','success', 3500);
    rerender();
  };

  iPw2.addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick: ()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick: submit }, '✓ 送出申請'));
  m.root.appendChild(actions);

  setTimeout(()=> iName.focus(), 80);
}

function loadLastUser(){
  try { return JSON.parse(localStorage.getItem(LS_LAST_USER) || 'null'); } catch(e){ return null; }
}
function saveLastUser(u){
  try {
    if(u) localStorage.setItem(LS_LAST_USER, JSON.stringify(u));
    else localStorage.removeItem(LS_LAST_USER);
  } catch(e){}
}
function loadRemember(){
  try { return JSON.parse(localStorage.getItem(LS_REMEMBER) || 'null'); } catch(e){ return null; }
}
function saveRemember(r){
  try {
    if(r) localStorage.setItem(LS_REMEMBER, JSON.stringify(r));
    else localStorage.removeItem(LS_REMEMBER);
  } catch(e){}
}
function loadLoginStep(){
  try { return localStorage.getItem(LS_LOGIN_STEP) || 'choose'; } catch(e){ return 'choose'; }
}
function saveLoginStep(step){
  try {
    if(step) localStorage.setItem(LS_LOGIN_STEP, step);
    else localStorage.removeItem(LS_LOGIN_STEP);
  } catch(e){}

// Try one-click continue from saved last user.
function quickContinueAsLast(){
  const lu = loadLastUser();
  if(!lu) return toast('沒有上次登入紀錄','danger');
  if(lu.role === 'teacher'){
    const a = App.db.accounts.find(x => x.id === lu.id || x.username === lu.username);
    if(!a) return toast('帳號已被刪除，請重新登入','danger');
    // remember-me: skip password if within 7 days
    const rem = loadRemember();
    const remOk = rem && rem.username === a.username && (Date.now() - rem.ts) < 7*24*3600*1000;
    if(remOk){
      App.session = { role:'teacher', id:a.id, name:a.name, username:a.username };
      saveSession();
      saveLastUser({ role:'teacher', id:a.id, username:a.username, name:a.name, ts:Date.now() });
      toast('歡迎回來，' + a.name + '！','success');
      go('overview');
      return;
    }
    // otherwise prompt for password
    App._loginStage = 'teacher';
    App._loginPrefill = { username: a.username };
    rerender();
    return;
  }
  if(lu.role === 'student'){
    const s = App.db.students.find(x => x.id === lu.id);
    if(!s) return toast('學生已不存在','danger');
    studentTapToLogin(s.id);
  }
}

    App._loginStage = (App.loginRole === 'teacher' || App.loginRole === 'student')

  }

          el('div', { class:'last-user-meta' },
            (lastUser.role === 'teacher' ? '老師' : '學生') +

          )
        )

    const teacherCard = el('button', { class:'role-choice-card', onclick: e => {
      e.currentTarget.classList.add('tapped');

    }},

      el('div', { class:'rc-title' }, '我是老師'),
      el('div', { class:'rc-sub' }, '班級管理 / 成績 / 公告')
    );
    const studentCard = el('button', { class:'role-choice-card', onclick: e => {
      e.currentTarget.classList.add('tapped');
      setTimeout(()=> { App._loginStage = 'student'; rerender(); }, 220);
    }},
      el('span', { class:'rc-ico' }, '🧑‍🎓'),
      el('div', { class:'rc-title' }, '我是學生'),
      el('div', { class:'rc-sub' }, '簽到 / 作業 / 成績')
    );
    grid.appendChild(teacherCard);
    grid.appendChild(studentCard);
    stage.appendChild(grid);
    card.appendChild(stage);
  }
  else if(App._loginStage === 'teacher'){
    card.appendChild(renderLoginTeacherStage());
  }

    card.appendChild(renderLoginStudentStage());

    const ok = await confirmDlg('要切換到別的教室嗎？目前的設定會被清除（資料保留）');
    if(ok){
      App.cfg = null; App.session = null;

function renderLoginTeacherStage(){
  const stage = el('div', { class:'login-stage' });
  stage.appendChild(el('h3', { style:{marginBottom:'14px'} }, '🧑‍🏫 老師登入'));

  const hasDefault = App.db.accounts.some(a => a.username === 'admin' && a.password === 'admin123');
  const prefill = App._loginPrefill || {};
  const rememberSaved = loadRemember();

  const f1 = el('div', { class:'field' });
  f1.appendChild(el('label', { class:'label' }, '帳號'));
  const i1 = el('input', { class:'input', placeholder:'admin', autocomplete:'username',
    value: prefill.username || (rememberSaved && rememberSaved.username) || '' });
  f1.appendChild(i1);
  stage.appendChild(f1);

  const f2 = el('div', { class:'field' });
  f2.appendChild(el('label', { class:'label' }, '密碼'));
  const pwWrap = el('div', { class:'pw-input-wrap' });
  const i2 = el('input', { class:'input', type:'password', placeholder:'密碼', autocomplete:'current-password' });
  const togglePw = el('button', { type:'button', class:'pw-toggle', onclick: e => {
    e.preventDefault();
    if(i2.type === 'password'){ i2.type = 'text'; togglePw.textContent = '🙈'; }
    else { i2.type = 'password'; togglePw.textContent = '👁'; }
  }}, '👁');
  pwWrap.appendChild(i2); pwWrap.appendChild(togglePw);
  f2.appendChild(pwWrap);
  stage.appendChild(f2);

  // Remember me
  const rememberLabel = el('label', { class:'remember-row' });
  const rememberChk = el('input', { type:'checkbox' });
  if(rememberSaved && rememberSaved.username) rememberChk.checked = true;
  rememberLabel.appendChild(rememberChk);
  rememberLabel.appendChild(document.createTextNode(' 記住我（7 天內免輸入密碼）'));
  stage.appendChild(rememberLabel);

  if(hasDefault){
    const hint = el('div', { class:'default-hint' },
      el('span', null, '💡 預設帳號：'),
      el('code', { style:{fontSize:'12px'} }, 'admin / admin123'),
      el('div', { class:'dh-actions' },
        el('button', { onclick: e => { e.preventDefault(); i1.value='admin'; i2.value='admin123'; }}, '使用預設'),
        el('button', { onclick: e => { e.preventDefault(); i1.value=''; i2.value=''; i1.focus(); }}, '清除')
      )
    );
    stage.appendChild(hint);
  }

  const submit = async ()=>{
    const u = i1.value.trim(); const pw = i2.value;
    if(!u || !pw){ toast('請輸入帳號和密碼','danger'); return; }
    const candidate = App.db.accounts.find(x => x.username === u);
    if(!candidate){ toast('帳號或密碼錯誤','danger'); return; }
    const ok = await verifyPassword(pw, candidate.password);
    if(!ok){ toast('帳號或密碼錯誤','danger'); return; }
    // 自動升級：若仍為明文密碼，登入後改存雜湊
    if(!isPasswordHashed(candidate.password)){
      try {
        candidate.password = await hashPassword(pw);
        saveDB();
        try { Sync.setMap('accounts', App.db.accounts); } catch(e){}
      } catch(e){}
    }
    const a = candidate;
    App.session = { role:'teacher', id:a.id, name:a.name, username:a.username };
    saveSession();
    saveLastUser({ role:'teacher', id:a.id, username:a.username, name:a.name, ts:Date.now() });
    if(rememberChk.checked){
      saveRemember({ username:a.username, ts:Date.now() });
    } else {
      saveRemember(null);
    }
    App._loginStage = null; App._loginPrefill = null;
    toast('歡迎，' + a.name + '！','success');
    go('overview');
  };

  const btnRow = el('div', { class:'flex', style:{marginTop:'10px'} },
    el('button', { class:'btn', style:{flex:'0 0 auto'}, onclick: ()=> { App._loginStage = 'choose'; App._loginPrefill = null; rerender(); } }, '← 返回'),
    el('button', { class:'btn btn-primary', style:{flex:'1'}, onclick: submit }, '登入 →')
  );
  stage.appendChild(btnRow);

  // 🔑 忘記密碼連結
  stage.appendChild(el('div', { class:'small', style:{textAlign:'center',marginTop:'14px'} },
    el('a', { href:'javascript:void(0)', onclick: showTeacherForgotPassword,
      style:{color:'var(--primary)',textDecoration:'underline',cursor:'pointer'} },
      '🔑 忘記密碼？')
  ));

  i1.addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
  i2.addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
  setTimeout(()=> { (i1.value ? i2 : i1).focus(); }, 80);

  return stage;
}

  );

  // 選項 2: 自訂新密碼（保留原帳號）
  const opt2 = el('div', { style:{background:'var(--surface-2)',padding:'14px',borderRadius:'10px',marginTop:'10px'} },
    el('div', { style:{fontWeight:'700',marginBottom:'8px',fontSize:'14px'} }, '✏️ 自訂新密碼'),
    el('div', { class:'small muted', style:{marginBottom:'10px'} }, '保留原本的老師帳號，只改密碼')
  );
  const accSel = el('select', { class:'input select', style:{marginBottom:'8px'} });
  (App.db.accounts || []).forEach(a => {
    accSel.appendChild(el('option', { value:a.id }, a.username + '（' + (a.name||'老師') + '）'));
  });
  if(!App.db.accounts || !App.db.accounts.length){
    accSel.appendChild(el('option', { value:'' }, '尚無帳號'));
    accSel.disabled = true;
  }
  opt2.appendChild(accSel);
  const newPw = el('input', { class:'input', type:'text', placeholder:'新密碼（至少 4 字元）', style:{marginBottom:'8px'} });
  opt2.appendChild(newPw);
  opt2.appendChild(el('button', { class:'btn btn-block', onclick: async ()=> {
    const accId = accSel.value;
    const pw = newPw.value.trim();
    if(!accId){ toast('請選擇帳號','warning'); return; }
    if(!pw || pw.length < 4){ toast('密碼至少 4 字元','warning'); return; }
    const ok = await confirmDlg('確定更改此帳號的密碼？', { title:'確認' });
    if(!ok) return;
    const acc = App.db.accounts.find(a => String(a.id) === String(accId));
    if(!acc){ toast('帳號不存在','danger'); return; }
    acc.password = await hashPassword(pw);
    saveDB();
    try { Sync.setMap('accounts', App.db.accounts); bcNotify(); } catch(e){}
    if(typeof logOp === 'function') logOp('teacherPwChange', '老師 ' + acc.username + ' 改密碼');
    m.close();
    toast('✅ 密碼已更新！請用新密碼登入','success', 5000);
  }}, '✓ 更新密碼'));
  m.root.appendChild(opt2);

  // 選項 3: 全部重設
  const opt3 = el('div', { style:{background:'var(--danger-soft)',padding:'14px',borderRadius:'10px',marginTop:'10px'} },
    el('div', { style:{fontWeight:'700',marginBottom:'4px',fontSize:'14px',color:'var(--danger)'} }, '⚠️ 全部清除重新開始'),
    el('div', { class:'small muted', style:{marginBottom:'10px'} }, '清空所有資料（學生、紀錄全消失）'),
    el('button', { class:'btn btn-danger btn-block', onclick: ()=> {
      m.close();
      location.href = location.pathname + '?reset=1';
    }}, '🗑️ 全部清除')
  );
  m.root.appendChild(opt3);

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick: ()=> m.close() }, '取消'));
  m.root.appendChild(actions);
}

function renderLoginStudentStage(){
  // 🔒 隱私友善版：班級下拉 → 姓名下拉 → 密碼
  // 不顯示其他同學的卡片清單
  const stage = el('div', { class:'login-stage' });
  stage.appendChild(el('h3', null, '🧑‍🎓 學生登入'));
  stage.appendChild(el('div', { class:'small muted', style:{marginBottom:'14px'} },
    '依序選擇班級、姓名，輸入密碼即可登入'));

  if(!App.db.students.length){
    stage.appendChild(el('div', { class:'empty', style:{padding:'24px 8px'} },
      el('div', { class:'ico', style:{fontSize:'40px'} }, '🧑‍🎓'),
      el('div', null, '老師還沒建立學生名單'),
      el('div', { class:'tiny muted', style:{marginTop:'4px'} }, '你可以申請註冊，等待老師審核')
    ));
    stage.appendChild(el('button', { class:'btn btn-primary btn-block', style:{marginTop:'10px'}, onclick: studentRegisterFlow }, '＋ 申請註冊'));
    stage.appendChild(el('button', { class:'btn btn-block', style:{marginTop:'6px'}, onclick: ()=> { App._loginStage = 'choose'; rerender(); } }, '← 返回'));
    return stage;
  }

  // 取得所有班級（去重 + 排序）
  const classes = [...new Set(App.db.students.map(s => s.cls || '未分班'))].sort((a,b)=> a.localeCompare(b));

  // 班級下拉
  const f1 = el('div', { class:'field' });
  f1.appendChild(el('label', { class:'label' }, '① 選擇班級'));
  const selCls = el('select', { class:'input select' });
  selCls.appendChild(el('option', { value:'' }, '── 請選擇班級 ──'));
  classes.forEach(c => {
    const o = el('option', { value:c }, c);
    if(App._loginCls === c) o.setAttribute('selected','');
    selCls.appendChild(o);
  });
  f1.appendChild(selCls);
  stage.appendChild(f1);

  // 姓名下拉（依班級篩選）
  const f2 = el('div', { class:'field' });
  f2.appendChild(el('label', { class:'label' }, '② 選擇姓名'));
  const selName = el('select', { class:'input select' });
  f2.appendChild(selName);
  stage.appendChild(f2);

  // 密碼欄
  const f3 = el('div', { class:'field' });
  f3.appendChild(el('label', { class:'label' }, '③ 輸入密碼'));
  const pwWrap = el('div', { class:'pw-input-wrap' });
  const iPw = el('input', { class:'input', type:'password', placeholder:'輸入密碼', autocomplete:'current-password' });
  const togBtn = el('button', { type:'button', class:'pw-toggle', title:'顯示/隱藏密碼', onclick: ()=> {
    iPw.type = iPw.type === 'password' ? 'text' : 'password';
    togBtn.textContent = iPw.type === 'password' ? '👁' : '🙈';
  }}, '👁');
  pwWrap.appendChild(iPw);
  pwWrap.appendChild(togBtn);
  f3.appendChild(pwWrap);
  stage.appendChild(f3);

  function refreshNameList(){
    const cls = selCls.value;
    selName.innerHTML = '';
    if(!cls){
      const o = el('option', { value:'' }, '── 請先選班級 ──');
      o.setAttribute('disabled','');
      selName.appendChild(o);
      selName.disabled = true;
      return;
    }
    selName.disabled = false;
    selName.appendChild(el('option', { value:'' }, '── 請選擇姓名 ──'));
    const list = App.db.students
      .filter(s => (s.cls || '未分班') === cls)
      .sort((a,b) => (a.seat||0) - (b.seat||0) || (a.name||'').localeCompare(b.name||''));
    list.forEach(s => {
      // 隱私：顯示「座號 + 姓名首字 + ○ + 姓名末字」(可選)
      // 這裡用完整姓名（學生選自己的本來就知道）
      const o = el('option', { value:String(s.id) }, (s.seat ? '['+s.seat+'] ' : '') + s.name);
      if(App._loginStuId == s.id) o.setAttribute('selected','');
      selName.appendChild(o);
    });
  }
  selCls.addEventListener('change', () => {
    App._loginCls = selCls.value;
    App._loginStuId = '';
    refreshNameList();
    iPw.value = '';
  });
  selName.addEventListener('change', () => {
    App._loginStuId = selName.value;
    iPw.focus();
  });
  refreshNameList();

  // 登入函式
  async function attemptLogin(){
    const sid = parseInt(selName.value);
    if(!selCls.value) return toast('請先選擇班級', 'warning');
    if(!sid) return toast('請選擇你的姓名', 'warning');
    const pw = iPw.value;
    if(!pw) return toast('請輸入密碼', 'warning');
    const s = App.db.students.find(x => x.id === sid);
    if(!s) return toast('學生不存在','danger');
    const stored = s.password || s.pass || (String(s.sid||'0000').slice(-4));
    const ok = await verifyPassword(pw, stored);
    if(!ok){
      toast('密碼錯誤','danger');
      iPw.value = '';
      iPw.focus();
      return;
    }
    // 自動升級為雜湊
    if(!isPasswordHashed(s.password)){
      try {
        s.password = await hashPassword(pw);
        saveDB();
        try { Sync.setMap('students', App.db.students); } catch(e){}
      } catch(e){}
    }
    // 登入成功
    finishStudentLogin(s);
  }
  iPw.addEventListener('keydown', e => { if(e.key === 'Enter') attemptLogin(); });

  // 登入按鈕
  stage.appendChild(el('button', { class:'btn btn-primary btn-block', style:{marginTop:'8px'}, onclick: attemptLogin }, '登入'));

  // 忘記密碼
  stage.appendChild(el('div', { class:'small', style:{textAlign:'center',marginTop:'10px'} },
    el('a', { href:'javascript:void(0)', onclick: showForgotPassword,
      style:{color:'var(--primary)',textDecoration:'underline',cursor:'pointer'} },
      '🔑 忘記密碼？')
  ));

  stage.appendChild(el('hr', { class:'sep' }));
  stage.appendChild(el('div', { class:'flex', style:{flexWrap:'wrap',gap:'8px'} },
    el('button', { class:'btn', style:{flex:'1'}, onclick: ()=> { App._loginStage = 'choose'; App._loginCls=''; App._loginStuId=''; rerender(); } }, '← 返回'),
    el('button', { class:'btn', style:{flex:'1'}, onclick: studentRegisterFlow }, '＋ 申請註冊')
  ));
  return stage;
}

// 忘記密碼說明
function showForgotPassword(){
  const m = modal('', { dismissable:true });
  m.root.appendChild(el('h2', null, '🔑 忘記密碼'));
  m.root.appendChild(el('p', { style:{lineHeight:'1.6',fontSize:'14px',color:'var(--text)',marginBottom:'12px'} },
    '輸入註冊時填的 Email，即可發送重設密碼請求給老師：'));

  // 學號
  const f1 = el('div', { class:'field' });
  f1.appendChild(el('label', { class:'label' }, '學號'));
  const iSid = el('input', { class:'input', placeholder:'例：1095001', inputmode:'numeric' });
  f1.appendChild(iSid);
  m.root.appendChild(f1);

  // Email
  const f2 = el('div', { class:'field' });
  f2.appendChild(el('label', { class:'label' }, '📧 註冊 Email'));
  const iEmail = el('input', { class:'input', type:'email', placeholder:'your@example.com' });
  f2.appendChild(iEmail);
  m.root.appendChild(f2);

  const err = el('div', { class:'small', style:{color:'var(--danger)',display:'none',padding:'8px 12px',background:'var(--danger-soft)',borderRadius:'8px',marginBottom:'8px'} });
  m.root.appendChild(err);

  // 說明
  m.root.appendChild(el('div', { style:{background:'var(--surface-2)',padding:'12px',borderRadius:'8px',marginTop:'10px',fontSize:'13px',lineHeight:'1.7'} },
    el('div', { style:{fontWeight:'600',marginBottom:'4px'} }, '💡 找回方式：'),
    el('div', null, '1. 老師會在後台收到通知 → 一鍵重設'),
    el('div', null, '2. 也可請老師直接幫你重設'),
    el('div', { class:'small muted', style:{marginTop:'4px'} }, '預設密碼為學號末 4 碼')
  ));

  const submit = ()=> {
    const sid = iSid.value.trim();
    const email = iEmail.value.trim();
    err.style.display = 'none';
    if(!sid) { err.textContent='請輸入學號'; err.style.display='block'; return; }
    if(!email) { err.textContent='請輸入 Email'; err.style.display='block'; return; }

    // 找對應學生
    const s = App.db.students.find(x => String(x.sid||'') === sid && (x.email||'').toLowerCase() === email.toLowerCase());
    if(!s){
      err.textContent='學號與 Email 不符，請確認後重試（或聯絡老師）';
      err.style.display='block';
      return;
    }

    // 建立重設請求
    App.db.passwordResets = App.db.passwordResets || [];
    // 移除舊的請求
    App.db.passwordResets = App.db.passwordResets.filter(r => r.studentId !== s.id);
    App.db.passwordResets.push({
      id: nid(),
      studentId: s.id,
      studentName: s.name,
      cls: s.cls,
      sid: s.sid,
      email: s.email,
      status: 'pending',
      ts: Date.now()
    });
    saveDB();
    try { Sync.setMap('passwordResets', App.db.passwordResets); bcNotify(); } catch(e){}
    if(typeof logOp === 'function') logOp('pwResetRequest', s.name + ' 申請重設密碼');

    m.close();
    // 成功 modal
    const m2 = modal('', { dismissable:true });
    m2.root.appendChild(el('h2', { style:{color:'var(--success)'} }, '✅ 申請已送出'));
    m2.root.appendChild(el('p', { style:{lineHeight:'1.8'} },
      '已通知老師重設你的密碼。老師核准後，請用「學號末 4 碼」（' + String(s.sid||'').slice(-4) + '）登入，並立即修改密碼。'));
    const a2 = el('div', { class:'modal-actions' });
    a2.appendChild(el('button', { class:'btn btn-primary', onclick:()=> m2.close() }, '我知道了'));
    m2.root.appendChild(a2);
  };

  iEmail.addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick: submit }, '📨 送出申請'));
  m.root.appendChild(actions);
}

/* ════════════════════════════════════════════════════════════
   STUDENT TAP-TO-LOGIN — pick name → enter password modal
   ──────────────────────────────────────────────────────────── */
function studentTapToLogin(studentId){
  const s = App.db.students.find(x => x.id === studentId);
  if(!s) return toast('找不到學生','danger');

  // If no password set on this student, log them in directly.
  // (Common case for V1-imported students whose sid was used as fallback.)
  if(!s.password){
    finishStudentLogin(s);
    return;
  }

  // Ask for password in a focused modal.
  const m = modal('', { dismissable:true });
  const colorIdx = (s.id ? String(s.id).charCodeAt(0) : 0) % 8;
  m.root.appendChild(el('div', { style:{textAlign:'center',marginBottom:'12px'} },
    el('div', { class:'av av-color-' + colorIdx, style:{
      width:'72px',height:'72px',borderRadius:'50%',margin:'0 auto 10px',
      color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'28px',fontWeight:'700'
    }}, initials(s.name)),
    el('h2', null, s.name),
    el('div', { class:'small muted' },
      (s.cls ? s.cls + ' · ' : '') + (s.sid ? '學號 ' + s.sid : (s.seat ? '座號 ' + s.seat : ''))
    )
  ));

  const f = el('div', { class:'field' });
  f.appendChild(el('label', { class:'label' }, '請輸入密碼'));
  const inp = el('input', { class:'input', type:'password', placeholder:'你的密碼', autocomplete:'current-password' });
  f.appendChild(inp);
  const hint = el('div', { class:'tiny muted', style:{marginTop:'4px'} },
    s.sid
      ? '提示：預設密碼為學號末 4 碼 (' + String(s.sid).slice(-4).padStart(4,'0') + ')'
      : '若沒改過，請聯絡老師索取預設密碼'
  );
  f.appendChild(hint);
  m.root.appendChild(f);

  const tryLogin = async () => {
    const pw = inp.value;
    const ok = await verifyPassword(pw, s.password);
    if(!ok){
      toast('密碼錯誤','danger');
      inp.focus(); inp.select();
      return;
    }
    if(!isPasswordHashed(s.password)){
      try {
        s.password = await hashPassword(pw);
        saveDB();
        try { Sync.setMap('students', App.db.students); } catch(e){}
      } catch(e){}
    }
    m.close();
    finishStudentLogin(s);
  };

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn', onclick:()=> m.close() }, '取消'));
  actions.appendChild(el('button', { class:'btn btn-primary', onclick: tryLogin }, '登入 →'));
  m.root.appendChild(actions);

  inp.addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); });
  setTimeout(()=> inp.focus(), 80);
}

function finishStudentLogin(s){
  App.session = { role:'student', id:s.id, name:s.name, cls:s.cls };
  saveSession();
  saveLastUser({ role:'student', id:s.id, name:s.name, cls:s.cls||'', ts:Date.now() });
  App._loginStage = null;
  // 第一次登入或老師重設過密碼 → 強制改密碼
  if(s.mustChangePw){
    toast('歡迎，' + s.name + '！首次登入請更新密碼','info', 4000);
    setTimeout(() => forceChangePassword(s.id), 600);
    return;
  }
  toast('歡迎回來，' + s.name + '！','success');
  go('checkin');
}

// 強制改密碼（無法關閉的 modal）
function forceChangePassword(studentId){
  const s = App.db.students.find(x => x.id === studentId);
  if(!s) return;
  const m = modal('', { dismissable:false });
  m.root.appendChild(el('h2', null, '🔐 請設定新密碼'));
  m.root.appendChild(el('p', { style:{color:'var(--text-muted)',fontSize:'14px',lineHeight:'1.6'} },
    '為了帳號安全，首次登入需要設定屬於你自己的密碼。'));
  m.root.appendChild(el('div', { class:'small muted', style:{marginBottom:'10px'} },
    '🧑‍🎓 ' + s.name + (s.sid ? '（學號 ' + s.sid + '）' : '')));

  const f1 = el('div', { class:'field' });
  f1.appendChild(el('label', { class:'label' }, '新密碼（至少 4 個字元）'));
  const wrap1 = el('div', { class:'pw-input-wrap' });
  const i1 = el('input', { class:'input', type:'password', placeholder:'新密碼' });
  const tog1 = el('button', { type:'button', class:'pw-toggle', onclick: ()=> {
    i1.type = i1.type === 'password' ? 'text' : 'password';
    tog1.textContent = i1.type === 'password' ? '👁' : '🙈';
  }}, '👁');
  wrap1.appendChild(i1); wrap1.appendChild(tog1);
  f1.appendChild(wrap1);
  m.root.appendChild(f1);

  const f2 = el('div', { class:'field' });
  f2.appendChild(el('label', { class:'label' }, '確認密碼'));
  const i2 = el('input', { class:'input', type:'password', placeholder:'再輸入一次' });
  f2.appendChild(i2);
  m.root.appendChild(f2);

  const err = el('div', { class:'small', style:{color:'var(--danger)',display:'none',marginTop:'4px'} });
  m.root.appendChild(err);

  const submit = async ()=> {
    const p1 = i1.value;
    const p2 = i2.value;
    if(!p1 || p1.length < 4){
      err.textContent = '密碼至少 4 個字元'; err.style.display='block'; return;
    }
    if(p1 !== p2){
      err.textContent = '兩次密碼不一致'; err.style.display='block'; return;
    }
    // 不能與預設密碼相同
    const defaultPw = String(s.sid||'0000').slice(-4);
    if(p1 === defaultPw){
      err.textContent = '不能使用預設密碼，請設定一個新的'; err.style.display='block'; return;
    }
    // 寫入（雜湊）
    s.password = await hashPassword(p1);
    s.mustChangePw = false;
    s.passwordChangedAt = Date.now();
    saveDB();
    if(typeof logOp === 'function') logOp('passwordChange', s.name + ' 完成首次密碼設定');
    if(typeof Sync !== 'undefined' && Sync.push) Sync.push('students');
    m.close();
    toast('✅ 密碼設定成功，歡迎使用！','success');
    go('checkin');
  };

  i1.addEventListener('keydown', e => { if(e.key === 'Enter') i2.focus(); });
  i2.addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });

  const actions = el('div', { class:'modal-actions' });
  actions.appendChild(el('button', { class:'btn btn-primary btn-block', onclick: submit }, '設定密碼並進入'));
  m.root.appendChild(actions);

  setTimeout(()=> i1.focus(), 100);
}

function renderChrome(root, role){
  root.innerHTML = '';
  const app = el('div', { class:'app' + (App.sidebarCollapsed ? ' sb-collapsed' : '') });

  // sidebar (desktop)
  if(role === 'teacher'){
    app.appendChild(renderSidebarTeacher());
  } else {
    app.appendChild(renderSidebarStudent());
  }

  // main area
  const main = el('div', { class:'main-area' });
  main.appendChild(renderTopbar(role));
  const content = el('div', { class:'content', id:'main-content' });
  main.appendChild(content);
  if(role === 'teacher') main.appendChild(renderBottomNavTeacher());
  else main.appendChild(renderBottomNavStudent());

  app.appendChild(main);
  root.appendChild(app);

  return content;
}

// batch 2: 老師端側欄「未讀」學生回饋（依本學期 + 上次造訪時間判斷）
function teacherFeedbackBadge(){
  if(!App.session || App.session.role !== 'teacher') return 0;
  const term = currentTerm();
  const key = LS_KEY + '_fb_lastread_' + (App.cfg?.roomCode||'local');
  const lastRead = parseInt(localStorage.getItem(key) || '0', 10);
  return (App.db.feedbacks || []).filter(f => (f.term||'') === term && (f.ts||0) > lastRead).length;
}
function markFeedbackRead(){
  if(!App.session || App.session.role !== 'teacher') return;
  const key = LS_KEY + '_fb_lastread_' + (App.cfg?.roomCode||'local');
  try { localStorage.setItem(key, String(Date.now())); } catch(e){}
}
function studentNewAssignmentCount(){
  if(!App.session || App.session.role !== 'student') return 0;
  const me = currentStudent(); if(!me) return 0;
  const subs = new Set(App.db.submissions.filter(s => s.studentId === me.id).map(s => s.assignmentId));
  return App.db.assignments.filter(a => assignmentTargets(a).has(me.id) && !subs.has(a.id) && !isAssignmentOverdue(a)).length;
}
function studentUnreadAnnouncements(){
  if(!App.session || App.session.role !== 'student') return 0;
  const key = LS_KEY + '_annread_' + (App.cfg?.roomCode||'local') + '_' + App.session.id;
  let last = 0;
  try { last = parseInt(localStorage.getItem(key) || '0', 10) || 0; } catch(e){}
  return App.db.announcements.filter(a => (a.ts||0) > last && !isAnnouncementExpired(a)).length;
}
function studentPendingPeerCount(){
  if(!App.session || App.session.role !== 'student') return 0;
  const me = currentStudent(); if(!me) return 0;
  if(!App.db.peerEvals || !App.db.peerEvals.length) return 0;
  let pending = 0;
  App.db.peerEvals.forEach(pe => {
    if(typeof peerEvalIsDueClosed === 'function' && peerEvalIsDueClosed(pe)) return;
    const ratees = (typeof peerEvalRatees === 'function') ? peerEvalRatees(pe, me) : [];
    if(!ratees.length) return;
    const done = (pe.scores||[]).filter(s => s.raterId === me.id).length;
    if(done < ratees.length) pending++;
  });
  return pending;
}
function isAnnouncementExpired(a){
  if(!a.expireAt) return false;
  return new Date(a.expireAt).getTime() < Date.now();
}

function toggleTheme(){
  App.theme = App.theme === 'dark' ? 'light' : 'dark';
  saveTheme();
  try { applyBranding(); } catch(e){}
  rerender();
}
function doLogout(){
  confirmDlg('要登出嗎？資料會保留', { title:'登出' }).then(ok => {
    if(!ok) return;
    App.session = null;
    saveSession();
    App._loginStage = 'choose';
    App._loginPrefill = null;
    rerender();
  });
}

function rOv(content){
